<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STORY MASTER Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="style.css?v=1.2">
</head>
<body>
    <div id="app">
        <header id="top-header">
            <div class="header-main">
                <button id="menu-toggle" onclick="toggleSidebar()">☰</button>
                <div class="logo" id="projectTitle">STORY MASTER</div>
                <button class="save-btn" onclick="saveToCloud()">저장</button>
            </div>
            <div id="timeline-bar" class="sub-bar">
                <div class="search-wrap" id="searchBar"></div>
                <button class="era-btn" onclick="openEraModal()">연대 편집</button>
            </div>
        </header>

        <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
        <aside id="sidebar">
            <nav class="side-nav">
                <div class="nav-item active" id="m-timeline" onclick="switchView('timeline')">사건 타임라인</div>
                <div class="nav-item" id="m-story" onclick="switchView('story')">줄거리 집필</div>
                <div class="nav-item" id="m-char" onclick="switchView('character')">캐릭터 도감</div>
            </nav>
            <div class="side-footer">
                <button onclick="openLoadModal()">프로젝트 목록</button>
            </div>
        </aside>

        <main id="main-content">
            <section id="view-timeline" class="content-view active">
                <div class="timeline-container dot-bg">
                    <div class="center-line"></div>
                    <div id="event-list"></div>
                </div>
            </section>
            <section id="view-story" class="content-view">
                <div class="story-editor">
                    <div class="editor-header">
                        <h3 id="current-story-title">메인 줄거리</h3>
                        <div class="editor-btns">
                            <button id="story-edit-btn" onclick="toggleStoryEdit()">편집</button>
                        </div>
                    </div>
                    <div class="editor-body">
                        <div id="story-viewer" class="paper"></div>
                        <textarea id="story-input" class="paper" style="display:none;"></textarea>
                    </div>
                </div>
            </section>
        </main>

        <button class="fab" id="main-fab" onclick="addScene()">+</button>
    </div>

    <div id="detailModal" class="modal"><div class="modal-card">
        <div class="tab-header" id="modalTabMenu"></div>
        <div class="tab-content">
            <p id="modalDate" class="meta-info"></p>
            <div id="modalText" class="main-text"></div>
        </div>
        <div class="modal-footer">
            <button onclick="handleTabEdit()">수정</button>
            <button onclick="addBranch()">+ 가지</button>
            <button class="close" onclick="closeModal('detailModal')">닫기</button>
        </div>
    </div></div>

    <div id="editModal" class="modal"><div class="modal-card p-20">
        <h4>사건 기록</h4>
        <div class="edit-row">
            <select id="eraType"></select>
            <input type="number" id="eYear" placeholder="연도">
            <select id="eMonth"><script>for(let i=1;i<=12;i++)document.write(`<option value="${i}">${i}월</option>`)</script></select>
        </div>
        <textarea id="eContent" rows="5" placeholder="내용을 입력하세요"></textarea>
        <button class="btn-pill" onclick="saveScene()">저장</button>
        <button class="btn-ghost del-text" id="delBtn">삭제</button>
        <button class="btn-ghost" onclick="closeModal('editModal')">취소</button>
    </div></div>

    <div id="loadModal" class="modal"><div class="modal-card p-20">
        <h4>프로젝트 목록</h4>
        <div id="projectList"></div>
        <button class="btn-pill" id="addProjBtn">+ 새 프로젝트</button>
        <button class="btn-ghost" onclick="closeModal('loadModal')">닫기</button>
    </div></div>

    <script src="script.js?v=1.2"></script>
</body>
</html>
