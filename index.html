<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Yuta's Engine</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  
  <style>
    :root { --primary: #4dabf7; --bg: #f8f9fa; --line: #dee2e6; --paper: #ffffff; --node: #74c0fc; --text: #212529; }
    body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 75px; -webkit-user-select: none; user-select: none; }

    /* 상단 네비게이션 */
    .header { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 1000; }
    .header-btn { font-size: 11px; font-weight: 800; color: #adb5bd; border: none; background: none; cursor: pointer; }
    .header-btn.active { color: #333; }
    .header-btn.active::after { content: ''; position: absolute; bottom: -10px; left: 0; width: 100%; height: 3px; background: var(--node); }

    /* 모눈종이 배경 및 컨테이너 */
    .view-container { margin-top: 60px; min-height: 100vh; background-image: radial-gradient(#dee2e6 1px, transparent 1px); background-size: 25px 25px; }
    .view { display: none; padding: 20px; box-sizing: border-box; }
    .view.active { display: block; }

    /* 1. 타임라인 (쫀득한 노드 & 직사각형 박스 복구) */
    .timeline { position: relative; width: 100%; max-width: 550px; margin: 0 auto; padding-top: 30px; }
    .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--line); transform: translateX(-50%); z-index: 1; }
    
    .row { display: grid; grid-template-columns: 1fr 1fr; position: relative; margin-bottom: 25px; align-items: center; min-height: 90px; }
    .node-wrap { position: absolute; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
    .node-dot { width: 10px; height: 10px; background: #fff; border: 2px solid var(--node); border-radius: 50%; }
    .node-year { font-size: 10px; font-weight: 800; color: #fff; background: #343a40; padding: 3px 10px; border-radius: 12px; margin-top: 6px; white-space: nowrap; box-shadow: 0 3px 5px rgba(0,0,0,0.1); }

    /* 가로 연결선 (쫀득하게 붙는 선) */
    .connector { position: absolute; top: 15px; height: 1.5px; background: rgba(0,0,0,0.05); z-index: 2; width: calc(50% - 110px); }
    .line-left { right: 50%; }
    .line-right { left: 50%; }

    /* 메모 박스 (직사각형 파스텔) */
    .dropzone { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 90px; padding: 0 10px; z-index: 5; }
    .card { background: #fff; padding: 12px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); width: 125px; min-height: 60px; position: relative; cursor: pointer; border-left: 5px solid rgba(0,0,0,0.02); }
    .card:active { transform: scale(1.03); }
    .card-meta { font-size: 9px; color: var(--node); font-weight: 900; margin-bottom: 6px; }
    .card-text { font-size: 12px; font-weight: 700; color: #495057; line-height: 1.5; word-break: break-all; }

    /* 2. 스토리 (모바일 최적화) */
    .paper-area { width: 100%; box-sizing: border-box; background: var(--paper); border-radius: 15px; padding: 20px; min-height: calc(100vh - 160px); box-shadow: 0 3px 10px rgba(0,0,0,0.03); outline: none; }
    
    /* 3. 캐릭터 (동그라미 아이콘 작게) */
    .char-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
    .char-box { text-align: center; }
    .char-circle { width: 55px; height: 55px; border-radius: 50%; border: 3px solid #eee; margin: 0 auto 5px; background: #f1f3f5; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 20px; }

    /* 하단 메뉴 */
    .bottom-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: #fff; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; }
    .btn-sub { border: none; background: none; font-size: 11px; font-weight: 800; color: #adb5bd; cursor: pointer; padding: 10px; }
    .fab { width: 55px; height: 55px; background: var(--node); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 32px; transform: translateY(-20px); border: 5px solid var(--bg); box-shadow: 0 5px 15px rgba(116,192,252,0.4); }

    /* 커스텀 모달 (영문주소 없음) */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 3000; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
    .modal-content { background: white; width: 100%; max-width: 350px; padding: 25px; border-radius: 20px; box-sizing: border-box; }
    input, select, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #eee; border-radius: 10px; font-size: 14px; box-sizing: border-box; font-family: inherit; }
    .btn-main { width: 100%; padding: 14px; background: var(--node); color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 15px; cursor: pointer; }
  </style>
</head>
<body>

<header class="header">
  <button class="header-btn active" onclick="showTab('timeline', this)">타임라인</button>
  <button class="header-btn" onclick="showTab('story', this)">스토리</button>
  <button class="header-btn" onclick="showTab('char', this)">캐릭터도감</button>
</header>

<div class="view-container">
  <div id="timeline-view" class="view active">
    <div class="timeline">
      <div class="center-line"></div>
      <div id="tl-body"></div>
    </div>
    <div class="bottom-bar">
      <button class="btn-sub" onclick="openEraModal()">시대설정</button>
      <div class="fab" onclick="openEventModal()">+</div>
      <button class="btn-sub" onclick="saveAll()">클라우드</button>
    </div>
  </div>

  <div id="story-view" class="view">
    <div id="story-editor" class="paper-area" contenteditable="true" placeholder="트리트먼트를 작성하세요..."></div>
    <div class="bottom-bar">
      <button class="btn-sub" onclick="saveStory()">저장</button>
      <button class="btn-sub" onclick="alert('목록')">목록</button>
      <button class="btn-sub" onclick="extractParagraph()">추출</button>
    </div>
  </div>

  <div id="char-view" class="view">
    <div class="char-grid" id="char-list"></div>
    <div class="bottom-bar">
      <button class="btn-main" style="width: 85%;" onclick="openCharModal()">+ 캐릭터 추가</button>
    </div>
  </div>
</div>

<div id="eventModal" class="modal"><div class="modal-content">
  <h4 style="margin:0 0 15px 0">사건 기록</h4>
  <select id="e-era"></select>
  <div style="display:flex; gap:6px;">
    <input type="number" id="e-year" placeholder="연도">
    <input type="number" id="e-month" placeholder="월">
  </div>
  <textarea id="e-text" rows="5" placeholder="내용을 입력하세요"></textarea>
  <button class="btn-main" onclick="saveEvent()">기록 완료</button>
  <button class="btn-sub" style="width:100%; margin-top:10px;" onclick="closeModal('eventModal')">취소</button>
</div></div>

<div id="charModal" class="modal"><div class="modal-content">
  <h3>캐릭터 설정</h3>
  <input type="text" id="c-name" placeholder="이름">
  <input type="number" id="c-age" placeholder="나이">
  <textarea id="c-desc" rows="3" placeholder="설정 사항"></textarea>
  <button class="btn-main" onclick="saveChar()">저장</button>
  <button class="btn-sub" style="width:100%; margin-top:10px;" onclick="closeModal('charModal')">취소</button>
</div></div>

<script>
  const config = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
  if (!firebase.apps.length) firebase.initializeApp(config);
  const db = firebase.database();

  let state = { curProject: '기본', storyboard: [], eras: ['제국력'], characters: [], story: "" };

  function showTab(name, el) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.header-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(name + '-view').classList.add('active');
    el.classList.add('active');
    if(name === 'timeline') renderTimeline();
    if(name === 'char') renderChars();
  }

  // 타임라인 렌더링 (가로 연결선 & 파스텔 테두리)
  function renderTimeline() {
    const list = document.getElementById('tl-body');
    list.innerHTML = "";
    // 연도순 정렬
    const sorted = [...state.storyboard].sort((a,b) => a.year - b.year || a.month - b.month);
    
    let lastYear = null;
    sorted.forEach((s, i) => {
      const side = i % 2 === 0 ? 'left' : 'right';
      const row = document.createElement('div');
      row.className = 'row';
      
      // 연도가 바뀔 때만 노드 표시
      let yearHtml = '';
      if(s.year !== lastYear) {
        yearHtml = `<div class="node-year">${s.era} ${s.year}년</div>`;
        lastYear = s.year;
      }

      row.innerHTML = `
        <div class="dropzone" data-side="left"></div>
        <div class="node-wrap">
          ${yearHtml}
          <div class="node-dot"></div>
        </div>
        <div class="dropzone" data-side="right"></div>
        <div class="connector line-${side}"></div>
      `;
      
      const zone = row.querySelector(`.dropzone[data-side="${side}"]`);
      const card = document.createElement('div');
      card.className = 'card';
      // 파스텔톤 순환 테두리
      card.style.borderLeftColor = ['#d0ebff','#b2f2bb','#ffec99','#ffccf9'][i % 4];
      card.innerHTML = `<div class="card-meta"><span>No.${i+1}</span> <span>${s.month}월</span></div><div class="card-text">${s.text}</div>`;
      card.onclick = () => openEditEvent(s.id);
      zone.appendChild(card);
      list.appendChild(row);
    });
  }

  // 데이터 동기화
  function sync() { db.ref('users/Yuta/projects/' + state.curProject).set(state); }
  function saveAll() { sync(); alert("클라우드 저장 완료!"); }

  // 사건 입력 로직
  let editId = null;
  function openEventModal() { editId = null; document.getElementById('e-text').value = ""; document.getElementById('e-era').innerHTML = state.eras.map(e=>`<option>${e}</option>`).join(''); openModal('eventModal'); }
  function saveEvent() {
    const text = document.getElementById('e-text').value; if(!text) return;
    const ev = { id: editId || Date.now(), era: document.getElementById('e-era').value, year: parseInt(document.getElementById('e-year').value)||0, month: parseInt(document.getElementById('e-month').value)||1, text: text };
    if(editId) state.storyboard = state.storyboard.map(s => s.id === editId ? ev : s);
    else state.storyboard.push(ev);
    renderTimeline(); closeModal('eventModal'); sync();
  }

  // 모달 제어
  function openModal(id) { document.getElementById(id).style.display = 'flex'; }
  function closeModal(id) { document.getElementById(id).style.display = 'none'; }
  function renderChars() { const list = document.getElementById('char-list'); list.innerHTML = (state.characters || []).map(c => `<div class="char-box"><div class="char-circle">👤</div><div style="font-size:12px; font-weight:800">${c.name}</div></div>`).join(''); }

  // 초기 로딩
  window.onload = () => {
    db.ref('users/Yuta/projects/기본').once('value', s => {
      const d = s.val(); if(d) state = d; renderTimeline();
    });
  };
</script>
</body>
</html>
