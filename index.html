<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STORY MASTER v4.6</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=4.6">
</head>
<body>
    <div id="app">
        <header id="main-nav">
            <div class="logo">SM</div>
            <div class="nav-right">
                <span class="v-tab active">타임라인</span>
                <span class="v-tab">스토리</span>
                <span class="v-tab">캐릭터</span>
            </div>
        </header>

        <div class="sub-nav">
            <div class="proj-selector" onclick="toggleProjMenu()">
                <span id="currentProjectTitle">이그리예가</span> <i class="fas fa-chevron-down"></i>
                <div id="projMenuPopup" class="proj-popup hidden">
                    <div class="pop-item" onclick="createNewProject()">+ 새 프로젝트</div>
                    <div id="project-list-items"></div>
                </div>
            </div>
            <button class="btn-cloud" onclick="saveToCloud()"><i class="fas fa-cloud-upload-alt"></i></button>
        </div>

        <main id="main-content">
            <div class="timeline-canvas dot-bg" id="canvas">
                <div class="center-line"></div>
                <svg id="connection-svg"></svg>
                <div id="event-container"></div>
            </div>
        </main>

        <div id="bottom-sheet-layer" onclick="closeSheet(event)">
            <div id="bottom-sheet">
                <div class="sheet-handle"></div>
                
                <div id="view-mode">
                    <div class="branch-preview" id="view-branches"></div>
                    <div class="sheet-header">
                        <span id="view-date" class="text-primary"></span>
                        <button class="btn-del-text" onclick="deleteEvent()">삭제</button>
                    </div>
                    <h3 id="view-title"></h3>
                    <p id="view-memo"></p>
                    <div class="sheet-footer">
                        <button class="btn-edit-main" onclick="toggleEditMode(true)">내용 편집</button>
                        <button class="btn-add-branch" onclick="addBranch()">+ 가지 추가</button>
                    </div>
                </div>

                <div id="edit-mode" class="hidden">
                    <div class="edit-grid">
                        <div class="input-group">
                            <label>연대 선택</label>
                            <div class="flex-row">
                                <select id="edit-year-sel"></select>
                                <button class="btn-small" onclick="addNewYear()">추가</button>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>월 설정</label>
                            <select id="edit-month"></select>
                        </div>
                    </div>
                    <input type="text" id="edit-title" placeholder="사건 제목">
                    <textarea id="edit-memo" placeholder="상세 메모를 입력하세요"></textarea>
                    <button class="btn-save-full" onclick="updateEvent()">저장하기</button>
                </div>
                <button class="btn-close-sheet" onclick="closeSheet()">닫기</button>
            </div>
        </div>

        <button class="fab" onclick="createNewEvent()">+</button>
    </div>
    <script src="script.js?v=4.6"></script>
</body>
</html>
