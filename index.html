<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yuta's Engine</title>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { 
            --primary: #4dabf7; --dark: #343a40; --text: #495057; --node: #74c0fc; --bg: #f8f9fa;
            --p1: #d0ebff; --p2: #fff9db; --p3: #d3f9d8; --p4: #ffe3e3; 
            --line: #dee2e6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        .app-header { height: 60px; background: var(--dark); color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: fixed; top:0; width:100%; z-index:2000; }
        .header-side { width: 80px; display: flex; gap: 15px; align-items: center; }
        .app-logo { width: 32px; height: 32px; background: var(--primary); border-radius: 8px; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 14px; color: white; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        .project-title { flex: 1; text-align: center; font-weight: bold; font-size: 16px; cursor: pointer; padding: 6px; border-radius: 8px; transition: 0.2s; border: 1px solid rgba(255,255,255,0.1); }
        .icon-btn { cursor: pointer; font-size: 18px; background: none; border: none; color: white; display: flex; justify-content: center; align-items: center; transition: 0.2s; opacity: 0.8; }
        .icon-btn:active { opacity: 1; transform: scale(0.9); }

        .tab-menu { position:fixed; top:60px; width:100%; display:flex; background:white; z-index:1999; height:45px; border-bottom:1px solid #eee; }
        .tab-item { flex:1; display:flex; align-items:center; justify-content:center; font-size:14px; color:#adb5bd; cursor:pointer; }
        .tab-item.active { color:var(--dark); font-weight:bold; border-bottom: 2px solid var(--dark); }

        .content-body { margin-top: 105px; padding-bottom: 120px; }
        .view { display: none; width: 100%; }
        .view.active { display: block; }

        /* 타임라인 노드 및 선 교차점 완벽 일치화 */
        .tl-wrapper { position: relative; width: 100%; max-width: 500px; margin: 0 auto; padding-top: 10px; }
        .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--line); transform: translateX(-50%); z-index: 1; }
        .year-banner { display: flex; justify-content: center; margin: 30px 0 15px; width: 100%; position: relative; z-index: 10; }
        .year-text { background: var(--dark); color: white; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .month-cluster { position: relative; width: 100%; margin-bottom: 40px; }
        /* 💡 노드 위치를 선과 선이 만나는 위치에 정확히 고정 */
        .month-node { position: absolute; left: 50%; top: 15px; transform: translate(-50%, -50%); width: 10px; height: 10px; background: white; border: 3px solid var(--node); border-radius: 50%; z-index: 5; }

        .event-grid { display: grid; grid-template-columns: 1fr 1fr; width: 100%; padding: 0 15px; gap: 40px; position: relative; }
        .timeline-card { background: #fff; padding: 12px; border-radius: 10px; width: 100%; box-shadow: 0 3px 10px rgba(0,0,0,0.06); position: relative; cursor: grab; z-index: 10; align-self: center; }
        
        .card-index { position: absolute; top: 15px; width: 20px; z-index: -1; }
        .timeline-card:nth-child(odd) .card-index { right: -20px; border-bottom: 2px solid var(--line); } 
        .timeline-card:nth-child(even) .card-index { left: -20px; border-bottom: 2px solid var(--line); }

        /* 모달 스타일 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 3000; justify-content: center; align-items: center; backdrop-filter: blur(2px); }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 18px; width: 320px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }

        /* 스토리 뷰 전용 */
        #story-view { background: #f1f3f5; padding: 15px; min-height: calc(100vh - 105px); display: flex; justify-content: center; }
        #story-treatment { background: #fff; border: none; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 25px; width: 100%; max-width: 600px; height: calc(100vh - 145px); resize: none; font-size: 15px; line-height: 1.6; outline: none; }

        /* 캐릭터 동그란 아이콘 */
        .char-circle { width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; font-size: 13px; cursor: pointer; box-shadow: 0 3px 6px rgba(0,0,0,0.1); position: relative; }

        /* 심플한 아이콘 메뉴 */
        .pop-menu { display: none; position: absolute; bottom: 65px; right: 0; background: white; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); width: 150px; overflow: hidden; }
        .pop-menu.active { display: block; }
        .pop-item { padding: 12px; font-size: 13px; color: #495057; cursor: pointer; border-bottom: 1px solid #f1f3f5; display: flex; align-items: center; gap: 8px; }
        .pop-item:active { background: #f8f9fa; }

        .input-row { display: flex; gap: 5px; margin-bottom: 12px; width: 100%; }
        .input-row input, .input-row select, .input-row textarea { padding: 12px; border: 1px solid #f1f3f5; border-radius: 8px; font-size: 14px; background: #f8f9fa; min-width: 0; outline: none; }

        .fab-wrap { position:fixed; bottom:30px; right:25px; z-index:2001; }
        .main-fab { width:54px; height:54px; border-radius:50%; background:var(--primary); color:white; border:none; font-size:28px; box-shadow:0 5px 15px rgba(77,171,247,0.4); cursor:pointer; }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="header-side"><div class="app-logo">YE</div></div>
        <div class="project-title">이그리에가 ▾</div>
        <div class="header-side" style="justify-content: flex-end;">
            <button class="icon-btn" onclick="location.reload()">⟳</button>
            <button class="icon-btn" onclick="alert('자동 저장되었습니다.')">✔</button>
        </div>
    </header>

    <nav class="tab-menu">
        <div class="tab-item active" onclick="showTab('timeline', this)">타임라인</div>
        <div class="tab-item" onclick="showTab('story', this)">스토리</div>
        <div class="tab-item" onclick="showTab('char', this)">캐릭터도감</div>
    </nav>

    <main class="content-body">
        <div id="timeline-view" class="view active">
            <div class="tl-wrapper"><div class="center-line"></div><div id="tl-list"></div></div>
        </div>
        
        <div id="story-view" class="view">
            <textarea id="story-treatment" placeholder="이곳에 기본 트리트먼트를 작성하세요.">첫 번째 단락: 주인공이 모험을 시작한다.</textarea>
        </div>
        
        <div id="char-view" class="view" style="padding:20px;">
            <div id="char-list" style="display:flex; flex-wrap:wrap; gap:15px; justify-content:center;"></div>
        </div>
    </main>

    <div id="timelineModal" class="modal"><div class="modal-content" style="padding:25px; background:white;">
        <h4 style="margin-bottom:15px; font-size:16px;">새로운 기록</h4>
        <p style="font-size:12px; color:#ff6b6b; margin-bottom:10px;">날짜(년/월)를 입력해주세요!</p>
        <div class="input-row"><input type="number" placeholder="년도 입력"> <input type="number" placeholder="월 입력"></div>
        <div class="input-row"><textarea rows="3" placeholder="내용을 입력하세요..." style="width:100%; resize:none;"></textarea></div>
        <div style="display:flex; justify-content:space-between; margin-top:15px;">
            <button class="f-btn-text" style="color:var(--primary);" onclick="alert('데이터베이스 연동 준비중'); closeModal('timelineModal')">저장</button>
            <button class="f-btn-text" style="color:#adb5bd;" onclick="closeModal('timelineModal')">닫기</button>
        </div>
    </div></div>

    <div id="charRegModal" class="modal"><div class="modal-content" style="padding:25px; border-radius:24px; background:white;">
        <h4 style="font-size:18px; font-weight:bold; margin-bottom:20px; text-align:center;">캐릭터 등록</h4>
        <div style="width:80px; height:80px; border-radius:50%; background:#f1f3f5; display:flex; justify-content:center; align-items:center; margin:0 auto 20px; color:#adb5bd; font-size:14px; cursor:pointer;">사진+</div>
        <div class="input-row"><input type="text" id="c-name" placeholder="이름" style="width:100%;"></div>
        <div class="input-row"><input type="text" id="c-age" placeholder="나이" style="flex:1;"> <input type="text" id="c-gender" placeholder="성별" style="flex:1;"></div>
        <div class="input-row"><input type="text" id="c-feat" placeholder="외모/특징" style="width:100%;"></div>
        <div class="input-row"><textarea id="c-memo" rows="3" placeholder="중요 메모" style="width:100%; resize:none;"></textarea></div>
        <div style="font-size:12px; color:#adb5bd; text-align:left; margin-bottom:8px;">캐릭터 분류 색상</div>
        <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-bottom:20px;" id="color-palette"></div>
        <button class="f-btn-text" style="width:100%; background:var(--primary); color:white; border-radius:12px; padding:12px; font-weight:bold; border:none;" onclick="saveCharacter()">캐릭터 저장</button>
        <button class="f-btn-text" style="width:100%; background:#f1f3f5; color:#495057; border-radius:12px; padding:12px; font-weight:bold; border:none; margin-top:8px;" onclick="closeModal('charRegModal')">닫기</button>
    </div></div>

    <div id="charDetailModal" class="modal"><div class="modal-content" style="padding:25px; border-radius:24px; background:white;">
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
            <div id="d-avatar" class="char-circle" style="width:50px; height:50px; font-size:12px;"></div>
            <h4 id="d-name" style="font-size:16px; font-weight:bold; margin:0;">이름</h4>
        </div>
        <p id="d-memo" style="font-size:13px; color:#495057; line-height:1.6; min-height:80px; background:#f8f9fa; padding:15px; border-radius:8px; margin-bottom:20px;"></p>
        <div style="display:flex; gap:10px;">
            <button class="f-btn-text" style="flex:1; background:#f1f3f5; color:#495057; border-radius:10px; padding:10px;" onclick="alert('수정 기능 준비중');">수정</button>
            <button class="f-btn-text" style="flex:1; background:#ffe3e3; color:#ff6b6b; border-radius:10px; padding:10px;" id="btn-delete-char">삭제</button>
            <button class="f-btn-text" style="flex:1; background:#eee; color:#adb5bd; border-radius:10px; padding:10px;" onclick="closeModal('charDetailModal')">닫기</button>
        </div>
    </div></div>

    <div class="fab-wrap">
        <div class="pop-menu" id="story-menu">
            <div class="pop-item" onclick="alert('문서 목록 준비중'); closePopMenus();">○ 목록 열기</div>
            <div class="pop-item" onclick="alert('단락 내보내기'); closePopMenus();">○ 단락 내보내기</div>
        </div>
        <div class="pop-menu" id="char-menu">
            <div class="pop-item" onclick="openModal('charRegModal'); closePopMenus();">○ 캐릭터 추가</div>
            <div class="pop-item" onclick="alert('관계도 정리 창 준비중'); closePopMenus();">○ 관계도 정리</div>
        </div>
        <button class="main-fab" onclick="handleFabClick()">+</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://true-s-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let state = { storyboard: [], eras: ['제국력'], currentTab: 'timeline' };
        
        let characters = [
            {id: 'c1', name: '홍길동', color: '#ff6b6b', memo: '정의로운 주인공. 의적 활동을 한다.'},
            {id: 'c2', name: '이몽룡', color: '#339af0', memo: '청렴한 어사. 성춘향과 사랑에 빠진다.'},
            {id: 'c3', name: '성춘향', color: '#20c997', memo: '절개 있는 여인. 이몽룡을 기다린다.'}
        ];
        const paletteColors = ['#ff6b6b', '#f06595', '#cc5de8', '#845ef7', '#5c7cfa', '#339af0', '#22b8cf', '#20c997', '#51cf66', '#fcc419'];
        let selectedColor = '#ff6b6b';

        function syncData() {
            db.ref('users/Yuta/projects/기본/storyboard').on('value', snap => {
                const raw = snap.val();
                if(!raw) { state.storyboard = []; renderTimeline(); return; }
                state.storyboard = Object.keys(raw).map(key => ({...raw[key], id: String(key)})).sort((a,b) => (a.order || 0) - (b.order || 0));
                renderTimeline();
            });
            renderColorPalette();
            renderCharacters();
        }

        /* 💡 탭 전환 함수 복구 (꼬임 해결) */
        function showTab(n, el) { 
            state.currentTab = n; 
            document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active')); 
            document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); 
            el.classList.add('active'); 
            document.getElementById(n+'-view').classList.add('active'); 
            closePopMenus();
        }

        function handleFabClick() {
            closePopMenus();
            if (state.currentTab === 'timeline') { openModal('timelineModal'); }
            else if (state.currentTab === 'story') { document.getElementById('story-menu').classList.toggle('active'); }
            else if (state.currentTab === 'char') { document.getElementById('char-menu').classList.toggle('active'); }
        }

        function closePopMenus() { document.querySelectorAll('.pop-menu').forEach(m => m.classList.remove('active')); }

        function renderColorPalette() {
            const palette = document.getElementById('color-palette'); palette.innerHTML = '';
            paletteColors.forEach(color => {
                const chip = document.createElement('div');
                chip.style.cssText = `width:24px; height:24px; border-radius:50%; background:${color}; cursor:pointer; border:2px solid ${color === selectedColor ? '#343a40' : 'transparent'};`;
                chip.onclick = () => { selectedColor = color; renderColorPalette(); };
                palette.appendChild(chip);
            });
        }

        /* 💡 캐릭터 아이콘 클릭 시 상세 모달창 열기로 변경 */
        function renderCharacters() {
            const list = document.getElementById('char-list'); list.innerHTML = '';
            characters.sort((a, b) => a.color.localeCompare(b.color));
            characters.forEach(c => {
                const item = document.createElement('div');
                item.className = 'char-circle';
                item.style.background = c.color;
                item.innerText = c.name.substring(0, 2);
                item.onclick = () => openCharDetailModal(c.id); // 수정/삭제 대신 상세보기 열기
                list.appendChild(item);
            });
        }

        /* 💡 캐릭터 상세보기 모달 구현 */
        function openCharDetailModal(id) {
            const c = characters.find(char => char.id === id);
            if(!c) return;
            document.getElementById('d-name').innerText = c.name;
            document.getElementById('d-memo').innerText = c.memo || '작성된 메모가 없습니다.';
            const avatar = document.getElementById('d-avatar');
            avatar.style.background = c.color; avatar.innerText = c.name.substring(0, 2);
            document.getElementById('btn-delete-char').onclick = () => deleteCharacter(c.id);
            openModal('charDetailModal');
        }

        function deleteCharacter(id) {
            if(confirm('이 캐릭터를 정말 삭제하시겠습니까?')) {
                characters = characters.filter(char => char.id !== id);
                renderCharacters();
                closeModal('charDetailModal');
            }
        }

        function saveCharacter() {
            const name = document.getElementById('c-name').value.trim();
            const memo = document.getElementById('c-memo').value.trim();
            if(!name) return alert('이름을 입력해주세요!');
            characters.push({ id: 'c' + Date.now(), name: name, color: selectedColor, memo: memo });
            document.getElementById('c-name').value = ''; document.getElementById('c-feat').value = ''; document.getElementById('c-memo').value = '';
            closeModal('charRegModal'); renderCharacters();
        }

        function renderTimeline() {
            const list = document.getElementById('tl-list'); list.innerHTML = ''; 
            const grouped = state.storyboard.reduce((acc, cur) => {
                const key = `${cur.era} ${cur.year}년`;
                if(!acc[key]) acc[key] = {};
                if(!acc[key][cur.month]) acc[key][cur.month] = [];
                acc[key][cur.month].push(cur); return acc;
            }, {});

            for(const yearKey in grouped) {
                const banner = document.createElement('div'); banner.className = 'year-banner';
                banner.innerHTML = `<span class="year-text">${yearKey}</span>`;
                list.appendChild(banner); 

                for(const month in grouped[yearKey]) {
                    if (grouped[yearKey][month].length === 0) continue;
                    const cluster = document.createElement('div'); cluster.className = 'month-cluster';
                    cluster.innerHTML = `<div class="month-node"></div>`; // 💡 교차점 노드
                    const grid = document.createElement('div'); grid.className = 'event-grid'; grid.dataset.month = month; grid.dataset.yearKey = yearKey;

                    grouped[yearKey][month].forEach((ev) => {
                        const card = document.createElement('div'); card.className = 'timeline-card'; card.dataset.id = String(ev.id);
                        card.innerHTML = `<div class="card-index"></div><div><div style="font-size:10px; color:var(--node); font-weight:bold;">${month}월</div><div style="font-size:12px; margin-top:5px; line-height:1.5;">${ev.text}</div></div>`;
                        grid.appendChild(card);
                    });
                    cluster.appendChild(grid); list.appendChild(cluster); 
                }
            }
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        syncData();
    </script>
</body>
</html>
