<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>STORY MASTER Pro v17</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    :root { --primary: #4dabf7; --bg: #f1f3f5; --card-bg: #ffffff; --line: #dee2e6; --text: #212529; --gray: #868e96; }
    body { font-family: 'Pretendard', sans-serif; margin: 0; background-color: var(--bg); color: var(--text); overflow-x: hidden; -webkit-user-select: none; user-select: none; touch-action: pan-y; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    /* 헤더 & 상단 고정 메뉴 */
    .fixed-header { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.95); backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid #eee; }
    .top-bar { height: 50px; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; }
    .project-name { font-weight: 900; color: var(--primary); font-size: 16px; }
    .top-btns { display: flex; gap: 10px; }
    .top-btn { border: none; background: #f1f3f5; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 800; color: #495057; }

    .tab-nav { height: 45px; display: flex; justify-content: center; align-items: center; gap: 40px; border-top: 1px solid #f8f9fa; }
    .tab-item { font-size: 14px; font-weight: 800; color: #adb5bd; cursor: pointer; padding-bottom: 4px; border-bottom: 2px solid transparent; }
    .tab-item.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* 컨텐츠 영역 */
    .view-container { margin-top: 105px; padding: 15px; min-height: 100vh; }
    .view { display: none; }
    .view.active { display: block; }

    /* [타임라인 스타일] */
    .timeline-wrap { position: relative; width: 100%; max-width: 500px; margin: 0 auto; }
    .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--line); transform: translateX(-50%); }
    .year-marker { position: relative; width: fit-content; margin: 25px auto 15px; padding: 6px 14px; background: #343a40; color: white; border-radius: 20px; font-size: 10px; font-weight: 800; z-index: 10; }
    .row { display: grid; grid-template-columns: 1fr 1fr; position: relative; margin-bottom: 25px; min-height: 80px; }
    .node { width: 10px; height: 10px; background: white; border: 2px solid var(--primary); border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); top: 30px; z-index: 5; }
    .dropzone { display: flex; flex-direction: column; gap: 15px; min-height: 80px; }
    .dropzone[data-side="left"] { align-items: flex-end; padding-right: 35px; }
    .dropzone[data-side="right"] { align-items: flex-start; padding-left: 35px; }

    /* 인덱스 탭 & 카드 */
    .card-wrapper { position: relative; width: 105px; z-index: 10; cursor: pointer; }
    .side-tabs { position: absolute; top: 8px; display: flex; flex-direction: column; gap: 2px; }
    .dropzone[data-side="left"] .side-tabs { right: 100%; align-items: flex-end; }
    .dropzone[data-side="right"] .side-tabs { left: 100%; align-items: flex-start; }
    .tab-idx { width: 12px; height: 18px; border: 1px solid rgba(0,0,0,0.03); border-radius: 4px; }
    .tab-white { background: #fff; } .tab-blue { background: #d0ebff; } .tab-yellow { background: #fff9db; } .tab-green { background: #d3f9d8; } .tab-pink { background: #ffdeeb; }
    .card { background: #fff; width: 100%; min-height: 60px; border-radius: 12px; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
    .card-month { font-size: 9px; font-weight: 900; color: var(--primary); margin-bottom: 3px; }
    .card-content { font-size: 11px; font-weight: 700; line-height: 1.4; color: #333; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }

    /* [스토리 글 목록 스타일] */
    .story-list { display: flex; flex-direction: column; gap: 12px; }
    .story-card { background: #fff; padding: 15px; border-radius: 15px; border: 1px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
    .story-info { font-size: 10px; color: var(--gray); font-weight: 800; margin-bottom: 5px; }
    .story-body { font-size: 14px; font-weight: 700; line-height: 1.6; color: #444; }

    /* [캐릭터 4열 스타일] */
    .char-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .char-item { text-align: center; }
    .char-circle { width: 65px; height: 65px; border-radius: 20px; background: #eee; margin: 0 auto 5px; overflow: hidden; border: 2px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; }
    .char-circle img { width: 100%; height: 100%; object-fit: cover; }
    .char-name { font-size: 11px; font-weight: 800; }

    /* 모달 스타일 */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
    .modal-content { background: white; width: 90%; max-width: 400px; padding: 25px; border-radius: 25px; max-height: 85vh; overflow-y: auto; }
    .btn-pill { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 15px; font-weight: 800; width: 100%; cursor: pointer; margin-top: 10px; }
    .btn-ghost { background: #f1f3f5; border: none; padding: 12px; border-radius: 12px; font-weight: 700; width: 100%; margin-top: 8px; }

    /* 플로팅 버튼 */
    .fab { position: fixed; bottom: 30px; right: 20px; width: 55px; height: 55px; background: var(--primary); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 8px 20px rgba(77,171,247,0.4); z-index: 900; }
  </style>
</head>
<body>

<div class="fixed-header">
  <div class="top-bar">
    <div class="project-name" id="projectTitle">이그리예가</div>
    <div class="top-btns">
      <button class="top-btn" onclick="window.sync()">저장</button>
      <button class="top-btn" onclick="location.reload()">갱신</button>
    </div>
  </div>
  <div class="tab-nav">
    <div id="t-timeline" class="tab-item active" onclick="switchView('timeline')">타임라인</div>
    <div id="t-story" class="tab-item" onclick="switchView('story')">스토리</div>
    <div id="t-char" class="tab-item" onclick="switchView('char')">캐릭터</div>
  </div>
</div>

<div class="view-container">
  <div id="view-timeline" class="view active">
    <div class="timeline-wrap" id="timeline"></div>
  </div>

  <div id="view-story" class="view">
    <div class="story-list" id="story-render"></div>
  </div>

  <div id="view-char" class="view">
    <div class="char-grid" id="char-render"></div>
  </div>
</div>

<div class="fab" id="mainFab" onclick="window.addScene()">+</div>

<div id="editModal" class="modal"><div class="modal-content">
  <h4 style="text-align:center; margin-bottom:20px;">기록 편집</h4>
  <div style="display:flex; gap:6px; margin-bottom:10px;">
    <select id="eraType" style="flex:1.5; padding:10px; border-radius:10px; border:1px solid #eee;"></select>
    <input type="number" id="eYear" style="flex:1; padding:10px; border-radius:10px; border:1px solid #eee;" placeholder="년">
    <select id="eMonth" style="flex:1; padding:10px; border-radius:10px; border:1px solid #eee;">
      <script>for(let i=1;i<=12;i++)document.write(`<option value="${i}">${i}월</option>`)</script>
    </select>
  </div>
  <div style="display:flex; gap:5px; margin-bottom:15px;">
    <button class="top-btn" style="flex:1;" onclick="window.manageEras()">시대 추가/삭제</button>
  </div>
  <textarea id="eContent" style="width:100%; height:120px; padding:12px; border-radius:12px; border:1px solid #eee; margin-bottom:15px;" placeholder="내용을 입력하세요"></textarea>
  <button class="btn-pill" onclick="window.saveScene()">저장하기</button>
  <button class="btn-ghost" style="color:red;" id="delBtn">삭제</button>
  <button class="btn-ghost" onclick="window.closeModal('editModal')">닫기</button>
</div></div>

<div id="viewModal" class="modal"><div class="modal-content">
  <div style="display:flex; align-items:flex-end; gap:4px;" id="viewTabMenu"></div>
  <div style="border:1px solid #ddd; border-radius:0 15px 15px 15px; padding:15px; background:white; margin-bottom:15px;">
    <div id="viewMonth" style="font-size:11px; font-weight:900; color:var(--primary); margin-bottom:5px;"></div>
    <div id="viewText" style="font-size:15px; line-height:1.6; font-weight:700; min-height:100px; white-space:pre-wrap;"></div>
  </div>
  <div style="display:flex; gap:8px;"><button class="btn-pill" onclick="window.handleTabEdit()">편집</button><button class="btn-ghost" onclick="window.showBranchInput()">+ 가지</button></div>
  <button class="btn-ghost" onclick="window.closeModal('viewModal')">닫기</button>
</div></div>

<script>
  const config = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", authDomain: "true-s.firebaseapp.com", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
  if (!firebase.apps.length) firebase.initializeApp(config);
  const db = firebase.database();

  let storyboard = [], eras = ["공통"], chars = [], charDetails = {}, currentProject = "이그리예가";
  let editingId = null, currentViewTab = 0;
  const pastelTabs = ["tab-blue", "tab-yellow", "tab-green", "tab-pink"];

  function switchView(view) {
    document.querySelectorAll('.view, .tab-item').forEach(e => e.classList.remove('active'));
    document.getElementById(`view-${view}`).classList.add('active');
    document.getElementById(`t-${view}`).classList.add('active');
    
    const fab = document.getElementById('mainFab');
    if(view === 'timeline') { fab.onclick = window.addScene; fab.style.display = 'flex'; }
    else if(view === 'story') { fab.style.display = 'none'; window.renderStories(); }
    else if(view === 'char') { fab.onclick = window.openCharAdd; fab.style.display = 'flex'; window.renderChars(); }
  }

  // [타임라인 렌더링]
  window.renderTimeline = () => {
    const container = document.getElementById('timeline');
    container.innerHTML = '<div class="center-line"></div>';
    eras.forEach(eName => {
      const eraData = storyboard.filter(s => s.era === eName).sort((a,b) => (a.year - b.year) || (a.month - b.month));
      if(eraData.length === 0) return;
      
      const groups = {};
      eraData.forEach(sc => {
        const k = `${eName} ${sc.year}년`;
        if(!groups[k]) groups[k] = {}; if(!groups[k][sc.month]) groups[k][sc.month] = {left:[], right:[]};
        groups[k][sc.month][sc.side||'left'].push(sc);
      });

      Object.keys(groups).forEach(key => {
        container.innerHTML += `<div class="year-marker">${key}</div>`;
        Object.keys(groups[key]).sort((a,b)=>a-b).forEach(m => {
          const row = document.createElement('div'); row.className = 'row';
          row.innerHTML = `<div class="dropzone" data-side="left"></div><div class="node"></div><div class="dropzone" data-side="right"></div>`;
          container.appendChild(row);
          ['left','right'].forEach(side => {
            const zone = row.querySelector(`.dropzone[data-side="${side}"]`);
            groups[key][m][side].forEach(sc => {
              const wrap = document.createElement('div'); wrap.className = 'card-wrapper'; wrap.dataset.id = sc.id;
              let tH = `<div class="tab-idx tab-white"></div>`;
              if(sc.branches) sc.branches.forEach((_,i) => tH += `<div class="tab-idx ${pastelTabs[i]}"></div>`);
              wrap.innerHTML = `<div class="side-tabs">${tH}</div><div class="card"><div class="card-month">${m}월</div><div class="card-content">${sc.text}</div></div>`;
              wrap.onclick = () => window.openViewer(sc.id);
              zone.appendChild(wrap);
            });
          });
        });
      });
    });
  };

  // [스토리 글 목록 렌더링]
  window.renderStories = () => {
    const render = document.getElementById('story-render');
    const sorted = [...storyboard].sort((a,b) => (a.year - b.year) || (a.month - b.month));
    render.innerHTML = sorted.map(s => `
      <div class="story-card" onclick="window.openViewer('${s.id}')">
        <div class="story-info">${s.era} | ${s.year}년 ${s.month}월</div>
        <div class="story-body">${s.text}</div>
      </div>
    `).join('');
  };

  // [사건 저장 & 시대 관리]
  window.saveScene = () => {
    const text = document.getElementById('eContent').value;
    if(!text) return;
    const scene = {
      id: editingId || Date.now().toString(),
      era: document.getElementById('eraType').value,
      year: parseInt(document.getElementById('eYear').value) || 1000,
      month: parseInt(document.getElementById('eMonth').value),
      text: text,
      side: 'left',
      branches: editingId ? (storyboard.find(x=>x.id==editingId).branches || []) : []
    };
    if(editingId) storyboard = storyboard.map(s => s.id === editingId ? scene : s);
    else storyboard.push(scene);
    window.sync(); window.closeModal('editModal');
  };

  window.manageEras = () => {
    const n = prompt("새로운 시대 이름을 입력하거나 삭제할 이름을 정확히 입력하세요.", "");
    if(!n) return;
    if(eras.includes(n)) { if(confirm(`'${n}' 시대를 삭제할까요?`)) eras = eras.filter(e => e !== n); }
    else { eras.push(n); }
    window.updateEraSelect();
  };

  window.updateEraSelect = () => {
    document.getElementById('eraType').innerHTML = eras.map(e => `<option value="${e}">${e}</option>`).join('');
  };

  window.sync = () => {
    db.ref('projects/'+currentProject).set({ storyboard, eras, chars, charDetails }).then(() => {
      window.renderTimeline();
      window.renderStories();
    });
  };

  window.addScene = () => {
    editingId = null;
    document.getElementById('eContent').value = "";
    window.updateEraSelect();
    window.openModal('editModal');
  };

  window.openViewer = (id) => {
    editingId = id; const s = storyboard.find(x => x.id == id);
    currentViewTab = 0; window.renderTabs(s); window.openModal('viewModal');
  };

  window.renderTabs = (s) => {
    const menu = document.getElementById('viewTabMenu');
    let tabs = [`<div class="v-tab active" onclick="window.switchTab(0)">사건</div>`];
    (s.branches || []).forEach((_, i) => tabs.push(`<div class="v-tab ${pastelTabs[i]} ${currentViewTab===(i+1)?'active':''}" onclick="window.switchTab(${i+1})">탭 ${i+1}</div>`));
    menu.innerHTML = tabs.join('');
    document.getElementById('viewMonth').innerText = `${s.era} ${s.year}년 ${s.month}월`;
    document.getElementById('viewText').innerText = currentViewTab === 0 ? s.text : s.branches[currentViewTab-1];
  };

  window.closeModal = (id) => document.getElementById(id).style.display = 'none';
  window.openModal = (id) => document.getElementById(id).style.display = 'flex';

  window.onload = () => {
    db.ref('projects/'+currentProject).on('value', s => {
      const d = s.val();
      if(d) {
        storyboard = d.storyboard || [];
        eras = d.eras || ["공통"];
        chars = d.chars || [];
        charDetails = d.charDetails || {};
        window.renderTimeline();
        window.updateEraSelect();
      }
    });
  };
</script>
</body>
</html>
