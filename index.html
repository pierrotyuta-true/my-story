<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STORY MASTER v2.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="style.css?v=2.0">
</head>
<body>
    <div id="app">
        <header id="top-nav">
            <div class="nav-main">
                <button id="menu-toggle" onclick="toggleMainSidebar()"><i class="fas fa-bars"></i></button>
                <div id="projectTitle" class="logo" onclick="openLoadModal()">프로젝트 선택</div>
                <button class="cloud-btn" onclick="saveToCloud()">구름저장</button>
            </div>
            <div class="tab-menu-bar">
                <button id="tab-timeline" class="v-tab active" onclick="switchTab('timeline')">Timeline</button>
                <button id="tab-story" class="v-tab" onclick="switchTab('story')">Story</button>
                <button id="tab-character" class="v-tab" onclick="switchTab('character')">Character</button>
            </div>
        </header>

        <div id="sidebar-overlay" onclick="toggleMainSidebar()"></div>
        <aside id="main-sidebar">
            <div class="sidebar-header">STORY MASTER</div>
            <nav class="side-nav">
                <div class="nav-item active" onclick="switchTab('timeline'); toggleMainSidebar();">사건 타임라인</div>
                <div class="nav-item" onclick="switchTab('story'); toggleMainSidebar();">줄거리 집필</div>
                <div class="nav-item" onclick="switchTab('character'); toggleMainSidebar();">캐릭터 도감</div>
            </nav>
            <div class="side-footer">
                <button onclick="openLoadModal()">작품 목록 / 변경</button>
            </div>
        </aside>

        <main id="main-content">
            <section id="view-timeline" class="tab-view active">
                <div class="filter-bar">
                    <button class="filter-btn active">전체</button>
                    <button class="filter-btn">주요사건</button>
                </div>
                <div class="timeline-wrapper dot-bg">
                    <div class="timeline-line"></div>
                    <div id="event-list"></div>
                </div>
            </section>

            <section id="view-story" class="tab-view">
                <div class="editor-container">
                    <textarea id="story-input" class="paper-content" placeholder="이곳에 줄거리를 작성하세요..."></textarea>
                </div>
            </section>

            <section id="view-character" class="tab-view">
                <div id="char-list" class="char-grid"></div>
            </section>
        </main>

        <button class="floating-add-btn" onclick="handleAddButton()">+</button>
    </div>

    <div id="customModal" class="modal-overlay">
        <div class="modal-card card-shadow">
            <h4 id="modalTitle">사건 추가</h4>
            <input type="text" id="modalInput" placeholder="내용을 입력하세요..." onkeyup="if(window.event.keyCode==13){document.getElementById('modalConfirmBtn').click()}">
            <div class="modal-btns">
                <button class="cancel-btn" onclick="closeCustomModal()">취소</button>
                <button class="confirm-btn" id="modalConfirmBtn">확ิน</button>
            </div>
        </div>
    </div>

    <div id="loadModal" class="modal-overlay">
        <div class="modal-card">
            <h4>작품 관리</h4>
            <div id="projectList" class="scroll-list"></div>
            <div class="new-proj-input">
                <input type="text" id="newProjName" placeholder="새 작품 이름">
                <button onclick="createNewProject()">생성</button>
            </div>
            <button class="close-btn" onclick="closeModal('loadModal')">닫기</button>
        </div>
    </div>

    <script src="script.js?v=2.0"></script>
</body>
</html>
