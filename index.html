<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>스토리마스터 Pro</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  
  <style>
    :root { 
      --primary: #4dabf7; 
      --bg: #f1f3f5; 
      --card-bg: #ffffff; 
      --line: #dee2e6; 
      --text: #212529; 
      --gray: #868e96; 
      --danger: #ff6b6b; 
    }
    
    body { 
      font-family: 'Pretendard', sans-serif; margin: 0; 
      background-color: var(--bg); 
      background-image: radial-gradient(#e9ecef 1.5px, transparent 1.5px); 
      background-size: 25px 25px; color: var(--text); 
      overflow-x: hidden; padding-bottom: 80px;
      -webkit-user-select: none; user-select: none;
    }

    /* 상단 네비게이션 (밝은 버전) */
    .top-nav {
      display: flex; justify-content: space-around; padding: 15px 10px;
      background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px);
      position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .nav-item { 
      font-size: 15px; font-weight: 800; color: var(--gray); 
      cursor: pointer; transition: 0.3s; position: relative;
    }
    .nav-item.active { color: var(--primary); }
    .nav-item.active::after {
      content: ''; position: absolute; bottom: -8px; left: 0; width: 100%; height: 3px;
      background: var(--primary); border-radius: 10px;
    }

    /* 검색/필터 바 */
    .search-bar { 
      margin-top: 65px; display: flex; gap: 6px; overflow-x: auto; 
      padding: 10px 15px; scrollbar-width: none; background: transparent;
    }
    .filter-tag { 
      padding: 6px 14px; border-radius: 20px; background: #fff; border: 1px solid #eee; 
      font-size: 11px; font-weight: 700; white-space: nowrap; color: var(--gray); cursor: pointer;
    }
    .filter-tag.active { background: var(--primary); color: white; border-color: var(--primary); }

    /* 타임라인 메인 레이아웃 */
    .timeline-container { position: relative; width: 100%; max-width: 500px; margin: 10px auto 0; min-height: 100vh; }
    .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--line); transform: translateX(-50%); }
    .year-marker { position: relative; width: fit-content; margin: 30px auto 20px; padding: 6px 14px; background: #343a40; color: white; border-radius: 20px; font-size: 10px; font-weight: 800; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    
    .row { display: grid; grid-template-columns: 1fr 1fr; position: relative; margin-bottom: 25px; min-height: 80px; }
    .node { width: 10px; height: 10px; background: white; border: 2px solid var(--primary); border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); top: 30px; z-index: 5; }
    .dropzone { display: flex; flex-direction: column; gap: 15px; padding: 0 5px; min-height: 80px; }
    .dropzone[data-side="left"] { align-items: flex-end; padding-right: 35px; }
    .dropzone[data-side="right"] { align-items: flex-start; padding-left: 35px; }

    /* 카드 디자인 */
    .card-wrapper { position: relative; width: 105px; z-index: 10; touch-action: none; cursor: pointer; }
    .card { background: #fff; width: 100%; min-height: 60px; border-radius: 10px; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border: 1px solid rgba(0,0,0,0.02); position: relative; z-index: 11; pointer-events: none; }
    .card-month { font-size: 8px; font-weight: 900; color: var(--primary); margin-bottom: 3px; }
    .card-content { font-size: 10.5px; line-height: 1.4; font-weight: 700; color: #444; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }

    /* 가지(Branch) 탭 표시 */
    .side-tabs { position: absolute; top: 8px; display: flex; flex-direction: column; gap: 2px; pointer-events: none; }
    .dropzone[data-side="left"] .side-tabs { right: 100%; align-items: flex-end; }
    .dropzone[data-side="right"] .side-tabs { left: 100%; align-items: flex-start; }
    .tab-idx { width: 12px; height: 18px; border-radius: 6px 0 0 6px; border: 1px solid rgba(0,0,0,0.03); }
    .dropzone[data-side="right"] .tab-idx { border-radius: 0 6px 6px 0; }
    .tab-white { background: #fff; z-index: 12; }
    .tab-blue { background: #d0ebff; } .tab-yellow { background: #fff9db; } .tab-green { background: #d3f9d8; } .tab-pink { background: #ffdeeb; }

    /* 캐릭터 도감 뷰 */
    #char-view { display: none; padding: 80px 20px; max-width: 500px; margin: 0 auto; }
    .char-list-grid { display: flex; flex-direction: column; gap: 10px; }
    .char-item { display: flex; align-items: center; gap: 12px; background: #fff; padding: 12px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .char-img-sm { width: 45px; height: 45px; border-radius: 12px; background: #f1f3f5; overflow: hidden; border: 2px solid var(--primary); display: flex; align-items: center; justify-content: center; }

    /* 모달 공통 */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
    .modal-content { background: white; width: 85%; max-width: 400px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-height: 85vh; overflow-y: auto; }
    input, select, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #eee; background: #f8f9fa; font-size: 14px; margin-bottom: 10px; outline: none; font-family: inherit; }
    .btn-pill { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 800; font-size: 14px; width: 100%; cursor: pointer; }
    .btn-ghost { background: #f1f3f5; color: #495057; border: none; padding: 12px; border-radius: 12px; font-weight: 700; width: 100%; margin-top: 8px; cursor: pointer; }

    /* 하단 바 */
    .nav-bottom { position: fixed; bottom: 0; width: 100%; height: 65px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; }
    .nav-btn { border: none; background: none; font-size: 10px; font-weight: 800; color: #adb5bd; cursor: pointer; }
    .add-btn-main { width: 50px; height: 50px; background: var(--primary); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 26px; margin-bottom: 25px; border: 4px solid white; box-shadow: 0 4px 12px rgba(77,171,247,0.3); }

    .drag-clone { position: fixed; z-index: 5000; pointer-events: none; opacity: 0.7; width: 105px; }
  </style>
</head>
<body>

<div class="top-nav">
  <div class="nav-item active" onclick="showTab('timeline')">타임라인</div>
  <div class="nav-item" onclick="showTab('char')">캐릭터도감</div>
  <div class="nav-item" onclick="openLoadModal()">프로젝트</div>
</div>

<div id="timeline-view">
  <div class="search-bar" id="searchBar"></div>
  <div class="timeline-container" id="timeline">
    <div class="center-line"></div>
  </div>
</div>

<div id="char-view">
  <div class="char-list-grid" id="charListGrid"></div>
  <button class="btn-pill" style="margin-top:20px;" onclick="openCharAdd()">+ 새 캐릭터 추가</button>
</div>

<div class="nav-bottom">
  <button class="nav-btn" onclick="openEraModal()">시대설정</button>
  <div class="add-btn-main" onclick="addScene()">+</div>
  <button class="nav-btn" onclick="saveToCloud()">클라우드</button>
</div>

<div id="editModal" class="modal"><div class="modal-content">
  <h4 style="text-align:center; margin:0 0 15px 0;">기록 편집</h4>
  <div style="display:flex; gap:6px;"><select id="eraType" style="flex:1.5;"></select><input type="number" id="eYear" style="flex:1;" placeholder="연도"><select id="eMonth" style="flex:1;"><script>for(let i=1;i<=12;i++)document.write(`<option value="${i}">${i}월</option>`)</script></select></div>
  <div id="charTagSelector" style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:12px;"></div>
  <textarea id="eContent" rows="5" placeholder="내용을 입력하세요"></textarea>
  <button class="btn-pill" onclick="saveScene()">저장</button>
  <button class="btn-ghost" style="color:var(--danger);" id="delBtn">삭제</button>
  <button class="btn-ghost" onclick="closeModal('editModal')">취소</button>
</div></div>

<div id="charEditModal" class="modal"><div class="modal-content">
  <h4 style="text-align:center; margin:0 0 15px 0;">캐릭터 정보</h4>
  <div style="display:flex; justify-content:center; margin-bottom:15px;" onclick="document.getElementById('charImgInput').click()">
    <div id="charPrevBox" class="char-img-sm" style="width:70px; height:70px; cursor:pointer;">
      <img id="charPrevImg" style="width:100%; height:100%; object-fit:cover; display:none;">
      <div id="charEmptySym" style="font-size:30px;">👤</div>
    </div>
    <input type="file" id="charImgInput" hidden accept="image/*" onchange="handleCharImg(event)">
  </div>
  <input type="text" id="cName" placeholder="이름 (필수)"><input type="text" id="cAge" placeholder="나이/생일"><textarea id="cNote" rows="3" placeholder="기타 메모"></textarea>
  <button class="btn-pill" onclick="saveCharInfo()">캐릭터 저장</button>
  <button class="btn-ghost" onclick="closeModal('charEditModal')">취소</button>
</div></div>

<div id="loadModal" class="modal"><div class="modal-content">
  <h4 style="margin:0 0 15px 0;">프로젝트 목록</h4>
  <div id="projectList"></div>
  <button class="btn-pill" style="margin-top:10px;" id="addProjBtn">+ 새 프로젝트</button>
  <button class="btn-ghost" onclick="closeModal('loadModal')">닫기</button>
</div></div>

<script>
  // Firebase 설정
  const config = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", authDomain: "true-s.firebaseapp.com", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
  if (!firebase.apps.length) firebase.initializeApp(config);
  const db = firebase.database();

  let storyboard = [], eras = ["공통"], chars = [], charDetails = {}, currentProject = null, editingId = null;
  let selectedFilter = null, selectedChars = [], tempCharImg = "";
  const pastelTabs = ["tab-blue", "tab-yellow", "tab-green", "tab-pink"];

  // 탭 전환
  function showTab(tab) {
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('timeline-view').style.display = (tab === 'timeline') ? 'block' : 'none';
    document.getElementById('char-view').style.display = (tab === 'char') ? 'block' : 'none';
    if(tab === 'char') renderCharList();
  }

  // 타임라인 렌더링
  window.render = () => {
    const container = document.getElementById('timeline');
    if(!currentProject) return;
    container.innerHTML = '<div class="center-line"></div>';
    let filtered = selectedFilter ? storyboard.filter(s => (s.chars||[]).includes(selectedFilter)) : storyboard;
    
    eras.forEach(eName => {
      const eraData = filtered.filter(s => s.era === eName).sort((a,b) => (a.year - b.year) || (a.month - b.month));
      const groups = {};
      eraData.forEach(sc => {
        const k = `${eName} ${sc.year}년`;
        if(!groups[k]) groups[k] = {}; if(!groups[k][sc.month]) groups[k][sc.month] = {left:[], right:[]};
        groups[k][sc.month][sc.side||'left'].push(sc);
      });
      Object.keys(groups).forEach(key => {
        container.innerHTML += `<div class="year-marker">${key}</div>`;
        Object.keys(groups[key]).sort((a,b)=>a-b).forEach(m => {
          const row = document.createElement('div'); row.className = 'row';
          row.innerHTML = `<div class="dropzone" data-gkey="${key}" data-month="${m}" data-side="left"></div><div class="node"></div><div class="dropzone" data-gkey="${key}" data-month="${m}" data-side="right"></div>`;
          container.appendChild(row);
          ['left','right'].forEach(side => {
            const zone = row.querySelector(`.dropzone[data-side="${side}"]`);
            groups[key][m][side].forEach(sc => {
              const wrap = document.createElement('div'); wrap.className = 'card-wrapper';
              wrap.dataset.id = sc.id;
              let tabsHtml = `<div class="tab-idx tab-white"></div>`;
              if(sc.branches) sc.branches.forEach((_,i) => tabsHtml += `<div class="tab-idx ${pastelTabs[i]||'tab-blue'}"></div>`);
              wrap.innerHTML = `<div class="side-tabs">${tabsHtml}</div><div class="card"><div class="card-month">${m}월</div><div class="card-content">${sc.text}</div></div>`;
              zone.appendChild(wrap);
            });
          });
        });
      });
    });
    window.updateSearchBar();
  };

  // 터치 드래그 앤 드롭
  let dragItem = null, startX, startY, currentTarget = null, dragId = null, isMoving = false;
  document.addEventListener('touchstart', (e) => {
    const wrap = e.target.closest('.card-wrapper');
    if(!wrap) return;
    const touch = e.touches[0];
    startX = touch.clientX; startY = touch.clientY; dragId = wrap.dataset.id; isMoving = false;
    const move = (me) => {
      const mt = me.touches[0];
      if(!isMoving && (Math.abs(mt.clientX - startX) > 10 || Math.abs(mt.clientY - startY) > 10)) {
        isMoving = true;
        dragItem = wrap.cloneNode(true);
        dragItem.className = 'card-wrapper drag-clone';
        document.body.appendChild(dragItem);
      }
      if(isMoving && dragItem) {
        me.preventDefault();
        dragItem.style.left = (mt.clientX - 50) + 'px';
        dragItem.style.top = (mt.clientY - 40) + 'px';
        const zone = document.elementFromPoint(mt.clientX, mt.clientY)?.closest('.dropzone');
        if(currentTarget !== zone) { if(currentTarget) currentTarget.style.background = ''; currentTarget = zone; if(currentTarget) currentTarget.style.background = 'rgba(77,171,247,0.1)'; }
      }
    };
    const end = () => {
      if(!isMoving && dragId) openEdit(dragId);
      else if(isMoving && currentTarget && dragId) {
        const idx = storyboard.findIndex(s => s.id == dragId);
        const p = currentTarget.dataset.gkey.split(' ');
        storyboard[idx].year = parseInt(p.pop());
        storyboard[idx].era = p.join(' ');
        storyboard[idx].month = parseInt(currentTarget.dataset.month);
        storyboard[idx].side = currentTarget.dataset.side;
        window.sync();
      }
      if(dragItem) dragItem.remove();
      if(currentTarget) currentTarget.style.background = '';
      document.removeEventListener('touchmove', move); document.removeEventListener('touchend', end);
    };
    document.addEventListener('touchmove', move, { passive: false });
    document.addEventListener('touchend', end);
  }, { passive: true });

  // 캐릭터 관리
  function renderCharList() {
    const grid = document.getElementById('charListGrid');
    grid.innerHTML = chars.map(c => `
      <div class="char-item" onclick="editCharExist('${c}')">
        <div class="char-img-sm">
          ${charDetails[c]?.img ? `<img src="${charDetails[c].img}" style="width:100%;height:100%;object-fit:cover;">` : '👤'}
        </div>
        <div style="flex:1;"><b style="font-size:14px;">${c}</b><div style="font-size:11px; color:var(--gray);">${charDetails[c]?.age || ''}</div></div>
        <button class="btn-ghost" style="width:auto; margin:0; padding:5px 10px; font-size:11px;">수정</button>
      </div>
    `).join('');
  }

  window.openCharAdd = () => {
    editingCharName = null; tempCharImg = "";
    document.getElementById('charPrevImg').style.display = "none";
    document.getElementById('charEmptySym').style.display = "block";
    document.getElementById('cName').value = ""; document.getElementById('cAge').value = ""; document.getElementById('cNote').value = "";
    openModal('charEditModal');
  };

  let editingCharName = null;
  window.editCharExist = (name) => {
    editingCharName = name;
    const d = charDetails[name] || {};
    document.getElementById('cName').value = name;
    document.getElementById('cAge').value = d.age || "";
    document.getElementById('cNote').value = d.note || "";
    tempCharImg = d.img || "";
    if(tempCharImg) {
      document.getElementById('charPrevImg').src = tempCharImg;
      document.getElementById('charPrevImg').style.display = "block";
      document.getElementById('charEmptySym').style.display = "none";
    } else {
      document.getElementById('charPrevImg').style.display = "none";
      document.getElementById('charEmptySym').style.display = "block";
    }
    openModal('charEditModal');
  };

  window.saveCharInfo = () => {
    const name = document.getElementById('cName').value.trim();
    if(!name) return;
    if(editingCharName && editingCharName !== name) {
      delete charDetails[editingCharName];
      chars = chars.filter(c => c !== editingCharName);
    }
    charDetails[name] = { img: tempCharImg, age: document.getElementById('cAge').value, note: document.getElementById('cNote').value };
    if(!chars.includes(name)) chars.push(name);
    window.sync(); closeModal('charEditModal'); renderCharList();
  };

  // 프로젝트/시대 관리
  window.openLoadModal = () => {
    db.ref('projects').once('value').then(s => {
      const d = s.val();
      document.getElementById('projectList').innerHTML = d ? Object.keys(d).map(k => `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; background:#f8f9fa; border-radius:12px; margin-bottom:8px;">
          <b style="font-size:13px;">${k}</b>
          <button class="btn-pill" style="width:auto; padding:5px 15px; font-size:11px;" onclick="loadP('${k}')">열기</button>
        </div>
      `).join('') : '';
      openModal('loadModal');
    });
  };

  window.loadP = (k) => {
    currentProject = k; localStorage.setItem('lastProject', k);
    db.ref('projects/'+k).on('value', s => {
      const d = s.val();
      if(d){ storyboard=d.data||[]; eras=d.eras||["공통"]; chars=d.chars||[]; charDetails=d.charDetails||{}; window.render(); }
    });
    closeModal('loadModal');
  };

  // 공통 유틸리티
  window.sync = () => { if(currentProject) db.ref('projects/'+currentProject).set({ data: storyboard, eras, chars, charDetails }).then(window.render); };
  window.saveToCloud = () => { if(currentProject) window.sync(); alert("저장되었습니다."); };
  window.openModal = (id) => document.getElementById(id).style.display = 'flex';
  window.closeModal = (id) => document.getElementById(id).style.display = 'none';

  window.openEdit = (id) => {
    editingId = id; const s = storyboard.find(x => x.id == id);
    document.getElementById('eContent').value = s ? s.text : "";
    document.getElementById('eYear').value = s ? s.year : "1000";
    document.getElementById('eraType').innerHTML = eras.map(e => `<option value="${e}">${e}</option>`).join('');
    if(s) { document.getElementById('eraType').value = s.era; document.getElementById('eMonth').value = s.month; selectedChars = s.chars || []; }
    else { selectedChars = []; }
    updateCharUI(); openModal('editModal');
  };

  window.updateCharUI = () => {
    document.getElementById('charTagSelector').innerHTML = chars.map(c => `
      <div style="padding:4px 10px; border-radius:12px; border:1px solid #eee; font-size:10px; background:${selectedChars.includes(c)?'var(--primary)':'#fff'}; color:${selectedChars.includes(c)?'#fff':'var(--gray)'}" onclick="toggleChar('${c}')">${c}</div>
    `).join('');
  };

  window.toggleChar = (c) => {
    if(selectedChars.includes(c)) selectedChars = selectedChars.filter(x=>x!==c);
    else selectedChars.push(c);
    updateCharUI();
  };

  window.saveScene = () => {
    const text = document.getElementById('eContent').value.trim(); if(!text) return;
    const year = parseInt(document.getElementById('eYear').value), era = document.getElementById('eraType').value, month = parseInt(document.getElementById('eMonth').value);
    if(editingId) storyboard = storyboard.map(s => s.id == editingId ? {...s, text, year, month, era, chars: selectedChars} : s);
    else storyboard.push({ id: Date.now().toString(), era, year, month, text, chars: selectedChars, side: 'left', branches: [] });
    window.sync(); closeModal('editModal');
  };

  window.handleCharImg = (e) => {
    const file = e.target.files[0];
    if(file) {
      const reader = new FileReader();
      reader.onload = (re) => {
        tempCharImg = re.target.result;
        document.getElementById('charPrevImg').src = tempCharImg;
        document.getElementById('charPrevImg').style.display = "block";
        document.getElementById('charEmptySym').style.display = "none";
      };
      reader.readAsDataURL(file);
    }
  };

  window.updateSearchBar = () => {
    document.getElementById('searchBar').innerHTML = `<div onclick="filterByChar(null)" class="filter-tag ${selectedFilter===null?'active':''}">전체</div>` + 
      chars.map(c => `<div onclick="filterByChar('${c}')" class="filter-tag ${selectedFilter===c?'active':''}">${c}</div>`).join('');
  };

  window.filterByChar = (name) => { selectedFilter = name; window.render(); };
  window.addScene = () => { if(!currentProject) openLoadModal(); else openEdit(null); };

  document.getElementById('addProjBtn').onclick = () => { const n = prompt("새 프로젝트 이름"); if(n) loadP(n); };
  document.getElementById('delBtn').onclick = () => { if(confirm("삭제할까요?")) { storyboard = storyboard.filter(s => s.id != editingId); window.sync(); closeModal('editModal'); } };

  window.onload = () => { const last = localStorage.getItem('lastProject'); if(last) loadP(last); else openLoadModal(); };
</script>
</body>
</html>
