<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>스토리마스터 Pro</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    :root { --primary: #4dabf7; --bg: #f1f3f5; --card-bg: #ffffff; --line: #dee2e6; --text: #212529; --gray: #868e96; --danger: #ff6b6b; --inactive-tab: #ced4da; }
    body { font-family: 'Pretendard', sans-serif; margin: 0; background-color: var(--bg); background-image: radial-gradient(#e9ecef 1.5px, transparent 1.5px); background-size: 25px 25px; color: var(--text); overflow-x: hidden; padding-bottom: 70px; -webkit-user-select: none; user-select: none; touch-action: pan-y; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    /* 헤더 */
    .header-container { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .header { height: 50px; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; }
    .project-title { font-size: 15px; font-weight: 900; color: var(--primary); }
    .search-bar { display: flex; gap: 6px; overflow-x: auto; padding: 8px 15px; scrollbar-width: none; }
    .filter-tag { padding: 5px 12px; border-radius: 15px; background: #fff; border: 1px solid #eee; font-size: 11px; font-weight: 700; white-space: nowrap; color: var(--gray); }

    /* 타임라인 */
    .timeline-container { position: relative; width: 100%; max-width: 500px; margin: 100px auto 0; min-height: 100vh; }
    .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--line); transform: translateX(-50%); }
    .year-marker { position: relative; width: fit-content; margin: 30px auto 20px; padding: 6px 14px; background: #343a40; color: white; border-radius: 20px; font-size: 10px; font-weight: 800; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    
    .row { display: grid; grid-template-columns: 1fr 1fr; position: relative; margin-bottom: 25px; min-height: 80px; }
    .node { width: 10px; height: 10px; background: white; border: 2px solid var(--primary); border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); top: 30px; z-index: 5; }
    .dropzone { display: flex; flex-direction: column; gap: 15px; padding: 0 5px; min-height: 80px; }
    .dropzone[data-side="left"] { align-items: flex-end; padding-right: 35px; }
    .dropzone[data-side="right"] { align-items: flex-start; padding-left: 35px; }

    /* [수정] 타임라인 인덱스 탭: 회색 자투리 없이 밀착 */
    .card-wrapper { position: relative; width: 105px; z-index: 10; touch-action: none; cursor: pointer; }
    .side-tabs { position: absolute; top: -1px; display: flex; flex-direction: column; gap: 2px; pointer-events: none; }
    .dropzone[data-side="left"] .side-tabs { right: 100%; align-items: flex-end; }
    .dropzone[data-side="right"] .side-tabs { left: 100%; align-items: flex-start; }
    .tab-idx { width: 12px; height: 18px; }
    .tab-white { background: #fff; border: 1px solid rgba(0,0,0,0.03); width: 13px; position: relative; z-index: 12; }
    .dropzone[data-side="left"] .tab-white { border-right: none !important; margin-right: -1px; }
    .dropzone[data-side="right"] .tab-white { border-left: none !important; margin-left: -1px; }
    .dropzone[data-side="left"] .tab-idx { border-radius: 6px 0 0 6px; }
    .dropzone[data-side="right"] .tab-idx { border-radius: 0 6px 6px 0; }
    .tab-blue { background: #d0ebff; } .tab-yellow { background: #fff9db; } .tab-green { background: #d3f9d8; } .tab-pink { background: #ffdeeb; }

    .card { background: #fff; width: 100%; min-height: 60px; border-radius: 10px; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border: 1px solid rgba(0,0,0,0.02); position: relative; z-index: 11; pointer-events: none; }
    .card-month { font-size: 8px; font-weight: 900; color: var(--primary); margin-bottom: 3px; }
    .card-content { font-size: 10.5px; line-height: 1.4; font-weight: 700; color: #444; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }

    /* [수정] 모달 상세 페이지 및 탭 (첫 번째 사진처럼 복구) */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 2000; justify-content: center; align-items: flex-end; backdrop-filter: blur(5px); }
    
    /* 상세 페이지 전용 모달 컨텐츠 스타일 */
    #viewModal .modal-content { 
      background: white; width: 100%; max-width: 450px; padding: 25px 20px; 
      border-radius: 20px 20px 0 0; max-height: 85vh; overflow-y: visible; /* 탭이 보이게 visible */
      box-shadow: 0 -5px 25px rgba(0,0,0,0.1); position: relative; 
    }
    
    /* 튀어나온 탭 메뉴 (첫 번째 사진) */
    .view-tab-menu { 
      position: absolute; top: -35px; /* 모달 위로 튀어나오게 */
      left: 20px; display: flex; gap: 8px; z-index: 2100; 
    }
    
    .v-tab { 
      padding: 8px 15px; border-radius: 10px 10px 0 0; font-size: 13px; font-weight: 800; 
      background: var(--inactive-tab); color: #fff; border: none; box-shadow: 0 -3px 5px rgba(0,0,0,0.05); 
      transition: all 0.2s;
    }
    
    /* 활성 탭 스타일 (첫 번째 사진) */
    .v-tab.active { 
      background: white !important; color: var(--primary) !important; padding-top: 12px; /* 살짝 위로 */
      box-shadow: 0 -5px 10px rgba(0,0,0,0.05); z-index: 2101; 
    }
    
    /* 선택된 활성 탭이 가지색일 경우 (첫 번째 사진) */
    .v-tab.tab-blue.active { color: #fff !important; background: #4dabf7 !important; }
    .v-tab.tab-yellow.active { color: #fff !important; background: #fcc419 !important; }
    .v-tab.tab-green.active { color: #fff !important; background: #51cf66 !important; }
    .v-tab.tab-pink.active { color: #fff !important; background: #ff8787 !important; }

    .view-body { border: none; padding: 10px 0; margin-bottom: 20px; }
    #viewMonth { font-size: 12px; font-weight: 900; color: var(--primary); margin-bottom: 10px; }
    #viewText { font-size: 15px; line-height: 1.6; color: #333; white-space: pre-wrap; font-weight: 700; min-height: 120px; }

    /* 일반 모달 컨텐츠 */
    .modal-content { background: white; width: 100%; max-width: 450px; padding: 20px; border-radius: 20px 20px 0 0; max-height: 85vh; overflow-y: auto; box-shadow: 0 -5px 25px rgba(0,0,0,0.1); }
    #inputModal, #confirmModal { align-items: center; z-index: 4000; }
    #inputModal .modal-content, #confirmModal .modal-content { border-radius: 20px; width: 85%; }

    /* 버튼 */
    .btn-pill { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 800; font-size: 14px; width: 100%; outline: none; }
    .btn-ghost { background: #f1f3f5; color: #495057; border: none; padding: 10px; border-radius: 10px; font-weight: 700; font-size: 12px; width: 100%; outline: none; }
    .btn-del-sm { background: #fff0f0; color: var(--danger); border: none; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; }

    input, select, textarea { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #eee; background: #f8f9fa; font-size: 14px; margin-bottom: 8px; outline: none; }

    /* 네비게이션 */
    .nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; }
    .nav-btn { border: none; background: none; font-size: 10px; font-weight: 800; color: #adb5bd; }
    .add-btn-main { width: 48px; height: 48px; background: var(--primary); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 25px; border: 3px solid white; box-shadow: 0 4px 12px rgba(77,171,247,0.3); }
  </style>
</head>
<body>

<div id="confirmModal" class="modal"><div class="modal-content" style="text-align:center;">
    <h4 id="confirmTitle" style="margin:0 0 10px 0;">알림</h4>
    <p id="confirmMsg" style="font-size:13px; color:#666; margin-bottom:20px; line-height:1.5;"></p>
    <div style="display:flex; gap:8px;"><button class="btn-pill" id="confirmOkBtn">확인</button><button class="btn-ghost" id="confirmCancelBtn">취소</button></div>
</div></div>

<div id="inputModal" class="modal"><div class="modal-content">
    <h4 id="inputTitle" style="margin:0 0 15px 0; text-align:center;">입력</h4>
    <textarea id="customInput" rows="4" placeholder="내용을 입력하세요"></textarea>
    <div style="display:flex; gap:10px;"><button class="btn-pill" id="inputConfirmBtn">확인</button><button class="btn-ghost" onclick="window.closeModal('inputModal')">취소</button></div>
</div></div>

<div id="viewModal" class="modal">
  <div class="modal-content">
    <div class="view-tab-menu" id="viewTabMenu"></div>
    <div class="view-body">
      <div id="viewMonth"></div>
      <div id="viewText"></div>
    </div>
    <div style="display:flex; gap:8px; margin-bottom:8px;"><button class="btn-pill" style="flex:1.5;" onclick="window.handleTabEdit()">편집</button><button class="btn-ghost" style="flex:1;" onclick="window.showBranchInput()">+ 가지</button></div>
    <button class="btn-ghost" onclick="window.closeModal('viewModal')">닫기</button>
  </div>
</div>

<div id="editModal" class="modal"><div class="modal-content">
    <h4 style="text-align:center; margin:0 0 15px 0;">기록 편집</h4>
    <div style="display:flex; gap:6px;"><select id="eraType" style="flex:1.5;"></select><input type="number" id="eYear" style="flex:1;" placeholder="연도"><select id="eMonth" style="flex:1;"><script>for(let i=1;i<=12;i++)document.write(`<option value="${i}">${i}월</option>`)</script></select></div>
    <div id="charTagSelector" style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:12px;"></div>
    <textarea id="eContent" rows="5" placeholder="내용을 입력하세요"></textarea>
    <button class="btn-pill" onclick="window.saveScene()">저장</button>
    <button class="btn-ghost" style="margin-top:8px; color:var(--danger);" id="delBtn">삭제</button>
    <button class="btn-ghost" style="margin-top:8px;" onclick="window.closeModal('editModal')">취소</button>
</div></div>

<div id="charEditModal" class="modal"><div class="modal-content"><h4 style="text-align:center; margin:0 0 15px 0;">캐릭터 정보</h4><div style="display:flex; justify-content:center; margin-bottom:15px;" onclick="document.getElementById('charImgInput').click()"><img id="charPrevImg" style="width:80px; height:80px; border-radius:20px; object-fit:cover; border:3px solid var(--primary); display:none;"><div id="charEmptySym" style="width:80px; height:80px; border-radius:20px; border:3px solid var(--primary); background:#f1f3f5; display:flex; align-items:center; justify-content:center; font-size:30px;">👤</div><input type="file" id="charImgInput" hidden accept="image/*" onchange="window.handleCharImg(event)"></div><input type="text" id="cName" placeholder="이름 (필수)"><input type="text" id="cAge" placeholder="나이/생일"><input type="text" id="cLook" placeholder="특징"><textarea id="cNote" rows="3" placeholder="기타 메모"></textarea><button class="btn-pill" onclick="window.saveCharInfo()">캐릭터 저장</button><button class="btn-ghost" style="margin-top:8px;" onclick="window.closeModal('charEditModal')">취소</button></div></div>
<div id="charModal" class="modal"><div class="modal-content"><h4 style="text-align:center; margin:0 0 15px 0;">캐릭터 도감</h4><div id="charListGrid" style="max-height:300px; overflow-y:auto;"></div><button class="btn-pill" style="margin-top:10px;" onclick="window.openCharAdd()">+ 새 캐릭터 추가</button><button class="btn-ghost" style="margin-top:8px;" onclick="window.closeModal('charModal')">닫기</button></div></div>
<div id="eraModal" class="modal"><div class="modal-content"><h4>시대 순서</h4><div id="eraListGrid"></div><button class="btn-pill" style="margin-top:10px;" id="addEraBtn">+ 시대 추가</button><button class="btn-ghost" style="margin-top:8px;" onclick="window.closeModal('eraModal')">닫기</button></div></div>
<div id="loadModal" class="modal"><div class="modal-content"><h4>프로젝트 목록</h4><div id="projectList"></div><button class="btn-pill" style="margin-top:10px;" id="addProjBtn">+ 새 프로젝트</button><button class="btn-ghost" style="margin-top:8px;" onclick="window.closeModal('loadModal')">닫기</button></div></div>

<div class="header-container">
  <div class="header"><div class="project-title" id="projectTitle">STORY MASTER</div><button class="btn-pill" style="width:auto; padding:5px 12px; font-size:11px;" onclick="window.saveToCloud()">클라우드 저장</button></div>
  <div class="search-bar" id="searchBar"></div>
</div>
<div class="timeline-container" id="timeline"></div>
<div class="nav">
  <button class="nav-btn" onclick="window.openLoadModal()">목록</button>
  <button class="nav-btn" onclick="window.openEraModal()">시대</button>
  <div class="add-btn-main" onclick="window.addScene()">+</div>
  <button class="nav-btn" onclick="window.openCharModal()">캐릭터</button>
  <button class="nav-btn" onclick="location.reload()">갱신</button>
</div>

<script>
  const config = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", authDomain: "true-s.firebaseapp.com", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
  if (!firebase.apps.length) firebase.initializeApp(config);
  const db = firebase.database();

  let storyboard = [], eras = ["공통"], chars = [], charDetails = {}, currentProject = null, editingId = null;
  const pastelTabs = ["tab-blue", "tab-yellow", "tab-green", "tab-pink"];
  let selectedChars = [], selectedFilter = null, tempCharImg = "", currentViewTab = 0;

  window.closeModal = (id) => { document.getElementById(id).style.display = 'none'; };
  window.openModal = (id) => { document.getElementById(id).style.display = 'flex'; };

  window.customConfirm = (title, msg, onOk, isAlert = false) => {
    document.getElementById('confirmTitle').innerText = title;
    document.getElementById('confirmMsg').innerText = msg;
    const okBtn = document.getElementById('confirmOkBtn');
    const cancelBtn = document.getElementById('confirmCancelBtn');
    cancelBtn.style.display = isAlert ? 'none' : 'block';
    window.openModal('confirmModal');
    okBtn.onclick = () => { window.closeModal('confirmModal'); if(onOk) onOk(); };
    cancelBtn.onclick = () => window.closeModal('confirmModal');
  };

  window.customPrompt = (title, defaultVal, callback) => {
    document.getElementById('inputTitle').innerText = title;
    document.getElementById('customInput').value = defaultVal || "";
    window.openModal('inputModal');
    document.getElementById('inputConfirmBtn').onclick = () => {
        const val = document.getElementById('customInput').value;
        window.closeModal('inputModal');
        callback(val);
    };
  };

  window.render = () => {
    const container = document.getElementById('timeline');
    if(!currentProject) return;
    container.innerHTML = '<div class="center-line"></div>';
    let filtered = selectedFilter ? storyboard.filter(s => (s.chars||[]).includes(selectedFilter)) : storyboard;
    eras.forEach(eName => {
        const eraData = filtered.filter(s => s.era === eName).sort((a,b) => (a.year - b.year) || (a.month - b.month));
        const groups = {};
        eraData.forEach(sc => {
            const k = `${eName} ${sc.year}년`;
            if(!groups[k]) groups[k] = {}; if(!groups[k][sc.month]) groups[k][sc.month] = {left:[], right:[]};
            groups[k][sc.month][sc.side||'left'].push(sc);
        });
        Object.keys(groups).forEach(key => {
            container.innerHTML += `<div class="year-marker">${key}</div>`;
            Object.keys(groups[key]).sort((a,b)=>a-b).forEach(m => {
                const row = document.createElement('div'); row.className = 'row';
                row.innerHTML = `<div class="dropzone" data-gkey="${key}" data-month="${m}" data-side="left"></div><div class="node"></div><div class="dropzone" data-gkey="${key}" data-month="${m}" data-side="right"></div>`;
                container.appendChild(row);
                ['left','right'].forEach(side => {
                    const zone = row.querySelector(`.dropzone[data-side="${side}"]`);
                    groups[key][m][side].forEach(sc => {
                        const wrap = document.createElement('div'); wrap.className = 'card-wrapper';
                        wrap.dataset.id = sc.id;
                        let tabsHtml = `<div class="tab-idx tab-white"></div>`;
                        if(sc.branches) sc.branches.forEach((_,i) => tabsHtml += `<div class="tab-idx ${pastelTabs[i]||'tab-blue'}"></div>`);
                        wrap.innerHTML = `<div class="side-tabs">${tabsHtml}</div><div class="card"><div class="card-month">${m}월</div><div class="card-content">${sc.text}</div></div>`;
                        zone.appendChild(wrap);
                    });
                });
            });
        });
    });
    window.updateSearchBar();
  };

  window.openViewer = (id) => { 
    editingId = id; 
    const s = storyboard.find(x => x.id == id); 
    if(!s) return; 
    currentViewTab = 0; 
    window.renderTabs(s); 
    window.openModal('viewModal'); 
  };
  
  /* [로직 수정] 모달 탭 렌더링: 선택되지 않은 탭은 회색 처리 */
  window.renderTabs = (s) => {
    const menu = document.getElementById('viewTabMenu');
    let tabs = [`<div class="v-tab ${currentViewTab===0?'active':''}" onclick="window.switchTab(0)">사건</div>`];
    (s.branches || []).forEach((_, i) => {
      const colorClass = pastelTabs[i] || 'tab-blue';
      tabs.push(`<div class="v-tab ${colorClass} ${currentViewTab===(i+1)?'active':''}" onclick="window.switchTab(${i+1})">탭 ${i+1}</div>`);
    });
    menu.innerHTML = tabs.join('');
    document.getElementById('viewMonth').innerText = `${s.era} ${s.year}년 ${s.month}월`;
    document.getElementById('viewText').innerText = currentViewTab === 0 ? s.text : s.branches[currentViewTab-1];
  };

  window.switchTab = (idx) => { currentViewTab = idx; window.renderTabs(storyboard.find(x => x.id == editingId)); };
  window.handleTabEdit = () => {
    const s = storyboard.find(x => x.id == editingId);
    if(currentViewTab === 0) { window.closeModal('viewModal'); window.openEdit(editingId); }
    else {
      window.customPrompt("탭 내용 수정 (비우면 삭제)", s.branches[currentViewTab-1], (val) => {
          if(val === "") s.branches.splice(currentViewTab-1, 1); else if(val) s.branches[currentViewTab-1] = val;
          window.sync(); window.openViewer(editingId);
      });
    }
  };
  window.showBranchInput = () => {
    const s = storyboard.find(x => x.id == editingId);
    if((s.branches||[]).length >= 4) return window.customConfirm("알림", "최대 4개까지만 가능합니다.", null, true);
    window.customPrompt("새로운 가지 내용 입력", "", (val) => {
        if(val) { if(!s.branches) s.branches = []; s.branches.push(val); window.sync(); }
        window.openViewer(editingId);
    });
  };

  let dragItem = null, startX, startY, currentTarget = null, dragId = null, isMoving = false;
  document.addEventListener('touchstart', (e) => {
    const wrap = e.target.closest('.card-wrapper');
    if(!wrap) return;
    const touch = e.touches[0];
    startX = touch.clientX; startY = touch.clientY; dragId = wrap.dataset.id; isMoving = false;
    const move = (me) => {
      const mt = me.touches[0];
      if(!isMoving && (Math.abs(mt.clientX - startX) > 10 || Math.abs(mt.clientY - startY) > 10)) {
        isMoving = true;
        dragItem = wrap.cloneNode(true);
        dragItem.className = 'card-wrapper drag-clone';
        dragItem.style.position = 'fixed'; dragItem.style.zIndex = '5000'; dragItem.style.width = '105px'; dragItem.style.pointerEvents = 'none'; dragItem.style.opacity = '0.7';
        document.body.appendChild(dragItem);
      }
      if(isMoving && dragItem) {
        me.preventDefault();
        dragItem.style.left = (mt.clientX - 50) + 'px';
        dragItem.style.top = (mt.clientY - 40) + 'px';
        const zone = document.elementFromPoint(mt.clientX, mt.clientY)?.closest('.dropzone');
        if(currentTarget !== zone) { if(currentTarget) currentTarget.style.background = ''; currentTarget = zone; if(currentTarget) currentTarget.style.background = 'rgba(77,171,247,0.1)'; }
      }
    };
    const end = () => {
      if(!isMoving && dragId) window.openViewer(dragId);
      else if(isMoving && currentTarget && dragId) {
        const idx = storyboard.findIndex(s => s.id == dragId);
        const p = currentTarget.dataset.gkey.split(' ');
        storyboard[idx].year = parseInt(p.pop());
        storyboard[idx].era = p.join(' ');
        storyboard[idx].month = parseInt(currentTarget.dataset.month);
        storyboard[idx].side = currentTarget.dataset.side;
        window.sync();
      }
      if(dragItem) dragItem.remove();
      if(currentTarget) currentTarget.style.background = '';
      document.removeEventListener('touchmove', move);
      document.removeEventListener('touchend', end);
      dragId = null;
    };
    document.addEventListener('touchmove', move, { passive: false });
    document.addEventListener('touchend', end);
  }, { passive: true });

  window.openCharAdd = () => { window.closeModal('charModal'); editingCharName = null; tempCharImg = ""; document.getElementById('charPrevImg').style.display = "none"; document.getElementById('charEmptySym').style.display = "flex"; document.getElementById('cName').value = ""; document.getElementById('cAge').value = ""; document.getElementById('cLook').value = ""; document.getElementById('cNote').value = ""; window.openModal('charEditModal'); };
  let editingCharName = null;
  window.editCharExist = (name) => { window.closeModal('charModal'); editingCharName = name; const d = charDetails[name] || {}; document.getElementById('cName').value = name; document.getElementById('cAge').value = d.age || ""; document.getElementById('cLook').value = d.look || ""; document.getElementById('cNote').value = d.note || ""; tempCharImg = d.img || ""; if(tempCharImg) { document.getElementById('charPrevImg').src = tempCharImg; document.getElementById('charPrevImg').style.display = "block"; document.getElementById('charEmptySym').style.display = "none"; } else { document.getElementById('charPrevImg').style.display = "none"; document.getElementById('charEmptySym').style.display = "flex"; } window.openModal('charEditModal'); };
  window.saveCharInfo = () => { const name = document.getElementById('cName').value.trim(); if(!name) return; if(editingCharName && editingCharName !== name) { delete charDetails[editingCharName]; chars = chars.filter(c => c !== editingCharName); } charDetails[name] = { img: tempCharImg, age: document.getElementById('cAge').value, look: document.getElementById('cLook').value, note: document.getElementById('cNote').value }; if(!chars.includes(name)) chars.push(name); window.sync(); window.closeModal('charEditModal'); setTimeout(window.openCharModal, 200); };
  window.openCharModal = () => { const grid = document.getElementById('charListGrid'); grid.innerHTML = chars.map(c => `<div style="display:flex; align-items:center; gap:10px; background:#f8f9fa; padding:10px; border-radius:12px; margin-bottom:8px;"><div style="width:40px; height:40px; background:#eee; border-radius:8px; overflow:hidden;">${charDetails[c]?.img ? `<img src="${charDetails[c].img}" style="width:100%; height:100%; object-fit:cover;">` : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;">👤</div>'}</div><div style="flex:1;"><b style="font-size:13px;">${c}</b></div><button class="btn-ghost" style="width:auto; padding:4px 8px; font-size:11px;" onclick="window.editCharExist('${c}')">편집</button></div>`).join(''); window.openModal('charModal'); };
  window.openEraModal = () => { const grid = document.getElementById('eraListGrid'); grid.innerHTML = eras.map((e, i) => `<div style="display:flex; justify-content:space-between; align-items:center; padding:10px; background:#f8f9fa; border-radius:12px; margin-bottom:8px;"><b style="font-size:12px; flex:1;">${e}</b><div style="display:flex; gap:5px;"><button class="btn-ghost" style="width:auto; padding:4px 8px;" onclick="window.moveEra(${i}, -1)">▲</button><button class="btn-ghost" style="width:auto; padding:4px 8px;" onclick="window.moveEra(${i}, 1)">▼</button><button class="btn-del-sm" onclick="window.delEra(${i})">삭제</button></div></div>`).join(''); window.openModal('eraModal'); };
  window.delEra = (idx) => { if(eras.length <= 1) return window.customConfirm("경고", "최소 한 개의 시대는 필요합니다.", null, true); window.customConfirm("삭제 확인", `'${eras[idx]}' 시대를 삭제할까요?`, () => { eras.splice(idx, 1); window.sync(); window.openEraModal(); }); };
  window.moveEra = (idx, dir) => { const target = idx + dir; if(target < 0 || target >= eras.length) return; const temp = eras[idx]; eras[idx] = eras[target]; eras[target] = temp; window.sync(); window.openEraModal(); };
  window.openLoadModal = () => { db.ref('projects').once('value').then(s => { const d = s.val(); document.getElementById('projectList').innerHTML = d ? Object.keys(d).map(k => `<div style="display:flex; justify-content:space-between; align-items:center; padding:12px; background:#f8f9fa; border-radius:12px; margin-bottom:8px;"><b style="font-size:13px; flex:1;">${k}</b><div style="display:flex; gap:6px;"><button class="btn-pill" style="width:auto; padding:4px 12px; font-size:11px;" onclick="window.loadP('${k}')">열기</button><button class="btn-del-sm" onclick="window.delProject('${k}')">삭제</button></div></div>`).join('') : ''; window.openModal('loadModal'); }); };
  window.delProject = (k) => { window.customConfirm("삭제 확인", `프로젝트 '${k}'를 영구 삭제할까요?`, () => { db.ref('projects/'+k).remove().then(window.openLoadModal); }); };
  document.getElementById('addEraBtn').onclick = () => window.customPrompt("새 시대 이름", "", (n) => { if(n) { eras.push(n); window.sync(); window.openEraModal(); } });
  document.getElementById('addProjBtn').onclick = () => window.customPrompt("새 프로젝트 이름", "", (n) => { if(n) window.loadP(n); });
  document.getElementById('delBtn').onclick = () => { window.customConfirm("사건 삭제", "정말 삭제할까요?", () => { storyboard = storyboard.filter(s => s.id != editingId); window.sync(); window.closeModal('editModal'); }); };
  window.sync = () => { if(currentProject) db.ref('projects/'+currentProject).set({ data: storyboard, eras, chars, charDetails }).then(window.render); };
  window.saveToCloud = () => { if(currentProject) db.ref('projects/'+currentProject).set({ data: storyboard, eras, chars, charDetails }).then(() => window.customConfirm("저장 완료", "클라우드에 안전하게 저장되었습니다.", null, true)); };
  window.loadP = (k) => { currentProject = k; localStorage.setItem('lastProject', k); document.getElementById('projectTitle').innerText = k; db.ref('projects/'+k).on('value', s => { const d = s.val(); if(d){ storyboard=d.data||[]; eras=d.eras||["공통"]; chars=d.chars||[]; charDetails=d.charDetails||{}; window.render(); } }); window.closeModal('loadModal'); };
  window.openEdit = (id) => { editingId = id; const s = storyboard.find(x => x.id == id); document.getElementById('eContent').value = s ? s.text : ""; document.getElementById('eYear').value = s ? s.year : "1000"; document.getElementById('eraType').innerHTML = eras.map(e => `<option value="${e}">${e}</option>`).join(''); if(s) { document.getElementById('eraType').value = s.era; document.getElementById('eMonth').value = s.month; selectedChars = s.chars || []; } else { selectedChars = []; } window.updateCharUI(); window.openModal('editModal'); };
  window.updateCharUI = () => { document.getElementById('charTagSelector').innerHTML = chars.map(c => `<div style="padding:4px 10px; border-radius:12px; border:1px solid #eee; font-size:10px; background:${selectedChars.includes(c)?'#4dabf7':'#fff'}; color:${selectedChars.includes(c)?'#fff':'#868e96'}" onclick="window.toggleChar('${c}')">${c}</div>`).join(''); };
  window.toggleChar = (c) => { if(selectedChars.includes(c)) selectedChars = selectedChars.filter(x=>x!==c); else selectedChars.push(c); window.updateCharUI(); };
  window.saveScene = () => { const text = document.getElementById('eContent').value.trim(); if(!text) return; const year = parseInt(document.getElementById('eYear').value), era = document.getElementById('eraType').value, month = parseInt(document.getElementById('eMonth').value); if(editingId) storyboard = storyboard.map(s => s.id == editingId ? {...s, text, year, month, era, chars: selectedChars} : s); else storyboard.push({ id: Date.now().toString(), era, year, month, text, chars: selectedChars, side: 'left', branches: [] }); window.sync(); window.closeModal('editModal'); };
  window.handleCharImg = (e) => { const file = e.target.files[0]; if(file) { const reader = new FileReader(); reader.onload = (re) => { tempCharImg = re.target.result; document.getElementById('charPrevImg').src = tempCharImg; document.getElementById('charPrevImg').style.display = "block"; document.getElementById('charEmptySym').style.display = "none"; }; reader.readAsDataURL(file); } };
  window.updateSearchBar = () => { document.getElementById('searchBar').innerHTML = `<div onclick="window.filterByChar(null)" class="filter-tag" style="${selectedFilter===null?'background:#4dabf7;color:#fff;border-color:#4dabf7':''}">전체</div>` + chars.map(c => `<div onclick="window.filterByChar('${c}')" class="filter-tag" style="${selectedFilter===c?'background:#4dabf7;color:#fff;border-color:#4dabf7':''}">${c}</div>`).join(''); };
  window.filterByChar = (name) => { selectedFilter = name; window.render(); };
  window.addScene = () => { if(!currentProject) return; window.openEdit(null); };
  window.onload = () => { const last = localStorage.getItem('lastProject'); if(last) window.loadP(last); else window.openLoadModal(); };
</script>
</body>
</html>
