<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STORY MASTER v4.4</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=4.4">
</head>
<body>
    <div id="app">
        <header id="main-nav">
            <div class="nav-left logo">SM</div>
            <div class="nav-right">
                <button class="v-tab active">타임라인</button>
                <button class="v-tab">스토리</button>
                <button class="v-tab">캐릭터</button>
            </div>
        </header>

        <div id="sub-nav-timeline" class="sub-nav">
            <div class="proj-selector shadow-sm" onclick="toggleProjMenu()">
                <span id="currentProjectTitle">이그리예가</span>
                <i class="fas fa-chevron-down"></i>
                <div id="projMenuPopup" class="proj-popup hidden">
                    <div class="pop-item" onclick="createNewProject()">새 프로젝트</div>
                    <div id="project-list-items"></div>
                </div>
            </div>
            <button class="save-icon" onclick="saveToCloud()"><i class="fas fa-cloud-upload-alt"></i></button>
        </div>

        <main id="main-content">
            <div class="timeline-canvas dot-bg" id="canvas">
                <div class="center-line"></div>
                <svg id="connection-svg"></svg>
                <div id="event-container"></div>
            </div>
        </main>

        <div id="bottom-sheet-layer" onclick="closeSheet(event)">
            <div id="bottom-sheet">
                <div class="sheet-handle"></div>
                <div class="sheet-header">
                    <span>사건 편집</span>
                    <button class="btn-del-text" onclick="deleteEvent()">삭제</button>
                </div>
                <div class="sheet-body">
                    <input type="text" id="edit-title" placeholder="사건 제목">
                    <textarea id="edit-memo" placeholder="상세 메모를 입력하세요 (가지 추가)"></textarea>
                    <button class="btn-save-full" onclick="updateEvent()">적용하기</button>
                </div>
            </div>
        </div>

        <button class="fab" onclick="createNewEvent()">+</button>
    </div>
    <script src="script.js?v=4.4"></script>
</body>
</html>
