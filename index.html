<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yuta's Engine</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { 
            --primary: #4dabf7; 
            --dark: #343a40; 
            --bg: #f8f9fa; 
            --header-h: 55px; 
            --nav-h: 45px; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: #333; }

        /* 상단바 및 탭 메뉴 고정 */
        #fixed-top-area {
            position: fixed; top: 0; left: 0; right: 0; z-index: 2000;
        }
        .app-header { 
            height: var(--header-h); background: var(--dark); color: white; 
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px; 
        }
        .logo { font-weight: bold; font-size: 20px; color: var(--primary); }
        .title-wrap { font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .cloud-save-btn { background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }

        .tab-menu { 
            height: var(--nav-h); background: #fff; display: flex; border-bottom: 1px solid #eee; 
        }
        .tab-item {
            flex: 1; display: flex; align-items: center; justify-content: center;
            font-size: 14px; color: #666; cursor: pointer; font-weight: 500;
        }
        .tab-item.active { color: var(--primary); border-bottom: 2px solid var(--primary); font-weight: bold; }

        /* 메인 컨텐츠 영역 */
        .content-body { 
            margin-top: calc(var(--header-h) + var(--nav-h)); 
            padding: 15px; min-height: calc(100vh - 100px); position: relative; z-index: 1;
        }
        .view { display: none; }
        .view.active { display: block; }

        /* 타임라인 디자인 (격자 배경) */
        #timeline-view.active {
            background-image: radial-gradient(#dee2e6 1.2px, transparent 1.2px);
            background-size: 20px 20px; background-attachment: fixed;
        }
        .tl-wrapper { position: relative; width: 100%; max-width: 500px; margin: 0 auto; padding: 20px 0; }
        .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #dee2e6; transform: translateX(-50%); }

        .event-row { position: relative; width: 100%; display: flex; margin-bottom: 30px; align-items: center; }
        .node-point { position: absolute; left: 50%; width: 10px; height: 10px; background: #fff; border: 2.5px solid var(--primary); border-radius: 50%; z-index: 5; transform: translate(-50%, -50%); }
        .h-line { position: absolute; top: 50%; width: 25px; height: 1.5px; background: #dee2e6; }
        .left .h-line { right: 50%; margin-right: 5px; }
        .right .h-line { left: 50%; margin-left: 5px; }

        .card-side { width: calc(50% - 20px); }
        .left .card-side { margin-right: auto; padding-right: 10px; text-align: right; display: flex; justify-content: flex-end; }
        .right .card-side { margin-left: auto; padding-left: 10px; display: flex; justify-content: flex-start; }

        .card { 
            background: #fff; padding: 12px; border-radius: 10px; text-align: left;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); width: 100%; max-width: 170px;
            border-left: 4px solid var(--primary); cursor: pointer;
        }
        .card-index { font-size: 9px; color: #ced4da; margin-bottom: 2px; font-family: monospace; }
        .card-meta { font-size: 11px; color: #adb5bd; margin-bottom: 3px; }
        .card-text { font-size: 13px; color: #495057; }

        /* 스토리 탭 디자인 */
        .story-paper { 
            background: white; width: 100%; max-width: 600px; margin: 20px auto; 
            border-radius: 12px; padding: 30px; min-height: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); border-top: 5px solid var(--primary);
        }
        #story-editor { min-height: 300px; outline: none; line-height: 1.8; font-size: 15px; }

        /* 캐릭터 도감 디자인 */
        .char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px; }
        .char-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .char-name { font-weight: bold; font-size: 16px; margin-bottom: 5px; color: var(--primary); }
        .char-info { font-size: 12px; color: #868e96; margin-bottom: 8px; }
        .char-memo { font-size: 13px; color: #495057; line-height: 1.4; }

        /* 하단 FAB 버튼 */
        .fab-wrap { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 2001; }
        .fab { width: 55px; height: 55px; background: var(--primary); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); cursor: pointer; }

        /* 모달창 스타일 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 3000; justify-content: center; align-items: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: white; width: 100%; max-width: 360px; padding: 20px; border-radius: 12px; }
        .modal-header-btns { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }

        /* 인풋 및 버튼 */
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; }
        button { cursor: pointer; padding: 10px; border-radius: 6px; border: none; font-weight: bold; }
        .btn-main { background: var(--primary); color: white; width: 100%; margin-bottom: 5px; }
        .btn-sub { background: #e9ecef; color: #495057; width: 100%; }
        .btn-arrow { background: #f1f3f5; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .danger { background: #ff6b6b; color: white; }

        /* 연대 관리 목록 */
        .reorder-list { margin-bottom: 15px; }
        .reorder-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #eee; }
        
        /* 상세보기 버튼 그리드 */
        .detail-btn-wrap { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="fixed-top-area">
        <header class="app-header">
            <div class="logo">Y</div>
            <div id="project-main-title" class="title-wrap" onclick="openModal('projModal')">
                <span id="project-name">기본</span>
                <span class="proj-dropdown">▾</span>
            </div>
            <button class="cloud-save-btn" onclick="saveToCloudManual()">저장</button>
        </header>
        <nav class="tab-menu">
            <div class="tab-item active" onclick="showTab('timeline')">타임라인</div>
            <div class="tab-item" onclick="showTab('story')">스토리</div>
            <div class="tab-item" onclick="showTab('char')">캐릭터도감</div>
        </nav>
    </div>

    <main class="content-body">
        <div id="timeline-view" class="view active">
            <div class="tl-wrapper">
                <div class="center-line"></div>
                <div id="tl-list"></div>
            </div>
        </div>

        <div id="story-view" class="view">
            <div class="story-paper">
                <div id="story-editor" contenteditable="true" placeholder="이곳에 이야기를 펼쳐보세요..."></div>
                <button class="btn-main" style="margin-top:15px;" onclick="saveStory()">클라우드 저장</button>
            </div>
        </div>

        <div id="char-view" class="view">
            <div id="char-list" class="char-grid"></div>
        </div>
    </main>

    <div class="fab-wrap" id="fab-container">
        <div class="fab" onclick="handleClickFab()">+</div>
    </div>

    <div id="eventModal" class="modal"><div class="modal-content">
        <div class="modal-header-btns">
            <h3>기록 편집</h3>
            <button class="btn-arrow" style="padding: 5px 10px;" onclick="openModal('eraModal')">연대 관리</button>
        </div>
        <select id="e-era"></select>
        <div style="display:flex; gap:5px;">
            <input type="number" id="e-year" placeholder="년">
            <input type="number" id="e-month" placeholder="월">
        </div>
        <textarea id="e-text" rows="5" placeholder="내용을 입력하세요."></textarea>
        <button class="btn-main" onclick="saveEvent()">기록 저장</button>
        <button class="btn-sub" onclick="closeModal('eventModal')">닫기</button>
    </div></div>

    <div id="eraModal" class="modal"><div class="modal-content">
        <h3>연대 순서 관리</h3>
        <div id="era-manager-list" class="reorder-list"></div>
        <input type="text" id="new-era-in" placeholder="새 연대 이름">
        <button class="btn-main" onclick="addNewEra()">+ 연대 추가</button>
        <button class="btn-sub" onclick="closeModal('eraModal')">닫기</button>
    </div></div>

    <div id="memoDetailModal" class="modal"><div class="modal-content">
        <h3>사건 상세보기</h3>
        <div id="memo-detail-text" style="padding:15px; background:#f8f9fa; border-radius:6px; margin:10px 0; font-size:14px; line-height:1.6;"></div>
        <div class="detail-btn-wrap">
            <button class="btn-main" onclick="addBranch()">가지추가</button>
            <button class="btn-sub" onclick="alert('기능 준비중')">편집</button>
            <button class="btn-sub danger" onclick="deleteCurrentEvent()">삭제</button>
        </div>
        <button class="btn-sub" style="width:100%; margin-top:10px;" onclick="closeModal('memoDetailModal')">닫기</button>
    </div></div>

    <div id="charModal" class="modal"><div class="modal-content">
        <h3>새 캐릭터 등록</h3>
        <input type="text" id="c-name" placeholder="이름">
        <div style="display:flex; gap:5px;">
            <input type="text" id="c-age" placeholder="나이">
            <input type="text" id="c-gender" placeholder="성별">
        </div>
        <textarea id="c-memo" rows="4" placeholder="특징 및 메모를 적어주세요."></textarea>
        <button class="btn-main" onclick="saveChar()">캐릭터 저장</button>
        <button class="btn-sub" onclick="closeModal('charModal')">닫기</button>
    </div></div>

    <div id="projModal" class="modal"><div class="modal-content">
        <h3>프로젝트 전환</h3>
        <input type="text" id="new-proj-name-in" placeholder="새 프로젝트 이름">
        <button class="btn-main" onclick="alert('기능 준비중')">프로젝트 추가</button>
        <button class="btn-sub" onclick="closeModal('projModal')">닫기</button>
    </div></div>


    <script>
        // Firebase 설정 (Yuta님의 데이터베이스)
        const firebaseConfig = {
            apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc",
            databaseURL: "https://true-s-default-rtdb.firebaseio.com",
            projectId: "true-s"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 앱 상태 데이터
        let state = {
            curProject: '기본',
            eras: ['제국력'],
            storyboard: [],
            story: "",
            characters: []
        };
        let detailMemoId = null; // 현재 상세보기 중인 메모 ID

        // 1. 데이터 로드 및 실시간 동기화
        function syncData() {
            db.ref('users/Yuta/projects/' + state.curProject).on('value', snapshot => {
                const data = snapshot.val();
                if (data) {
                    state.eras = data.eras || ['제국력'];
                    state.storyboard = data.storyboard ? Object.values(data.storyboard) : [];
                    state.story = data.story || "";
                    state.characters = data.characters ? Object.values(data.characters) : [];
                    
                    document.getElementById('story-editor').innerText = state.story;
                    
                    renderTimeline();
                    populateEraDropdown();
                    populateEraManager();
                    renderCharacters();
                }
            });
        }

        // 탭 전환
        function showTab(tabName) {
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            
            const fab = document.getElementById('fab-container');
            if (tabName === 'story') { fab.style.display = 'none'; } 
            else { fab.style.display = 'block'; }

            event.target.classList.add('active');
            document.getElementById(`${tabName}-view`).classList.add('active');
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        // 플러스 버튼 클릭 분기
        function handleClickFab() {
            const isCharTab = document.getElementById('char-view').classList.contains('active');
            if (isCharTab) openModal('charModal');
            else openModal('eventModal');
        }

        // 2. 타임라인 그리기 (인덱스 부여 + 연대 순서 정렬)
        function renderTimeline() {
            const list = document.getElementById('tl-list');
            list.innerHTML = '<div class="center-line"></div>';
            
            // 정렬: 1. eras 배열 내 순서, 2. 연도, 3. 월
            const sorted = [...state.storyboard].sort((a, b) => {
                const eraA = state.eras.indexOf(a.era);
                const eraB = state.eras.indexOf(b.era);
                if (eraA !== eraB) return eraA - eraB;
                if (a.year !== b.year) return a.year - b.year;
                return a.month - b.month;
            });

            sorted.forEach((item, index) => {
                const isLeft = index % 2 === 0;
                const row = document.createElement('div');
                row.className = `event-row ${isLeft ? 'left' : 'right'}`;
                
                row.innerHTML = `
                    <div class="node-point"></div>
                    <div class="h-line"></div>
                    <div class="card-side">
                        <div class="card" onclick="openMemoDetail('${item.id}')">
                            <div class="card-index">INDEX ${String(index + 1).padStart(3, '0')}</div>
                            <div class="card-meta">${item.era} ${item.year}년 ${item.month}월</div>
                            <div class="card-text">${item.text}</div>
                        </div>
                    </div>
                `;
                list.appendChild(row);
            });
        }

        // 3. 연대 관리 및 화살표 조작
        function populateEraDropdown() {
            const select = document.getElementById('e-era');
            select.innerHTML = state.eras.map(e => `<option value="${e}">${e}</option>`).join('');
        }

        function populateEraManager() {
            const list = document.getElementById('era-manager-list');
            list.innerHTML = state.eras.map((e, i) => `
                <div class="reorder-item">
                    <span>${e}</span>
                    <div>
                        <button class="btn-arrow" onclick="moveEra(${i}, -1)">▲</button>
                        <button class="btn-arrow" onclick="moveEra(${i}, 1)">▼</button>
                    </div>
                </div>
            `).join('');
        }

        function moveEra(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= state.eras.length) return;
            
            const temp = state.eras[index];
            state.eras[index] = state.eras[newIndex];
            state.eras[newIndex] = temp;
            
            db.ref('users/Yuta/projects/' + state.curProject).update({ eras: state.eras });
        }

        function addNewEra() {
            const input = document.getElementById('new-era-in');
            if (!input.value.trim()) return;
            state.eras.push(input.value.trim());
            db.ref('users/Yuta/projects/' + state.curProject).update({ eras: state.eras });
            input.value = '';
        }

        // 4. 기록 저장
        function saveEvent() {
            const era = document.getElementById('e-era').value;
            const year = parseInt(document.getElementById('e-year').value);
            const month = parseInt(document.getElementById('e-month').value);
            const text = document.getElementById('e-text').value;

            if (!year || !month || !text.trim()) return alert("모든 칸을 입력해 주세요!");

            const newId = Date.now().toString();
            db.ref(`users/Yuta/projects/${state.curProject}/storyboard/${newId}`).set({
                id: newId, era, year, month, text
            });

            closeModal('eventModal');
            document.getElementById('e-text').value = '';
        }

        // 5. 상세보기 및 가지추가
        function openMemoDetail(id) {
            detailMemoId = id;
            const memo = state.storyboard.find(m => m.id === id);
            if (!memo) return;
            document.getElementById('memo-detail-text').innerText = memo.text;
            openModal('memoDetailModal');
        }

        function addBranch() {
            const baseMemo = state.storyboard.find(m => m.id === detailMemoId);
            closeModal('memoDetailModal');
            
            openModal('eventModal');
            document.getElementById('e-era').value = baseMemo.era;
            document.getElementById('e-year').value = baseMemo.year;
            document.getElementById('e-month').value = baseMemo.month;
            document.getElementById('e-text').value = `[${baseMemo.text}] 에서 파생된 이야기: `;
        }

        function deleteCurrentEvent() {
            if (!detailMemoId) return;
            if (confirm("정말 이 기록을 삭제하시겠습니까?")) {
                db.ref(`users/Yuta/projects/${state.curProject}/storyboard/${detailMemoId}`).remove();
                closeModal('memoDetailModal');
            }
        }

        // 6. 스토리 저장
        function saveStory() {
            const text = document.getElementById('story-editor').innerText;
            db.ref(`users/Yuta/projects/${state.curProject}`).update({ story: text });
            alert("스토리가 성공적으로 클라우드에 저장되었습니다.");
        }

        // 7. 캐릭터 도감 관리
        function saveChar() {
            const name = document.getElementById('c-name').value;
            const age = document.getElementById('c-age').value;
            const gender = document.getElementById('c-gender').value;
            const memo = document.getElementById('c-memo').value;

            if (!name.trim()) return alert("이름을 입력해 주세요!");

            const newId = Date.now().toString();
            db.ref(`users/Yuta/projects/${state.curProject}/characters/${newId}`).set({
                id: newId, name, age, gender, memo
            });

            closeModal('charModal');
            document.getElementById('c-name').value = '';
            document.getElementById('c-age').value = '';
            document.getElementById('c-gender').value = '';
            document.getElementById('c-memo').value = '';
        }

        function renderCharacters() {
            const list = document.getElementById('char-list');
            if (state.characters.length === 0) {
                list.innerHTML = '<div style="grid-column: 1/3; text-align: center; color: #999; padding: 20px;">등록된 캐릭터가 없습니다. + 버튼을 눌러보세요!</div>';
                return;
            }
            list.innerHTML = state.characters.map(c => `
                <div class="char-card">
                    <div class="char-name">${c.name}</div>
                    <div class="char-info">${c.age || '나이 미정'} / ${c.gender || '성별 미정'}</div>
                    <div class="char-memo">${c.memo || '메모가 없습니다.'}</div>
                </div>
            `).join('');
        }

        // 수동 클라우드 저장 트리거 (헤더 우측 버튼용)
        function saveToCloudManual() {
            saveStory();
        }

        // 초기 실행
        syncData();
    </script>
</body>
</html>
