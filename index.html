<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STORY MASTER</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root { --primary: #4dabf7; --bg: #f8f9fa; --line: #dee2e6; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Pretendard', sans-serif; background: var(--bg); overflow: hidden; }
        
        /* 헤더 최적화 */
        header { position: fixed; top: 0; width: 100%; height: 50px; background: #fff; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 1100; border-bottom: 1px solid #eee; box-sizing: border-box; }
        .logo { font-size: 16px; font-weight: 900; color: var(--primary); cursor: pointer; }

        .top-nav { position: fixed; top: 50px; width: 100%; height: 45px; background: #fff; display: flex; justify-content: center; align-items: center; gap: 30px; z-index: 1050; border-bottom: 1px solid #eee; }
        .nav-item { font-size: 14px; font-weight: 800; color: #adb5bd; cursor: pointer; padding-bottom: 5px; border-bottom: 2px solid transparent; }
        .nav-item.active { color: var(--primary); border-bottom-color: var(--primary); }

        /* 메인 컨텐츠 영역 */
        .content-view { display: none; height: calc(100vh - 155px); margin-top: 95px; overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .content-view.active { display: block; }

        /* 타임라인 레이아웃 (v10 유지 및 드래그 보정) */
        .timeline-container { position: relative; width: 100%; max-width: 500px; margin: 0 auto; min-height: 100%; padding-bottom: 50px; }
        .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--line); transform: translateX(-50%); }
        .year-marker { position: relative; width: fit-content; margin: 20px auto 10px; padding: 4px 10px; background: #343a40; color: white; border-radius: 15px; font-size: 10px; font-weight: 800; z-index: 10; }

        .dropzone { position: relative; width: 100%; display: grid; grid-template-columns: 1fr 1fr; margin-bottom: 8px; }
        .card-wrapper { position: relative; width: 110px; z-index: 20; }
        .card { background: #fff; width: 100%; padding: 10px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee; }
        
        /* 캐릭터 4열 그리드 */
        .char-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; text-align: center; }
        .char-item { position: relative; cursor: pointer; }
        .char-circle { width: 65px; height: 65px; border-radius: 50%; background: #eee; margin: 0 auto 5px; overflow: hidden; border: 2px solid #fff; box-shadow: 0 3px 6px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; }
        .char-circle img { width: 100%; height: 100%; object-fit: cover; }
        .char-name { font-size: 11px; font-weight: 800; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 팝업/모달 디자인 (영문 주소 흔적 제거) */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: #fff; width: 90%; max-width: 400px; border-radius: 20px; padding: 20px; box-sizing: border-box; max-height: 80vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        .compact-input { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 10px; border: 1px solid #eee; background: #f8f9fa; font-size: 14px; box-sizing: border-box; outline: none; }
        .row { display: flex; gap: 8px; }

        /* 하단 탭별 메뉴 */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #fff; display: flex; justify-content: center; align-items: center; border-top: 1px solid #eee; z-index: 1000; }
        .nav-btn-group { display: none; width: 100%; justify-content: space-around; align-items: center; padding: 0 20px; }
        .nav-btn-group.active { display: flex; }
        
        .main-add-btn { width: 50px; height: 50px; background: var(--primary); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 28px; border: 4px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top: -30px; }
        .sub-btn { font-size: 11px; font-weight: 800; color: #adb5bd; text-align: center; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="openSettings()">STORY MASTER</div>
        <div id="project-display" onclick="toggleProjectList()" style="font-weight:900; font-size:14px; cursor:pointer;">이그리예가 ▾</div>
        <button onclick="saveToCloud()" style="border:none; background:none; color:var(--primary); font-weight:800; font-size:11px;">저장</button>
    </header>

    <nav class="top-nav">
        <div class="nav-item active" onclick="switchView('timeline')">타임라인</div>
        <div class="nav-item" onclick="switchView('story')">스토리</div>
        <div class="nav-item" onclick="switchView('char')">캐릭터</div>
    </nav>

    <div id="view-timeline" class="content-view active">
        <div class="timeline-container">
            <div class="center-line"></div>
            <div id="cards-area"></div>
        </div>
    </div>

    <div id="view-story" class="content-view">
        <div id="story-list-area"></div>
        <textarea id="story-editor" class="compact-input" style="height:300px; background:#fff;" placeholder="이야기를 적어보세요... 단락을 나누어 저장하면 목록으로 관리됩니다."></textarea>
    </div>

    <div id="view-char" class="content-view">
        <div class="char-grid" id="char-area"></div>
    </div>

    <footer class="bottom-nav">
        <div id="menu-timeline" class="nav-btn-group active">
            <div class="sub-btn">시대편집</div>
            <div class="main-add-btn" onclick="addNewEvent()">+</div>
            <div class="sub-btn">필터</div>
        </div>
        <div id="menu-story" class="nav-btn-group">
            <div class="sub-btn">단락분리</div>
            <div class="main-add-btn" onclick="saveStoryPart()">✓</div>
            <div class="sub-btn">목록보기</div>
        </div>
        <div id="menu-char" class="nav-btn-group">
            <div class="sub-btn">분류편집</div>
            <div class="main-add-btn" onclick="openCharModal()">+</div>
            <div class="sub-btn">순서변경</div>
        </div>
    </footer>

    <div id="charModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0; text-align:center;">캐릭터 등록</h3>
            <div onclick="document.getElementById('char-file').click()" class="char-circle" style="width:80px; height:80px; margin: 0 auto 15px; cursor:pointer; background:#f1f3f5;">
                <img id="char-preview" src="" style="display:none;">
                <span id="char-placeholder">사진+</span>
            </div>
            <input type="file" id="char-file" hidden onchange="previewImage(this)">
            <input type="text" id="c-name" class="compact-input" placeholder="이름">
            <div class="row">
                <input type="text" id="c-age" class="compact-input" placeholder="나이">
                <input type="text" id="c-gender" class="compact-input" placeholder="성별">
            </div>
            <input type="text" id="c-look" class="compact-input" placeholder="외모/특징">
            <textarea id="c-memo" class="compact-input" style="height:80px;" placeholder="중요 메모"></textarea>
            <input type="text" id="c-cat" class="compact-input" placeholder="분류 (예: 주인공, 빌런)">
            <button class="btn-pill" onclick="saveCharacter()">캐릭터 저장</button>
            <button class="btn-ghost" onclick="closeModal('charModal')">닫기</button>
        </div>
    </div>

    <div id="projectModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0;">프로젝트 목록</h3>
            <div id="p-list-box"></div>
            <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
            <input type="text" id="new-p-name" class="compact-input" placeholder="새 프로젝트 이름">
            <button class="btn-pill" onclick="createNewProject()">+ 새 프로젝트 추가</button>
            <button class="btn-ghost" onclick="closeModal('projectModal')">닫기</button>
        </div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", authDomain: "true-s.firebaseapp.com", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
        firebase.initializeApp(config);
        const db = firebase.database();

        let currentProject = "이그리예가", projects = ["이그리예가"], data = { timeline:[], eras:["공통"], chars:[], stories:[] };
        let charImgBase64 = "";

        function init() {
            db.ref(`projects/${currentProject}`).on('value', s => {
                data = s.val() || { timeline:[], eras:["공통"], chars:[], stories:[] };
                renderAll();
            });
        }

        function switchView(view) {
            document.querySelectorAll('.content-view, .nav-item, .nav-btn-group').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${view}`).classList.add('active');
            document.getElementById(`menu-${view}`).classList.add('active');
            event.target.classList.add('active');
        }

        function renderAll() {
            // 타임라인 렌더링 (생략 - 기존 로직과 동일)
            renderChars();
            document.getElementById('project-display').innerText = currentProject + " ▾";
        }

        /* 캐릭터 로직 */
        function renderChars() {
            const area = document.getElementById('char-area');
            area.innerHTML = (data.chars || []).map((c, idx) => `
                <div class="char-item" data-id="${idx}">
                    <div class="char-circle">${c.img ? `<img src="${c.img}">` : '👤'}</div>
                    <div class="char-name">${c.name}</div>
                </div>
            `).join('');
            setupCharDrag();
        }

        function setupCharDrag() {
            interact('.char-item').draggable({
                onmove(e) {
                    const t = e.target;
                    const x = (parseFloat(t.dataset.x) || 0) + e.dx;
                    const y = (parseFloat(t.dataset.y) || 0) + e.dy;
                    t.style.transform = `translate(${x}px, ${y}px)`;
                    t.dataset.x = x; t.dataset.y = y;
                    t.style.zIndex = 1000;
                },
                onend(e) {
                    // 드래그 종료 시 순서 교체 로직은 유타님의 조직도 구상에 맞춰 추후 고도화 가능
                    e.target.style.transform = ''; e.target.dataset.x = 0; e.target.dataset.y = 0;
                }
            });
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    charImgBase64 = e.target.result;
                    document.getElementById('char-preview').src = charImgBase64;
                    document.getElementById('char-preview').style.display = 'block';
                    document.getElementById('char-placeholder').style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveCharacter() {
            const char = {
                name: document.getElementById('c-name').value,
                age: document.getElementById('c-age').value,
                gender: document.getElementById('c-gender').value,
                look: document.getElementById('c-look').value,
                memo: document.getElementById('c-memo').value,
                cat: document.getElementById('c-cat').value,
                img: charImgBase64
            };
            if(!data.chars) data.chars = [];
            data.chars.push(char);
            sync(); closeModal('charModal');
            charImgBase64 = ""; // 리셋
        }

        /* 프로젝트 관리 */
        function toggleProjectList() {
            const box = document.getElementById('p-list-box');
            box.innerHTML = projects.map(p => `<div onclick="switchProject('${p}')" style="padding:12px; border-bottom:1px solid #eee; font-weight:700;">${p} ${p===currentProject?'(현재)':''}</div>`).join('');
            openModal('projectModal');
        }

        function createNewProject() {
            const name = document.getElementById('new-p-name').value.trim();
            if(name && !projects.includes(name)) {
                projects.push(name);
                switchProject(name);
                closeModal('projectModal');
            }
        }

        function switchProject(name) {
            currentProject = name;
            init();
            closeModal('projectModal');
        }

        /* 공통 함수 */
        function openCharModal() { openModal('charModal'); }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function sync() { db.ref(`projects/${currentProject}`).set(data); }
        function saveToCloud() { sync(); alert("저장 완료"); }

        window.onload = init;
    </script>
</body>
</html>
