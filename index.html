<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Yuta Engine Pro v22</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    :root { --primary: #4dabf7; --bg: #f8f9fa; --card-bg: #ffffff; --line: #dee2e6; --text: #212529; --gray: #868e96; --danger: #ff6b6b; }
    body { font-family: 'Pretendard', sans-serif; margin: 0; background-color: var(--bg); background-image: radial-gradient(#e9ecef 1.5px, transparent 1.5px); background-size: 25px 25px; color: var(--text); overflow-x: hidden; padding-bottom: 80px; -webkit-user-select: none; user-select: none; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    /* 헤더 디자인: 스토리마스터 스타일 */
    .header-container { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .header { height: 55px; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; }
    .project-title { font-size: 16px; font-weight: 900; color: var(--primary); letter-spacing: -0.5px; }
    
    /* 캐릭터 필터 바 */
    .search-bar { display: flex; gap: 6px; overflow-x: auto; padding: 10px 15px; scrollbar-width: none; }
    .search-bar::-webkit-scrollbar { display: none; }
    .filter-tag { padding: 6px 14px; border-radius: 18px; background: #fff; border: 1px solid #eee; font-size: 12px; font-weight: 700; white-space: nowrap; color: var(--gray); transition: 0.2s; }
    .filter-tag.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 10px rgba(77,171,247,0.3); }

    /* 타임라인 메인 구조 */
    .timeline-container { position: relative; width: 100%; max-width: 500px; margin: 115px auto 0; min-height: 100vh; padding-bottom: 100px; }
    .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--line); transform: translateX(-50%); }
    .year-marker { position: relative; width: fit-content; margin: 40px auto 25px; padding: 7px 16px; background: #343a40; color: white; border-radius: 20px; font-size: 11px; font-weight: 800; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
    
    /* 사건 로우 및 노드 */
    .row { display: grid; grid-template-columns: 1fr 1fr; position: relative; margin-bottom: 30px; min-height: 90px; }
    .node { width: 12px; height: 12px; background: white; border: 3px solid var(--primary); border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); top: 35px; z-index: 5; }
    .dropzone { display: flex; flex-direction: column; gap: 15px; padding: 0 5px; min-height: 90px; }
    .dropzone[data-side="left"] { align-items: flex-end; padding-right: 35px; }
    .dropzone[data-side="right"] { align-items: flex-start; padding-left: 35px; }

    /* 카드 및 인덱스 탭 (요청하신 파스텔 5종) */
    .card-wrapper { position: relative; width: 115px; z-index: 10; touch-action: none; cursor: pointer; }
    .side-tabs { position: absolute; top: 10px; display: flex; flex-direction: column; gap: 2.5px; pointer-events: none; }
    .dropzone[data-side="left"] .side-tabs { right: 100%; align-items: flex-end; }
    .dropzone[data-side="right"] .side-tabs { left: 100%; align-items: flex-start; }
    
    .tab-idx { width: 13px; height: 20px; transition: 0.2s; }
    .tab-white { background: #fff; border: 1px solid rgba(0,0,0,0.05); width: 14px; position: relative; z-index: 12; }
    .dropzone[data-side="left"] .tab-white { border-right: none; margin-right: -1px; border-radius: 6px 0 0 6px; }
    .dropzone[data-side="right"] .tab-white { border-left: none; margin-left: -1px; border-radius: 0 6px 6px 0; }
    
    /* 가지 색상 (파스텔 레드, 옐로, 그린, 블루, 퍼플) */
    .br-0 { background: #ffc9c9; } .br-1 { background: #fff9db; } .br-2 { background: #d3f9d8; } .br-3 { background: #d0ebff; } .br-4 { background: #eebefa; }
    .dropzone[data-side="left"] .tab-idx:not(.tab-white) { border-radius: 6px 0 0 6px; }
    .dropzone[data-side="right"] .tab-idx:not(.tab-white) { border-radius: 0 6px 6px 0; }

    .card { background: #fff; width: 100%; min-height: 65px; border-radius: 12px; padding: 12px; box-shadow: 0 6px 18px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.03); position: relative; z-index: 11; }
    .card-month { font-size: 9px; font-weight: 900; color: var(--primary); margin-bottom: 4px; text-transform: uppercase; }
    .card-content { font-size: 11px; line-height: 1.45; font-weight: 700; color: #444; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }

    /* 모달 공통 디자인 */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; justify-content: center; align-items: flex-end; backdrop-filter: blur(8px); }
    .modal-content { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 24px 24px 0 0; max-height: 90vh; overflow-y: auto; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); }
    
    /* 입력 UI 스타일 */
    .view-tab-menu { display: flex; align-items: flex-end; gap: 5px; margin-bottom: -1px; padding-left: 5px; overflow-x: auto; scrollbar-width: none; }
    .view-tab-menu::-webkit-scrollbar { display: none; }
    .v-tab { padding: 8px 15px; border-radius: 10px 10px 0 0; font-size: 12px; font-weight: 800; border: 1px solid #eee; border-bottom: none; background: #f1f3f5; color: #adb5bd; white-space: nowrap; }
    .v-tab.active { background: white; color: var(--text); border-color: #ddd; border-top: 3px solid var(--primary); padding-top: 10px; }
    .view-body { border: 1px solid #ddd; border-radius: 0 15px 15px 15px; padding: 22px; background: white; margin-bottom: 18px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.02); }

    .btn-pill { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 14px; font-weight: 800; font-size: 15px; width: 100%; transition: 0.2s; }
    .btn-pill:active { transform: scale(0.97); opacity: 0.9; }
    .btn-ghost { background: #f1f3f5; color: #495057; border: none; padding: 12px; border-radius: 12px; font-weight: 700; font-size: 13px; width: 100%; margin-top: 8px; }
    .btn-danger-text { color: var(--danger); font-weight: 800; background: #fff0f0; }

    input, select, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #eee; background: #f8f9fa; font-size: 14px; margin-bottom: 10px; outline: none; font-family: inherit; }
    
    /* 하단 내비게이션 */
    .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
    .nav-btn { border: none; background: none; font-size: 11px; font-weight: 800; color: #adb5bd; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .nav-btn.active { color: var(--primary); }
    .add-btn-main { width: 54px; height: 54px; background: var(--primary); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 35px; border: 4px solid white; box-shadow: 0 6px 16px rgba(77,171,247,0.4); }
  </style>
</head>
<body>

<div class="header-container">
  <div class="header">
    <div class="project-title" id="projectTitle">YUTA ENGINE PRO</div>
    <button class="btn-pill" style="width:auto; padding:6px 15px; font-size:12px;" onclick="window.saveToCloud()">CLOUD SAVE</button>
  </div>
  <div class="search-bar" id="searchBar"></div>
</div>

<div class="timeline-container" id="timeline">
  <div class="center-line"></div>
</div>

<div id="viewModal" class="modal"><div class="modal-content">
    <div class="view-tab-menu" id="viewTabMenu"></div>
    <div class="view-body">
      <div id="viewMonth" style="font-size:12px; font-weight:900; color:var(--primary); margin-bottom:10px;"></div>
      <div id="viewText" style="font-size:15px; line-height:1.7; color:#333; white-space:pre-wrap; font-weight:700; min-height:120px;"></div>
    </div>
    <div style="display:flex; gap:10px;">
        <button class="btn-pill" style="flex:2;" onclick="window.handleTabEdit()">편집/가지추가</button>
        <button class="btn-ghost" style="flex:1; margin-top:0;" onclick="window.closeModal('viewModal')">닫기</button>
    </div>
</div></div>

<div id="editModal" class="modal"><div class="modal-content">
    <h4 style="text-align:center; margin:0 0 20px 0; font-weight:900;">기록 편집</h4>
    <div style="background:#f1f3f5; padding:15px; border-radius:18px; margin-bottom:15px;">
        <div style="display:flex; gap:8px;">
            <select id="eraType" style="flex:2; margin-bottom:0;"></select>
            <input type="number" id="eYear" style="flex:1.2; margin-bottom:0;" placeholder="년">
            <select id="eMonth" style="flex:1; margin-bottom:0;">
                <script>for(let i=1;i<=12;i++)document.write(`<option value="${i}">${i}월</option>`)</script>
            </select>
        </div>
    </div>
    <textarea id="eContent" rows="6" placeholder="사건의 핵심 내용을 기록하세요."></textarea>
    
    <div style="margin: 15px 0;">
        <div style="font-size:12px; font-weight:800; color:var(--gray); margin-bottom:10px;">기능 메뉴</div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="btn-pill" onclick="window.saveScene()">저장하기</button>
            <button class="btn-pill" style="background:#40c057;" onclick="window.showBranchInput()">가지 추가</button>
            <button class="btn-ghost btn-danger-text" id="delBtn" style="grid-column: span 2;">기록 삭제</button>
        </div>
    </div>
    <button class="btn-ghost" onclick="window.closeModal('editModal')">취소</button>
</div></div>

<div id="confirmModal" class="modal"><div class="modal-content" style="text-align:center; border-radius:24px; width:85%; align-self:center; margin-bottom:auto; margin-top:auto;">
    <h4 id="confirmTitle" style="margin:0 0 12px 0;">알림</h4>
    <p id="confirmMsg" style="font-size:14px; color:#666; margin-bottom:25px; line-height:1.6;"></p>
    <div style="display:flex; gap:10px;"><button class="btn-pill" id="confirmOkBtn">확인</button><button class="btn-ghost" id="confirmCancelBtn" style="margin-top:0;">취소</button></div>
</div></div>

<div id="inputModal" class="modal"><div class="modal-content" style="border-radius:24px; width:90%; align-self:center; margin-bottom:auto; margin-top:auto;">
    <h4 id="inputTitle" style="margin:0 0 15px 0; text-align:center;">입력</h4>
    <textarea id="customInput" rows="5" placeholder="내용을 입력하세요" style="background:#fff; border:1px solid #ddd;"></textarea>
    <div style="display:flex; gap:10px;"><button class="btn-pill" id="inputConfirmBtn">확인</button><button class="btn-ghost" style="margin-top:0;" onclick="window.closeModal('inputModal')">취소</button></div>
</div></div>

<div id="eraModal" class="modal"><div class="modal-content">
    <h4 style="font-weight:900;">시대(Era) 관리</h4>
    <div id="eraListGrid" style="margin:15px 0;"></div>
    <button class="btn-pill" id="addEraBtn">+ 새 시대 추가</button>
    <button class="btn-ghost" onclick="window.closeModal('eraModal')">닫기</button>
</div></div>

<div id="loadModal" class="modal"><div class="modal-content">
    <h4 style="font-weight:900;">프로젝트 목록</h4>
    <div id="projectList" style="margin:15px 0;"></div>
    <button class="btn-pill" id="addProjBtn">+ 새 프로젝트 생성</button>
    <button class="btn-ghost" onclick="window.closeModal('loadModal')">닫기</button>
</div></div>

<div class="nav">
  <button class="nav-btn" onclick="window.openLoadModal()">📁<br>목록</button>
  <button class="nav-btn" onclick="window.openEraModal()">⏳<br>시대</button>
  <div class="add-btn-main" onclick="window.addScene()">+</div>
  <button class="nav-btn" onclick="window.saveToCloud()">☁️<br>저장</button>
  <button class="nav-btn" onclick="location.reload()">🔄<br>새로침</button>
</div>

<script>
  const config = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
  firebase.initializeApp(config);
  const db = firebase.database();

  let storyboard = [], eras = ["제국력"], currentProject = "기본";
  let editingId = null, currentViewTab = 0;
  const pastelColors = ["br-0", "br-1", "br-2", "br-3", "br-4"];

  // --- 유틸리티 함수 ---
  window.openModal = (id) => document.getElementById(id).style.display = 'flex';
  window.closeModal = (id) => document.getElementById(id).style.display = 'none';
  
  window.customConfirm = (title, msg, onOk, isAlert = false) => {
    document.getElementById('confirmTitle').innerText = title;
    document.getElementById('confirmMsg').innerText = msg;
    const okBtn = document.getElementById('confirmOkBtn');
    const cancelBtn = document.getElementById('confirmCancelBtn');
    cancelBtn.style.display = isAlert ? 'none' : 'block';
    window.openModal('confirmModal');
    okBtn.onclick = () => { window.closeModal('confirmModal'); if(onOk) onOk(); };
    cancelBtn.onclick = () => window.closeModal('confirmModal');
  };

  window.customPrompt = (title, defaultVal, callback) => {
    document.getElementById('inputTitle').innerText = title;
    document.getElementById('customInput').value = defaultVal || "";
    window.openModal('inputModal');
    document.getElementById('inputConfirmBtn').onclick = () => {
        const val = document.getElementById('customInput').value;
        window.closeModal('inputModal');
        callback(val);
    };
  };

  // --- 타임라인 렌더링 (좌우 정렬 및 월별 공유 노드) ---
  window.render = () => {
    const container = document.getElementById('timeline');
    container.innerHTML = '<div class="center-line"></div>';
    
    eras.forEach(eName => {
        const eraData = storyboard.filter(s => s.era === eName).sort((a,b) => (a.year - b.year) || (a.month - b.month));
        if(eraData.length === 0) return;

        // 연도 그룹화
        const years = [...new Set(eraData.map(s => s.year))];
        years.forEach(yr => {
            container.innerHTML += `<div class="year-marker">${eName} ${yr}년</div>`;
            const yearItems = eraData.filter(s => s.year === yr);
            const months = [...new Set(yearItems.map(s => s.month))].sort((a,b)=>a-b);

            months.forEach(m => {
                const row = document.createElement('div');
                row.className = 'row';
                row.innerHTML = `<div class="dropzone" data-side="left"></div><div class="node"></div><div class="dropzone" data-side="right"></div>`;
                container.appendChild(row);

                const monthItems = yearItems.filter(s => s.month === m);
                monthItems.forEach((sc, idx) => {
                    const side = idx % 2 === 0 ? 'left' : 'right';
                    const zone = row.querySelector(`.dropzone[data-side="${side}"]`);
                    
                    const wrap = document.createElement('div');
                    wrap.className = 'card-wrapper';
                    wrap.onclick = () => window.openViewer(sc.id);

                    // 인덱스 탭 생성 (메모박스 가로길이 축소 반영됨)
                    let tabsHtml = `<div class="tab-idx tab-white"></div>`;
                    if(sc.branches) sc.branches.forEach((_, i) => tabsHtml += `<div class="tab-idx ${pastelColors[i%5]}"></div>`);

                    wrap.innerHTML = `
                        <div class="side-tabs">${tabsHtml}</div>
                        <div class="card">
                            <div class="card-month">${m}월</div>
                            <div class="card-content">${sc.text}</div>
                        </div>`;
                    zone.appendChild(wrap);
                });
            });
        });
    });
  };

  // --- 상세 보기 및 가지 관리 ---
  window.openViewer = (id) => {
    editingId = id;
    const s = storyboard.find(x => x.id == id);
    currentViewTab = 0;
    window.renderTabs(s);
    window.openModal('viewModal');
  };

  window.renderTabs = (s) => {
    const menu = document.getElementById('viewTabMenu');
    let tabs = [`<div class="v-tab active" onclick="window.switchTab(0)">기록</div>`];
    (s.branches || []).forEach((_, i) => tabs.push(`<div class="v-tab ${pastelColors[i%5]} ${currentViewTab===(i+1)?'active':''}" onclick="window.switchTab(${i+1})">가지 ${i+1}</div>`));
    menu.innerHTML = tabs.join('');
    document.getElementById('viewMonth').innerText = `${s.era} ${s.year}년 ${s.month}월`;
    document.getElementById('viewText').innerText = currentViewTab === 0 ? s.text : s.branches[currentViewTab-1];
  };

  window.switchTab = (idx) => {
    currentViewTab = idx;
    window.renderTabs(storyboard.find(x => x.id == editingId));
  };

  window.handleTabEdit = () => {
    const s = storyboard.find(x => x.id == editingId);
    if(currentViewTab === 0) { window.closeModal('viewModal'); window.openEdit(editingId); }
    else {
      window.customPrompt("가지 내용 수정 (비우면 삭제)", s.branches[currentViewTab-1], (val) => {
          if(val === "") s.branches.splice(currentViewTab-1, 1);
          else if(val) s.branches[currentViewTab-1] = val;
          window.sync(); window.openViewer(editingId);
      });
    }
  };

  window.showBranchInput = () => {
    const s = storyboard.find(x => x.id == editingId || (editingId===null && storyboard[storyboard.length-1]));
    const target = s || { branches: [] };
    if((target.branches||[]).length >= 5) return window.customConfirm("알림", "가지는 최대 5개까지만 가능합니다.", null, true);
    window.customPrompt("새로운 가지 내용 입력", "", (val) => {
        if(val) {
            if(!target.branches) target.branches = [];
            target.branches.push(val);
            window.sync();
            if(editingId) window.openViewer(editingId);
        }
    });
  };

  // --- 데이터 동기화 및 관리 ---
  window.sync = () => { db.ref('projects/'+currentProject).set({ storyboard, eras }).then(window.render); };
  window.saveToCloud = () => { window.sync(); window.customConfirm("완료", "클라우드에 저장되었습니다.", null, true); };
  
  window.openEdit = (id) => {
    editingId = id;
    const s = storyboard.find(x => x.id == id);
    document.getElementById('eContent').value = s ? s.text : "";
    document.getElementById('eYear').value = s ? s.year : "1000";
    document.getElementById('eraType').innerHTML = eras.map(e => `<option value="${e}">${e}</option>`).join('');
    if(s) {
        document.getElementById('eraType').value = s.era;
        document.getElementById('eMonth').value = s.month;
        document.getElementById('delBtn').style.display = 'block';
    } else {
        document.getElementById('delBtn').style.display = 'none';
    }
    window.openModal('editModal');
  };

  window.saveScene = () => {
    const text = document.getElementById('eContent').value.trim();
    if(!text) return;
    const year = parseInt(document.getElementById('eYear').value);
    const era = document.getElementById('eraType').value;
    const month = parseInt(document.getElementById('eMonth').value);

    if(editingId) {
        storyboard = storyboard.map(s => s.id == editingId ? {...s, text, year, month, era} : s);
    } else {
        storyboard.push({ id: Date.now(), era, year, month, text, branches: [] });
    }
    window.sync();
    window.closeModal('editModal');
  };

  // --- 초기 실행 ---
  window.addScene = () => window.openEdit(null);
  window.openEraModal = () => {
    document.getElementById('eraListGrid').innerHTML = eras.map(e => `<div style="padding:12px; background:#f8f9fa; border-radius:12px; margin-bottom:8px; font-weight:800; font-size:13px;">${e}</div>`).join('');
    window.openModal('eraModal');
  };
  
  document.getElementById('addEraBtn').onclick = () => window.customPrompt("새 시대 이름", "", (n) => { if(n) { eras.push(n); window.sync(); window.openEraModal(); } });
  document.getElementById('delBtn').onclick = () => window.customConfirm("삭제", "이 기록을 삭제할까요?", () => { storyboard = storyboard.filter(s => s.id != editingId); window.sync(); window.closeModal('editModal'); });

  window.onload = () => {
    db.ref('projects/'+currentProject).on('value', s => {
        const d = s.val();
        if(d) { storyboard = d.storyboard || []; eras = d.eras || ["제국력"]; window.render(); }
    });
  };
</script>
</body>
</html>
