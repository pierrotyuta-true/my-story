<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChronoDeck</title>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { 
            --primary: #4dabf7; --dark: #343a40; --text: #495057; --bg: #f8f9fa;
            --p1: #d0ebff; --p2: #fff9db; --p3: #d3f9d8; --p4: #ffe3e3; --line: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Pretendard', sans-serif; background-color: var(--bg);
            background-image: radial-gradient(#dee2e6 1.5px, transparent 1.5px);
            background-size: 20px 20px; color: var(--text); overflow-x: hidden; 
            /* 구글 검색 및 선택 차단 */
            -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
        }
        input, textarea, select { -webkit-user-select: auto; user-select: auto; }

        /* 헤더 & 탭 */
        .app-header { height: 60px; background: var(--dark); color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: fixed; top:0; width:100%; z-index:2000; }
        .app-logo-wrap { display: flex; align-items: center; gap: 6px; color: #4dabf7; text-decoration: none; }
        .logo-symbol { font-size: 20px; font-weight: 900; }
        .logo-text-box { display: flex; flex-direction: column; line-height: 1.1; }
        .logo-text-upper { font-size: 9px; font-weight: 300; letter-spacing: 0.1em; }
        .logo-text-lower { font-size: 13px; font-weight: 800; }
        
        .project-title { flex: 1; text-align: center; font-weight: bold; font-size: 14px; cursor: pointer; border: none; margin: 0 10px; }
        .icon-btn { cursor: pointer; font-size: 12px; background: none; border: none; color: white; opacity: 0.8; }

        .tab-menu { position:fixed; top:60px; width:100%; display:flex; background:white; z-index:1999; height:45px; border-bottom:1px solid #eee; }
        .tab-item { flex:1; display:flex; align-items:center; justify-content:center; font-size:14px; color:#adb5bd; cursor:pointer; }
        .tab-item.active { color:var(--dark); font-weight:bold; border-bottom: 2px solid var(--dark); }

        .content-body { margin-top: 115px; padding-bottom: 120px; }
        .view { display: none; width: 100%; }
        .view.active { display: block; }

        /* 타임라인 */
        .tl-wrapper { position: relative; width: 100%; max-width: 500px; margin: 0 auto; }
        .center-line { position: absolute; left: 50%; transform: translateX(-50%); top: 0; bottom: 0; width: 2px; background: var(--line); }
        .year-banner { display: flex; justify-content: center; margin: 25px 0 10px; position: relative; z-index: 10; }
        .year-text { background: var(--dark); color: white; padding: 7px 18px; border-radius: 20px; font-size: 13px; font-weight: bold; }
        
        .month-cluster { position: relative; margin-bottom: 15px; padding: 8px 0; }
        .month-node { position: absolute; left: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; background: white; border: 2px solid #4dabf7; border-radius: 50%; z-index: 10; }
        .event-grid { display: grid; grid-template-columns: 1fr 1fr; column-gap: 30px; }
        .col { display: flex; flex-direction: column; gap: 6px; min-height: 40px; }
        .left-col { align-items: flex-end; }
        .right-col { align-items: flex-start; }
        
        .timeline-card { background: #fff; padding: 12px; border-radius: 12px; width: 135px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); border: 1px solid #f1f3f5; position: relative; cursor: pointer; }
        .card-text { font-size: 13px; pointer-events: none; }
        .branch-tab { position: absolute; width: 8px; height: 16px; background: #adb5bd; top: 6px; }
        .left-col .branch-tab { left: -8px; border-radius: 3px 0 0 3px; }
        .right-col .branch-tab { right: -8px; border-radius: 0 3px 3px 0; }

        /* 플로팅 메뉴 (FAB) */
        .fab-group { position: fixed; bottom: 30px; right: 25px; z-index: 2100; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .sub-fab { width: 42px; height: 42px; border-radius: 50%; background: white; border: 1px solid #eee; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; justify-content: center; align-items: center; font-size: 18px; cursor: pointer; transform: scale(0); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; }
        .sub-fab.show { transform: scale(1); opacity: 1; }
        .main-fab { width: 56px; height: 56px; border-radius: 50%; background: var(--primary); color: white; border: none; font-size: 28px; box-shadow: 0 5px 15px rgba(77,171,247,0.4); cursor: pointer; transition: 0.3s; z-index: 2101; }
        .main-fab.open { transform: rotate(45deg); background: #adb5bd; }

        /* 모달 공통 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 3000; justify-content: center; align-items: center; backdrop-filter: blur(2px); }
        .modal.active { display: flex; }
        .modal-main-card { background: white; border-radius: 15px; width: 320px; overflow: hidden; }
        #detail-body { padding: 20px; font-size: 14px; min-height: 100px; white-space: pre-wrap; }
        .modal-footer-clean { display: flex; padding: 12px; justify-content: space-around; border-top: 1px solid #f1f3f5; }
        .f-btn-text { background: none; border: none; font-size: 13px; color: var(--primary); font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header class="app-header">
        <a href="#" class="app-logo-wrap"><div class="logo-symbol">✦</div><div class="logo-text-box"><span class="logo-text-upper">CHRONO</span><span class="logo-text-lower">DECK</span></div></a>
        <div class="project-title" onclick="openModal('projectModal')">이그리에가 ▾</div>
        <button class="icon-btn" onclick="syncData()">갱신</button>
    </header>

    <nav class="tab-menu">
        <div class="tab-item active" onclick="showTab('timeline', this)">타임라인</div>
        <div class="tab-item" onclick="showTab('treats', this)">스토리</div>
        <div class="tab-item" onclick="showTab('chars', this)">캐릭터도감</div>
    </nav>

    <main class="content-body">
        <div id="timeline-view" class="view active"><div class="tl-wrapper"><div class="center-line"></div><div id="tl-list"></div></div></div>
        <div id="treats-view" class="view" style="padding:20px;"><div style="background:white; padding:20px; border-radius:15px;">스토리 트리트먼트 준비 중...</div></div>
        <div id="chars-view" class="view" style="padding:20px;"><div style="background:white; padding:20px; border-radius:15px;">캐릭터 도감 준비 중...</div></div>
    </main>

    <div class="fab-group">
        <div class="sub-fab" id="fab-era" onclick="openModal('eraModal')">⚙️</div>
        <div class="sub-fab" id="fab-event" onclick="openAddModal()">📝</div>
        <button class="main-fab" onclick="toggleFab()">+</button>
    </div>

    <div id="eventModal" class="modal"><div class="modal-content" style="background:white; padding:25px; border-radius:18px; width:320px;">
        <h4 id="event-title" style="margin-bottom:15px;">기록하기</h4>
        <div style="display:flex; gap:5px; margin-bottom:10px;"><select id="e-era" style="flex:1.5; padding:10px; border-radius:8px; border:1px solid #eee;"></select><input type="number" id="e-year" placeholder="년" style="flex:1; padding:10px; border-radius:8px; border:1px solid #eee;"><input type="number" id="e-month" placeholder="월" style="flex:1; padding:10px; border-radius:8px; border:1px solid #eee;"></div>
        <textarea id="e-text" rows="5" placeholder="내용을 입력하세요..." style="width:100%; padding:10px; border-radius:8px; border:1px solid #eee; margin-bottom:15px;"></textarea>
        <button style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold;" onclick="saveEvent()">저장</button>
        <button style="width:100%; margin-top:8px; background:none; border:none; color:#adb5bd;" onclick="closeModal('eventModal')">닫기</button>
    </div></div>

    <div id="eraModal" class="modal"><div class="modal-content" style="background:white; padding:20px; border-radius:15px; width:280px;">
        <h4 style="margin-bottom:15px;">연대 관리</h4>
        <div id="era-list" style="max-height:150px; overflow-y:auto; margin-bottom:10px;"></div>
        <div style="display:flex; gap:5px;"><input type="text" id="new-era-name" placeholder="새 연대" style="flex:1; padding:8px; border-radius:5px; border:1px solid #eee;"><button onclick="addNewEra()" style="padding:0 10px; background:var(--primary); color:white; border:none; border-radius:5px;">+</button></div>
        <button style="width:100%; margin-top:15px; background:none; border:none; color:#adb5bd;" onclick="closeModal('eraModal')">닫기</button>
    </div></div>

    <div id="detailModal" class="modal"><div class="modal-content compact" style="width:85%; max-width:320px;">
        <div id="modal-tab-container" style="display:flex; gap:5px; margin-bottom:-1px;"></div>
        <div class="modal-main-card"><div id="detail-body"></div><div class="modal-footer-clean" id="detail-footer"></div></div>
    </div></div>

    <script>
        const firebaseConfig = { databaseURL: "https://true-s-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let state = { storyboard: [], eras: ['제국력', '대한민국'], currentId: null };

        function toggleFab() {
            const main = document.querySelector('.main-fab');
            const subs = document.querySelectorAll('.sub-fab');
            main.classList.toggle('open');
            subs.forEach((s, i) => {
                setTimeout(() => s.classList.toggle('show'), i * 50);
            });
        }

        function syncData() {
            db.ref('users/Yuta/projects/기본/settings/eras').on('value', snap => {
                const raw = snap.val(); if(raw) state.eras = raw;
                updateEraSelect(); renderEras();
            });
            db.ref('users/Yuta/projects/기본/storyboard').on('value', snap => {
                const raw = snap.val() || {};
                state.storyboard = Object.keys(raw).map(k => ({...raw[k], id: String(k)})).sort((a,b) => (a.order || 0) - (b.order || 0));
                renderTimeline();
            });
        }

        function showTab(tabId, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId + '-view').classList.add('active');
            el.classList.add('active');
        }

        function renderTimeline() {
            const list = document.getElementById('tl-list'); list.innerHTML = '';
            const grouped = state.storyboard.reduce((acc, cur) => {
                const key = `${cur.era} ${cur.year}년`;
                if(!acc[key]) acc[key] = {};
                if(!acc[key][cur.month]) acc[key][cur.month] = [];
                acc[key][cur.month].push(cur); return acc;
            }, {});

            Object.keys(grouped).forEach(yearKey => {
                const banner = document.createElement('div'); banner.className = 'year-banner';
                banner.innerHTML = `<span class="year-text">${yearKey}</span>`;
                list.appendChild(banner);
                Object.keys(grouped[yearKey]).sort((a,b)=>a-b).forEach(month => {
                    const cluster = document.createElement('div'); cluster.className = 'month-cluster';
                    cluster.innerHTML = `<div class="month-node"></div><div class="event-grid"><div class="col left-col" data-side="left" data-month="${month}" data-year="${yearKey}"></div><div class="col right-col" data-side="right" data-month="${month}" data-year="${yearKey}"></div></div>`;
                    list.appendChild(cluster);
                    const lCol = cluster.querySelector('.left-col'); const rCol = cluster.querySelector('.right-col');
                    grouped[yearKey][month].forEach(ev => {
                        const card = document.createElement('div'); card.className = 'timeline-card'; card.dataset.id = ev.id;
                        card.innerHTML = `${(ev.branches)?'<div class="branch-tab"></div>':''}<div class="card-text"><small style="color:#adb5bd">${month}월</small><br>${ev.text}</div>`;
                        card.onclick = () => openDetailModal(ev.id);
                        (ev.side === 'right' ? rCol : lCol).appendChild(card);
                    });
                    [lCol, rCol].forEach(c => new Sortable(c, { group:'tl', animation:150, onEnd: updateCardPos }));
                });
            });
            setTimeout(renderCurves, 100);
        }

        function updateCardPos(e) {
            const id = e.item.dataset.id; const col = e.to; const parts = col.dataset.year.split(' ');
            db.ref(`users/Yuta/projects/기본/storyboard/${id}`).update({
                side: col.dataset.side, month: col.dataset.month, era: parts[0], year: parts[1].replace('년','')
            });
        }

        function renderCurves() {
            document.querySelectorAll('.month-cluster').forEach(c => {
                const node = c.querySelector('.month-node'); const first = c.querySelector('.timeline-card');
                if(node && first) node.style.top = `${first.offsetTop + (first.offsetHeight/2)}px`;
            });
        }

        function openDetailModal(id) {
            state.currentId = id; const ev = state.storyboard.find(i => i.id == id);
            document.getElementById('detail-body').innerText = ev.text;
            document.getElementById('detail-footer').innerHTML = `<button class="f-btn-text" onclick="deleteEvent('${id}')" style="color:#ff6b6b">삭제</button><button class="f-btn-text" onclick="closeModal('detailModal')">닫기</button>`;
            openModal('detailModal');
        }

        function openAddModal() { state.currentId = null; document.getElementById('e-text').value = ''; toggleFab(); openModal('eventModal'); }
        function saveEvent() {
            const id = Date.now();
            const data = {
                era: document.getElementById('e-era').value, year: document.getElementById('e-year').value,
                month: document.getElementById('e-month').value, text: document.getElementById('e-text').value,
                side: 'left', order: state.storyboard.length
            };
            db.ref(`users/Yuta/projects/기본/storyboard/${id}`).set(data).then(() => closeModal('eventModal'));
        }

        function deleteEvent(id) { if(confirm('삭제할까요?')) db.ref(`users/Yuta/projects/기본/storyboard/${id}`).remove().then(() => closeModal('detailModal')); }
        function updateEraSelect() { document.getElementById('e-era').innerHTML = state.eras.map(e => `<option>${e}</option>`).join(''); }
        function renderEras() { 
            document.getElementById('era-list').innerHTML = state.eras.map((e, i) => `<div style="display:flex; justify-content:space-between; padding:5px 0;"><span>${e}</span><button onclick="deleteEra(${i})" style="color:red; border:none; background:none;">×</button></div>`).join('');
        }
        function addNewEra() { const n = document.getElementById('new-era-name').value; if(n) { state.eras.push(n); db.ref('users/Yuta/projects/기본/settings/eras').set(state.eras); } }
        function deleteEra(i) { state.eras.splice(i,1); db.ref('users/Yuta/projects/기본/settings/eras').set(state.eras); }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        syncData();
    </script>
</body>
</html>
