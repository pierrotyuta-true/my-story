<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yuta's Engine</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { 
            --primary: #4dabf7; 
            --dark: #343a40; 
            --bg: #f8f9fa;
            /* 파스텔톤 인덱스 색상 */
            --tab-blue: #a5d8ff;
            --tab-yellow: #fff3bf;
            --tab-green: #c3fae8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: #333; }

        /* 타임라인 레이아웃 */
        .tl-container { position: relative; width: 100%; max-width: 500px; margin: 80px auto; padding-top: 20px; }
        .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #dee2e6; transform: translateX(-50%); }

        /* 💡 연도 배너와 노드 위치 */
        .year-section { position: relative; margin-bottom: 20px; } /* 전체 섹션 간격 축소 */
        .year-banner { display: flex; justify-content: center; margin-bottom: 10px; position: relative; z-index: 10; }
        .year-text { background: var(--dark); color: white; padding: 5px 15px; border-radius: 20px; font-size: 13px; font-weight: bold; }
        
        /* 💡 노드 위치를 연도 바로 아래 선 위로 이동 */
        .month-node { 
            position: absolute; left: 50%; top: 40px; width: 10px; height: 10px; 
            background: white; border: 2px solid var(--primary); border-radius: 50%; 
            z-index: 5; transform: translateX(-50%);
        }

        /* 💡 카드 간격 축소 및 정렬 */
        .card-container { 
            display: flex; flex-direction: column; gap: 5px; /* 화살표 부분: 카드 사이 간격 좁힘 */
            width: 100%; padding: 10px 15px; margin-top: 15px; /* 연도와의 간격 좁힘 */
        }

        .card { 
            background: #fff; padding: 12px; border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); width: 180px;
            cursor: pointer; position: relative; border: 1px solid #eee;
        }
        /* 지그재그 배치 */
        .card.left { align-self: flex-start; margin-left: 10%; }
        .card.right { align-self: flex-end; margin-right: 10%; }

        .card-meta { font-size: 11px; color: var(--primary); font-weight: bold; margin-bottom: 4px; }
        .card-text { font-size: 13px; color: #444; }

        /* 💡 인덱스 탭 디자인 */
        .card-tabs { position: absolute; right: -8px; top: 15px; display: flex; flex-direction: column; gap: 2px; }
        .tab { width: 6px; height: 18px; border-radius: 2px; }
        .tab-0 { background: var(--tab-blue); }
        .tab-1 { background: var(--tab-yellow); }
        .tab-2 { background: var(--tab-green); }

        /* 기타 UI */
        .app-header { position: fixed; top: 0; width: 100%; height: 55px; background: var(--dark); color: white; display: flex; align-items: center; padding: 0 15px; z-index: 1000; }
        .fab { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 55px; height: 55px; background: var(--primary); border-radius: 50%; color: white; border: none; font-size: 24px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <header class="app-header">Project: 기본 ▾</header>

    <div class="tl-container">
        <div class="center-line"></div>
        <div id="tl-list"></div>
    </div>

    <button class="fab" onclick="openAddModal()">+</button>

    <script>
        // Firebase 설정 (기존 정보 사용)
        const firebaseConfig = { databaseURL: "https://true-s-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function render() {
            db.ref('users/Yuta/projects/기본/storyboard').on('value', snap => {
                const list = document.getElementById('tl-list');
                list.innerHTML = '';
                const data = snap.val() ? Object.values(snap.val()) : [];
                
                // 연도별 그룹화
                const grouped = data.reduce((acc, cur) => {
                    if(!acc[cur.year]) acc[cur.year] = [];
                    acc[cur.year].push(cur);
                    return acc;
                }, {});

                for(const year in grouped) {
                    const section = document.createElement('div');
                    section.className = 'year-section';
                    
                    // 💡 요청하신 구조대로 노드와 카드 렌더링
                    let cardsHtml = '';
                    grouped[year].sort((a,b) => a.month - b.month).forEach((ev, idx) => {
                        const side = idx % 2 === 0 ? 'left' : 'right';
                        
                        // 인덱스 탭 로직 (가지 추가 데이터일 경우 표시)
                        let tabs = '';
                        if(ev.branchCount > 0) {
                            for(let i=0; i < Math.min(ev.branchCount, 3); i++) {
                                tabs += `<div class="tab tab-${i}"></div>`;
                            }
                        }

                        cardsHtml += `
                            <div class="card ${side}">
                                <div class="card-meta">${ev.month}월</div>
                                <div class="card-text">${ev.text}</div>
                                <div class="card-tabs">${tabs}</div>
                            </div>
                        `;
                    });

                    section.innerHTML = `
                        <div class="year-banner"><div class="year-text">${year}년</div></div>
                        <div class="month-node"></div>
                        <div class="card-container">${cardsHtml}</div>
                    `;
                    list.appendChild(section);
                }
            });
        }

        // 새 데이터 추가 (테스트용: branchCount는 가지 추가 시 늘려주면 됩니다)
        function openAddModal() {
            const year = prompt("연도");
            const month = prompt("월");
            const text = prompt("내용");
            if(year && month && text) {
                const id = Date.now();
                db.ref(`users/Yuta/projects/기본/storyboard/${id}`).set({
                    id, year, month, text, branchCount: 0 // 가지 추가 시 이 값을 1, 2, 3으로 올림
                });
            }
        }

        render();
    </script>
</body>
</html>
