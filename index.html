<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Yuta's Engine</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    :root { --primary: #4dabf7; --bg: #f8f9fa; --line: #dee2e6; --hero: #40c057; --villain: #fa5252; --extra: #fab005; }
    body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); overflow-x: hidden; padding-bottom: 70px; }
    
    /* 상단 탭 */
    .top-nav { display: flex; justify-content: space-around; padding: 15px 0; background: #fff; position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid #eee; }
    .nav-item { font-size: 14px; font-weight: 800; color: #adb5bd; cursor: pointer; }
    .nav-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); padding-bottom: 5px; }

    .view { display: none; padding-top: 65px; height: calc(100vh - 70px); box-sizing: border-box; }
    .view.active { display: block; }

    /* 타임라인 디자인 복구 */
    .tl-container { position: relative; width: 100%; max-width: 500px; margin: 0 auto; min-height: 100%; }
    .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--line); transform: translateX(-50%); }
    .era-tag { position: relative; margin: 20px auto; width: fit-content; padding: 5px 15px; background: #343a40; color: white; border-radius: 15px; font-size: 11px; z-index: 10; }
    .row { display: grid; grid-template-columns: 1fr 1fr; position: relative; margin-bottom: 15px; }
    .node { width: 10px; height: 10px; background: white; border: 2px solid var(--primary); border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); top: 15px; z-index: 5; }
    .card { background: #fff; padding: 10px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); width: 115px; font-size: 11px; position: relative; border-left: 4px solid var(--primary); }
    .card-label { position: absolute; top: -10px; left: 5px; background: var(--primary); color: white; font-size: 8px; padding: 2px 6px; border-radius: 4px; }
    
    /* 스토리 에디터 꽉 차게 */
    .story-editor { width: 100%; height: calc(100% - 60px); padding: 20px; border: none; outline: none; font-size: 15px; line-height: 1.8; box-sizing: border-box; background: white; resize: none; }

    /* 슬라이드 목록 (절반 크기) */
    .side-panel { position: fixed; right: -55%; top: 0; width: 55%; height: 100%; background: white; z-index: 2000; transition: 0.3s; box-shadow: -5px 0 15px rgba(0,0,0,0.1); padding: 15px; box-sizing: border-box; }
    .side-panel.open { right: 0; }
    .doc-link { padding: 10px 5px; border-bottom: 1px solid #f1f3f5; font-size: 13px; cursor: pointer; }
    .doc-sub { padding-left: 15px; color: #868e96; }

    /* 캐릭터 작게 */
    .char-circle { width: 55px; height: 55px; border-radius: 50%; border: 3px solid #ddd; overflow: hidden; margin: 0 auto; }
    .char-circle img { width: 100%; height: 100%; object-fit: cover; }

    /* 하단 메뉴 탭별 독립 */
    .bottom-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #fff; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; }
    .fab { width: 50px; height: 50px; background: var(--primary); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; position: relative; bottom: 15px; border: 4px solid white; }

    /* 모달 */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center; align-items: center; }
    .modal-content { background: white; width: 85%; padding: 20px; border-radius: 15px; box-sizing: border-box; }
    input, select, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
  </style>
</head>
<body>

<div class="top-nav">
  <div class="nav-item active" onclick="showTab('timeline')">타임라인</div>
  <div class="nav-item" onclick="showTab('story')">스토리</div>
  <div class="nav-item" onclick="showTab('char')">캐릭터도감</div>
</div>

<div id="timeline-view" class="view active">
  <div class="tl-container" id="tl-body"><div class="center-line"></div></div>
  <div class="bottom-bar">
    <button onclick="openEraModal()" style="border:none; background:none; font-size:12px;">시대설정</button>
    <div class="fab" onclick="openEventModal()">+</div>
    <button onclick="saveToCloud()" style="border:none; background:none; font-size:12px;">클라우드</button>
  </div>
</div>

<div id="story-view" class="view">
  <textarea id="main-editor" class="story-editor" placeholder="트리트먼트를 작성하세요..."></textarea>
  <div class="bottom-bar">
    <button onclick="saveStory()" style="border:none; background:none; font-size:12px;">저장</button>
    <button onclick="toggleDocs()" style="border:none; background:none; font-size:12px;">문서목록</button>
    <button onclick="extractToDoc()" style="border:none; background:none; font-size:12px;">문단추출</button>
  </div>
</div>

<div id="char-view" class="view">
  <div id="char-grid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px; padding:15px;"></div>
  <div class="bottom-bar">
    <button onclick="openCharModal()" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:8px;">+ 캐릭터 추가</button>
    <button onclick="drawRelations()" style="border:none; background:none; font-size:12px;">관계도</button>
  </div>
</div>

<div id="eraModal" class="modal"><div class="modal-content">
  <h4>시대 순서 설정</h4>
  <div id="era-edit-list" style="max-height:200px; overflow-y:auto; margin-bottom:15px;"></div>
  <input type="text" id="newEraName" placeholder="새 시대 이름">
  <button onclick="addNewEra()" style="width:100%; background:var(--primary); color:white; border:none; padding:10px; border-radius:8px;">시대 추가</button>
  <button onclick="closeModal('eraModal')" style="width:100%; margin-top:5px; border:none; background:none;">닫기</button>
</div></div>

<div id="eventModal" class="modal"><div class="modal-content">
  <h4>사건/메모 기록</h4>
  <div style="display:flex; gap:5px;">
    <select id="eEra" style="flex:1.5;"></select>
    <input type="number" id="eYear" style="flex:1;" placeholder="연도">
  </div>
  <textarea id="eText" rows="4" placeholder="내용을 입력하세요"></textarea>
  <div style="display:flex; gap:5px;">
    <button onclick="saveEvent()" style="flex:1; background:var(--primary); color:white; border:none; padding:10px; border-radius:8px;">저장</button>
    <button onclick="exportTimelineToDoc()" style="flex:1; background:#343a40; color:white; border:none; padding:10px; border-radius:8px;">문서내보내기</button>
  </div>
  <button onclick="closeModal('eventModal')" style="width:100%; margin-top:5px; border:none; background:none;">취소</button>
</div></div>

<div id="side-panel" class="side-panel">
  <h4>문서 목록</h4>
  <div id="doc-list"></div>
  <button onclick="toggleDocs()" style="width:100%; margin-top:20px; padding:10px; border-radius:8px; border:1px solid #ddd;">닫기</button>
</div>

<script>
  const config = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
  if (!firebase.apps.length) firebase.initializeApp(config);
  const db = firebase.database();

  let storyboard = [], eras = ["공통"], characters = [], docs = [{id:'main', title:'기본 트리트먼트', content:'', type:'main'}];
  let currentProject = "MyStory_V2";

  function showTab(tab) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(tab + '-view').classList.add('active');
    if(tab === 'timeline') renderTimeline();
    if(tab === 'char') renderChars();
  }

  // 타임라인 렌더링
  function renderTimeline() {
    const tl = document.getElementById('tl-body');
    tl.innerHTML = '<div class="center-line"></div>';
    eras.forEach(era => {
      tl.innerHTML += `<div class="era-tag">${era}</div>`;
      storyboard.filter(s => s.era === era).sort((a,b)=>a.year-b.year).forEach((sc, idx) => {
        const row = document.createElement('div'); row.className = 'row';
        const side = idx % 2 === 0 ? 'left' : 'right';
        row.innerHTML = `<div style="display:flex; justify-content:${side==='left'?'flex-end':'flex-start'}; padding:0 25px;">
          <div class="card"><div class="card-label">${sc.year}년</div>${sc.text}</div>
        </div><div class="node"></div>`;
        if(side === 'right') row.style.gridTemplateColumns = '1fr 1fr';
        tl.appendChild(row);
      });
    });
  }

  // 시대 설정 (순서 변경/삭제)
  function openEraModal() {
    const list = document.getElementById('era-edit-list');
    list.innerHTML = eras.map((e, i) => `
      <div style="display:flex; align-items:center; gap:10px; padding:8px; border-bottom:1px solid #eee;">
        <span style="flex:1; font-size:13px;">${e}</span>
        <button onclick="moveEra(${i},-1)">▲</button>
        <button onclick="moveEra(${i},1)">▼</button>
        <button onclick="deleteEra(${i})" style="color:red;">X</button>
      </div>`).join('');
    document.getElementById('eraModal').style.display='flex';
  }

  function moveEra(index, step) {
    let target = index + step;
    if(target < 0 || target >= eras.length) return;
    [eras[index], eras[target]] = [eras[target], eras[index]];
    openEraModal(); renderTimeline(); sync();
  }

  function deleteEra(index) { if(confirm('이 시대를 삭제할까요?')) { eras.splice(index,1); openEraModal(); renderTimeline(); sync(); } }
  function addNewEra() { const val = document.getElementById('newEraName').value; if(val) { eras.push(val); openEraModal(); sync(); } }

  // 문서 내보내기 (스토리 탭으로)
  function exportTimelineToDoc() {
    let content = eras.map(era => `[${era}]\n` + storyboard.filter(s=>s.era===era).map(s=>`- ${s.year}년: ${s.text}`).join('\n')).join('\n\n');
    docs.push({ id: Date.now(), title: '타임라인_추출', content, type: 'sub' });
    alert('스토리 목록의 [ㄴ 타임라인_추출]로 저장되었습니다.');
    sync();
  }

  function extractToDoc() {
    const sel = window.getSelection().toString();
    if(!sel) return;
    docs.push({ id: Date.now(), title: sel.substring(0,10)+'...', content: sel, type: 'sub' });
    renderDocList();
  }

  function renderDocList() {
    document.getElementById('doc-list').innerHTML = docs.map(d => `
      <div class="doc-link ${d.type==='sub'?'doc-sub':''}" onclick="loadDoc('${d.id}')">
        ${d.type==='sub'?'ㄴ ':''}<b>${d.title}</b>
      </div>`).join('');
  }

  function loadDoc(id) { 
    const d = docs.find(x => x.id == id);
    if(d) { document.getElementById('main-editor').value = d.content; toggleDocs(); }
  }

  function toggleDocs() { document.getElementById('side-panel').classList.toggle('open'); renderDocList(); }
  function openEventModal() { 
    document.getElementById('eEra').innerHTML = eras.map(e=>`<option value="${e}">${e}</option>`).join('');
    document.getElementById('eventModal').style.display='flex'; 
  }
  function saveEvent() {
    const text = document.getElementById('eText').value;
    const year = document.getElementById('eYear').value;
    const era = document.getElementById('eEra').value;
    if(!text || !year) return;
    storyboard.push({ id: Date.now(), text, year, era });
    renderTimeline(); closeModal('eventModal'); sync();
  }
  function closeModal(id) { document.getElementById(id).style.display='none'; }
  function sync() { db.ref('projects/'+currentProject).set({ storyboard, eras, characters, docs }); }
  function saveToCloud() { sync(); alert('저장완료'); }

  window.onload = () => {
    db.ref('projects/'+currentProject).once('value', s => {
      const d = s.val(); if(d) { storyboard=d.storyboard||[]; eras=d.eras||["공통"]; characters=d.characters||[]; docs=d.docs||docs; renderTimeline(); }
    });
  };
</script>
</body>
</html>
