<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STORY MASTER v15.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --primary: #4dabf7; --bg: #f8f9fa; --text: #212529; --border: #eee; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        /* 헤더 & 네비게이션 */
        .header-wrap { position: fixed; top: 0; width: 100%; background: #fff; z-index: 1000; border-bottom: 1px solid var(--border); }
        .top-info { height: 50px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
        .proj-btn { font-size: 16px; font-weight: 800; cursor: pointer; color: var(--text); }
        
        .tabs { display: flex; justify-content: center; gap: 30px; height: 45px; align-items: center; }
        .tab-item { font-size: 14px; font-weight: 800; color: #adb5bd; cursor: pointer; border-bottom: 2px solid transparent; padding-bottom: 3px; }
        .tab-item.active { color: var(--primary); border-bottom-color: var(--primary); }

        /* 컨텐츠 영역 */
        .main-view { margin-top: 100px; height: calc(100vh - 200px); overflow-y: auto; padding: 15px; }
        .view { display: none; }
        .view.active { display: block; }

        /* 캐릭터 등록창 슬림화 및 리뉴얼 */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .modal-box { background: #fff; width: 85%; max-width: 340px; border-radius: 25px; padding: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .modal-box h3 { text-align: center; margin: 0 0 15px 0; font-size: 18px; }
        
        .s-input { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 10px; border: 1px solid #f1f3f5; background: #f8f9fa; font-size: 13px; outline: none; }
        .btn-row { display: flex; gap: 8px; margin-top: 10px; }
        .b-save { flex: 1.5; background: var(--primary); color: #fff; border: none; padding: 12px; border-radius: 12px; font-weight: 800; font-size: 14px; cursor: pointer; }
        .b-close { flex: 1; background: #f1f3f5; color: #495057; border: none; padding: 12px; border-radius: 12px; font-weight: 700; font-size: 14px; cursor: pointer; }

        /* 하단 메뉴 바: 터치 간섭 방지 및 위치 최적화 */
        .bottom-nav { position: fixed; bottom: 25px; left: 20px; right: 20px; height: 60px; background: rgba(255,255,255,0.95); border-radius: 30px; display: flex; justify-content: space-around; align-items: center; z-index: 5000; box-shadow: 0 5px 20px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05); }
        .nav-side-btn { background: none; border: none; font-size: 12px; font-weight: 800; color: #adb5bd; width: 80px; height: 100%; cursor: pointer; }
        .nav-add-btn { width: 50px; height: 50px; background: var(--primary); border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 26px; margin-top: -35px; border: 4px solid #fff; box-shadow: 0 4px 12px rgba(77,171,247,0.3); cursor: pointer; }

        /* 무팝업 토스트 알림 */
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 12px; z-index: 10000; opacity: 0; transition: 0.3s; pointer-events: none; }
    </style>
</head>
<body>

<div class="header-wrap">
    <div class="top-info">
        <div style="font-size:16px; font-weight:900; color:var(--primary);">STORY MASTER</div>
        <div class="proj-btn" onclick="openProj()">이그리예가 ▾</div>
        <button onclick="cloudSave()" style="border:none; background:none; color:var(--primary); font-weight:800; font-size:12px;">클라우드 저장</button>
    </div>
    <div class="tabs">
        <div id="tab-timeline" class="tab-item active" onclick="goTab('timeline')">타임라인</div>
        <div id="tab-story" class="tab-item" onclick="goTab('story')">스토리</div>
        <div id="tab-char" class="tab-item" onclick="goTab('char')">캐릭터</div>
    </div>
</div>

<div class="main-view">
    <div id="v-timeline" class="view active"><div style="text-align:center; color:#ccc; margin-top:50px;">사건을 등록해주세요.</div></div>
    <div id="v-story" class="view">
        <textarea id="story-area" class="s-input" style="height:350px; background:#fff; border:1px solid #eee;" placeholder="이곳에 이그리예가의 이야기를 기록하세요..."></textarea>
    </div>
    <div id="v-char" class="view"><div id="char-list-grid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px;"></div></div>
</div>

<footer class="bottom-nav">
    <button id="btn-left" class="nav-side-btn" onclick="act('left')">목록</button>
    <div class="nav-add-btn" id="main-act-btn" onclick="act('main')">+</div>
    <button id="btn-right" class="nav-side-btn" onclick="act('right')">시대</button>
</footer>

<div id="charModal" class="modal-overlay"><div class="modal-box">
    <h3>캐릭터 등록</h3>
    <div style="width:70px; height:70px; background:#f8f9fa; border-radius:50%; margin:0 auto 15px; display:flex; align-items:center; justify-content:center; color:#adb5bd; border:1px dashed #dee2e6; font-size:11px;">사진+</div>
    <input type="text" id="c-name" class="s-input" placeholder="이름 (필수)">
    <div style="display:flex; gap:5px;">
        <input type="text" id="c-age" class="s-input" placeholder="나이">
        <input type="text" id="c-gen" class="s-input" placeholder="성별">
    </div>
    <input type="text" id="c-trait" class="s-input" placeholder="주요 특징">
    <textarea id="c-memo" class="s-input" style="height:60px;" placeholder="간략한 메모"></textarea>
    <div class="btn-row">
        <button class="b-save" onclick="saveChar()">저장하기</button>
        <button class="b-close" onclick="closeM('charModal')">취소</button>
    </div>
</div></div>

<div id="toast" class="toast">저장 완료!</div>

<script>
    let nowTab = 'timeline';

    function goTab(t) {
        nowTab = t;
        document.querySelectorAll('.view, .tab-item').forEach(el => el.classList.remove('active'));
        document.getElementById('v-'+t).classList.add('active');
        document.getElementById('tab-'+t).classList.add('active');
        
        const lb = document.getElementById('btn-left'), rb = document.getElementById('btn-right'), mb = document.getElementById('main-act-btn');
        if(t === 'timeline') { lb.innerText="목록"; rb.innerText="시대"; mb.innerText="+"; }
        else if(t === 'story') { lb.innerText="단락분리"; rb.innerText="목록보기"; mb.innerText="✓"; } //
        else { lb.innerText="분류편집"; rb.innerText="순서변경"; mb.innerText="+"; }
    }

    function act(type) {
        if(type === 'main') {
            if(nowTab === 'timeline') showToast("새 사건 추가 창을 엽니다.");
            else if(nowTab === 'story') showToast("스토리 단락을 저장했습니다! ✓"); //
            else openM('charModal');
        } else {
            showToast(nowTab + "의 " + type + " 기능을 실행합니다.");
        }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.opacity = 1;
        setTimeout(() => t.style.opacity = 0, 2000);
    }

    function openM(id) { document.getElementById(id).style.display = 'flex'; }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }
    function cloudSave() { showToast("클라우드 동기화 완료!"); }
    function saveChar() { showToast("캐릭터가 저장되었습니다."); closeM('charModal'); }
</script>
</body>
</html>
