<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>스토리마스터 Pro</title>
  <style>
    :root { 
      --primary: #4dabf7; --bg: #f8f9fa; --card-bg: #ffffff; 
      --text: #212529; --line: #dee2e6; --card-max-w: 320px; 
    }
    
    * { -webkit-user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { 
      font-family: 'Pretendard', -apple-system, sans-serif; 
      background: var(--bg); margin: 0; padding-bottom: 120px; 
      color: var(--text); overflow-x: hidden; touch-action: manipulation;
    }

    /* 헤더 */
    .header { 
      position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.85); 
      backdrop-filter: blur(10px); z-index: 1000; padding: env(safe-area-inset-top) 20px 15px; 
      display: flex; justify-content: space-between; align-items: center; 
      border-bottom: 1px solid rgba(0,0,0,0.05); 
    }
    .header h1 { margin: 0; font-size: 18px; font-weight: 900; color: var(--primary); letter-spacing: -0.5px; }

    /* 타임라인 레이아웃 */
    .timeline-container { position: relative; width: 100%; max-width: 1000px; margin: 100px auto 0; padding: 0 20px; }
    .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--line); transform: translateX(-50%); }

    .year-marker { 
      position: relative; width: fit-content; margin: 50px auto; padding: 8px 20px; 
      background: #495057; color: white; border-radius: 20px; 
      font-size: 13px; font-weight: 700; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.15); 
    }

    .row { display: grid; grid-template-columns: 1fr 60px 1fr; align-items: start; margin-bottom: 40px; position: relative; }
    .node-container { display: flex; justify-content: center; padding-top: 25px; position: relative; }
    .node { 
      width: 12px; height: 12px; background: white; border: 3px solid var(--primary); 
      border-radius: 50%; z-index: 5; box-shadow: 0 0 0 4px var(--bg);
    }

    /* 가로 연결선 */
    .row::before {
      content: ""; position: absolute; top: 31px; left: 15%; right: 15%;
      height: 1px; background: var(--line); z-index: 0; opacity: 0.5;
    }

    /* 카드 디자인 */
    .card-wrapper { width: 100%; display: flex; flex-direction: column; z-index: 2; }
    .left .card-wrapper { align-items: flex-end; }
    .right .card-wrapper { align-items: flex-start; }

    .card { 
      background: var(--card-bg); width: 100%; max-width: var(--card-max-w);
      border-radius: 16px; position: relative; padding: 18px; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.03);
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .card:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    
    .card-color-bar { position: absolute; top: 0; left: 0; width: 6px; height: 100%; border-radius: 16px 0 0 16px; }
    .card-month { font-size: 11px; font-weight: 800; color: #adb5bd; margin-bottom: 8px; display: block; text-transform: uppercase; }
    .card-content { font-size: 15px; line-height: 1.6; color: #343a40; font-weight: 500; word-break: break-all; }

    /* 태블릿/PC 최적화 */
    @media (min-width: 768px) {
      .row { grid-template-columns: 1fr 100px 1fr; }
      .card-content { font-size: 16px; }
      .year-marker { font-size: 15px; }
    }

    /* 하단 네비게이션 */
    .nav { 
      position: fixed; bottom: 0; width: 100%; height: 80px; background: white; 
      display: flex; justify-content: space-around; align-items: center; 
      box-shadow: 0 -10px 30px rgba(0,0,0,0.08); z-index: 1000; 
      padding-bottom: env(safe-area-inset-bottom); 
    }
    .nav-btn { 
      flex: 1; border: none; background: none; font-size: 11px; font-weight: 700; 
      color: #adb5bd; display: flex; flex-direction: column; align-items: center; gap: 5px; 
    }
    .nav-btn span { font-size: 18px; }
    .add-btn-main { 
      width: 60px; height: 60px; background: var(--primary); border-radius: 50%; 
      color: white; display: flex; align-items: center; justify-content: center; 
      font-size: 32px; position: absolute; top: -30px; border: 5px solid white;
      box-shadow: 0 10px 20px rgba(77,171,247,0.4);
    }

    /* 모달 및 UI 요소 생략 (기능은 유지) */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
    .modal-content { background: white; width: 90%; max-width: 380px; padding: 30px; border-radius: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
    input, textarea, select { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #e9ecef; font-size: 16px; background: #f8f9fa; }
    .btn-group { display: flex; gap: 10px; margin-top: 10px; }
    .btn { flex: 1; padding: 16px; border: none; border-radius: 14px; font-weight: 700; font-size: 15px; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-sub { background: #f1f3f5; color: #495057; }
    .color-select { display: flex; gap: 12px; justify-content: center; margin-bottom: 25px; }
    .dot { width: 32px; height: 32px; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 0 1px #dee2e6; cursor: pointer; }
    .dot.selected { box-shadow: 0 0 0 3px var(--primary); transform: scale(1.15); }
  </style>
</head>
<body>

<div class="header">
  <h1>STORYMASTER</h1>
  <button class="btn-primary" style="padding: 8px 18px; border-radius: 25px; font-size: 12px; border:none;" onclick="saveToCloud()">클라우드 저장</button>
</div>

<div class="timeline-container" id="timeline">
  <div class="center-line"></div>
</div>

<div class="nav">
  <button class="nav-btn" onclick="openLoadModal()"><span>📂</span>목록</button>
  <button class="nav-btn" style="margin-right: 35px;" onclick="openEraModal()"><span>⏳</span>시대</button>
  <div style="position: relative; width: 60px;"><button class="add-btn-main" onclick="addScene()">+</button></div>
  <button class="nav-btn" style="margin-left: 35px;" onclick="openCharModal()"><span>👥</span>인물</button>
  <button class="nav-btn" onclick="location.reload()"><span>🔄</span>새침</button>
</div>

<div id="editModal" class="modal">
  <div class="modal-content">
    <h2 style="margin:0 0 25px; font-size:20px; text-align:center;">사건 기록</h2>
    <div class="color-select" id="colorPicker">
      <div class="dot" style="background:#4dabf7;" data-c="#4dabf7"></div>
      <div class="dot" style="background:#ff8787;" data-c="#ff8787"></div>
      <div class="dot" style="background:#63e6be;" data-c="#63e6be"></div>
      <div class="dot" style="background:#ffd43b;" data-c="#ffd43b"></div>
      <div class="dot" style="background:#b197fc;" data-c="#b197fc"></div>
    </div>
    <select id="eraType"></select>
    <div style="display:flex; gap:10px;"><input type="number" id="eYear" placeholder="연도"><select id="eMonth"><script>for(let i=1;i<=12;i++)document.write(`<option value="${i}">${i}월</option>`)</script></select></div>
    <textarea id="eContent" rows="4" placeholder="어떤 기록을 남길까요?"></textarea>
    <div class="btn-group">
      <button class="btn btn-sub" onclick="handleDelete()" id="delBtn">삭제</button>
      <button class="btn btn-primary" style="flex:2" onclick="saveScene()">저장하기</button>
    </div>
    <button onclick="closeModal('editModal')" style="width:100%; margin-top:20px; border:none; background:none; color:#adb5bd; font-size:13px; font-weight:600;">취소하고 돌아가기</button>
  </div>
</div>

<div id="eraModal" class="modal"><div class="modal-content"><h3>시대 관리</h3><div style="display:flex; gap:5px; margin-bottom:15px;"><input type="text" id="newEra" placeholder="예: 서기, 우주력" style="margin:0;"><button class="btn-primary" style="padding:0 20px; border-radius:12px; border:none;" onclick="addEra()">추가</button></div><div id="eraList" style="max-height:200px; overflow-y:auto;"></div><button class="btn-sub" style="width:100%; margin-top:15px; border:none;" onclick="closeModal('eraModal')">닫기</button></div></div>
<div id="charModal" class="modal"><div class="modal-content"><h3>인물 관리</h3><div style="display:flex; gap:5px; margin-bottom:15px;"><input type="text" id="newChar" placeholder="인물 이름" style="margin:0;"><button class="btn-primary" style="padding:0 20px; border-radius:12px; border:none;" onclick="addChar()">등록</button></div><div id="charList" style="max-height:200px; overflow-y:auto;"></div><button class="btn-sub" style="width:100%; margin-top:15px; border:none;" onclick="closeModal('charModal')">닫기</button></div></div>
<div id="loadModal" class="modal"><div class="modal-content"><h3>불러오기</h3><div id="projectList" style="max-height:300px; overflow-y:auto;"></div><button class="btn-sub" style="width:100%; margin-top:15px; border:none;" onclick="closeModal('loadModal')">닫기</button></div></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

  const firebaseConfig = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", authDomain: "true-s.firebaseapp.com", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let storyboard = [], eras = [], chars = [], currentProject = null, editingId = null, selColor = "#4dabf7";

  window.closeModal = (id) => document.getElementById(id).style.display = 'none';

  // --- 렌더링 (반응형 그리드 적용) ---
  window.render = () => {
    const container = document.getElementById('timeline');
    container.innerHTML = '<div class="center-line"></div>';
    
    const groups = {};
    storyboard.sort((a,b) => (eras.indexOf(a.era) - eras.indexOf(b.era)) || (a.year - b.year) || (a.month - b.month))
    .forEach(s => {
      const k = `${s.era} ${s.year}년`;
      if(!groups[k]) groups[k] = {};
      if(!groups[k][s.month]) groups[k][s.month] = { left: [], right: [] };
      groups[k][s.month][s.side].push(s);
    });

    Object.keys(groups).forEach(key => {
      const mk = document.createElement('div'); mk.className = 'year-marker'; mk.innerText = key;
      container.appendChild(mk);

      Object.keys(groups[key]).sort((a,b)=>a-b).forEach(m => {
        const row = document.createElement('div'); row.className = 'row';
        const leftBox = document.createElement('div'); leftBox.className = 'left';
        const nodeBox = document.createElement('div'); nodeBox.className = 'node-container';
        const rightBox = document.createElement('div'); rightBox.className = 'right';

        nodeBox.innerHTML = '<div class="node"></div>';

        ['left', 'right'].forEach(side => {
          const wrapper = document.createElement('div'); wrapper.className = 'card-wrapper';
          const target = side === 'left' ? leftBox : rightBox;
          
          groups[key][m][side].forEach(sc => {
            const card = document.createElement('div'); card.className = 'card';
            card.innerHTML = `<div class="card-color-bar" style="background:${sc.color}"></div><span class="card-month">${m}월</span><div class="card-content">${sc.text}</div>`;
            card.onclick = () => openEdit(sc.id);
            wrapper.appendChild(card);
          });
          target.appendChild(wrapper);
        });

        row.appendChild(leftBox); row.appendChild(nodeBox); row.appendChild(rightBox);
        container.appendChild(row);
      });
    });
  };

  // --- 로직 핸들러 ---
  window.openEdit = (id) => {
    const s = storyboard.find(x => x.id == id);
    editingId = id; selColor = s.color;
    document.getElementById('eContent').value = s.text;
    document.getElementById('eYear').value = s.year;
    document.getElementById('eMonth').value = s.month;
    document.getElementById('eraType').innerHTML = eras.map(e => `<option value="${e}">${e}</option>`).join('');
    document.getElementById('eraType').value = s.era;
    updateColor();
    document.getElementById('delBtn').style.display = 'block';
    document.getElementById('editModal').style.display = 'flex';
  };

  window.addScene = () => {
    if(!eras.length) return alert('시대를 먼저 만드세요!');
    editingId = null; selColor = "#4dabf7";
    document.getElementById('eContent').value = "";
    document.getElementById('eYear').value = "";
    document.getElementById('eraType').innerHTML = eras.map(e => `<option value="${e}">${e}</option>`).join('');
    updateColor();
    document.getElementById('delBtn').style.display = 'none';
    document.getElementById('editModal').style.display = 'flex';
  };

  window.saveScene = () => {
    const text = document.getElementById('eContent').value.trim();
    const year = document.getElementById('eYear').value;
    if(!text || !year) return;
    const side = editingId ? storyboard.find(x=>x.id==editingId).side : (storyboard.length % 2 === 0 ? 'left' : 'right');
    const data = { id: editingId || Date.now().toString(), era: document.getElementById('eraType').value, year: parseInt(year), month: parseInt(document.getElementById('eMonth').value), text, color: selColor, side };
    if(editingId) storyboard = storyboard.map(s => s.id == editingId ? data : s);
    else storyboard.push(data);
    closeModal('editModal'); sync();
  };

  const sync = () => { if(currentProject) set(ref(db, `projects/${currentProject}`), { data: storyboard, eras, chars }); render(); };
  window.saveToCloud = () => { const n = prompt("저장할 프로젝트 이름"); if(n) { currentProject = n; sync(); alert("저장되었습니다."); } };
  window.openLoadModal = () => { get(ref(db, 'projects')).then(s => { const d = s.val(); document.getElementById('projectList').innerHTML = d ? Object.keys(d).map(k => `<button class="btn btn-sub" style="width:100%; margin-bottom:10px; text-align:left; border:1px solid #eee;" onclick="loadP('${k}')">📁 ${k}</button>`).join('') : '저장된 프로젝트가 없습니다.'; document.getElementById('loadModal').style.display = 'flex'; }) };
  window.loadP = (k) => { currentProject = k; onValue(ref(db, `projects/${k}`), s => { const d = s.val(); if(d){ storyboard=d.data||[]; eras=d.eras||[]; chars=d.chars||[]; render(); } }, {onlyOnce:true}); closeModal('loadModal'); };
  window.handleDelete = () => { if(confirm("정말 삭제할까요?")) { storyboard = storyboard.filter(s => s.id != editingId); closeModal('editModal'); sync(); } };
  
  window.openEraModal = () => { document.getElementById('eraList').innerHTML = eras.map(e => `<div style="padding:12px; border-bottom:1px solid #f1f3f5; font-weight:600;">${e}</div>`).join(''); document.getElementById('eraModal').style.display = 'flex'; };
  window.addEra = () => { const v = document.getElementById('newEra').value.trim(); if(v){ eras.push(v); sync(); document.getElementById('newEra').value=""; render(); } };
  window.openCharModal = () => { document.getElementById('charList').innerHTML = chars.map(c => `<div style="padding:12px; border-bottom:1px solid #f1f3f5;">${c}</div>`).join(''); document.getElementById('charModal').style.display = 'flex'; };
  window.addChar = () => { const v = document.getElementById('newChar').value.trim(); if(v){ chars.push(v); sync(); document.getElementById('newChar').value=""; } };

  const updateColor = () => document.querySelectorAll('.dot').forEach(d => d.classList.toggle('selected', d.dataset.c === selColor));
  document.querySelectorAll('.dot').forEach(d => d.onclick = () => { selColor = d.dataset.c; updateColor(); });

  render();
</script>
</body>
</html>
