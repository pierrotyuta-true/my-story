<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yuta's Engine</title>

    <style>
        :root { 
            --bg: #f8f9fa;
            --line: #ced4da;
            --node: #74c0fc;
            --text-dark: #212529;
            --text-muted: #495057;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            /* 1. 캡처본 특유의 은은한 점선 배경 구현 */
            background-color: var(--bg);
            background-image: radial-gradient(#dee2e6 1.5px, transparent 1.5px);
            background-size: 20px 20px;
            color: var(--text-dark);
        }

        /* 타임라인 전체 감싸기 */
        .timeline-container {
            position: relative;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px 10px;
        }

        /* 2. 중앙 메인선 */
        .timeline-container::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background-color: #e2e8f0;
            transform: translateX(-50%);
        }

        /* 년도 배너 (제국력 589년) */
        .year-banner {
            display: flex;
            justify-content: center;
            margin: 20px 0 30px;
            position: relative;
            z-index: 10;
        }
        .year-text {
            background: #343a40;
            color: white;
            padding: 7px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* 타임라인 아이템 정렬 */
        .timeline-item {
            display: flex;
            width: 100%;
            margin-bottom: 25px;
            position: relative;
            align-items: center;
        }
        
        /* 왼쪽 카드 배치 */
        .timeline-item.left { justify-content: flex-start; }
        /* 오른쪽 카드 배치 */
        .timeline-item.right { justify-content: flex-end; }

        /* 3. 카드 디자인 (캡처본과 똑같이!) */
        .timeline-card {
            background: #ffffff;
            padding: 15px 16px;
            border-radius: 12px;
            width: calc(50% - 25px); /* 중앙선 침범하지 않게 조율 */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
            border: 1px solid #f1f3f5;
            position: relative;
            z-index: 5;
        }

        /* 4. 원본과 똑같은 위치의 월 뱃지 */
        .month-badge {
            display: inline-block;
            background-color: #e7f5ff;
            color: #339af0;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        /* 카드 내부 텍스트 */
        .card-text {
            font-size: 13px;
            color: var(--text-dark);
            line-height: 1.6;
            font-weight: 500;
        }

        /* 5. 중앙 파란 링 노드(동그라미) */
        .timeline-node {
            position: absolute;
            left: 50%;
            width: 12px;
            height: 12px;
            background: #ffffff;
            border: 3px solid var(--node);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* 6. 부드러운 연결선 */
        .connector {
            position: absolute;
            top: 50%;
            height: 2px;
            background-color: #e2e8f0;
            z-index: 1;
        }
        
        /* 왼쪽 카드에서 중앙선으로 가는 선 */
        .timeline-item.left .connector {
            right: 50%;
            left: calc(50% - 25px); /* 카드 끝에서 시작 */
        }
        
        /* 오른쪽 카드에서 중앙선으로 가는 선 */
        .timeline-item.right .connector {
            left: 50%;
            right: calc(50% - 25px);
        }

    </style>
</head>
<body>

    <div class="timeline-container">
        
        <div class="year-banner">
            <span class="year-text">제국력 589년</span>
        </div>

        <div class="timeline-item left">
            <div class="timeline-card">
                <div class="month-badge">3월</div>
                <div class="card-text">제국에 트립된 혜주</div>
            </div>
            <div class="connector"></div>
            <div class="timeline-node" style="top: 50%;"></div>
        </div>

        <div class="timeline-item right">
            <div class="timeline-card">
                <div class="month-badge">3월</div>
                <div class="card-text">이그리에가가 공작에게 혜주를 소개받는다. 혜주가 ...</div>
            </div>
            <div class="connector"></div>
        </div>

        <div class="timeline-item left">
            <div class="timeline-card">
                <div class="month-badge">3월</div>
                <div class="card-text">공작의 거처에서 지내게 된 혜주. 공작과 연인사이에...</div>
            </div>
            <div class="connector"></div>
        </div>

        <div class="timeline-item left">
            <div class="timeline-card">
                <div class="month-badge">4월</div>
                <div class="card-text">혜주가 황태자와 이그리에가를 소개받는다. 둘 모두...</div>
            </div>
            <div class="connector"></div>
            <div class="timeline-node" style="top: 50%;"></div>
        </div>

        <div class="timeline-item right">
            <div class="timeline-card">
                <div class="month-badge">4월</div>
                <div class="card-text">황태자와 공작의 요구로 혜주에게 마법을 가르치게...</div>
            </div>
            <div class="connector"></div>
        </div>

    </div>

</body>
</html>
