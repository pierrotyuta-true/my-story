<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>스토리마스터 Pro</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    :root { --primary: #4dabf7; --bg: #f1f3f5; --card-bg: #ffffff; --line: #dee2e6; --danger: #ff8787; --branch: #adb5bd; --text: #212529; }
    body { font-family: 'Pretendard', -apple-system, sans-serif; margin: 0; background: var(--bg); touch-action: pan-y; -webkit-user-select: none; user-select: none; padding-bottom: 80px; color: var(--text); overflow-x: hidden; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    /* 레이아웃 */
    .header-container { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .header { height: 55px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
    .project-title { font-size: 16px; font-weight: 900; color: var(--primary); letter-spacing: -0.5px; }
    
    .search-bar { display: flex; gap: 8px; overflow-x: auto; padding: 10px 20px; scrollbar-width: none; }
    .search-bar::-webkit-scrollbar { display: none; }
    .filter-tag { padding: 7px 15px; border-radius: 20px; background: #fff; border: 1px solid #eee; font-size: 11px; font-weight: 800; white-space: nowrap; cursor: pointer; color: #868e96; display: flex; align-items: center; gap: 5px; }
    .filter-tag.active { background: var(--primary); color: white; border-color: var(--primary); }

    .timeline-container { position: relative; width: 100%; max-width: 500px; margin: 120px auto 0; padding: 0; min-height: 100vh; }
    .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--line); transform: translateX(-50%); z-index: 0; }
    
    .row { display: grid; grid-template-columns: 1fr 1fr; position: relative; margin-bottom: 25px; min-height: 90px; }
    .node { width: 14px; height: 14px; background: white; border: 3px solid var(--primary); border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); top: 38px; z-index: 5; box-shadow: 0 0 0 4px var(--bg); }
    .year-marker { position: relative; width: fit-content; margin: 40px auto 30px; padding: 7px 18px; background: #343a40; color: white; border-radius: 20px; font-size: 11px; font-weight: 800; z-index: 10; }
    
    .dropzone { display: flex; flex-direction: column; gap: 15px; padding: 0 10px; }
    .dropzone[data-side="left"] { align-items: flex-end; padding-right: 25px; }
    .dropzone[data-side="right"] { align-items: flex-start; padding-left: 25px; }

    .card-wrapper { position: relative; width: 130px; } /* 래퍼 추가로 위치 고정 */
    .card { background: #fff; width: 100%; min-height: 75px; border-radius: 16px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; z-index: 10; border: 1px solid rgba(0,0,0,0.03); cursor: pointer; }
    .card::before { content: ""; position: absolute; left: 0; top: 15px; bottom: 15px; width: 4px; background-color: var(--card-accent, #eee); border-radius: 0 4px 4px 0; }
    .card-month { font-size: 10px; font-weight: 900; color: #adb5bd; margin-bottom: 8px; }
    .card-content { font-size: 12px; line-height: 1.5; font-weight: 700; color: #333; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    
    .branch-outer-container { position: absolute; top: 5px; display: flex; flex-direction: column; gap: 5px; z-index: 100; pointer-events: none; }
    .dropzone[data-side="left"] .branch-outer-container { right: 105%; align-items: flex-end; }
    .dropzone[data-side="right"] .branch-outer-container { left: 105%; align-items: flex-start; }
    .branch-cube { width: 16px; height: 16px; background: var(--branch); border-radius: 5px; cursor: pointer; border: 2.5px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); pointer-events: auto; }

    /* 모달 */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 4000; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
    .modal-content { background: white; width: 90%; max-width: 340px; padding: 20px; border-radius: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); max-height: 85vh; overflow-y: auto; position: relative; }
    
    input, select, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #eee; background: #f8f9fa; font-size: 14px; outline: none; }
    .btn-save { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 14px; font-weight: 800; font-size: 14px; width: 100%; margin-top: 10px; }
    .btn-close-text { width: 100%; background: none; border: none; color: #adb5bd; font-size: 13px; font-weight: 700; padding: 10px; margin-top: 5px; }

    .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; }
    .nav-btn { border: none; background: none; font-size: 10px; font-weight: 800; color: #adb5bd; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    #toast { visibility: hidden; min-width: 150px; background-color: #333; color: #fff; text-align: center; border-radius: 10px; padding: 12px; position: fixed; z-index: 5000; left: 50%; bottom: 100px; transform: translateX(-50%); opacity: 0; transition: 0.3s; }
    #toast.show { visibility: visible; opacity: 1; }
  </style>
</head>
<body>

<div id="toast">변경사항 저장됨</div>
<input type="file" id="imageInput" accept="image/*" style="display:none;" onchange="window.handleImageUpload(event)">

<div class="header-container">
  <div class="header">
    <div class="project-title" id="projectTitle">STORY MASTER</div>
    <button onclick="window.saveToCloud()" style="background:var(--primary); color:white; border:none; padding:8px 18px; border-radius:10px; font-weight:800; font-size:12px;">저장</button>
  </div>
  <div class="search-bar" id="searchBar"></div>
</div>

<div class="timeline-container" id="timeline"></div>

<div id="viewModal" class="modal"><div class="modal-content">
    <div id="viewMonth" style="font-size:11px; font-weight:900; color:var(--primary); margin-bottom:10px;"></div>
    <div id="viewText" style="font-size:14px; line-height:1.7; color:#333; margin-bottom:20px; white-space:pre-wrap; font-weight:600;"></div>
    <div id="viewTags" style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:25px;"></div>
    <div style="display:flex; gap:10px;">
        <button class="btn-save" style="flex:1;" onclick="window.goToEdit()">수정</button>
        <button id="addBranchBtn" class="btn-save" style="flex:1; background:#868e96;" onclick="window.addBranchFromView()">가지 추가</button>
    </div>
    <button class="btn-close-text" onclick="window.closeModal('viewModal')">닫기</button>
</div></div>

<div id="editModal" class="modal"><div class="modal-content">
    <h3 style="margin:0 0 20px 0; font-size:17px; text-align:center;">사건 기록</h3>
    <div class="input-row" style="display:flex; gap:8px; margin-bottom:10px;">
        <select id="eraType" style="flex:1.2;"></select>
        <input type="number" id="eYear" placeholder="연도" style="flex:1;">
        <select id="eMonth" style="flex:1;"><script>for(let i=1;i<=12;i++)document.write(`<option value="${i}">${i}월</option>`)</script></select>
    </div>
    <div id="colorPicker" style="display:flex; gap:8px; margin: 15px 0; justify-content:center; flex-wrap:wrap;"></div>
    <div id="charTagSelector" style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:15px; max-height:100px; overflow-y:auto;"></div>
    <textarea id="eContent" rows="5" placeholder="내용을 입력하세요" style="margin-bottom:15px;"></textarea>
    <div style="display:flex; gap:8px;">
        <button class="btn-save" style="flex:2.5; margin-top:0;" onclick="window.saveScene()">기록 완료</button>
        <button id="delBtn" style="flex:1; background:#fff0f0; color:#ff8787; border:none; border-radius:14px; font-weight:800;" onclick="window.confirmDeleteScene()">삭제</button>
    </div>
    <button class="btn-close-text" onclick="window.closeModal('editModal')">닫기</button>
</div></div>

<div id="charModal" class="modal"><div class="modal-content"><h3>캐릭터 관리</h3><div id="charListGrid"></div><button class="btn-save" onclick="window.openCharAdd()">+ 캐릭터 추가</button><button class="btn-close-text" onclick="window.closeModal('charModal')">닫기</button></div></div>
<div id="charEditModal" class="modal"><div class="modal-content"><h3>프로필</h3><div id="charImgPreview" style="width:80px; height:80px; border-radius:50%; margin:0 auto 10px; border:2px dashed #eee; overflow:hidden;" onclick="document.getElementById('imageInput').click()"></div><input type="text" id="cName" placeholder="이름"><button class="btn-save" onclick="window.saveCharDetail()">저장</button><button class="btn-close-text" onclick="window.closeModal('charEditModal')">취소</button></div></div>
<div id="customAlert" class="modal" style="z-index: 6000;"><div class="modal-content"><div id="alertTitle" style="font-weight:900; text-align:center;"></div><div id="alertMsg" style="text-align:center; margin:10px 0;"></div><div id="alertInputWrap" style="display:none;"><textarea id="alertInput" rows="4"></textarea></div><div style="display:flex; gap:10px;"><button class="btn-close-text" style="flex:1;" onclick="window.closeAlert(false)">취소</button><button class="btn-save" style="flex:1; margin-top:0;" onclick="window.closeAlert(true)">확인</button></div></div></div>
<div id="loadModal" class="modal"><div class="modal-content"><h3>연력표 목록</h3><div id="projectList"></div><button class="btn-save" onclick="window.promptNewProject()">+ 새 연력표</button><button class="btn-close-text" onclick="window.closeModal('loadModal')">닫기</button></div></div>
<div id="eraModal" class="modal"><div class="modal-content"><h3>시대 관리</h3><div id="eraListGrid"></div><button class="btn-save" onclick="window.promptNewEra()">+ 시대 추가</button><button class="btn-close-text" onclick="window.closeModal('eraModal')">닫기</button></div></div>

<div class="nav">
  <button class="nav-btn" onclick="window.openLoadModal()">목록</button>
  <button class="nav-btn" onclick="window.openEraModal()">시대</button>
  <button class="nav-btn" style="font-size:40px; color:var(--primary);" onclick="window.addScene()">+</button>
  <button class="nav-btn" onclick="window.openCharModal()">캐릭터</button>
  <button class="nav-btn" onclick="location.reload()">갱신</button>
</div>

<script>
  const config = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", authDomain: "true-s.firebaseapp.com", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
  if (!firebase.apps.length) firebase.initializeApp(config);
  const db = firebase.database();

  let storyboard = [], eras = ["공통"], chars = [], charDetails = {}, currentProject = null, editingId = null, selectedFilter = null;
  const userColors = ["#eee", "#d0ebff", "#fff9db", "#d3f9d8", "#ffdeeb", "#eebefa", "#dae1e7", "#495057", "#ffd43b"];
  let selectedColor = "#eee", selectedChars = [], alertCallback = null;

  window.closeModal = (id) => document.getElementById(id).style.display = 'none';
  window.openModal = (id) => document.getElementById(id).style.display = 'flex';
  
  window.render = () => {
    const container = document.getElementById('timeline');
    if(!currentProject) return;
    container.innerHTML = '<div class="center-line"></div>';
    let filtered = selectedFilter ? storyboard.filter(s => (s.chars||[]).includes(selectedFilter)) : storyboard;
    const sortedBoard = [...filtered].sort((a,b) => (eras.indexOf(a.era)-eras.indexOf(b.era)) || (a.year-b.year) || (a.month-b.month));
    const groups = {};
    sortedBoard.forEach(s => {
      const k = `${s.era||"공통"} ${s.year}년`;
      if(!groups[k]) groups[k] = {}; if(!groups[k][s.month]) groups[k][s.month] = {left:[], right:[]};
      groups[k][s.month][s.side||'left'].push(s);
    });

    Object.keys(groups).forEach(key => {
      container.innerHTML += `<div class="year-marker">${key}</div>`;
      Object.keys(groups[key]).sort((a,b)=>a-b).forEach(m => {
        const row = document.createElement('div'); row.className = 'row';
        row.innerHTML = `<div class="dropzone" data-gkey="${key}" data-month="${m}" data-side="left"></div><div class="node"></div><div class="dropzone" data-gkey="${key}" data-month="${m}" data-side="right"></div>`;
        container.appendChild(row);
        ['left','right'].forEach(side => {
          const zone = row.querySelector(`.dropzone[data-side="${side}"]`);
          groups[key][m][side].forEach(sc => {
            const wrap = document.createElement('div'); wrap.className = 'card-wrapper';
            wrap.innerHTML = `<div class="card" data-id="${sc.id}" style="--card-accent:${sc.color||'#eee'}"><div class="card-month">${m}월</div><div class="card-content">${sc.text}</div></div>`;
            
            // 가지 큐브 렌더링 (sc.branches가 없어도 빈 배열로 처리하여 오류 방지)
            const branches = sc.branches || [];
            if(branches.length > 0) {
              const bCont = document.createElement('div'); bCont.className = 'branch-outer-container';
              branches.forEach((b,idx) => {
                const cb = document.createElement('div'); cb.className = 'branch-cube';
                cb.onclick = (e) => { e.stopPropagation(); window.editBranch(e, sc.id, idx); };
                bCont.appendChild(cb);
              });
              wrap.appendChild(bCont);
            }
            zone.appendChild(wrap);
          });
        });
      });
    });
    window.updateSearchBar();
  };

  // 기존 유틸리티 함수들
  window.sync = () => { if(currentProject) db.ref('projects/'+currentProject).set({ data: storyboard, eras, chars, charDetails }).then(window.render); };
  window.saveToCloud = () => { if(currentProject) db.ref('projects/'+currentProject).set({ data: storyboard, eras, chars, charDetails }).then(() => { const t = document.getElementById('toast'); t.className = 'show'; setTimeout(() => t.className = '', 2000); }); };
  window.loadP = (k) => { currentProject = k; localStorage.setItem('lastProject', k); document.getElementById('projectTitle').innerText = k; db.ref('projects/'+k).on('value', s => { const d = s.val(); if(d){ storyboard=d.data||[]; eras=d.eras||["공통"]; chars=d.chars||[]; charDetails=d.charDetails||{}; window.render(); } }); window.closeModal('loadModal'); };
  window.openLoadModal = () => { db.ref('projects').once('value').then(s => { const d = s.val(); document.getElementById('projectList').innerHTML = d ? Object.keys(d).map(k => `<div class="char-list-item"><span>${k}</span><button onclick="window.loadP('${k}')">열기</button></div>`).join('') : ''; window.openModal('loadModal'); }); };
  
  window.openViewer = (id) => { 
    editingId = id; const s = storyboard.find(x => x.id == id); if(!s) return; 
    document.getElementById('viewMonth').innerText = `${s.era} ${s.year}년 ${s.month}월`; 
    document.getElementById('viewText').innerText = s.text; 
    document.getElementById('viewTags').innerHTML = (s.chars || []).map(c => `<div class="filter-tag">${c}</div>`).join(''); 
    const addBtn = document.getElementById('addBranchBtn'); 
    addBtn.style.opacity = (s.branches && s.branches.length >= 2) ? '0.4' : '1';
    window.openModal('viewModal'); 
  };
  
  window.goToEdit = () => { window.closeModal('viewModal'); window.openEdit(editingId); };
  window.openEdit = (id) => { editingId = id; const s = storyboard.find(x => x.id == id); document.getElementById('eContent').value = s ? s.text : ""; document.getElementById('eYear').value = s ? s.year : "1000"; document.getElementById('eMonth').value = s ? s.month : "1"; document.getElementById('eraType').innerHTML = eras.map(e => `<option value="${e}">${e}</option>`).join(''); if(s) document.getElementById('eraType').value = s.era; window.updateColorUI(); window.updateCharUI(); window.openModal('editModal'); };
  window.updateCharUI = () => { document.getElementById('charTagSelector').innerHTML = chars.map(c => `<div class="filter-tag ${selectedChars.includes(c)?'active':''}" onclick="window.toggleChar('${c}')">${c}</div>`).join(''); };
  window.toggleChar = (c) => { if(selectedChars.includes(c)) selectedChars = selectedChars.filter(x=>x!==c); else selectedChars.push(c); window.updateCharUI(); };
  window.updateColorUI = () => { document.getElementById('colorPicker').innerHTML = userColors.map(c => `<div style="background:${c}; width:22px; height:22px; border-radius:50%; border:2px solid ${selectedColor===c?'#4dabf7':'transparent'};" onclick="window.selectColor('${c}')"></div>`).join(''); };
  window.selectColor = (c) => { selectedColor = c; window.updateColorUI(); };
  window.saveScene = () => { const text = document.getElementById('eContent').value.trim(); if(!text) return; const year = parseInt(document.getElementById('eYear').value), month = parseInt(document.getElementById('eMonth').value), era = document.getElementById('eraType').value; if(editingId) storyboard = storyboard.map(s => s.id == editingId ? {...s, text, year, month, era, color: selectedColor, chars: selectedChars} : s); else storyboard.push({ id: Date.now().toString(), era, year, month, text, color: selectedColor, chars: selectedChars, side: 'left', branches: [] }); window.sync(); window.closeModal('editModal'); };
  
  window.addBranchFromView = () => { 
    const s = storyboard.find(x => x.id == editingId); 
    if(s.branches && s.branches.length >= 2) return; 
    window.closeModal('viewModal'); 
    setTimeout(() => { 
      window.customUI("가지 추가", "내용을 입력하세요", "prompt", (val) => { 
        if(val && typeof val === 'string' && val.trim() !== '') { 
          if(!s.branches) s.branches = []; 
          s.branches.push(val); 
          window.sync(); 
        } else { window.openViewer(editingId); }
      }); 
    }, 200); 
  };
  
  window.editBranch = (e, id, bIdx) => { 
    const s = storyboard.find(x => x.id == id); 
    window.customUI("가지 수정", "빈칸으로 저장하면 삭제됩니다.", "prompt", (val) => { 
      if(val === false) return; 
      if(val === true || (typeof val === 'string' && val.trim() === '')) s.branches.splice(bIdx, 1); 
      else s.branches[bIdx] = val; 
      window.sync(); 
    }, s.branches[bIdx]); 
  };

  window.customUI = (title, msg, type, callback, defaultVal = "") => {
    document.getElementById('alertTitle').innerText = title; document.getElementById('alertMsg').innerText = msg;
    const wrap = document.getElementById('alertInputWrap'); wrap.style.display = (type==='prompt'?'block':'none');
    if(type==='prompt') document.getElementById('alertInput').value = defaultVal;
    alertCallback = callback; window.openModal('customAlert');
  };
  window.closeAlert = (res) => { window.closeModal('customAlert'); if(alertCallback) { const val = document.getElementById('alertInput').value; alertCallback(res ? (val || true) : false); } };
  window.updateSearchBar = () => { const bar = document.getElementById('searchBar'); bar.innerHTML = `<div class="filter-tag ${selectedFilter===null?'active':''}" onclick="window.filterByChar(null)">전체</div>` + chars.map(c => `<div class="filter-tag ${selectedFilter===c?'active':''}" onclick="window.filterByChar('${c}')">${c}</div>`).join(''); };
  window.filterByChar = (name) => { selectedFilter = name; window.render(); };
  window.addScene = () => { if(!currentProject) return; window.openEdit(null); };
  window.openEraModal = () => { document.getElementById('eraListGrid').innerHTML = eras.map(e => `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${e}</span><button onclick="window.confirmDelEra('${e}')">삭제</button></div>`).join(''); window.openModal('eraModal'); };
  window.promptNewEra = () => { window.customUI("시대 추가", "이름 입력", "prompt", (n) => { if(n && typeof n === 'string') { eras.push(n); window.sync(); window.openEraModal(); } }); };
  window.openCharModal = () => { document.getElementById('charListGrid').innerHTML = chars.map(c => `<div>${c} <button onclick="window.confirmDelChar('${c}')">삭제</button></div>`).join(''); window.openModal('charModal'); };

  /* 터치 및 드래그 로직 (간섭 차단 최적화) */
  let dragItem = null, startX, startY, currentTarget = null, dragId = null, isMoving = false;
  document.addEventListener('touchstart', (e) => {
    if(e.target.closest('button') || e.target.closest('.branch-cube')) return;
    const card = e.target.closest('.card'); if(!card) return;
    const touch = e.touches[0]; startX = touch.clientX; startY = touch.clientY;
    dragId = card.dataset.id; isMoving = false;
    
    const move = (me) => {
      const mt = me.touches[0];
      if(!isMoving && (Math.abs(mt.clientX - startX) > 10 || Math.abs(mt.clientY - startY) > 10)) {
        isMoving = true; card.style.opacity = '0.5';
        dragItem = card.cloneNode(true); dragItem.style.position = 'fixed'; dragItem.style.zIndex = '5000'; dragItem.style.pointerEvents = 'none';
        document.body.appendChild(dragItem);
      }
      if(isMoving && dragItem) {
        dragItem.style.left = (mt.clientX - 65) + 'px'; dragItem.style.top = (mt.clientY - 20) + 'px';
        const below = document.elementFromPoint(mt.clientX, mt.clientY); const zone = below?.closest('.dropzone');
        if(currentTarget !== zone) { if(currentTarget) currentTarget.style.background = ''; currentTarget = zone; if(currentTarget) currentTarget.style.background = 'rgba(77,171,247,0.1)'; }
      }
    };
    const end = () => {
      if(!isMoving) { window.openViewer(dragId); }
      else if(currentTarget && dragId) {
        const idx = storyboard.findIndex(s => s.id == dragId);
        if(idx !== -1) {
          const p = currentTarget.dataset.gkey.split(' ');
          storyboard[idx].year = parseInt(p.pop()); storyboard[idx].era = p.join(' ');
          storyboard[idx].month = parseInt(currentTarget.dataset.month); storyboard[idx].side = currentTarget.dataset.side;
          window.sync();
        }
      }
      if(dragItem) { dragItem.remove(); dragItem = null; }
      card.style.opacity = '1'; if(currentTarget) currentTarget.style.background = '';
      document.removeEventListener('touchmove', move); document.removeEventListener('touchend', end);
    };
    document.addEventListener('touchmove', move, { passive: false }); document.addEventListener('touchend', end);
  }, { passive: true });

  window.onload = () => { const last = localStorage.getItem('lastProject'); if(last) window.loadP(last); else window.openLoadModal(); };
</script>
</body>
</html>
