<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Yuta's Engine Pro (Fixed v3)</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    :root { --primary: #4dabf7; --bg: #f8f9fa; --node: #343a40; --branch: #fab005; }
    body { font-family: 'Pretendard', sans-serif; margin: 0; background-color: var(--bg); color: #343a40; overflow: hidden; }
    
    /* 헤더 */
    .app-header { height: 50px; background: #343a40; color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: fixed; top: 0; width: 100%; z-index: 1100; box-sizing: border-box; }
    .header-btns { display: flex; gap: 8px; align-items: center; }
    .btn-refresh { background: none; border: none; color: #4dabf7; font-size: 18px; cursor: pointer; padding: 5px; }
    .btn-save { background: var(--primary); color: white; border: none; padding: 5px 12px; border-radius: 5px; font-weight: 800; cursor: pointer; }

    .top-nav { display: flex; justify-content: space-around; background: #fff; position: fixed; top: 50px; width: 100%; z-index: 1000; border-bottom: 1px solid #eee; height: 45px; align-items: center; }
    .nav-item { font-size: 13px; font-weight: 800; color: #adb5bd; cursor: pointer; padding: 10px; }
    .nav-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

    .view { display: none; margin-top: 95px; height: calc(100vh - 95px); overflow-y: auto; padding-bottom: 100px; box-sizing: border-box; }
    .view.active { display: block; }

    /* --- 타임라인 메모박스 위치 수정 핵심 코드 --- */
    .tl-container { position: relative; width: 100%; max-width: 600px; margin: 0 auto; padding-top: 40px; }
    .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #dee2e6; transform: translateX(-50%); z-index: 1; }
    
    /* 행 정렬을 상단(flex-start)으로 변경 */
    .row { display: grid; grid-template-columns: 1fr 1fr; position: relative; margin-bottom: 50px; align-items: flex-start; }
    
    /* 연도 노드: 위치를 고정하고 조금 더 크고 명확하게 */
    .node-wrap { position: absolute; left: 50%; top: 0; transform: translateX(-50%); z-index: 10; text-align: center; }
    .node-capsule { background: var(--node); color: #fff; font-size: 11px; font-weight: 900; padding: 5px 12px; border-radius: 15px; margin-bottom: 6px; white-space: nowrap; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    .node-dot { width: 14px; height: 14px; background: #fff; border: 3px solid var(--primary); border-radius: 50%; margin: 0 auto; }

    /* 메모박스(카드) 위치: 노드보다 살짝 아래로(margin-top) 내려 여유 공간 확보 */
    .dropzone { display: flex; flex-direction: column; padding: 0 20px; margin-top: 35px; }
    .card { background: #fff; padding: 16px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); width: 100%; font-size: 13px; cursor: pointer; border-top: 5px solid var(--primary); transition: transform 0.2s; }
    .card:active { transform: scale(0.98); }
    .card.branch-card { border-top-color: var(--branch); }
    /* ------------------------------------------- */

    .fab-area { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; pointer-events: none; z-index: 2000; }
    .fab { width: 60px; height: 60px; background: var(--primary); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 4px 20px rgba(77,171,247,0.4); border: none; cursor: pointer; pointer-events: auto; }

    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 3000; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
    .modal-content { background: white; width: 90%; max-width: 380px; padding: 25px; border-radius: 25px; box-sizing: border-box; max-height: 85vh; overflow-y: auto; }
    input, textarea, select { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 14px; }
    .btn-action { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }
    .btn-cancel { width: 100%; background: none; border: none; color: #adb5bd; padding: 12px; cursor: pointer; font-weight: 700; }
    .era-inline-edit { background: #f1f3f5; padding: 12px; border-radius: 12px; margin-bottom: 15px; }
  </style>
</head>
<body>

<header class="app-header">
  <div style="font-weight: 900; font-size: 22px; color: var(--primary);">Y</div>
  <div style="font-weight: 800; font-size: 15px;" id="cur-proj-name">프로젝트 ▼</div>
  <div class="header-btns">
    <button class="btn-refresh" onclick="location.reload()">🔄</button>
    <button class="btn-save" onclick="saveAll(true)">SAVE</button>
  </div>
</header>

<nav class="top-nav">
  <div class="nav-item active" onclick="setTab('timeline', this)">타임라인</div>
  <div class="nav-item" onclick="setTab('story', this)">스토리</div>
  <div class="nav-item" onclick="setTab('char', this)">캐릭터도감</div>
</nav>

<div id="timeline-view" class="view active">
  <div class="tl-container">
    <div class="center-line"></div>
    <div id="tl-render-area"></div>
  </div>
</div>

<div class="fab-area"><button class="fab" onclick="openEventModal()">+</button></div>

<div id="eventModal" class="modal"><div class="modal-content">
  <h3 style="margin-top:0;">사건 기록</h3>
  <div class="era-inline-edit">
    <div style="display:flex; gap:8px;">
      <select id="e-era" style="margin-bottom:0; flex:2;"></select>
      <input type="text" id="new-era-quick" placeholder="신규" style="margin-bottom:0; flex:1;">
      <button onclick="quickAddEra()" style="background:var(--node); color:white; border:none; border-radius:10px; padding:0 12px;">+</button>
    </div>
  </div>
  <div style="display:flex; gap:10px;">
    <input type="number" id="e-year" placeholder="연도">
    <input type="number" id="e-month" placeholder="월">
  </div>
  <textarea id="e-text" rows="4" placeholder="사건 내용을 적어주세요"></textarea>
  <button class="btn-action" onclick="saveEvent()">사건 저장</button>
  <button id="del-btn" style="width:100%; border:none; background:none; color:#fa5252; margin-top:10px; cursor:pointer; font-weight:700; display:none;" onclick="deleteEvent()">삭제하기</button>
  <button class="btn-cancel" onclick="closeModal('eventModal')">닫기</button>
</div></div>

<script>
  const config = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
  firebase.initializeApp(config);
  const db = firebase.database();

  let state = { curProject: '기본', data: { storyboard: [], eras: ['제국력'], characters: [], story: "" } };

  function renderTimeline() {
    const area = document.getElementById('tl-render-area');
    area.innerHTML = "";
    const sorted = [...(state.data.storyboard || [])].sort((a,b) => a.year - b.year || a.month - b.month);
    
    let lastYearLabel = "";
    sorted.forEach((s, i) => {
      const side = i % 2 === 0 ? 'left' : 'right';
      const row = document.createElement('div');
      row.className = 'row';
      
      const currentYearLabel = `${s.era} ${s.year}년`;
      let nodeHtml = '';
      if(currentYearLabel !== lastYearLabel) {
        nodeHtml = `<div class="node-wrap"><div class="node-capsule">${currentYearLabel}</div><div class="node-dot"></div></div>`;
        lastYearLabel = currentYearLabel;
      } else {
        nodeHtml = `<div class="node-wrap"><div class="node-dot"></div></div>`;
      }

      row.innerHTML = `
        <div class="dropzone" style="align-items: flex-end;">${side==='left' ? `<div class="card" onclick="openEditEvent(${s.id})"><div style="font-size:11px; color:var(--primary); font-weight:800; margin-bottom:5px;">${s.month}월</div>${s.text}</div>`:''}</div>
        ${nodeHtml}
        <div class="dropzone" style="align-items: flex-start;">${side==='right' ? `<div class="card" onclick="openEditEvent(${s.id})"><div style="font-size:11px; color:var(--primary); font-weight:800; margin-bottom:5px;">${s.month}월</div>${s.text}</div>`:''}</div>
      `;
      area.appendChild(row);
    });
  }

  // (기존 CRUD 함수들 유지...)
  function setTab(name, el) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(name + '-view').classList.add('active');
    el.classList.add('active');
  }
  function openEventModal() { editId = null; document.getElementById('e-text').value = ""; document.getElementById('del-btn').style.display = 'none'; updateEraSelect(); openModal('eventModal'); }
  function openEditEvent(id) { editId = id; const s = state.data.storyboard.find(x => x.id === id); updateEraSelect(s.era); document.getElementById('e-text').value = s.text; document.getElementById('e-year').value = s.year; document.getElementById('e-month').value = s.month; document.getElementById('del-btn').style.display = 'block'; openModal('eventModal'); }
  function updateEraSelect(selected) { document.getElementById('e-era').innerHTML = state.data.eras.map(e => `<option ${e===selected?'selected':''}>${e}</option>`).join(''); }
  function quickAddEra() { const newEra = document.getElementById('new-era-quick').value.trim(); if(newEra && !state.data.eras.includes(newEra)) { state.data.eras.push(newEra); updateEraSelect(newEra); document.getElementById('new-era-quick').value = ""; saveAll(false); } }
  function saveEvent() { const text = document.getElementById('e-text').value; if(!text) return; const year = parseInt(document.getElementById('e-year').value) || 0; const month = parseInt(document.getElementById('e-month').value) || 1; const era = document.getElementById('e-era').value; if(editId) { state.data.storyboard = state.data.storyboard.map(s => s.id === editId ? {...s, year, month, era, text} : s); } else { state.data.storyboard.push({ id: Date.now(), era, year, month, text, type: 'main' }); } renderTimeline(); closeModal('eventModal'); saveAll(false); }
  function deleteEvent() { if(!confirm("삭제할까요?")) return; state.data.storyboard = state.data.storyboard.filter(s => s.id !== editId); renderTimeline(); closeModal('eventModal'); saveAll(false); }
  function openModal(id) { document.getElementById(id).style.display = 'flex'; }
  function closeModal(id) { document.getElementById(id).style.display = 'none'; }
  function saveAll(isManual) { db.ref('users/Yuta/projects/' + state.curProject).set(state.data); if(isManual) alert("저장 완료!"); }

  window.onload = () => {
    db.ref('users/Yuta/projects/기본').once('value', s => {
      if(s.val()) state.data = s.val();
      renderTimeline();
    });
  };
</script>
</body>
</html>
