<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yuta's Engine</title>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { 
            --primary: #4dabf7; --dark: #343a40; --text: #495057; --node: #74c0fc; --bg: #f8f9fa;
            --c1: #4dabf7; --c2: #fab005; --c3: #40c057; --c4: #fa5252; /* 가지 글씨용 4색 */
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* 헤더 & 메뉴 */
        .app-header { height: 60px; background: var(--dark); color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: fixed; top:0; width:100%; z-index:2000; }
        .tab-menu { position:fixed; top:60px; width:100%; display:flex; background:white; z-index:1999; height:45px; border-bottom:1px solid #eee; }
        .tab-item { flex:1; display:flex; align-items:center; justify-content:center; font-size:14px; color:#adb5bd; cursor:pointer; }
        .tab-item.active { color:var(--dark); font-weight:bold; border-bottom: 2px solid var(--dark); }

        /* 타임라인 레이아웃 */
        .content-body { margin-top: 115px; padding-bottom: 100px; }
        .view { display: none; width: 100%; }
        .view.active { display: block; }
        .tl-wrapper { position: relative; width: 100%; max-width: 500px; margin: 0 auto; }
        .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #dee2e6; transform: translateX(-50%); z-index: 1; }
        
        .year-banner { position: relative; z-index: 10; display: flex; justify-content: center; margin: 25px 0 10px; }
        .year-text { background: var(--dark); color: white; padding: 4px 12px; border-radius: 15px; font-size: 11px; }

        .month-cluster { position: relative; width: 100%; margin-bottom: 15px; min-height: 40px; }
        .month-node { 
            position: absolute; left: 50%; top: 18px; transform: translateX(-50%); 
            width: 10px; height: 10px; background: white; border: 2.5px solid var(--node); border-radius: 50%; z-index: 5; 
        }

        .event-grid { display: grid; grid-template-columns: 1fr 1fr; width: 100%; padding: 0 10px; gap: 20px; }
        
        .timeline-card { 
            background: #fff; padding: 10px; border-radius: 8px; width: 34%; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: absolute; cursor: grab; z-index: 10;
        }
        .timeline-card.left { left: 10%; }
        .timeline-card.right { right: 10%; }

        /* 💡 수정: 회색 인덱스 (상단 배치, 사이즈 조정) */
        .card-index {
            position: absolute; top: 10px; width: 12px; height: 30%; background: #ced4da;
            border-radius: 3px; z-index: -1;
        }
        .left .card-index { left: -6px; }
        .right .card-index { right: -6px; }

        /* 💡 수정: 상세보기 창 (하단 둥글게, 줄 제거) */
        .modal-content.compact { width: 65%; height: 250px; position: relative; }
        .modal-main-card { background: white; border-radius: 12px; width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.2); }
        
        .top-tabs { position: absolute; top: -28px; left: 15px; display: flex; gap: 4px; }
        .top-tab { padding: 6px 15px; background: #e9ecef; border-radius: 8px 8px 0 0; font-size: 11px; color: #868e96; cursor: pointer; }
        .top-tab.active { background: white; color: var(--dark); font-weight: bold; }

        #detail-body { flex: 1; padding: 15px; overflow-y: auto; font-size: 13px; line-height: 1.6; }
        .modal-footer-clean { display: flex; padding: 5px 10px 15px; justify-content: space-around; }
        .f-btn-text { background: none; border: none; font-size: 12px; color: var(--primary); font-weight: bold; cursor: pointer; }
        .f-btn-text.gray { color: #adb5bd; }
        .f-btn-text.red { color: #ff6b6b; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }

        /* 연대 편집창 전용 */
        .era-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="logo">Y</div>
        <div class="project-title">이그리에가 ▾</div>
        <div class="header-right">
            <button onclick="location.reload()" style="background:none; border:none; color:white; font-size:18px; margin-right:10px;">↻</button>
            <button id="cloud-save" style="background:var(--primary); color:white; border:none; padding:5px 10px; border-radius:4px; font-weight:bold; font-size:12px;">저장</button>
        </div>
    </header>

    <nav class="tab-menu">
        <div class="tab-item active" onclick="showTab('timeline', this)">타임라인</div>
        <div class="tab-item" onclick="showTab('story', this)">스토리</div>
        <div class="tab-item" onclick="showTab('char', this)">캐릭터도감</div>
    </nav>

    <main class="content-body">
        <div id="timeline-view" class="view active">
            <div class="tl-wrapper"><div class="center-line"></div><div id="tl-list"></div></div>
        </div>
        <div id="story-view" class="view" style="padding:40px; text-align:center; color:#adb5bd;">작성된 스토리가 없습니다.</div>
        <div id="char-view" class="view" style="padding:40px; text-align:center; color:#adb5bd;">등록된 캐릭터가 없습니다.</div>
    </main>

    <div id="detailModal" class="modal"><div class="modal-content compact">
        <div class="top-tabs">
            <div id="tab-desc" class="top-tab active" onclick="switchDetailTab('desc')">내용</div>
            <div id="tab-branch" class="top-tab" onclick="switchDetailTab('branch')">가지</div>
        </div>
        <div class="modal-main-card">
            <div id="detail-body"></div>
            <div class="modal-footer-clean" id="detail-footer">
                <button class="f-btn-text" id="btn-edit">수정</button>
                <button class="f-btn-text" id="btn-branch">가지추가</button>
                <button class="f-btn-text red" id="btn-delete">삭제</button>
                <button class="f-btn-text gray" onclick="closeModal('detailModal')">닫기</button>
            </div>
        </div>
    </div></div>

    <div id="eraModal" class="modal"><div class="modal-content" style="background:white; padding:20px; border-radius:12px; width:280px;">
        <h4 style="margin-bottom:15px; font-size:14px;">연대 설정</h4>
        <div id="era-list" style="max-height:150px; overflow-y:auto; margin-bottom:15px;"></div>
        <input type="text" id="new-era-name" placeholder="새 연대 이름" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:6px; font-size:12px; margin-bottom:10px;">
        <div style="display:flex; gap:8px;">
            <button class="f-btn-text" style="flex:1; background:#f1f3f5; padding:10px; border-radius:6px;" onclick="addEra()">추가</button>
            <button class="f-btn-text gray" style="flex:1; background:#f1f3f5; padding:10px; border-radius:6px;" onclick="closeModal('eraModal')">닫기</button>
        </div>
    </div></div>

    <div id="eventModal" class="modal"><div class="modal-content" style="background:white; padding:20px; border-radius:12px; width:300px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
            <h4 style="font-size:14px;">기록 추가</h4>
            <span style="font-size:10px; color:var(--primary); cursor:pointer;" onclick="openEraModal()">연대편집</span>
        </div>
        <div style="display:flex; gap:5px; margin-bottom:10px;">
            <select id="e-era" style="flex:2; padding:8px; border-radius:6px; border:1px solid #ddd; font-size:12px;"></select>
            <input type="number" id="e-year" placeholder="년" style="flex:1; padding:8px; border-radius:6px; border:1px solid #ddd; font-size:12px;">
            <input type="number" id="e-month" placeholder="월" style="flex:1; padding:8px; border-radius:6px; border:1px solid #ddd; font-size:12px;">
        </div>
        <textarea id="e-text" rows="4" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:13px; margin-bottom:10px;"></textarea>
        <div style="display:flex; gap:10px;">
            <button class="f-btn-text" onclick="saveEvent()">저장</button>
            <button class="f-btn-text gray" onclick="closeModal('eventModal')">취소</button>
        </div>
    </div></div>

    <div id="branchModal" class="modal"><div class="modal-content" style="background:white; padding:15px; border-radius:12px; width:250px;">
        <textarea id="b-text" rows="4" style="width:100%; padding:10px; border:1px solid #eee; border-radius:6px; font-size:12px;"></textarea>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="f-btn-text" onclick="saveBranch()">저장</button>
            <button class="f-btn-text gray" onclick="closeModal('branchModal')">취소</button>
        </div>
    </div></div>

    <div class="fab-wrap" style="position:fixed; bottom:25px; right:20px; z-index:2001;">
        <button onclick="openAddModal()" style="width:45px; height:45px; border-radius:50%; background:var(--primary); color:white; border:none; font-size:22px; shadow:0 4px 10px rgba(0,0,0,0.2);">+</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://true-s-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let state = { storyboard: [], eras: ['제국력', '대한민국'], currentId: null };

        function syncData() {
            db.ref('users/Yuta/projects/기본/storyboard').on('value', snap => {
                const data = snap.val() ? Object.values(snap.val()) : [];
                state.storyboard = data.sort((a, b) => (a.order || 0) - (b.order || 0));
                renderTimeline();
            });
            db.ref('users/Yuta/projects/기본/eras').on('value', snap => {
                if(snap.val()) state.eras = snap.val();
            });
        }

        function renderTimeline() {
            const list = document.getElementById('tl-list');
            list.innerHTML = '';
            const grouped = state.storyboard.reduce((acc, cur) => {
                const key = `${cur.era} ${cur.year}년`;
                if(!acc[key]) acc[key] = {};
                if(!acc[key][cur.month]) acc[key][cur.month] = [];
                acc[key][cur.month].push(cur);
                return acc;
            }, {});

            for(const yearKey in grouped) {
                list.innerHTML += `<div class="year-banner"><span class="year-text">${yearKey}</span></div>`;
                for(const month in grouped[yearKey]) {
                    const cluster = document.createElement('div');
                    cluster.className = 'month-cluster';
                    cluster.innerHTML = `<div class="month-node"></div>`;
                    const grid = document.createElement('div');
                    grid.className = 'event-grid';
                    grouped[yearKey][month].forEach((ev, idx) => {
                        const side = idx % 2 === 0 ? 'left' : 'right';
                        const hasB = ev.branches && Object.keys(ev.branches).length > 0;
                        const card = document.createElement('div');
                        card.className = `timeline-card ${side}`;
                        card.dataset.id = ev.id;
                        card.innerHTML = `${hasB ? '<div class="card-index"></div>' : ''}<div onclick="openDetailModal('${ev.id}')"><div style="font-size:9px; color:var(--node); font-weight:bold;">${month}월</div><div style="font-size:11px; margin-top:3px; line-height:1.4;">${ev.text}</div></div>`;
                        grid.appendChild(card);
                    });
                    cluster.appendChild(grid);
                    list.appendChild(cluster);
                    
                    // 💡 드래그 앤 드롭 강화 (delay 추가)
                    new Sortable(grid, { group: 'shared', animation: 150, delay: 100, delayOnTouchOnly: true, onEnd: reorderAll });
                }
            }
        }

        function reorderAll() {
            const updates = {};
            document.querySelectorAll('.timeline-card').forEach((card, i) => { updates[`${card.dataset.id}/order`] = i; });
            db.ref('users/Yuta/projects/기본/storyboard').update(updates);
        }

        function switchDetailTab(type) {
            const ev = state.storyboard.find(i => i.id == state.currentId);
            const body = document.getElementById('detail-body');
            const footer = document.getElementById('detail-footer');
            
            document.querySelectorAll('.top-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${type}`).classList.add('active');

            if(type === 'desc') {
                body.innerText = ev.text;
                footer.style.display = 'flex';
                document.getElementById('btn-edit').style.display = 'block';
                document.getElementById('btn-branch').style.display = 'block';
            } else {
                body.innerHTML = ev.branches ? Object.values(ev.branches).map((b, idx) => 
                    `<div style="display:flex; justify:space-between; margin-bottom:10px; font-size:12px; color:var(--c${idx%4+1});">
                        <span style="flex:1;">● ${b.text}</span>
                        <span style="color:#ff6b6b; font-weight:bold; cursor:pointer;" onclick="deleteBranch('${b.id}')">×</span>
                    </div>`
                ).join('') : '<p style="text-align:center; color:#ccc; margin-top:20px;">메모 없음</p>';
                // 가지 탭에서는 수정/가지추가 숨김
                document.getElementById('btn-edit').style.display = 'none';
                document.getElementById('btn-branch').style.display = 'none';
            }
        }

        function openEraModal() {
            const list = document.getElementById('era-list');
            list.innerHTML = state.eras.map((e, idx) => `<div class="era-item"><span>${e}</span><span style="color:#ff6b6b;" onclick="deleteEra(${idx})">삭제</span></div>`).join('');
            openModal('eraModal');
        }

        function addEra() {
            const name = document.getElementById('new-era-name').value;
            if(!name) return;
            state.eras.push(name);
            db.ref('users/Yuta/projects/기본/eras').set(state.eras);
            document.getElementById('new-era-name').value = '';
            openEraModal();
        }

        function deleteEra(idx) {
            state.eras.splice(idx, 1);
            db.ref('users/Yuta/projects/기본/eras').set(state.eras);
            openEraModal();
        }

        function deleteBranch(bid) {
            db.ref(`users/Yuta/projects/기본/storyboard/${state.currentId}/branches/${bid}`).remove();
            setTimeout(() => switchDetailTab('branch'), 100);
        }

        function openDetailModal(id) { state.currentId = id; switchDetailTab('desc'); openModal('detailModal'); }
        function openAddModal() { state.currentId = null; document.getElementById('e-text').value = ""; document.getElementById('e-era').innerHTML = state.eras.map(e => `<option>${e}</option>`).join(''); openModal('eventModal'); }
        function openEditModal() { const ev = state.storyboard.find(i => i.id == state.currentId); document.getElementById('e-era').innerHTML = state.eras.map(e => `<option ${e===ev.era?'selected':''}>${e}</option>`).join(''); document.getElementById('e-year').value = ev.year; document.getElementById('e-month').value = ev.month; document.getElementById('e-text').value = ev.text; closeModal('detailModal'); openModal('eventModal'); }
        function saveEvent() { const id = state.currentId || Date.now(); const data = { id: id, era: document.getElementById('e-era').value, year: parseInt(document.getElementById('e-year').value)||0, month: parseInt(document.getElementById('e-month').value)||0, text: document.getElementById('e-text').value, order: state.currentId ? state.storyboard.find(i=>i.id==id).order : state.storyboard.length }; db.ref(`users/Yuta/projects/기본/storyboard/${id}`).update(data); closeModal('eventModal'); }
        function saveBranch() { const t = document.getElementById('b-text').value; if(!t) return; const bid = Date.now(); db.ref(`users/Yuta/projects/기본/storyboard/${state.currentId}/branches/${bid}`).set({ id:bid, text:t }); document.getElementById('b-text').value = ''; closeModal('branchModal'); setTimeout(() => switchDetailTab('branch'), 100); }
        function deleteEvent() { if(confirm("정말 삭제할까요?")) { db.ref(`users/Yuta/projects/기본/storyboard/${state.currentId}`).remove(); closeModal('detailModal'); } }

        function showTab(n, el) { 
            document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active')); 
            document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
            el.classList.add('active'); document.getElementById(n+'-view').classList.add('active'); 
        }

        document.getElementById('btn-edit').onclick = openEditModal;
        document.getElementById('btn-branch').onclick = () => openModal('branchModal');
        document.getElementById('btn-delete').onclick = deleteEvent;
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        syncData();
    </script>
</body>
</html>
