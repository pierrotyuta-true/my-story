<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yuta's Engine</title>

    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* 1. 디자인 시스템 정의 (폰트, 색상) */
        :root { 
            --primary: #4dabf7; 
            --dark: #343a40; 
            --text: #495057; 
            --node: #74c0fc;
            --bg: #f8f9fa; 
            --header-h: 60px; 
            --nav-h: 45px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* 2. 레이아웃 (고정 위치 및 레이어 순서) */
        #fixed-top-area {
            position: fixed; top: 0; left: 0; right: 0; z-index: 2000;
        }
        .app-header { 
            height: var(--header-h); background: var(--dark); color: white; 
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px; 
        }
        .logo { font-weight: 900; font-size: 20px; color: var(--primary); }
        .project-title { font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 5px; color: white; }
        .cloud-save-btn { background: var(--primary); color: white; border: none; padding: 7px 14px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; }

        .tab-menu { 
            height: var(--nav-h); background: #fff; display: flex; border-bottom: 1px solid #eee; 
        }
        .tab-item {
            flex: 1; display: flex; align-items: center; justify-content: center;
            font-size: 14px; color: #adb5bd; cursor: pointer; font-weight: bold;
        }
        .tab-item.active { color: var(--dark); border-bottom: 2px solid var(--dark); }

        /* 메인 컨텐츠 영역 */
        .content-body { 
            margin-top: calc(var(--header-h) + var(--nav-h)); 
            min-height: calc(100vh - 105px); padding-bottom: 85px;
            position: relative; z-index: 1;
        }
        .view { display: none; }
        .view.active { display: block; }

        /* 3. 타임라인 디자인 */
        #timeline-view.active {
            background-image: radial-gradient(#dee2e6 1.2px, transparent 1.2px);
            background-size: 20px 20px;
            background-attachment: fixed;
        }

        .tl-wrapper { position: relative; width: 100%; max-width: 500px; margin: 0 auto; padding-top: 30px; }
        .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #dee2e6; transform: translateX(-50%); z-index: 0; }

        .year-section { position: relative; width: 100%; margin-bottom: 40px; }
        .year-banner { display: flex; justify-content: center; margin-bottom: 20px; position: relative; z-index: 10; }
        .year-text { background: var(--dark); color: white; padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.15); }

        .month-cluster { position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; }
        .month-node { 
            width: 14px; height: 14px; background: white; border: 3px solid var(--node); 
            border-radius: 50%; z-index: 5; margin-bottom: 10px; box-shadow: 0 0 0 4px #fff;
        }

        .event-grid { 
            display: flex; flex-direction: column; gap: 15px; 
            width: 100%; padding: 0 15px; 
        }

        .timeline-card { 
            background: #fff; padding: 12px 15px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.06); width: 100%; max-width: 165px;
            border-left: 5px solid #e9ecef; cursor: pointer; position: relative;
        }
        .timeline-card.left { align-self: flex-start; margin-left: calc(5% + 5px); }
        .timeline-card.right { align-self: flex-end; margin-right: calc(5% + 5px); }

        .card-meta { font-size: 11px; color: var(--node); font-weight: bold; margin-bottom: 3px; }
        .card-text { font-size: 13px; font-weight: bold; color: var(--dark); line-height: 1.5; }

        /* 4. 스토리 탭 디자인 */
        .story-container {
            margin-top: calc(var(--header-h) + var(--nav-h) + 20px);
            padding: 0 15px;
        }
        .story-paper { 
            background: white; width: 100%; max-width: 600px; margin: 0 auto; 
            border-radius: 12px; padding: 25px; min-height: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); border-top: 5px solid var(--primary);
        }
        #story-editor { min-height: 350px; outline: none; line-height: 1.8; font-size: 14px; color: #444; }

        /* 5. 하단 FAB 및 모달 UI */
        .fab-wrap { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 2001; }
        .fab { width: 60px; height: 60px; background: var(--primary); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 6px 15px rgba(77,171,247,0.4); border: none; cursor: pointer; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 3000; justify-content: center; align-items: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: white; width: 100%; max-width: 350px; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); box-sizing: border-box; }
        
        /* 버튼 정렬 스타일 */
        .btn-modal-group { display: flex; gap: 8px; margin-top: 15px; }
        .btn-main { flex: 1; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-sub { flex: 1; padding: 12px; background: #e9ecef; color: #495057; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-danger { background: #ff6b6b; color: white; }

        /* 세분화된 입력칸 */
        .input-inline-group { display: flex; gap: 8px; margin-bottom: 12px; }
        .input-inline-group input { flex: 1; width: 0; margin-bottom: 0; }

        /* 입력 UI 공통 */
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #e1e4e8; border-radius: 8px; background: #fdfdfd; font-size: 14px; }
        textarea { resize: none; }
    </style>
</head>
<body>

    <div id="fixed-top-area">
        <header class="app-header">
            <div class="logo">Y</div>
            <div class="project-title" onclick="openProjModal()">이그리에가 ▾</div>
            <button class="cloud-save-btn">클라우드 저장</button>
        </header>
        <nav class="tab-menu">
            <div class="tab-item active" onclick="showTab('timeline')">타임라인</div>
            <div class="tab-item" onclick="showTab('story')">스토리</div>
            <div class="tab-item" onclick="showTab('char')">캐릭터도감</div>
        </nav>
    </div>

    <main class="content-body">
        
        <div id="timeline-view" class="view active">
            <div class="tl-wrapper">
                <div class="center-line"></div>
                <div id="tl-list"></div>
            </div>
        </div>

        <div id="story-view" class="view">
            <div class="story-container">
                <div class="story-paper">
                    <div id="story-editor" contenteditable="true">이그리에가가 황태자와...</div>
                    <div class="btn-modal-group" style="margin-top: 25px;">
                        <button class="btn-main">저장</button>
                        <button class="btn-sub">문서 목록</button>
                        <button class="btn-sub">문단 추출</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="fab-wrap">
        <button class="fab" onclick="openAddModal()">+</button>
    </div>

    <div id="detailModal" class="modal"><div class="modal-content">
        <div id="d-text" style="padding: 15px; background: #f8f9fa; border-radius: 10px; font-size: 14px; line-height: 1.6; color: #444; margin: 10px 0 15px 0;">내용</div>
        
        <div class="btn-modal-group">
            <button class="btn-main" onclick="openEditModal()">수정</button>
            <button class="btn-sub">가지 추가</button>
        </div>
        <div class="btn-modal-group" style="margin-top: 8px;">
            <button class="btn-sub btn-danger" onclick="deleteCurrentEvent()">삭제</button>
            <button class="btn-sub" onclick="closeModal('detailModal')">닫기</button>
        </div>
    </div></div>

    <div id="eventModal" class="modal"><div class="modal-content">
        <h3 id="modal-mode-title" style="margin-bottom: 20px;">기록 수정</h3>
        <select id="e-era"><option>제국력</option><option>대한민국</option></select>
        
        <div class="input-inline-group">
            <input type="number" id="e-year" placeholder="년 (예: 589)">
            <input type="number" id="e-month" placeholder="월 (1~12)">
        </div>

        <textarea id="e-text" rows="5" placeholder="내용을 입력하세요."></textarea>
        
        <div class="btn-modal-group">
            <button class="btn-main" onclick="saveEvent()">저장하기</button>
            <button class="btn-sub danger" onclick="closeModal('eventModal')">취소</button>
        </div>
    </div></div>


    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc",
            databaseURL: "https://true-s-default-rtdb.firebaseio.com",
            projectId: "true-s"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let state = { storyboard: [] };
        let currentDetailId = null;

        function syncData() {
            db.ref('users/Yuta/projects/기본/storyboard').on('value', snap => {
                state.storyboard = snap.val() ? Object.values(snap.val()) : [];
                renderTimeline();
            });
        }

        function renderTimeline() {
            const list = document.getElementById('tl-list');
            list.innerHTML = '';
            
            const sorted = state.storyboard.sort((a,b) => a.year - b.year || a.month - b.month);
            
            const grouped = sorted.reduce((acc, cur) => {
                const yEra = `${cur.era} ${cur.year}년`;
                if(!acc[yEra]) acc[yEra] = {};
                if(!acc[yEra][cur.month]) acc[yEra][cur.month] = [];
                acc[yEra][cur.month].push(cur);
                return acc;
            }, {});

            for(const yearEraLabel in grouped) {
                list.innerHTML += `<div class="year-banner"><div class="year-text">${yearEraLabel}</div></div>`;
                
                for(const month in grouped[yearEraLabel]) {
                    const monthEvents = grouped[yearEraLabel][month];
                    
                    const monthCluster = document.createElement('div');
                    monthCluster.className = 'month-cluster';
                    monthCluster.innerHTML = `<div class="month-node"></div>`;

                    const grid = document.createElement('div');
                    grid.className = 'event-grid';

                    monthEvents.forEach((ev, i) => {
                        const side = (i % 2 === 0) ? 'left' : 'right';
                        grid.innerHTML += `
                            <div class="timeline-card ${side}" onclick="openDetailModal('${ev.id}')">
                                <div class="card-meta">${month}월</div>
                                <div class="card-text">${ev.text}</div>
                            </div>
                        `;
                    });

                    monthCluster.appendChild(grid);
                    list.appendChild(monthCluster);
                }
            }
        }

        function openDetailModal(id) {
            currentDetailId = id;
            const ev = state.storyboard.find(item => item.id == id);
            document.getElementById('d-text').innerText = ev.text;
            openModal('detailModal');
        }

        function openEditModal() {
            const ev = state.storyboard.find(item => item.id == currentDetailId);
            document.getElementById('modal-mode-title').innerText = '기록 수정';
            document.getElementById('e-era').value = ev.era;
            document.getElementById('e-year').value = ev.year;
            document.getElementById('e-month').value = ev.month;
            document.getElementById('e-text').value = ev.text;
            closeModal('detailModal');
            openModal('eventModal');
        }

        function openAddModal() {
            currentDetailId = null;
            document.getElementById('modal-mode-title').innerText = '기록 추가';
            document.getElementById('e-text').value = '';
            openModal('eventModal');
        }

        function saveEvent() {
            const y = document.getElementById('e-year').value;
            const m = document.getElementById('e-month').value;
            const t = document.getElementById('e-text').value;
            if(!y || !m || !t) return alert("빈칸을 채워주세요.");
            
            const id = currentDetailId || Date.now();
            db.ref(`users/Yuta/projects/기본/storyboard/${id}`).update({
                id, era:'제국력', year:parseInt(y), month:parseInt(m), text:t
            });
            currentDetailId = null;
            closeModal('eventModal');
        }

        function deleteCurrentEvent() {
            if(confirm("정말 삭제하시겠습니까?")) {
                db.ref(`users/Yuta/projects/기본/storyboard/${currentDetailId}`).remove();
                closeModal('detailModal');
            }
        }

        function showTab(n) {
            document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
            document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(n+'-view').classList.add('active');
        }
        function openModal(id){ document.getElementById(id).classList.add('active'); }
        function closeModal(id){ document.getElementById(id).classList.remove('active'); }
        
        syncData();
    </script>
</body>
</html>
