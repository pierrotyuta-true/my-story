<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Yuta's WorldBuilder Pro</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    :root { 
      --primary: #4dabf7; --bg: #f8f9fa; --card-bg: #ffffff; --line: #dee2e6; 
      --text: #212529; --gray: #868e96; --hero: #40c057; --villain: #fa5252; --extra: #fab005;
    }
    body { 
      font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); 
      color: var(--text); overflow-x: hidden; padding-bottom: 70px;
    }

    /* 상단 네비게이션 */
    .top-nav {
      display: flex; justify-content: space-around; padding: 15px 0;
      background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
      position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid #eee;
    }
    .nav-item { font-size: 14px; font-weight: 800; color: var(--gray); cursor: pointer; position: relative; }
    .nav-item.active { color: var(--primary); }
    .nav-item.active::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 100%; height: 3px; background: var(--primary); border-radius: 5px; }

    /* 메인 뷰 컨테이너 */
    .view { display: none; margin-top: 60px; padding: 15px; animation: fadeIn 0.3s; }
    .view.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* --- 1. 타임라인 (기존 코드 유지) --- */
    .timeline-container { position: relative; width: 100%; max-width: 500px; margin: 0 auto; min-height: 80vh; }
    .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--line); transform: translateX(-50%); }
    .year-marker { position: relative; width: fit-content; margin: 20px auto; padding: 5px 12px; background: #343a40; color: white; border-radius: 15px; font-size: 11px; z-index: 10; }
    .row { display: grid; grid-template-columns: 1fr 1fr; position: relative; margin-bottom: 20px; }
    .node { width: 10px; height: 10px; background: #fff; border: 2px solid var(--primary); border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); top: 15px; z-index: 5; }
    .dropzone { display: flex; flex-direction: column; gap: 10px; min-height: 50px; }
    .dropzone[data-side="left"] { align-items: flex-end; padding-right: 25px; }
    .dropzone[data-side="right"] { align-items: flex-start; padding-left: 25px; }
    .card { background: #fff; padding: 10px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); width: 110px; font-size: 11px; font-weight: 600; }

    /* --- 2. 스토리 (트리트먼트) --- */
    #story-editor { width: 100%; min-height: 60vh; border: none; outline: none; background: white; padding: 20px; border-radius: 15px; box-shadow: inset 0 0 10px rgba(0,0,0,0.02); line-height: 1.8; font-size: 15px; }
    .story-footer { position: fixed; bottom: 75px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; width: 90%; }
    .side-panel { position: fixed; right: -100%; top: 0; width: 80%; height: 100%; background: white; z-index: 2000; transition: 0.3s; box-shadow: -5px 0 20px rgba(0,0,0,0.1); padding: 20px; }
    .side-panel.open { right: 0; }

    /* --- 3. 캐릭터 도감 --- */
    .char-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; text-align: center; }
    .char-circle { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #eee; margin: 0 auto 8px; overflow: hidden; position: relative; cursor: pointer; transition: 0.2s; }
    .char-circle img { width: 100%; height: 100%; object-fit: cover; }
    .char-circle.hero { border-color: var(--hero); }
    .char-circle.villain { border-color: var(--villain); }
    .char-circle.extra { border-color: var(--extra); }
    .char-name { font-size: 12px; font-weight: 800; }

    /* 모달 & 버튼 */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 3000; justify-content: center; align-items: center; }
    .modal-content { background: white; width: 85%; padding: 20px; border-radius: 20px; max-height: 80vh; overflow-y: auto; }
    .btn { padding: 12px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; }
    .btn-main { background: var(--primary); color: white; flex: 1; }
    .btn-sub { background: #e9ecef; color: #495057; }
    
    /* 하단 네비 바 */
    .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #fff; border-top: 1px solid #eee; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
  </style>
</head>
<body>

<div class="top-nav">
  <div class="nav-item active" onclick="switchView('timeline')">타임라인</div>
  <div class="nav-item" onclick="switchView('story')">스토리</div>
  <div class="nav-item" onclick="switchView('char')">캐릭터도감</div>
</div>

<div id="timeline" class="view active">
  <div class="timeline-container" id="tl-body">
    <div class="center-line"></div>
  </div>
</div>

<div id="story" class="view">
  <div contenteditable="true" id="story-editor" placeholder="여기에 트리트먼트를 작성하세요. 문단을 선택해 복사할 수 있습니다."></div>
  <div class="story-footer">
    <button class="btn btn-sub" onclick="toggleSidebar()">전체 문서</button>
    <button class="btn btn-main" onclick="extractText()">선택문단 추출</button>
    <button class="btn btn-main" onclick="saveStory()">저장</button>
  </div>
</div>

<div id="char" class="view">
  <div class="char-grid" id="char-list"></div>
  <div style="margin-top:30px; display:flex; gap:10px;">
    <button class="btn btn-main" onclick="openCharModal()">+ 캐릭터 추가</button>
    <button class="btn btn-sub" onclick="openRelationModal()">관계도</button>
  </div>
</div>

<div id="sidebar" class="side-panel">
  <h3>프로젝트 문서</h3>
  <div id="doc-list"></div>
  <button class="btn btn-sub" style="width:100%; margin-top:20px;" onclick="toggleSidebar()">닫기</button>
</div>

<div id="charModal" class="modal">
  <div class="modal-content">
    <h3>캐릭터 설정</h3>
    <input type="file" id="charImg" onchange="previewImg(this)">
    <div id="preview-box" class="char-circle" style="margin:10px auto;"></div>
    <input type="text" id="charName" placeholder="이름">
    <select id="charRole">
      <option value="hero">선역 (초록)</option>
      <option value="villain">악역 (빨강)</option>
      <option value="extra">조연 (노랑)</option>
    </select>
    <textarea id="charBio" placeholder="기본 설정 내역" style="width:100%; margin-top:10px;"></textarea>
    <button class="btn btn-main" style="width:100%; margin-top:15px;" onclick="saveCharacter()">저장</button>
    <button class="btn btn-sub" style="width:100%; margin-top:5px;" onclick="closeModal('charModal')">취소</button>
  </div>
</div>

<script>
  let currentView = 'timeline';
  let characters = JSON.parse(localStorage.getItem('yuta_chars') || '[]');
  let documents = JSON.parse(localStorage.getItem('yuta_docs') || '[]');

  function switchView(viewId) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
    event.target.classList.add('active');
    if(viewId === 'char') renderChars();
  }

  // --- 스토리 기능 ---
  function extractText() {
    const selection = window.getSelection().toString();
    if (!selection) return alert("추출할 문단을 드래그해서 선택해주세요.");
    const title = selection.substring(0, 15) + "...";
    const newDoc = { id: Date.now(), title, content: selection, parent: 'treatment' };
    documents.push(newDoc);
    localStorage.setItem('yuta_docs', JSON.stringify(documents));
    alert("새 하위 문서로 추출되었습니다!");
    renderDocs();
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    renderDocs();
  }

  function renderDocs() {
    const list = document.getElementById('doc-list');
    list.innerHTML = documents.map(doc => `
      <div style="padding:10px; border-bottom:1px solid #eee;">
        <b>📄 ${doc.title}</b>
      </div>
    `).join('');
  }

  // --- 캐릭터 기능 ---
  let tempImg = "";
  function previewImg(input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = e => {
        tempImg = e.target.result;
        document.getElementById('preview-box').innerHTML = `<img src="${tempImg}">`;
      };
      reader.readAsDataURL(input.files[0]);
    }
  }

  function openCharModal() { document.getElementById('charModal').style.display = 'flex'; }
  function closeModal(id) { document.getElementById(id).style.display = 'none'; }

  function saveCharacter() {
    const char = {
      name: document.getElementById('charName').value,
      role: document.getElementById('charRole').value,
      bio: document.getElementById('charBio').value,
      img: tempImg
    };
    characters.push(char);
    localStorage.setItem('yuta_chars', JSON.stringify(characters));
    renderChars();
    closeModal('charModal');
  }

  function renderChars() {
    const list = document.getElementById('char-list');
    list.innerHTML = characters.map(c => `
      <div>
        <div class="char-circle ${c.role}">
          <img src="${c.img || 'https://via.placeholder.com/100'}">
        </div>
        <div class="char-name">${c.name}</div>
      </div>
    `).join('');
  }

  // 타임라인 초기화 (기존 데이터 로드 로직 생략, 구조 유지)
  window.onload = () => {
    renderChars();
  };
</script>

</body>
</html>
