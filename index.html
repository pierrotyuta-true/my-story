<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STORY MASTER Pro v14.5</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --primary: #4dabf7; --bg: #f8f9fa; --line: #dee2e6; --text: #212529; --gray: #868e96; --danger: #ff6b6b; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; -webkit-user-select: none; user-select: none; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* 상단 헤더: 프로젝트 이름 클릭 시 메뉴 연결 */
        .header-fixed { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid #eee; }
        .header { height: 50px; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; }
        .project-title-btn { font-size: 16px; font-weight: 800; cursor: pointer; color: var(--text); display: flex; align-items: center; gap: 4px; }
        
        .top-nav { height: 45px; display: flex; justify-content: center; align-items: center; gap: 35px; border-top: 1px solid #f8f9fa; }
        .nav-item { font-size: 14px; font-weight: 800; color: #adb5bd; cursor: pointer; padding-bottom: 5px; border-bottom: 2px solid transparent; }
        .nav-item.active { color: var(--primary); border-bottom-color: var(--primary); }

        /* 메인 컨텐츠 영역 */
        .view-container { margin-top: 105px; padding: 15px; padding-bottom: 120px; } /* 하단 여백 대폭 확장 */
        .content-view { display: none; }
        .content-view.active { display: block; }

        /* 캐릭터 등록창 디자인 리뉴얼 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .styled-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #eee; background: #fcfcfc; font-size: 14px; outline: none; }
        .btn-blue { width: 100%; padding: 15px; border-radius: 15px; background: var(--primary); color: white; border: none; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .btn-close { width: 100%; padding: 12px; border-radius: 15px; background: #f1f3f5; color: #495057; border: none; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 8px; }

        /* 하단바: 구글 검색바 간섭 방지 (Z-index 및 Margin 상향) */
        .nav-bar { position: fixed; bottom: 20px; /* 바닥에서 띄움 */ left: 15px; right: 15px; height: 65px; background: rgba(255,255,255,0.95); border-radius: 20px; display: flex; justify-content: space-around; align-items: center; z-index: 9999; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .add-btn { width: 55px; height: 55px; background: var(--primary); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-top: -35px; border: 5px solid white; box-shadow: 0 5px 15px rgba(77,171,247,0.4); cursor: pointer; }
        .nav-btn-text { font-size: 12px; font-weight: 800; color: #adb5bd; background: none; border: none; cursor: pointer; padding: 15px; }

        /* 캐릭터 그리드 */
        .char-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .char-circle { width: 60px; height: 60px; border-radius: 20px; background: #f1f3f5; margin: 0 auto 5px; display: flex; align-items: center; justify-content: center; font-size: 20px; overflow: hidden; border: 2px solid #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="header-fixed">
    <div class="header">
        <div style="font-size:16px; font-weight:900; color:var(--primary);">SM Pro v14.5</div>
        <div class="project-title-btn" onclick="openProjectManager()">
            <span id="p-title">이그리예가</span> ▾
        </div>
        <button onclick="syncToCloud()" style="background:var(--primary); border:none; padding:6px 12px; border-radius:8px; font-size:11px; font-weight:800; color:white;">저장</button>
    </div>
    <nav class="top-nav">
        <div id="t-timeline" class="nav-item active" onclick="switchView('timeline')">타임라인</div>
        <div id="t-story" class="nav-item" onclick="switchView('story')">스토리</div>
        <div id="t-char" class="nav-item" onclick="switchView('char')">캐릭터</div>
    </nav>
</div>

<div class="view-container">
    <div id="view-timeline" class="content-view active">
        <div id="timeline-area" style="text-align:center; padding-top:50px; color:#adb5bd; font-weight:700;">사건을 추가해 보세요!</div>
    </div>
    <div id="view-story" class="content-view">
        <textarea id="story-input" class="styled-input" style="height:300px; background:#fff;" placeholder="이곳에 이그리예가의 줄거리를 기록하세요..."></textarea>
    </div>
    <div id="view-char" class="content-view"><div class="char-grid" id="char-area"></div></div>
</div>

<footer class="nav-bar">
    <button id="left-btn" class="nav-btn-text" onclick="handleLeftBtn()">목록</button>
    <div class="add-btn" onclick="handleAddBtn()">+</div>
    <button id="right-btn" class="nav-btn-text" onclick="handleRightBtn()">시대</button>
</footer>

<div id="charModal" class="modal"><div class="modal-content">
    <h3 style="text-align:center; margin-top:0; font-size:20px;">캐릭터 등록</h3>
    <div style="width:80px; height:80px; background:#f8f9fa; border-radius:50%; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; color:#adb5bd; border:2px dashed #dee2e6;">사진+</div>
    <input type="text" id="c-name" class="styled-input" placeholder="이름">
    <div style="display:flex; gap:10px;">
        <input type="text" id="c-age" class="styled-input" placeholder="나이">
        <input type="text" id="c-gender" class="styled-input" placeholder="성별">
    </div>
    <input type="text" id="c-look" class="styled-input" placeholder="외모/특징">
    <textarea id="c-memo" class="styled-input" style="height:80px;" placeholder="중요 메모"></textarea>
    <input type="text" id="c-type" class="styled-input" placeholder="분류 (예: 주인공, 빌런)">
    <button class="btn-blue" onclick="saveCharacter()">캐릭터 저장</button>
    <button class="btn-close" onclick="closeModal('charModal')">닫기</button>
</div></div>

<div id="projectModal" class="modal"><div class="modal-content">
    <h3 style="text-align:center; margin-top:0;">프로젝트 관리</h3>
    <div id="project-list" style="margin-bottom:15px;"></div>
    <input type="text" id="new-p-name" class="styled-input" placeholder="새 프로젝트 이름">
    <button class="btn-blue" onclick="addProject()">+ 새 프로젝트 추가</button>
    <button class="btn-close" onclick="closeModal('projectModal')">닫기</button>
</div></div>

<script>
    const config = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", authDomain: "true-s.firebaseapp.com", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    let currentView = 'timeline';
    let currentProject = "이그리예가";

    function switchView(view) {
        currentView = view;
        document.querySelectorAll('.content-view, .nav-item').forEach(e => e.classList.remove('active'));
        document.getElementById(`view-${view}`).classList.add('active');
        document.getElementById(`t-${view}`).classList.add('active');
        
        // 탭별 하단 버튼 텍스트 변경
        const lb = document.getElementById('left-btn'), rb = document.getElementById('right-btn');
        if(view === 'timeline') { lb.innerText = "목록"; rb.innerText = "시대"; }
        else if(view === 'story') { lb.innerText = "단락분리"; rb.innerText = "목록보기"; }
        else { lb.innerText = "분류편집"; rb.innerText = "순서변경"; }
    }

    function handleAddBtn() {
        if(currentView === 'char') openModal('charModal');
        else if(currentView === 'timeline') alert('새 사건 추가 창을 엽니다.');
        else alert('스토리 단락을 저장합니다. (✓)');
    }

    function openProjectManager() { openModal('projectModal'); }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function syncToCloud() { alert("데이터가 안전하게 저장되었습니다."); }
</script>
</body>
</html>
