<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STORY MASTER</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root { --primary: #4dabf7; --bg: #f8f9fa; --text: #333; --shadow: 0 10px 25px rgba(0,0,0,0.1); }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Pretendard', sans-serif; background: var(--bg); overflow: hidden; color: var(--text); }
        
        /* 헤더 & 네비게이션 */
        header { position: fixed; top: 0; width: 100%; height: 50px; background: #fff; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 1100; border-bottom: 1px solid #eee; box-sizing: border-box; }
        .logo { font-size: 16px; font-weight: 900; color: var(--primary); cursor: pointer; letter-spacing: -0.5px; }
        .project-name { font-weight: 800; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 4px; }

        .top-nav { position: fixed; top: 50px; width: 100%; height: 45px; background: #fff; display: flex; justify-content: center; align-items: center; gap: 30px; z-index: 1050; border-bottom: 1px solid #eee; }
        .nav-item { font-size: 14px; font-weight: 800; color: #adb5bd; cursor: pointer; padding-bottom: 5px; border-bottom: 2px solid transparent; transition: 0.2s; }
        .nav-item.active { color: var(--primary); border-bottom-color: var(--primary); }

        /* 컨텐츠 뷰 */
        .content-view { display: none; height: calc(100vh - 160px); margin-top: 95px; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .content-view.active { display: block; }

        /* 캐릭터 그리드 (4열 나열) */
        .char-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .char-circle { width: 60px; height: 60px; border-radius: 50%; background: #fff; margin: 0 auto 8px; overflow: hidden; border: 2px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.08); display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .char-circle img { width: 100%; height: 100%; object-fit: cover; }
        .char-name { font-size: 11px; font-weight: 700; text-align: center; }

        /* 모달 시스템 (통일된 디자인) */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: #fff; width: 85%; max-width: 380px; border-radius: 24px; padding: 25px; box-sizing: border-box; box-shadow: var(--shadow); position: relative; }
        .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 20px; text-align: center; }
        
        .input-group { margin-bottom: 12px; }
        .styled-input { width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid #eee; background: #f9f9f9; font-size: 14px; box-sizing: border-box; outline: none; transition: 0.2s; }
        .styled-input:focus { border-color: var(--primary); background: #fff; }

        .btn-main { width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: 800; font-size: 15px; cursor: pointer; margin-top: 10px; }
        .btn-sub { width: 100%; padding: 12px; background: none; color: #adb5bd; border: none; font-weight: 700; font-size: 14px; cursor: pointer; }

        /* 하단 탭 메뉴 */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #fff; display: flex; justify-content: center; align-items: center; border-top: 1px solid #eee; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn-group { display: none; width: 100%; justify-content: space-around; align-items: center; padding: 0 10px; }
        .nav-btn-group.active { display: flex; }
        
        .center-btn { width: 52px; height: 52px; background: var(--primary); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 4px solid #fff; box-shadow: 0 5px 15px rgba(77, 171, 247, 0.4); margin-top: -35px; cursor: pointer; }
        .side-btn { font-size: 12px; font-weight: 800; color: #adb5bd; cursor: pointer; width: 60px; text-align: center; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="showAlert('설정 메뉴 준비중입니다.')">SM v12.0</div>
        <div class="project-name" onclick="openProjectList()">
            <span id="cur-p-name">이그리예가</span> ▾
        </div>
        <div style="width:40px; text-align:right;" onclick="syncData()"><span style="font-size:18px;">☁️</span></div>
    </header>

    <nav class="top-nav">
        <div id="nav-timeline" class="nav-item active" onclick="switchView('timeline')">타임라인</div>
        <div id="nav-story" class="nav-item" onclick="switchView('story')">스토리</div>
        <div id="nav-char" class="nav-item" onclick="switchView('char')">캐릭터</div>
    </nav>

    <div id="view-timeline" class="content-view active">
        <div id="timeline-render-area">타임라인 데이터 로딩중...</div>
    </div>

    <div id="view-story" class="content-view">
        <textarea id="story-editor" class="styled-input" style="height:calc(100vh - 250px); line-height:1.6;" placeholder="오늘의 이야기를 기록해 보세요..."></textarea>
    </div>

    <div id="view-char" class="content-view">
        <div class="char-grid" id="char-list"></div>
    </div>

    <footer class="bottom-nav">
        <div id="menu-timeline" class="nav-btn-group active">
            <div class="side-btn" onclick="showAlert('시대 관리 기능 준비중')">시대편집</div>
            <div class="center-btn" onclick="showAlert('사건 추가 팝업 연결')">+</div>
            <div class="side-btn" onclick="showAlert('필터 기능 준비중')">필터</div>
        </div>
        <div id="menu-story" class="nav-btn-group">
            <div class="side-btn" onclick="splitStory()">단락분리</div>
            <div class="center-btn" onclick="saveStoryPart()">✓</div>
            <div class="side-btn" onclick="showAlert('저장된 목록 보기')">목록보기</div>
        </div>
        <div id="menu-char" class="nav-btn-group">
            <div class="side-btn" onclick="showAlert('분류 관리 기능 준비중')">분류편집</div>
            <div class="center-btn" onclick="openCharModal()">+</div>
            <div class="side-btn" onclick="showAlert('순서 변경 모드 활성화')">순서변경</div>
        </div>
    </footer>

    <div id="alertModal" class="modal">
        <div class="modal-content" style="text-align:center;">
            <div id="alert-msg" style="font-weight:700; margin-bottom:20px;"></div>
            <button class="btn-main" onclick="closeModal('alertModal')">확인</button>
        </div>
    </div>

    <div id="projectModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">프로젝트 전환</div>
            <div id="p-list-container"></div>
            <div class="input-group" style="margin-top:20px;">
                <input type="text" id="new-p-input" class="styled-input" placeholder="새 프로젝트 이름">
            </div>
            <button class="btn-main" onclick="addNewProject()">+ 프로젝트 추가</button>
            <button class="btn-sub" onclick="closeModal('projectModal')">닫기</button>
        </div>
    </div>

    <div id="charModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">캐릭터 등록</div>
            <div style="text-align:center; margin-bottom:15px;">
                <div onclick="document.getElementById('c-file').click()" class="char-circle" style="width:80px; height:80px; cursor:pointer; background:#f8f9fa;">
                    <span id="c-placeholder" style="font-size:12px; color:#adb5bd;">사진+</span>
                    <img id="c-preview" style="display:none; width:100%; height:100%; object-fit:cover;">
                </div>
                <input type="file" id="c-file" hidden onchange="handleImg(this)">
            </div>
            <input type="text" id="c-name" class="styled-input input-group" placeholder="이름">
            <div style="display:flex; gap:10px;" class="input-group">
                <input type="text" id="c-age" class="styled-input" placeholder="나이">
                <input type="text" id="c-gender" class="styled-input" placeholder="성별">
            </div>
            <input type="text" id="c-look" class="styled-input input-group" placeholder="외모 및 특징">
            <textarea id="c-memo" class="styled-input input-group" style="height:80px;" placeholder="중요 메모"></textarea>
            <input type="text" id="c-tag" class="styled-input input-group" placeholder="분류 (예: 주인공, 빌런)">
            <button class="btn-main" onclick="saveChar()">캐릭터 저장</button>
            <button class="btn-sub" onclick="closeModal('charModal')">취소</button>
        </div>
    </div>

    <script>
        // Firebase 설정 (유타님 정보 유지)
        const config = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", authDomain: "true-s.firebaseapp.com", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
        firebase.initializeApp(config);
        const db = firebase.database();

        let currentP = "이그리예가";
        let projects = ["이그리예가"];
        let charImg = "";

        // 뷰 전환
        function switchView(view) {
            document.querySelectorAll('.content-view, .nav-item, .nav-btn-group').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${view}`).classList.add('active');
            document.getElementById(`nav-${view}`).classList.add('active');
            document.getElementById(`menu-${view}`).classList.add('active');
        }

        // 커스텀 알림 (영문주소 없음)
        function showAlert(msg) {
            document.getElementById('alert-msg').innerText = msg;
            openModal('alertModal');
        }

        // 스토리 저장 (체크 버튼 기능)
        function saveStoryPart() {
            const text = document.getElementById('story-editor').value;
            if(!text) return showAlert('내용을 입력해주세요.');
            // 여기서 Firebase 저장 로직 수행 가능
            showAlert('스토리 저장이 완료되었습니다! ✓');
        }

        // 이미지 처리
        function handleImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    charImg = e.target.result;
                    document.getElementById('c-preview').src = charImg;
                    document.getElementById('c-preview').style.display = 'block';
                    document.getElementById('c-placeholder').style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 모달 제어
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function openProjectList() {
            const container = document.getElementById('p-list-container');
            container.innerHTML = projects.map(p => `
                <div onclick="showAlert('${p} 프로젝트로 전환')" style="padding:15px; border-bottom:1px solid #eee; font-weight:700;">
                    ${p} ${p===currentP ? '<span style="color:#4dabf7; font-size:11px; margin-left:5px;">●</span>' : ''}
                </div>
            `).join('');
            openModal('projectModal');
        }

        function openCharModal() {
            charImg = "";
            document.getElementById('c-preview').style.display = 'none';
            document.getElementById('c-placeholder').style.display = 'block';
            openModal('charModal');
        }
    </script>
</body>
</html>
