<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STORY MASTER v10.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root { --primary: #4dabf7; --bg: #f8f9fa; --line: #dee2e6; --danger: #ff6b6b; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Pretendard', sans-serif; background: var(--bg); overflow: hidden; touch-action: none; }
        
        /* 헤더 & 상단 네비 */
        header { position: fixed; top: 0; width: 100%; height: 50px; background: #fff; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 1100; border-bottom: 1px solid #eee; box-sizing: border-box; }
        .top-nav { position: fixed; top: 50px; width: 100%; height: 45px; background: #fff; display: flex; justify-content: center; align-items: center; gap: 35px; z-index: 1050; border-bottom: 1px solid #eee; }
        .nav-item { font-size: 14px; font-weight: 800; color: #adb5bd; cursor: pointer; padding-bottom: 4px; border-bottom: 2px solid transparent; }
        .nav-item.active { color: var(--primary); border-bottom-color: var(--primary); }

        /* 메인 컨텐츠 영역 */
        .content-view { display: none; height: calc(100vh - 155px); margin-top: 95px; overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .content-view.active { display: block; }

        /* 타임라인 레이아웃 */
        .timeline-container { position: relative; width: 100%; max-width: 500px; margin: 0 auto; min-height: 100%; padding-bottom: 50px; }
        .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--line); transform: translateX(-50%); z-index: 1; }
        .year-marker { position: relative; width: fit-content; margin: 20px auto 10px; padding: 4px 10px; background: #343a40; color: white; border-radius: 15px; font-size: 10px; font-weight: 800; z-index: 10; cursor: pointer; }

        /* 메모박스 & 탭 */
        .dropzone { position: relative; width: 100%; display: grid; grid-template-columns: 1fr 1fr; margin-bottom: 8px; z-index: 5; }
        .side-area { display: flex; flex-direction: column; gap: 5px; min-height: 60px; }
        .side-area.left { align-items: flex-end; padding-right: 25px; }
        .side-area.right { align-items: flex-start; padding-left: 25px; }
        .card-wrapper { position: relative; width: 110px; z-index: 20; }
        .card { background: #fff; width: 100%; padding: 10px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .card-month { font-size: 8px; font-weight: 900; color: var(--primary); }
        .card-content { font-size: 10px; line-height: 1.4; font-weight: 700; color: #444; }
        
        /* 탭 위치 자동 조정 */
        .side-tabs { position: absolute; top: 8px; display: flex; flex-direction: column; gap: 2px; }
        .left .side-tabs { left: -6px; } .right .side-tabs { right: -6px; }
        .tab-idx { width: 6px; height: 14px; border-radius: 2px; }
        .b-0 { background: #d0ebff; } .b-1 { background: #fff9db; } .b-2 { background: #d3f9d8; } .b-3 { background: #ffdeeb; }

        /* 상세보기 인덱스 탭 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: flex-end; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: #fff; width: 95%; max-width: 450px; border-radius: 20px 20px 0 0; padding: 20px; box-sizing: border-box; position: relative; }
        .view-tab-container { display: flex; position: absolute; top: -30px; left: 15px; gap: 4px; }
        .v-tab { padding: 6px 12px; background: #dee2e6; color: #868e96; font-size: 11px; font-weight: 800; border-radius: 8px 8px 0 0; border: none; }
        .v-tab.active { background: #fff; color: var(--primary); height: 30px; }

        /* 캐릭터 리스트 디자인 */
        .char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .char-card { background: #fff; border-radius: 12px; padding: 15px; display: flex; align-items: center; gap: 10px; border: 1px solid #eee; }
        .char-img { width: 40px; height: 40px; background: #f1f3f5; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* 콤팩트 입력창 (연도 너비 수정) */
        .compact-row { display: flex; gap: 5px; margin-bottom: 8px; align-items: center; }
        .input-box { padding: 8px; font-size: 13px; border-radius: 8px; border: 1px solid #eee; background: #f8f9fa; outline: none; }
        .w-era { flex: 2; } .w-year { flex: 0.8; width: 50px; } .w-month { flex: 0.5; width: 40px; }

        .btn-pill { background: var(--primary); color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: 800; width: 100%; margin-top: 5px; }
        .btn-ghost { background: #f1f3f5; border: none; padding: 10px; border-radius: 10px; font-weight: 700; width: 100%; margin-top: 5px; font-size: 11px; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #fff; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; }
        .add-btn { width: 45px; height: 45px; background: var(--primary); border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 25px; border: 3px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <header>
        <div style="font-size:12px; font-weight:800; color:var(--primary); cursor:pointer;" onclick="toggleProjectList()">LIST ▾</div>
        <input type="text" id="p-title-input" value="이그리예가" style="border:none; text-align:center; font-weight:900; font-size:14px; width:120px;" onchange="updateProjectName(this.value)">
        <button onclick="saveToCloud()" style="border:none; background:none; color:#adb5bd; font-weight:800; font-size:11px;">SAVE</button>
    </header>

    <div class="top-nav">
        <div class="nav-item active" onclick="switchView('timeline')">타임라인</div>
        <div class="nav-item" onclick="switchView('story')">스토리</div>
        <div class="nav-item" onclick="switchView('char')">캐릭터</div>
    </div>

    <div id="view-timeline" class="content-view active">
        <div class="timeline-container">
            <div class="center-line"></div>
            <div id="cards-area"></div>
        </div>
    </div>

    <div id="view-story" class="content-view">
        <h3 style="margin-top:0;">줄거리 요약</h3>
        <textarea id="story-memo" style="width:100%; height:300px; border:none; padding:15px; border-radius:12px; font-size:14px; line-height:1.6;" placeholder="이곳에 전체적인 스토리를 자유롭게 메모하세요..." onchange="sync()"></textarea>
    </div>

    <div id="view-char" class="content-view">
        <div class="char-grid" id="char-area"></div>
        <button class="btn-ghost" style="margin-top:20px;" onclick="addChar()">+ 캐릭터 추가</button>
    </div>

    <div id="viewModal" class="modal">
        <div class="modal-content">
            <div class="view-tab-container" id="tabMenu"></div>
            <div id="viewFullDate" style="font-size:10px; font-weight:800; color:var(--primary); margin-bottom:5px;"></div>
            <div id="viewContent" style="min-height:120px; font-size:14px; line-height:1.6; color:#333; font-weight:600;"></div>
            <div style="display:flex; gap:8px;">
                <button class="btn-pill" style="flex:1.5" onclick="openEdit()">수정</button>
                <button class="btn-ghost" style="flex:1" onclick="addNewBranch()">+ 가지추가</button>
            </div>
            <button class="btn-ghost" onclick="closeModal('viewModal')">닫기</button>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h4 id="modalTitle" style="margin:0 0 15px 0; text-align:center;">기록하기</h4>
            <div id="dateRow" class="compact-row">
                <select id="e-era" class="input-box w-era" onchange="checkNewEra(this)"></select>
                <input type="number" id="e-year" class="input-box w-year" placeholder="년">
                <input type="number" id="e-month" class="input-box w-month" placeholder="월">
            </div>
            <textarea id="e-text" rows="5" class="input-box" style="width:100%; box-sizing:border-box;" placeholder="내용을 입력하세요"></textarea>
            <button class="btn-pill" onclick="saveData()">저장</button>
            <button id="delBtn" class="btn-ghost" style="color:var(--danger)" onclick="deleteData()">삭제</button>
            <button class="btn-ghost" onclick="closeModal('editModal')">취소</button>
        </div>
    </div>

    <div class="nav">
        <div style="font-size:10px; font-weight:800; color:#adb5bd;" onclick="editEras()">연대편집</div>
        <div class="add-btn" onclick="addNewEvent()">+</div>
        <div style="font-size:10px; font-weight:800; color:#adb5bd;" onclick="alert('v10.0 기본 설정 모드입니다.')">설정</div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", authDomain: "true-s.firebaseapp.com", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
        firebase.initializeApp(config);
        const db = firebase.database();

        let storyboard = [], eras = ["공통"], characters = [], currentId = null, currentTab = 0, currentProject = "이그리예가";
        let isBranchMode = false;

        function init() {
            db.ref(`projects/${currentProject}`).on('value', s => {
                const d = s.val() || {};
                storyboard = d.data || [];
                eras = d.eras || ["공통"];
                characters = d.characters || [];
                document.getElementById('story-memo').value = d.story || "";
                render();
                renderChars();
            });
        }

        function switchView(view) {
            document.querySelectorAll('.content-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(`view-${view}`).classList.add('active');
            event.target.classList.add('active');
        }

        function render() {
            const container = document.getElementById('cards-area');
            container.innerHTML = '';
            storyboard.sort((a,b) => eras.indexOf(a.era) - eras.indexOf(b.era) || a.year - b.year || a.month - b.month);
            
            let lastYk = "";
            storyboard.forEach(ev => {
                const yk = `${ev.era} ${ev.year}년`;
                if(yk !== lastYk) {
                    const m = document.createElement('div'); m.className = 'year-marker';
                    m.innerText = yk; m.onclick = () => { const n = prompt("연대/연도 수정(미구현)"); };
                    container.appendChild(m); lastYk = yk;
                }
                const row = document.createElement('div'); row.className = 'dropzone';
                const left = document.createElement('div'); left.className = 'side-area left';
                const right = document.createElement('div'); right.className = 'side-area right';
                const cardWrap = document.createElement('div'); cardWrap.className = 'card-wrapper'; cardWrap.dataset.id = ev.id;
                
                let tabs = "";
                if(ev.branches && ev.branches.length > 0) ev.branches.forEach((_, i) => tabs += `<div class="tab-idx b-${i}"></div>`);
                
                cardWrap.innerHTML = `<div class="side-tabs">${tabs}</div><div class="card"><div class="card-month">${ev.month}월</div><div class="card-content">${ev.text.substring(0,15)}...</div></div>`;
                cardWrap.onclick = () => openView(ev.id);
                if(ev.side === 'right') right.appendChild(cardWrap); else left.appendChild(cardWrap);
                row.appendChild(left); row.appendChild(right); container.appendChild(row);
            });
            setupDrag();
        }

        function renderChars() {
            const area = document.getElementById('char-area');
            area.innerHTML = characters.map(c => `
                <div class="char-card">
                    <div class="char-img">👤</div>
                    <div><div style="font-weight:900;">${c.name}</div><div style="font-size:10px; color:#888;">${c.role}</div></div>
                </div>
            `).join('');
        }

        function setupDrag() {
            interact('.card-wrapper').draggable({
                onmove(e) {
                    const t = e.target;
                    const x = (parseFloat(t.dataset.x) || 0) + e.dx;
                    const y = (parseFloat(t.dataset.y) || 0) + e.dy;
                    t.style.transform = `translate(${x}px, ${y}px)`;
                    t.dataset.x = x; t.dataset.y = y;
                },
                onend(e) {
                    const t = e.target;
                    const ev = storyboard.find(s => s.id == t.dataset.id);
                    ev.side = (t.getBoundingClientRect().left + 55) < (window.innerWidth/2) ? 'left' : 'right';
                    t.style.transform = ''; t.dataset.x = 0; t.dataset.y = 0;
                    sync();
                }
            });
        }

        function openView(id) {
            currentId = id; currentTab = 0;
            const ev = storyboard.find(s => s.id == id);
            renderViewTabs(ev);
            openModal('viewModal');
        }

        function renderViewTabs(ev) {
            const menu = document.getElementById('tabMenu');
            let html = `<button class="v-tab ${currentTab===0?'active':''}" onclick="switchTab(0)">사건</button>`;
            (ev.branches || []).forEach((_, i) => html += `<button class="v-tab ${currentTab===i+1?'active':''}" onclick="switchTab(${i+1})">메모${i+1}</button>`);
            menu.innerHTML = html;
            document.getElementById('viewFullDate').innerText = `${ev.era} ${ev.year}년 ${ev.month}월`;
            document.getElementById('viewContent').innerText = currentTab === 0 ? ev.text : ev.branches[currentTab-1];
        }

        function switchTab(i) { currentTab = i; renderViewTabs(storyboard.find(s => s.id == currentId)); }

        function addNewEvent() {
            currentId = null; isBranchMode = false;
            document.getElementById('dateRow').style.display = 'flex';
            updateEraSelect(eras[0]);
            document.getElementById('e-year').value = 590; document.getElementById('e-month').value = 1; document.getElementById('e-text').value = "";
            document.getElementById('delBtn').style.display = 'none'; openModal('editModal');
        }

        function addNewBranch() {
            isBranchMode = true; document.getElementById('dateRow').style.display = 'none';
            document.getElementById('e-text').value = ""; openModal('editModal');
        }

        function openEdit() {
            const ev = storyboard.find(s => s.id == currentId);
            isBranchMode = false; document.getElementById('dateRow').style.display = currentTab===0?'flex':'none';
            updateEraSelect(ev.era); document.getElementById('e-year').value = ev.year;
            document.getElementById('e-month').value = ev.month;
            document.getElementById('e-text').value = currentTab === 0 ? ev.text : ev.branches[currentTab-1];
            document.getElementById('delBtn').style.display = 'block'; openModal('editModal');
        }

        function saveData() {
            const val = document.getElementById('e-text').value.trim(); if(!val) return;
            if(isBranchMode) {
                const ev = storyboard.find(s => s.id == currentId);
                if(!ev.branches) ev.branches = []; ev.branches.push(val); currentTab = ev.branches.length;
            } else if(currentId) {
                const ev = storyboard.find(s => s.id == currentId);
                if(currentTab === 0) {
                    ev.era = document.getElementById('e-era').value;
                    ev.year = parseInt(document.getElementById('e-year').value);
                    ev.month = parseInt(document.getElementById('e-month').value);
                    ev.text = val;
                } else ev.branches[currentTab-1] = val;
            } else {
                storyboard.push({ id: Date.now(), era: document.getElementById('e-era').value, year: parseInt(document.getElementById('e-year').value), month: parseInt(document.getElementById('e-month').value), text: val, side: 'left', branches: [] });
            }
            sync(); closeModal('editModal'); if(currentId) renderViewTabs(storyboard.find(s => s.id == currentId));
        }

        function deleteData() {
            if(!confirm("삭제할까요?")) return;
            if(currentTab === 0) { storyboard = storyboard.filter(s => s.id != currentId); closeModal('viewModal'); }
            else { const ev = storyboard.find(s => s.id == currentId); ev.branches.splice(currentTab-1, 1); currentTab = 0; renderViewTabs(ev); }
            sync(); closeModal('editModal');
        }

        function addChar() {
            const name = prompt("캐릭터 이름:");
            if(name) { characters.push({name, role: "주요 인물"}); sync(); renderChars(); }
        }

        function editEras() {
            const n = prompt("현재 연대: " + eras.join(', ') + "\n추가할 연대 이름을 입력하세요:");
            if(n) { eras.push(n); sync(); }
        }

        function updateProjectName(val) { currentProject = val; init(); }
        function toggleProjectList() { alert("현재 프로젝트: " + currentProject + "\n다른 프로젝트 불러오기는 추후 업데이트 예정입니다."); }
        function updateEraSelect(sel) {
            const s = document.getElementById('e-era');
            s.innerHTML = eras.map(e => `<option value="${e}">${e}</option>`).join('') + `<option value="new">+ 새 연대</option>`;
            s.value = sel;
        }
        function checkNewEra(obj) { if(obj.value === 'new') { const n = prompt("새 연대:"); if(n) { eras.push(n); updateEraSelect(n); } } }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function sync() { 
            db.ref(`projects/${currentProject}`).set({ 
                data: storyboard, eras, characters, 
                story: document.getElementById('story-memo').value 
            }); 
        }
        function saveToCloud() { sync(); alert("클라우드 저장 완료!"); }

        window.onload = init;
    </script>
</body>
</html>
