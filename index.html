<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STORY MASTER Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --bg-dark: #121212;
            --card-dark: #1e1e1e;
            --primary: #3793ff;
            --accent: #ff4785;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
        }

        body { 
            margin: 0; background: var(--bg-dark); color: var(--text-main); 
            font-family: 'Pretendard', sans-serif; overflow: hidden; height: 100vh;
        }

        /* 세련된 상단 네비게이션 */
        .top-nav {
            display: flex; justify-content: space-around; padding: 20px 10px;
            background: rgba(18, 18, 18, 0.8); backdrop-filter: blur(20px);
            position: fixed; top: 0; width: 100%; z-index: 1000;
        }
        .nav-item { 
            font-size: 16px; font-weight: 700; color: var(--text-sub); 
            cursor: pointer; transition: 0.3s; position: relative;
        }
        .nav-item.active { color: var(--primary); }
        .nav-item.active::after {
            content: ''; position: absolute; bottom: -8px; left: 0; width: 100%; height: 3px;
            background: var(--primary); border-radius: 10px;
        }

        /* 타임라인 디자인 복구 */
        .timeline-container { 
            margin-top: 80px; height: calc(100% - 160px); overflow-y: auto; 
            position: relative; padding: 20px;
        }
        .center-line {
            position: absolute; left: 50%; top: 0; bottom: 0; width: 2px;
            background: linear-gradient(to bottom, transparent, #333, transparent);
            transform: translateX(-50%);
        }
        .event-card {
            background: var(--card-dark); border-radius: 20px; padding: 18px;
            width: 42%; margin-bottom: 30px; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #2a2a2a;
        }
        .event-card.left { float: left; clear: both; margin-right: 50%; }
        .event-card.right { float: right; clear: both; margin-left: 50%; }

        /* 캐릭터 드래그 앤 드롭 구역 */
        #char-canvas {
            position: relative; height: 100%; width: 100%; display: none;
        }
        .char-profile {
            width: 80px; text-align: center; position: absolute; cursor: grab;
            transition: transform 0.2s;
        }
        .char-profile:active { cursor: grabbing; transform: scale(1.1); }
        .char-circle {
            width: 65px; height: 65px; border-radius: 25px; background: #333;
            margin: 0 auto 8px; border: 2px solid var(--primary);
            box-shadow: 0 5px 15px rgba(55, 147, 255, 0.3); overflow: hidden;
        }

        /* 하단 플로팅 바 */
        .floating-bar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.9); padding: 10px 25px;
            border-radius: 40px; display: flex; align-items: center; gap: 30px;
            border: 1px solid #333; box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        .add-btn {
            width: 55px; height: 55px; background: var(--primary);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 30px; color: white; margin-top: -45px; border: 4px solid var(--bg-dark);
        }

        /* 기록 편집 모달 복구 */
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 2000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: var(--card-dark); width: 90%; max-width: 400px;
            border-radius: 30px; padding: 30px; border: 1px solid #333;
        }
        input, textarea, select {
            width: 100%; background: #252525; border: 1px solid #333;
            color: white; padding: 15px; border-radius: 15px; margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="nav-item active" onclick="showTab('timeline')">타임라인</div>
    <div class="nav-item" onclick="showTab('story')">스토리</div>
    <div class="nav-item" onclick="showTab('char')">캐릭터</div>
</div>

<div id="timeline-view" class="timeline-container">
    <div class="center-line"></div>
    <div id="event-list"></div>
</div>

<div id="char-canvas">
    <div class="char-profile" style="top:150px; left:50px;" draggable="true">
        <div class="char-circle"><img src="https://via.placeholder.com/65" style="width:100%"></div>
        <div style="font-size:12px; font-weight:600;">유타</div>
    </div>
</div>

<div class="floating-bar">
    <span style="font-size:13px; color:var(--text-sub);">목록</span>
    <div class="add-btn" onclick="openModal()">+</div>
    <span style="font-size:13px; color:var(--text-sub);">시대</span>
</div>

<div id="editor-modal" class="modal">
    <div class="modal-content">
        <h2 style="margin:0 0 20px 0; font-size:20px;">기록 편집</h2>
        <div style="display:flex; gap:10px;">
            <select style="flex:1;"><option>제국력</option></select>
            <input type="number" placeholder="년" style="flex:1;">
            <input type="number" placeholder="월" style="flex:0.5;">
        </div>
        <textarea rows="5" placeholder="내용을 입력하세요."></textarea>
        <button onclick="closeModal()" style="width:100%; padding:18px; border-radius:18px; border:none; background:var(--primary); color:white; font-weight:800;">저장하기</button>
        <p onclick="closeModal()" style="text-align:center; margin-top:15px; color:var(--text-sub); font-size:14px;">닫기</p>
    </div>
</div>

<script>
    function showTab(tab) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        event.target.classList.add('active');
        
        document.getElementById('timeline-view').style.display = (tab === 'timeline') ? 'block' : 'none';
        document.getElementById('char-canvas').style.display = (tab === 'char') ? 'block' : 'none';
    }

    function openModal() { document.getElementById('editor-modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('editor-modal').style.display = 'none'; }

    // 드래그 기능 구현
    const chars = document.querySelectorAll('.char-profile');
    chars.forEach(char => {
        char.addEventListener('dragend', (e) => {
            char.style.left = e.pageX - 40 + 'px';
            char.style.top = e.pageY - 40 + 'px';
        });
    });
</script>

</body>
</html>
