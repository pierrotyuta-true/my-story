<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>스토리마스터 Pro</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    :root { 
        --primary: #4dabf7; --bg: #f1f3f5; --line: #e0e0e0; --text: #212529; --gray: #868e96; --danger: #ff6b6b; --stroke-width: 1.5px;
        --card-w: 110px;
    }
    body { font-family: 'Pretendard', sans-serif; margin: 0; background-color: var(--bg); background-image: radial-gradient(#e9ecef 1.5px, transparent 1.5px); background-size: 25px 25px; color: var(--text); overflow-x: hidden; padding-bottom: 80px; -webkit-user-select: none; user-select: none; touch-action: pan-y; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    @media (min-width: 768px) {
        :root { --card-w: 140px; }
        .timeline-container { max-width: 750px !important; }
        .modal-content { max-width: 550px !important; }
    }

    /* 헤더 & 네비 */
    .header-container { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .header { height: 50px; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; max-width: 800px; margin: 0 auto; }
    .project-title { font-size: 15px; font-weight: 900; color: var(--primary); cursor: pointer; }
    .nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; }
    .nav-btn { border: none; background: none; font-size: 10px; font-weight: 800; color: #adb5bd; cursor: pointer; }
    .add-btn-main { width: 48px; height: 48px; background: var(--primary); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 25px; border: 3px solid white; box-shadow: 0 4px 12px rgba(77,171,247,0.3); cursor: pointer; }

    /* 타임라인 레이아웃 */
    .timeline-container { position: relative; width: 100%; max-width: 500px; margin: 100px auto 0; min-height: 100vh; padding: 0 10px; }
    .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: var(--stroke-width); background: var(--line); transform: translateX(-50%); }
    .year-marker { position: relative; width: fit-content; margin: 30px auto 20px; padding: 6px 14px; background: #343a40; color: white; border-radius: 20px; font-size: 10px; font-weight: 800; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .row { display: grid; grid-template-columns: 1fr 1fr; position: relative; margin-bottom: 35px; min-height: 80px; }
    .node { width: 10px; height: 10px; background: white; border: var(--stroke-width) solid var(--primary); border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); top: 30px; z-index: 50; }
    .dropzone { display: flex; flex-direction: column; gap: 12.5px; padding: 0 5px; min-height: 80px; position: relative; transition: background 0.2s; border-radius: 10px; }
    .dropzone[data-side="left"] { align-items: flex-end; padding-right: 35px; }
    .dropzone[data-side="right"] { align-items: flex-start; padding-left: 35px; }

    /* 카드 스타일 */
    .card-wrapper { position: relative; width: var(--card-w); z-index: 60; touch-action: none; cursor: pointer; }
    .side-tabs { position: absolute; top: 8px; display: flex; flex-direction: column; pointer-events: none; }
    .dropzone[data-side="left"] .side-tabs { right: 100%; align-items: flex-end; }
    .dropzone[data-side="right"] .side-tabs { left: 100%; align-items: flex-start; }
    .tab-idx { width: 14px; height: 18px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; }
    .tab-idx:not(:first-child) { margin-top: -10px; } 
    .tab-white { background: #fff; border: 1px solid rgba(0,0,0,0.1); width: 16px; z-index: 20; border-radius: 5px 0 0 5px; }
    .card { background: #fff; width: 100%; min-height: 60px; border-radius: 10px; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border: 1px solid rgba(0,0,0,0.02); position: relative; z-index: 25; pointer-events: none; }
    .card-month { font-size: 8px; font-weight: 900; color: var(--primary); margin-bottom: 3px; }
    .card-content { font-size: 10.5px; line-height: 1.4; font-weight: 700; color: #444; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }

    /* 모달 공통 */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 5000; justify-content: center; align-items: flex-end; backdrop-filter: blur(5px); }
    .modal-content { background: white; border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    
    /* 상세보기 탭 */
    .view-tab-menu { display: flex; gap: 4px; padding-left: 5px; position: relative; z-index: 5001; }
    .v-tab { padding: 10px 18px; border-radius: 12px 12px 0 0; font-size: 11px; font-weight: 800; background: #e9ecef; color: #adb5bd; border: 1px solid #ddd; border-bottom: none; cursor: pointer; margin-bottom: -1px; }
    .v-tab.active { background: white; color: var(--text); padding-top: 12px; border-bottom: 1px solid white; z-index: 5002; }
    .view-body { border-radius: 0 15px 15px 15px; padding: 22px; background: white; border: 1px solid #ddd; margin-top: -1px; }

    /* 입력 UI */
    input, select, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #eee; background: #f8f9fa; font-size: 14px; margin-bottom: 10px; outline: none; font-family: inherit; }
    .btn-pill { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 14px; font-weight: 800; font-size: 14px; width: 100%; cursor: pointer; }
    .btn-ghost { background: #f1f3f5; color: #495057; border: none; padding: 12px; border-radius: 12px; font-weight: 700; font-size: 12px; width: 100%; cursor: pointer; margin-top: 5px; }
    
    /* 리스트 아이템 */
    .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #f8f9fa; border-radius: 12px; margin-bottom: 8px; border: 1px solid #eee; }
    .list-item b { font-size: 14px; }
  </style>
</head>
<body>

<div id="promptModal" class="modal" style="align-items: center; background: rgba(0,0,0,0.6);">
    <div class="modal-content" style="border-radius: 20px; width: 90%; max-width: 350px;">
        <h4 id="promptTitle" style="margin: 0 0 15px 0; text-align: center;">입력</h4>
        <input type="text" id="promptInput" placeholder="내용을 입력하세요">
        <button class="btn-pill" id="promptOk">확인</button>
        <button class="btn-ghost" onclick="window.closeModal('promptModal')">취소</button>
    </div>
</div>

<div id="viewModal" class="modal">
    <div class="modal-content">
        <div class="view-tab-menu" id="viewTabMenu"></div>
        <div class="view-body">
            <div id="viewMonth" style="font-size:11px; font-weight:900; color:var(--primary); margin-bottom:8px;"></div>
            <div id="viewText" style="font-size:14px; line-height:1.7; color:#333; white-space:pre-wrap; font-weight:700; min-height:100px;"></div>
        </div>
        <div style="margin-top:15px; display:flex; gap:8px;">
            <button class="btn-pill" style="flex:1.5;" onclick="window.handleTabEdit()">편집</button>
            <button class="btn-ghost" style="flex:1; margin:0;" onclick="window.showBranchInput()">+ 가지</button>
        </div>
        <button class="btn-ghost" style="width:100%; margin-top:8px;" onclick="window.closeModal('viewModal')">닫기</button>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h4 style="text-align:center; margin:0 0 15px 0;">기록 편집</h4>
        <div style="display:flex; gap:6px;">
            <select id="eraType" style="flex:1.5;"></select>
            <input type="number" id="eYear" style="flex:1;">
            <select id="eMonth" style="flex:1;">
                <script>for(let i=1;i<=12;i++)document.write(`<option value="${i}">${i}월</option>`)</script>
            </select>
        </div>
        <div id="charTagSelector" style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:12px;"></div>
        <textarea id="eContent" rows="6" placeholder="이야기를 적어보세요..."></textarea>
        <button class="btn-pill" onclick="window.saveScene()">저장하기</button>
        <button class="btn-ghost" style="color:var(--danger);" id="delBtn">사건 삭제</button>
        <button class="btn-ghost" onclick="window.closeModal('editModal')">취소</button>
    </div>
</div>

<div id="charModal" class="modal">
    <div class="modal-content">
        <h4>캐릭터 도감</h4>
        <div id="charListGrid" style="margin-bottom:15px;"></div>
        <button class="btn-pill" onclick="window.askCustom('새 캐릭터 이름', (n)=>window.addChar(n))">+ 새 캐릭터</button>
        <button class="btn-ghost" onclick="window.closeModal('charModal')">닫기</button>
    </div>
</div>

<div id="charDetailModal" class="modal">
    <div class="modal-content">
        <h4 id="charDetailName">캐릭터 정보</h4>
        <input type="text" id="charImgUrl" placeholder="이미지 URL">
        <textarea id="charMemo" rows="4" placeholder="캐릭터 설정을 메모하세요..."></textarea>
        <button class="btn-pill" onclick="window.saveCharDetail()">정보 저장</button>
        <button class="btn-ghost" onclick="window.closeModal('charDetailModal')">뒤로가기</button>
    </div>
</div>

<div id="eraModal" class="modal">
    <div class="modal-content">
        <h4>시대 설정</h4>
        <div id="eraListGrid"></div>
        <button class="btn-pill" onclick="window.askCustom('새 시대 이름', (n)=>window.addEra(n))">+ 시대 추가</button>
        <button class="btn-ghost" onclick="window.closeModal('eraModal')">닫기</button>
    </div>
</div>

<div class="header-container">
  <div class="header">
    <div class="project-title" id="projectTitle" onclick="window.openLoadModal()">프로젝트 로딩중...</div>
    <button class="btn-pill" style="width:auto; padding:6px 15px; font-size:11px;" onclick="window.saveToCloud()">구름 저장</button>
  </div>
  <div class="search-bar" id="searchBar" style="display:flex; gap:8px; overflow-x:auto; padding:10px 15px;"></div>
</div>

<div class="timeline-container" id="timeline"></div>

<div class="nav">
  <button class="nav-btn" onclick="window.openLoadModal()">목록</button>
  <button class="nav-btn" onclick="window.openEraModal()">시대</button>
  <div class="add-btn-main" onclick="window.addScene()">+</div>
  <button class="nav-btn" onclick="window.openCharModal()">캐릭터</button>
  <button class="nav-btn" onclick="location.reload()">새로고침</button>
</div>

<div id="loadModal" class="modal">
    <div class="modal-content">
        <h4>프로젝트 목록</h4>
        <div id="projectList"></div>
        <button class="btn-pill" onclick="window.askCustom('새 프로젝트 이름', (n)=>window.loadP(n))">+ 새 프로젝트</button>
        <button class="btn-ghost" onclick="window.closeModal('loadModal')">닫기</button>
    </div>
</div>

<script>
  const config = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", authDomain: "true-s.firebaseapp.com", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
  firebase.initializeApp(config);
  const db = firebase.database();

  let storyboard = [], eras = ["공통"], chars = [], charDetails = {}, currentProject = null, editingId = null, editingChar = null;
  const pastelTabs = ["tab-blue", "tab-green", "tab-yellow", "tab-pink"];
  let selectedFilter = null, currentViewTab = 0;

  // 커스텀 프롬프트 로직
  window.askCustom = (title, callback) => {
    document.getElementById('promptTitle').innerText = title;
    document.getElementById('promptInput').value = "";
    window.openModal('promptModal');
    document.getElementById('promptOk').onclick = () => {
        const val = document.getElementById('promptInput').value.trim();
        if(val) { callback(val); window.closeModal('promptModal'); }
    };
  };

  window.closeModal = (id) => document.getElementById(id).style.display = 'none';
  window.openModal = (id) => document.getElementById(id).style.display = 'flex';

  // 타임라인 렌더링 (연도 복구)
  window.render = () => {
    const container = document.getElementById('timeline');
    if(!currentProject) return;
    container.innerHTML = '<div class="center-line"></div>';
    let filtered = selectedFilter ? storyboard.filter(s => (s.chars||[]).includes(selectedFilter)) : storyboard;
    
    eras.forEach(eName => {
        const eraData = filtered.filter(s => s.era === eName);
        if(eraData.length === 0 && eName !== "공통") return;
        
        container.innerHTML += `<div class="year-marker" style="background:#1a1a1a;">${eName}</div>`;
        
        const yearsMap = {};
        eraData.forEach(sc => {
            if(!yearsMap[sc.year]) yearsMap[sc.year] = {};
            if(!yearsMap[sc.year][sc.month]) yearsMap[sc.year][sc.month] = {left:[], right:[]};
            yearsMap[sc.year][sc.month][sc.side||'left'].push(sc);
        });

        Object.keys(yearsMap).sort((a,b)=>a-b).forEach(y => {
            container.innerHTML += `<div class="year-marker">${y}년</div>`;
            const monthsMap = yearsMap[y];
            Object.keys(monthsMap).sort((a,b)=>a-b).forEach(m => {
                const row = document.createElement('div'); row.className = 'row';
                row.innerHTML = `<div class="dropzone" data-era="${eName}" data-year="${y}" data-month="${m}" data-side="left"></div><div class="node"></div><div class="dropzone" data-era="${eName}" data-year="${y}" data-month="${m}" data-side="right"></div>`;
                container.appendChild(row);

                ['left','right'].forEach(side => {
                    const zone = row.querySelector(`.dropzone[data-side="${side}"]`);
                    const sideCards = monthsMap[m][side];
                    if(sideCards) {
                        sideCards.forEach((sc, idx) => {
                            const wrap = document.createElement('div'); wrap.className = 'card-wrapper';
                            wrap.dataset.id = sc.id;
                            let tHtml = `<div class="tab-idx tab-white"></div>`;
                            if(sc.branches) sc.branches.forEach((_,i) => tHtml += `<div class="tab-idx ${pastelTabs[i]||'tab-blue'}"></div>`);
                            wrap.innerHTML = `<div class="side-tabs">${tHtml}</div><div class="card"><div class="card-month">${m}월</div><div class="card-content">${sc.text}</div></div>`;
                            zone.appendChild(wrap);
                        });
                    }
                });
            });
        });
    });
    window.updateSearchBar();
  };

  // 캐릭터 편집 복구
  window.openCharModal = () => {
    const list = document.getElementById('charListGrid');
    list.innerHTML = chars.map(c => `
        <div class="list-item">
            <b onclick="window.editCharDetail('${c}')" style="cursor:pointer; color:var(--primary)">${c}</b>
            <button class="btn-ghost" style="width:auto; margin:0;" onclick="window.deleteChar('${c}')">삭제</button>
        </div>
    `).join('');
    window.openModal('charModal');
  };
  window.addChar = (n) => { if(!chars.includes(n)) { chars.push(n); window.sync(); window.openCharModal(); } };
  window.deleteChar = (n) => { if(confirm(`${n} 캐릭터를 삭제할까요?`)) { chars = chars.filter(x=>x!==n); window.sync(); window.openCharModal(); } };
  window.editCharDetail = (n) => {
    editingChar = n;
    const d = charDetails[n] || { img: "", memo: "" };
    document.getElementById('charDetailName').innerText = n;
    document.getElementById('charImgUrl').value = d.img || "";
    document.getElementById('charMemo').value = d.memo || "";
    window.openModal('charDetailModal');
  };
  window.saveCharDetail = () => {
    charDetails[editingChar] = { img: document.getElementById('charImgUrl').value, memo: document.getElementById('charMemo').value };
    window.sync(); window.closeModal('charDetailModal');
  };

  // 시대 편집 복구
  window.openEraModal = () => {
    const list = document.getElementById('eraListGrid');
    list.innerHTML = eras.map((e, i) => `
        <div class="list-item">
            <input type="text" value="${e}" onchange="window.renameEra(${i}, this.value)" style="width:60%; margin:0;">
            <div style="display:flex; gap:4px;">
                <button class="btn-ghost" style="padding:5px;" onclick="window.moveEra(${i},-1)">▲</button>
                <button class="btn-ghost" style="padding:5px;" onclick="window.moveEra(${i},1)">▼</button>
                <button class="btn-ghost" style="padding:5px; color:var(--danger);" onclick="window.deleteEra(${i})">X</button>
            </div>
        </div>
    `).join('');
    window.openModal('eraModal');
  };
  window.addEra = (n) => { eras.push(n); window.sync(); window.openEraModal(); };
  window.renameEra = (i, n) => { eras[i] = n; window.sync(); };
  window.moveEra = (i, d) => { const t = i + d; if(t>=0 && t<eras.length) { [eras[i], eras[t]] = [eras[t], eras[i]]; window.sync(); window.openEraModal(); } };
  window.deleteEra = (i) => { if(confirm("시대를 삭제할까요?")) { eras.splice(i, 1); window.sync(); window.openEraModal(); } };

  // 프로젝트 목록 관리
  window.openLoadModal = () => {
    db.ref('projects').once('value').then(s => {
        const d = s.val();
        document.getElementById('projectList').innerHTML = d ? Object.keys(d).map(k => `
            <div class="list-item">
                <b>${k}</b>
                <div style="display:flex; gap:5px;">
                    <button class="btn-pill" style="width:auto; padding:6px 12px;" onclick="window.loadP('${k}')">열기</button>
                    <button class="btn-ghost" style="width:auto; color:var(--danger);" onclick="window.deleteProj('${k}')">삭제</button>
                </div>
            </div>
        `).join('') : '<p>프로젝트가 없습니다.</p>';
        window.openModal('loadModal');
    });
  };
  window.deleteProj = (k) => { if(confirm(`[${k}] 프로젝트를 영구 삭제하시겠습니까?`)) { db.ref('projects/'+k).remove().then(window.openLoadModal); } };

  // 데이터 동기화 기본 함수
  window.sync = () => { if(currentProject) db.ref('projects/'+currentProject).set({ data: storyboard, eras, chars, charDetails }).then(window.render); };
  window.loadP = (k) => { 
    currentProject = k; localStorage.setItem('lastProject', k); document.getElementById('projectTitle').innerText = k; 
    db.ref('projects/'+k).on('value', s => { 
        const d = s.val(); if(d){ storyboard=d.data||[]; eras=d.eras||["공통"]; chars=d.chars||[]; charDetails=d.charDetails||{}; window.render(); } 
    }); window.closeModal('loadModal'); 
  };

  // 나머지 이벤트 리스너들 (기존 드래그, 뷰어, 편집 로직 통합 유지)
  window.openViewer = (id) => { editingId = id; const s = storyboard.find(x => x.id == id); if(!s) return; currentViewTab = 0; window.renderTabs(s); window.openModal('viewModal'); };
  window.renderTabs = (s) => {
    const menu = document.getElementById('viewTabMenu');
    let tabs = [`<div class="v-tab ${currentViewTab === 0 ? 'active' : ''}" onclick="window.switchTab(0)">사건</div>`];
    (s.branches || []).forEach((_, i) => tabs.push(`<div class="v-tab ${currentViewTab === (i+1) ? 'active' : ''}" onclick="window.switchTab(${i+1})">가지${i+1}</div>`));
    menu.innerHTML = tabs.join('');
    document.getElementById('viewMonth').innerText = `${s.era} ${s.year}년 ${s.month}월`;
    document.getElementById('viewText').innerText = currentViewTab === 0 ? s.text : s.branches[currentViewTab-1];
  };
  window.switchTab = (idx) => { currentViewTab = idx; window.renderTabs(storyboard.find(x => x.id == editingId)); };
  window.showBranchInput = () => { window.askCustom("새로운 가지 내용", (val) => { const s = storyboard.find(x => x.id == editingId); if(!s.branches) s.branches = []; s.branches.push(val); window.sync(); window.openViewer(editingId); }); };
  window.handleTabEdit = () => {
    const s = storyboard.find(x => x.id == editingId);
    if(currentViewTab === 0) { window.closeModal('viewModal'); window.openEdit(editingId); } 
    else { window.askCustom("가지 내용 수정", (val) => { s.branches[currentViewTab-1] = val; window.sync(); window.openViewer(editingId); }); }
  };
  window.saveToCloud = () => { if(currentProject) window.sync(); alert("클라우드 동기화 완료!"); };
  window.openEdit = (id) => {
    editingId = id; const s = storyboard.find(x => x.id == id);
    document.getElementById('eContent').value = s ? s.text : ""; document.getElementById('eYear').value = s ? s.year : "2026";
    document.getElementById('eraType').innerHTML = eras.map(e => `<option value="${e}">${e}</option>`).join('');
    if(s) { document.getElementById('eraType').value = s.era; document.getElementById('eMonth').value = s.month; selectedChars = s.chars || []; } else { selectedChars = []; }
    window.updateCharUI(); window.openModal('editModal');
  };
  window.saveScene = () => {
    const text = document.getElementById('eContent').value.trim(); if(!text) return;
    const year = parseInt(document.getElementById('eYear').value), era = document.getElementById('eraType').value, month = parseInt(document.getElementById('eMonth').value);
    if(editingId) storyboard = storyboard.map(s => s.id == editingId ? {...s, text, year, month, era, chars: selectedChars} : s);
    else storyboard.push({ id: Date.now().toString(), era, year, month, text, chars: selectedChars, side: 'left', branches: [] });
    window.sync(); window.closeModal('editModal');
  };
  window.updateCharUI = () => { document.getElementById('charTagSelector').innerHTML = chars.map(c => `<div style="padding:5px 12px; border-radius:15px; border:1px solid #eee; font-size:11px; background:${selectedChars.includes(c)?'#4dabf7':'#fff'}; color:${selectedChars.includes(c)?'#fff':'#868e96'}" onclick="window.toggleChar('${c}')">${c}</div>`).join(''); };
  window.toggleChar = (c) => { if(selectedChars.includes(c)) selectedChars = selectedChars.filter(x=>x!==c); else selectedChars.push(c); window.updateCharUI(); };
  window.updateSearchBar = () => { document.getElementById('searchBar').innerHTML = `<div onclick="window.filterByChar(null)" style="padding:5px 15px; border-radius:20px; background:${selectedFilter===null?'#4dabf7':'#fff'}; color:${selectedFilter===null?'#fff':'#868e96'}; border:1px solid #eee; font-size:12px; white-space:nowrap;">전체</div>` + chars.map(c => `<div onclick="window.filterByChar('${c}')" style="padding:5px 15px; border-radius:20px; background:${selectedFilter===c?'#4dabf7':'#fff'}; color:${selectedFilter===c?'#fff':'#868e96'}; border:1px solid #eee; font-size:12px; white-space:nowrap;">${c}</div>`).join(''); };
  window.filterByChar = (n) => { selectedFilter = n; window.render(); };
  window.addScene = () => { if(!currentProject) return; window.openEdit(null); };
  document.getElementById('delBtn').onclick = () => { if(confirm("사건을 삭제하시겠습니까?")) { storyboard = storyboard.filter(s => s.id != editingId); window.sync(); window.closeModal('editModal'); } };

  // 터치 이벤트 분리 (클릭/드래그)
  let startX, startY, isDragging = false, dragId = null;
  document.addEventListener('touchstart', (e) => {
    const wrap = e.target.closest('.card-wrapper'); if(!wrap) return;
    const touch = e.touches[0]; startX = touch.clientX; startY = touch.clientY; dragId = wrap.dataset.id; isDragging = false;
    const end = (ee) => {
        const et = ee.changedTouches[0];
        const dist = Math.hypot(et.clientX - startX, et.clientY - startY);
        if(dist < 10) window.openViewer(dragId); // 드래그 없이 터치만 하면 뷰어 오픈
        document.removeEventListener('touchend', end);
    };
    document.addEventListener('touchend', end);
  }, { passive: true });

  window.onload = () => { const last = localStorage.getItem('lastProject'); if(last) window.loadP(last); else window.openLoadModal(); };
</script>
</body>
</html>
