<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>유타의 타임라인</title> <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <nav id="top-nav">
            <div class="nav-container">
                <button class="tab-btn active" onclick="switchTab('timeline')">Timeline</button>
                <button class="tab-btn" onclick="switchTab('story')">Story</button>
                <button class="tab-btn" onclick="switchTab('character')">Character</button>
            </div>
        </nav>

        <div id="tab-container">
            <section id="view-timeline" class="tab-view active">
                <header class="view-header">
                    <h3>사건 흐름</h3>
                    <button class="main-add-btn" onclick="addEvent()">+ 사건 추가</button>
                </header>
                <div id="event-list" class="scroll-area"></div>
            </section>

            <section id="view-story" class="tab-view">
                <div class="story-layout">
                    <aside id="sidebar">
                        <div class="sidebar-header">
                            <strong>Story List</strong>
                            <button class="icon-btn" onclick="createNewStory()">+</button>
                        </div>
                        <ul id="story-list" class="story-list scroll-area"></ul>
                    </aside>
                    <main class="main-editor">
                        <header class="editor-header">
                            <strong id="current-title">메인 줄거리</strong>
                            <div class="actions">
                                <button class="sub-btn" onclick="makeSubDocument()">파트 분리</button>
                                <button id="edit-btn" class="primary-btn" onclick="handleEdit()">편집 시작</button>
                            </div>
                        </header>
                        <div class="content-area scroll-area">
                            <div class="paper">
                                <div id="viewer"></div>
                                <textarea id="editor" spellcheck="false"></textarea>
                            </div>
                        </div>
                    </main>
                </div>
            </section>

            <section id="view-character" class="tab-view">
                <div class="empty-state">
                    <h3>인물 설정</h3>
                    <p>준비 중인 공간입니다.</p>
                </div>
            </section>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
