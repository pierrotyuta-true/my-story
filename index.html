<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>스토리마스터 Pro</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    :root { --primary: #4dabf7; --bg: #f1f3f5; --card-bg: #ffffff; --line: #dee2e6; --text: #212529; --gray: #868e96; --danger: #ff6b6b; --inactive-tab: #ced4da; }
    body { font-family: 'Pretendard', sans-serif; margin: 0; background-color: var(--bg); background-image: radial-gradient(#e9ecef 1.5px, transparent 1.5px); background-size: 25px 25px; color: var(--text); overflow-x: hidden; padding-bottom: 70px; -webkit-user-select: none; user-select: none; touch-action: pan-y; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    /* 레이아웃 공통 */
    .header-container { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .header { height: 50px; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; }
    .project-title { font-size: 15px; font-weight: 900; color: var(--primary); }
    .search-bar { display: flex; gap: 6px; overflow-x: auto; padding: 8px 15px; scrollbar-width: none; }
    .filter-tag { padding: 5px 12px; border-radius: 15px; background: #fff; border: 1px solid #eee; font-size: 11px; font-weight: 700; white-space: nowrap; color: var(--gray); }
    .timeline-container { position: relative; width: 100%; max-width: 500px; margin: 100px auto 0; min-height: 100vh; }
    .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--line); transform: translateX(-50%); }
    .year-marker { position: relative; width: fit-content; margin: 30px auto 20px; padding: 6px 14px; background: #343a40; color: white; border-radius: 20px; font-size: 10px; font-weight: 800; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .row { display: grid; grid-template-columns: 1fr 1fr; position: relative; margin-bottom: 25px; min-height: 80px; }
    .node { width: 10px; height: 10px; background: white; border: 2px solid var(--primary); border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); top: 30px; z-index: 5; }
    .dropzone { display: flex; flex-direction: column; gap: 15px; padding: 0 5px; min-height: 80px; }
    .dropzone[data-side="left"] { align-items: flex-end; padding-right: 35px; }
    .dropzone[data-side="right"] { align-items: flex-start; padding-left: 35px; }

    /* [디자인 수정] 타임라인 인덱스 탭 통일화 */
    .card-wrapper { position: relative; width: 105px; z-index: 10; touch-action: none; cursor: pointer; }
    .side-tabs { position: absolute; top: 4px; display: flex; flex-direction: column; gap: 2px; pointer-events: none; }
    .dropzone[data-side="left"] .side-tabs { right: 100%; align-items: flex-end; }
    .dropzone[data-side="right"] .side-tabs { left: 100%; align-items: flex-start; }

    /* 탭 공통: 모든 탭에 곡률 적용 */
    .tab-idx { width: 12px; height: 18px; position: relative; transition: all 0.2s; }
    .dropzone[data-side="left"] .tab-idx { border-radius: 6px 0 0 6px; }
    .dropzone[data-side="right"] .tab-idx { border-radius: 0 6px 6px 0; }

    /* 하얀 탭: 곡선은 유지하되 카드 뒤로 밀어넣어 자투리 가림 */
    .tab-white { 
      background: #fff; 
      width: 16px !important; 
      z-index: 1; /* 카드보다 아래 */
      border: 1px solid rgba(0,0,0,0.05);
    }
    .dropzone[data-side="left"] .tab-white { margin-right: -10px; border-right: none; }
    .dropzone[data-side="right"] .tab-white { margin-left: -10px; border-left: none; }

    /* 가지 탭 색상 */
    .tab-blue { background: #d0ebff; } .tab-yellow { background: #fff9db; } .tab-green { background: #d3f9d8; } .tab-pink { background: #ffdeeb; }

    /* 메모 박스 */
    .card { 
      background: #fff; width: 100%; min-height: 60px; border-radius: 10px; padding: 10px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.08); border: 1px solid rgba(0,0,0,0.02); 
      position: relative; z-index: 11; pointer-events: none; /* 래퍼가 클릭을 대신 받음 */
    }
    .card-month { font-size: 8px; font-weight: 900; color: var(--primary); margin-bottom: 3px; }
    .card-content { font-size: 10.5px; line-height: 1.4; font-weight: 700; color: #444; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }

    /* 모달 및 기타 (이전 기능 유지) */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 2000; justify-content: center; align-items: flex-end; backdrop-filter: blur(5px); }
    #viewModal .modal-content { background: white; width: 100%; max-width: 450px; padding: 25px 20px; border-radius: 20px 20px 0 0; max-height: 85vh; overflow-y: visible; box-shadow: 0 -5px 25px rgba(0,0,0,0.1); position: relative; z-index: 2200; }
    .view-tab-menu { position: absolute; top: -32px; left: 20px; display: flex; gap: 5px; z-index: 2100; }
    .v-tab { padding: 8px 14px; border-radius: 12px 12px 0 0; font-size: 12px; font-weight: 800; border: none; transition: all 0.2s; cursor: pointer; box-shadow: 0 -2px 5px rgba(0,0,0,0.05); }
    .v-tab.tab-blue { background: #d0ebff; color: #4dabf7; } .v-tab.tab-yellow { background: #fff9db; color: #fab005; } .v-tab.tab-green { background: #d3f9d8; color: #40c057; } .v-tab.tab-pink { background: #ffdeeb; color: #f06595; }
    .v-tab:first-child:not([class*="tab-"]) { background: #e9ecef; color: #868e96; }
    .v-tab.active { background: white !important; z-index: 2300; margin-top: -3px; padding-top: 11px; box-shadow: 0 -3px 10px rgba(0,0,0,0.05); }
    .btn-pill { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 800; font-size: 14px; width: 100%; outline: none; }
    .btn-ghost { background: #f1f3f5; color: #495057; border: none; padding: 10px; border-radius: 10px; font-weight: 700; font-size: 12px; width: 100%; outline: none; }
    input, select, textarea { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #eee; background: #f8f9fa; font-size: 14px; margin-bottom: 8px; outline: none; }
    .nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; }
    .nav-btn { border: none; background: none; font-size: 10px; font-weight: 800; color: #adb5bd; }
    .add-btn-main { width: 48px; height: 48px; background: var(--primary); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 25px; border: 3px solid white; box-shadow: 0 4px 12px rgba(77,171,247,0.3); }
  </style>
</head>
<body>

<div id="confirmModal" class="modal"><div class="modal-content" style="text-align:center;"><h4 id="confirmTitle" style="margin:0 0 10px 0;">알림</h4><p id="confirmMsg" style="font-size:13px; color:#666; margin-bottom:20px; line-height:1.5;"></p><div style="display:flex; gap:8px;"><button class="btn-pill" id="confirmOkBtn">확인</button><button class="btn-ghost" id="confirmCancelBtn">취소</button></div></div></div>
<div id="inputModal" class="modal"><div class="modal-content"><h4 id="inputTitle" style="margin:0 0 15px 0; text-align:center;">입력</h4><textarea id="customInput" rows="4" placeholder="내용을 입력하세요"></textarea><div style="display:flex; gap:10px;"><button class="btn-pill" id="inputConfirmBtn">확인</button><button class="btn-ghost" onclick="window.closeModal('inputModal')">취소</button></div></div></div>
<div id="viewModal" class="modal"><div class="modal-content"><div class="view-tab-menu" id="viewTabMenu"></div><div class="view-body"><div id="viewMonth"></div><div id="viewText"></div></div><div style="display:flex; gap:8px; margin-bottom:8px;"><button class="btn-pill" style="flex:1.5;" onclick="window.handleTabEdit()">편집</button><button class="btn-ghost" style="flex:1;" onclick="window.showBranchInput()">+ 가지</button></div><button class="btn-ghost" onclick="window.closeModal('viewModal')">닫기</button></div></div>
<div id="editModal" class="modal"><div class="modal-content"><h4 style="text-align:center; margin:0 0 15px 0;">기록 편집</h4><div style="display:flex; gap:6px;"><select id="eraType" style="flex:1.5;"></select><input type="number" id="eYear" style="flex:1;" placeholder="연도"><select id="eMonth" style="flex:1;"><script>for(let i=1;i<=12;i++)document.write(`<option value="${i}">${i}월</option>`)</script></select></div><div id="charTagSelector" style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:12px;"></div><textarea id="eContent" rows="5" placeholder="내용을 입력하세요"></textarea><button class="btn-pill" onclick="window.saveScene()">저장</button><button class="btn-ghost" style="margin-top:8px; color:var(--danger);" id="delBtn">삭제</button><button class="btn-ghost" style="margin-top:8px;" onclick="window.closeModal('editModal')">취소</button></div></div>
<div class="header-container">
  <div class="header"><div class="project-title" id="projectTitle">STORY MASTER</div><button class="btn-pill" style="width:auto; padding:5px 12px; font-size:11px;" onclick="window.saveToCloud()">클라우드 저장</button></div>
  <div class="search-bar" id="searchBar"></div>
</div>
<div class="timeline-container" id="timeline"></div>
<div class="nav">
  <button class="nav-btn" onclick="window.openLoadModal()">목록</button>
  <button class="nav-btn" onclick="window.openEraModal()">시대</button>
  <div class="add-btn-main" onclick="window.addScene()">+</div>
  <button class="nav-btn" onclick="window.openCharModal()">캐릭터</button>
  <button class="nav-btn" onclick="location.reload()">갱신</button>
</div>

<script>
  /* [핵심 로직] Firebase 및 클릭 이벤트 통합 */
  const config = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", authDomain: "true-s.firebaseapp.com", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
  if (!firebase.apps.length) firebase.initializeApp(config);
  const db = firebase.database();

  let storyboard = [], eras = ["공통"], chars = [], charDetails = {}, currentProject = null, editingId = null;
  const pastelTabs = ["tab-blue", "tab-yellow", "tab-green", "tab-pink"];
  let selectedChars = [], selectedFilter = null, tempCharImg = "", currentViewTab = 0;

  window.closeModal = (id) => { document.getElementById(id).style.display = 'none'; };
  window.openModal = (id) => { document.getElementById(id).style.display = 'flex'; };

  // 상세 보기 및 탭 렌더링
  window.openViewer = (id) => { 
    editingId = id; 
    const s = storyboard.find(x => x.id == id); 
    if(!s) return; 
    currentViewTab = 0; 
    window.renderTabs(s); 
    window.openModal('viewModal'); 
  };
  
  window.renderTabs = (s) => {
    const menu = document.getElementById('viewTabMenu');
    let tabs = [`<div class="v-tab ${currentViewTab===0?'active':''}" onclick="window.switchTab(0)">사건</div>`];
    (s.branches || []).forEach((_, i) => {
      const colorClass = pastelTabs[i] || 'tab-blue';
      tabs.push(`<div class="v-tab ${colorClass} ${currentViewTab===(i+1)?'active':''}" onclick="window.switchTab(${i+1})">가지 ${i+1}</div>`);
    });
    menu.innerHTML = tabs.join('');
    document.getElementById('viewMonth').innerText = `${s.era} ${s.year}년 ${s.month}월`;
    document.getElementById('viewText').innerText = currentViewTab === 0 ? s.text : s.branches[currentViewTab-1];
  };

  window.switchTab = (idx) => { currentViewTab = idx; window.renderTabs(storyboard.find(x => x.id == editingId)); };

  /* [수정] 터치 이벤트 통합: 어디를 눌러도 상세보기 */
  let dragItem = null, startX, startY, currentTarget = null, dragId = null, isMoving = false;
  document.addEventListener('touchstart', (e) => {
    const wrap = e.target.closest('.card-wrapper');
    if(!wrap) return;
    
    const touch = e.touches[0];
    startX = touch.clientX; startY = touch.clientY; dragId = wrap.dataset.id; isMoving = false;

    const move = (me) => {
      const mt = me.touches[0];
      if(!isMoving && (Math.abs(mt.clientX - startX) > 10 || Math.abs(mt.clientY - startY) > 10)) {
        isMoving = true;
        dragItem = wrap.cloneNode(true);
        dragItem.className = 'card-wrapper drag-clone';
        dragItem.style.position = 'fixed'; dragItem.style.zIndex = '5000'; dragItem.style.width = '105px'; dragItem.style.pointerEvents = 'none'; dragItem.style.opacity = '0.7';
        document.body.appendChild(dragItem);
      }
      if(isMoving && dragItem) {
        me.preventDefault();
        dragItem.style.left = (mt.clientX - 50) + 'px';
        dragItem.style.top = (mt.clientY - 40) + 'px';
        const zone = document.elementFromPoint(mt.clientX, mt.clientY)?.closest('.dropzone');
        if(currentTarget !== zone) { if(currentTarget) currentTarget.style.background = ''; currentTarget = zone; if(currentTarget) currentTarget.style.background = 'rgba(77,171,247,0.1)'; }
      }
    };

    const end = () => {
      // [수정] 이동하지 않고 뗐을 때 무조건 상세보기 실행
      if(!isMoving && dragId) {
        window.openViewer(dragId);
      } else if(isMoving && currentTarget && dragId) {
        const idx = storyboard.findIndex(s => s.id == dragId);
        const p = currentTarget.dataset.gkey.split(' ');
        storyboard[idx].year = parseInt(p.pop());
        storyboard[idx].era = p.join(' ');
        storyboard[idx].month = parseInt(currentTarget.dataset.month);
        storyboard[idx].side = currentTarget.dataset.side;
        window.sync();
      }
      if(dragItem) dragItem.remove();
      if(currentTarget) currentTarget.style.background = '';
      document.removeEventListener('touchmove', move);
      document.removeEventListener('touchend', end);
      dragId = null;
    };

    document.addEventListener('touchmove', move, { passive: false });
    document.addEventListener('touchend', end);
  }, { passive: true });

  /* 이하 렌더링 및 클라우드 로직 (이전 버전과 동일) */
  window.render = () => {
    const container = document.getElementById('timeline');
    if(!currentProject) return;
    container.innerHTML = '<div class="center-line"></div>';
    let filtered = selectedFilter ? storyboard.filter(s => (s.chars||[]).includes(selectedFilter)) : storyboard;
    eras.forEach(eName => {
        const eraData = filtered.filter(s => s.era === eName).sort((a,b) => (a.year - b.year) || (a.month - b.month));
        const groups = {};
        eraData.forEach(sc => {
            const k = `${eName} ${sc.year}년`;
            if(!groups[k]) groups[k] = {}; if(!groups[k][sc.month]) groups[k][sc.month] = {left:[], right:[]};
            groups[k][sc.month][sc.side||'left'].push(sc);
        });
        Object.keys(groups).forEach(key => {
            container.innerHTML += `<div class="year-marker">${key}</div>`;
            Object.keys(groups[key]).sort((a,b)=>a-b).forEach(m => {
                const row = document.createElement('div'); row.className = 'row';
                row.innerHTML = `<div class="dropzone" data-gkey="${key}" data-month="${m}" data-side="left"></div><div class="node"></div><div class="dropzone" data-gkey="${key}" data-month="${m}" data-side="right"></div>`;
                container.appendChild(row);
                ['left','right'].forEach(side => {
                    const zone = row.querySelector(`.dropzone[data-side="${side}"]`);
                    groups[key][m][side].forEach(sc => {
                        const wrap = document.createElement('div'); wrap.className = 'card-wrapper';
                        wrap.dataset.id = sc.id;
                        let tabsHtml = `<div class="tab-idx tab-white"></div>`;
                        if(sc.branches) sc.branches.forEach((_,i) => tabsHtml += `<div class="tab-idx ${pastelTabs[i]||'tab-blue'}"></div>`);
                        wrap.innerHTML = `<div class="side-tabs">${tabsHtml}</div><div class="card"><div class="card-month">${m}월</div><div class="card-content">${sc.text}</div></div>`;
                        zone.appendChild(wrap);
                    });
                });
            });
        });
    });
    window.updateSearchBar();
  };

  window.sync = () => { if(currentProject) db.ref('projects/'+currentProject).set({ data: storyboard, eras, chars, charDetails }).then(window.render); };
  window.loadP = (k) => { currentProject = k; localStorage.setItem('lastProject', k); document.getElementById('projectTitle').innerText = k; db.ref('projects/'+k).on('value', s => { const d = s.val(); if(d){ storyboard=d.data||[]; eras=d.eras||["공통"]; chars=d.chars||[]; charDetails=d.charDetails||{}; window.render(); } }); window.closeModal('loadModal'); };
  window.addScene = () => { if(!currentProject) return; window.openEdit(null); };
  window.onload = () => { const last = localStorage.getItem('lastProject'); if(last) window.loadP(last); else window.openLoadModal(); };
  // ... (나머지 헬퍼 함수들은 기존 코드 유지)
</script>
</body>
</html>
