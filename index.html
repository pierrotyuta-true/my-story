<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>스토리마스터 Pro</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    :root { --primary: #4dabf7; --bg: #f8f9fa; --card-bg: #ffffff; --line: #dee2e6; --text: #212529; --gray: #868e96; }
    body { font-family: 'Pretendard', -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 90px; -webkit-user-select: none; user-select: none; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    /* 헤더 */
    .header-container { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .header { height: 60px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
    .project-title { font-size: 18px; font-weight: 900; color: var(--primary); letter-spacing: -0.5px; }
    .search-bar { display: flex; gap: 8px; overflow-x: auto; padding: 10px 20px; scrollbar-width: none; }
    .filter-tag { padding: 7px 15px; border-radius: 20px; background: #fff; border: 1px solid #eee; font-size: 12px; font-weight: 700; white-space: nowrap; cursor: pointer; color: #868e96; transition: 0.2s; }
    .filter-tag.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 10px rgba(77,171,247,0.3); }

    /* 타임라인 레이아웃 */
    .timeline-container { position: relative; width: 100%; max-width: 500px; margin: 120px auto 0; min-height: 100vh; }
    .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--line); transform: translateX(-50%); }
    .year-marker { position: relative; width: fit-content; margin: 40px auto 25px; padding: 8px 18px; background: #343a40; color: white; border-radius: 25px; font-size: 11px; font-weight: 800; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    
    .row { display: grid; grid-template-columns: 1fr 1fr; position: relative; margin-bottom: 30px; min-height: 90px; }
    .node { width: 12px; height: 12px; background: white; border: 3px solid var(--primary); border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); top: 35px; z-index: 5; }
    
    .dropzone { display: flex; flex-direction: column; gap: 20px; padding: 0 5px; min-height: 90px; transition: background 0.3s; }
    .dropzone[data-side="left"] { align-items: flex-end; padding-right: 30px; }
    .dropzone[data-side="right"] { align-items: flex-start; padding-left: 30px; }

    /* 카드 & 측면 인덱스 탭 */
    .card-wrapper { position: relative; width: 110px; z-index: 10; transition: transform 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
    
    .side-tabs { position: absolute; top: 8px; display: flex; flex-direction: column; gap: 2px; }
    /* 왼쪽 박스: 탭이 왼쪽에 붙음 */
    .dropzone[data-side="left"] .side-tabs { right: 100%; align-items: flex-end; }
    /* 오른쪽 박스: 탭이 오른쪽에 붙음 */
    .dropzone[data-side="right"] .side-tabs { left: 100%; align-items: flex-start; }
    
    .tab-idx { width: 8px; height: 18px; border: 1px solid rgba(0,0,0,0.05); }
    .dropzone[data-side="left"] .tab-idx { border-radius: 4px 0 0 4px; }
    .dropzone[data-side="right"] .tab-idx { border-radius: 0 4px 4px 0; }

    .tab-white { background: #fff; } .tab-blue { background: #d0ebff; } .tab-yellow { background: #fff9db; } 
    .tab-green { background: #d3f9d8; } .tab-orange { background: #ffe8cc; } .tab-pink { background: #ffdeeb; }

    .card { background: #fff; width: 100%; min-height: 70px; border-radius: 12px; padding: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.03); cursor: pointer; position: relative; pointer-events: none; }
    .card-month { font-size: 9px; font-weight: 900; color: var(--primary); margin-bottom: 5px; opacity: 0.7; }
    .card-content { font-size: 11px; line-height: 1.5; font-weight: 700; color: #333; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

    /* 상세 창 및 탭 (디자인 세련되게) */
    .view-tab-menu { display: flex; align-items: flex-end; gap: 5px; margin-bottom: -1px; padding: 0 5px; }
    .v-tab { 
      padding: 8px 14px; border-radius: 10px 10px 0 0; font-size: 12px; font-weight: 800; border: 1px solid #eee; border-bottom: none;
      transition: all 0.2s; cursor: pointer; height: 34px; display: flex; align-items: center; color: transparent; background: #eee;
    }
    .v-tab.active { height: 44px; background: white !important; color: #333 !important; border-color: #ddd; z-index: 2; }
    .v-tab:first-child { color: #868e96; }

    .view-body { border: 1px solid #ddd; border-radius: 0 15px 15px 15px; padding: 25px; background: white; position: relative; z-index: 1; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

    /* 모달 공통 */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: flex-end; backdrop-filter: blur(8px); }
    .modal-content { background: white; width: 100%; max-width: 500px; padding: 30px 25px; border-radius: 30px 30px 0 0; max-height: 90vh; overflow-y: auto; animation: slideUp 0.3s cubic-bezier(0, 0, 0.2, 1); }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    
    .btn-pill { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 18px; font-weight: 800; font-size: 15px; width: 100%; transition: 0.2s; }
    .btn-pill:active { transform: scale(0.98); opacity: 0.9; }
    .btn-ghost { background: #f1f3f5; color: #495057; border: none; padding: 12px; border-radius: 15px; font-weight: 700; font-size: 13px; }
    .btn-danger { background: #fff0f0; color: #ff6b6b; border: none; padding: 12px; border-radius: 15px; font-weight: 700; font-size: 13px; }

    input, select, textarea { width: 100%; padding: 14px; border-radius: 15px; border: 1px solid #eee; background: #f8f9fa; font-size: 15px; outline: none; font-family: inherit; margin-bottom: 10px; }
    input:focus, textarea:focus { border-color: var(--primary); background: #fff; }

    /* 네비게이션 */
    .nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: rgba(255,255,255,0.95); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
    .nav-btn { border: none; background: none; font-size: 11px; font-weight: 800; color: #adb5bd; display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .add-btn-main { width: 55px; height: 55px; background: var(--primary); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 8px 20px rgba(77,171,247,0.4); border: 4px solid white; margin-bottom: 30px; transition: 0.2s; }
    
    #toast { visibility: hidden; min-width: 150px; background: #333; color: #fff; text-align: center; border-radius: 12px; padding: 15px; position: fixed; z-index: 5000; left: 50%; bottom: 110px; transform: translateX(-50%); opacity: 0; transition: 0.3s; font-weight: 700; }
    #toast.show { visibility: visible; opacity: 1; }
  </style>
</head>
<body>

<div id="toast">성공적으로 저장되었습니다</div>

<div id="viewModal" class="modal"><div class="modal-content">
    <div class="view-tab-menu" id="viewTabMenu"></div>
    <div class="view-body">
      <div id="viewMonth" style="font-size:12px; font-weight:900; color:var(--primary); margin-bottom:12px; letter-spacing: 1px;"></div>
      <div id="viewContentArea" style="min-height:140px;">
        <div id="viewText" style="font-size:15px; line-height:1.7; color:#333; white-space:pre-wrap; font-weight:700;"></div>
      </div>
    </div>
    <div style="display:flex; gap:12px; margin-top:25px;">
        <button class="btn-pill" style="flex:1.5;" onclick="window.handleTabEdit()">편집하기</button>
        <button id="addBranchBtn" class="btn-ghost" style="flex:1;" onclick="window.addBranchUI()">+ 가지 추가</button>
    </div>
    <button class="btn-ghost" style="width:100%; margin-top:10px;" onclick="window.closeModal('viewModal')">닫기</button>
</div></div>

<div id="eraModal" class="modal"><div class="modal-content">
  <h3 style="text-align:center; margin-bottom:20px;">시대 순서 관리</h3>
  <div id="eraListGrid"></div>
  <button class="btn-pill" style="margin-top:15px;" onclick="window.promptNewEra()">+ 시대 추가</button>
  <button class="btn-ghost" style="width:100%; margin-top:10px;" onclick="window.closeModal('eraModal')">닫기</button>
</div></div>

<div id="charEditModal" class="modal"><div class="modal-content">
  <h3 style="margin:0 0 25px 0; text-align:center; font-weight:900;">캐릭터 프로필</h3>
  <div style="display:flex; justify-content:center; margin-bottom:25px;">
    <div onclick="document.getElementById('charImgInput').click()" style="position:relative; cursor:pointer;">
      <div id="charPrevWrap">
        <img id="charPrevImg" src="" style="width:100px; height:100px; border-radius:25px; object-fit:cover; border:4px solid var(--primary); display:none;">
        <div id="charEmptySym" style="width:100px; height:100px; border-radius:25px; border:4px solid var(--primary); background:#f1f3f5; display:flex; align-items:center; justify-content:center; font-size:35px; color:#adb5bd;">👤</div>
      </div>
      <div style="position:absolute; bottom:-5px; right:-5px; background:var(--primary); width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; border:3px solid white; font-size:18px;">+</div>
    </div>
    <input type="file" id="charImgInput" hidden accept="image/*" onchange="window.handleCharImg(event)">
  </div>
  <input type="text" id="cName" placeholder="이름을 입력하세요">
  <input type="text" id="cAge" placeholder="나이/생일">
  <input type="text" id="cLook" placeholder="외형 및 특징">
  <textarea id="cNote" rows="3" placeholder="기타 상세 설정"></textarea>
  <button class="btn-pill" onclick="window.saveCharInfo()">캐릭터 저장</button>
  <button class="btn-ghost" style="width:100%; margin-top:10px;" onclick="window.closeModal('charEditModal')">취소</button>
</div></div>

<div id="editModal" class="modal"><div class="modal-content">
    <h3 style="margin:0 0 20px 0; text-align:center; font-weight:900;">사건 기록 편집</h3>
    <div style="display:flex; gap:10px; margin-bottom:5px;">
        <select id="eraType" style="flex:1.5;"></select>
        <input type="number" id="eYear" style="flex:1;" placeholder="연도">
        <select id="eMonth" style="flex:1;"><script>for(let i=1;i<=12;i++)document.write(`<option value="${i}">${i}월</option>`)</script></select>
    </div>
    <div id="charTagSelector" style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:20px; max-height:100px; overflow-y:auto; padding:5px;"></div>
    <textarea id="eContent" rows="6" placeholder="기록할 내용을 입력하세요..." style="font-weight:600;"></textarea>
    <button class="btn-pill" style="margin-top:10px;" onclick="window.saveScene()">기록 저장하기</button>
    <button class="btn-danger" style="width:100%; margin-top:10px;" onclick="window.confirmDeleteScene()">기록 삭제</button>
    <button class="btn-ghost" style="width:100%; margin-top:10px;" onclick="window.closeModal('editModal')">닫기</button>
</div></div>

<div id="charModal" class="modal"><div class="modal-content"><h3>캐릭터 도감</h3><div id="charListGrid"></div><button class="btn-pill" style="margin-top:15px;" onclick="window.openCharAdd()">+ 새 캐릭터 추가</button><button class="btn-ghost" style="width:100%; margin-top:10px;" onclick="window.closeModal('charModal')">닫기</button></div></div>
<div id="loadModal" class="modal"><div class="modal-content"><h3>나의 연력표</h3><div id="projectList"></div><button class="btn-pill" style="margin-top:15px;" onclick="window.promptNewProject()">+ 새 프로젝트</button><button class="btn-ghost" style="width:100%; margin-top:10px;" onclick="window.closeModal('loadModal')">닫기</button></div></div>

<div class="header-container">
  <div class="header">
    <div class="project-title" id="projectTitle">STORY MASTER</div>
    <button class="btn-pill" style="width:auto; padding:8px 18px; font-size:13px;" onclick="window.saveToCloud()">클라우드 저장</button>
  </div>
  <div class="search-bar" id="searchBar"></div>
</div>

<div class="timeline-container" id="timeline"></div>

<div class="nav">
  <button class="nav-btn" onclick="window.openLoadModal()">목록</button>
  <button class="nav-btn" onclick="window.openEraModal()">시대</button>
  <div class="add-btn-main" onclick="window.addScene()">+</div>
  <button class="nav-btn" onclick="window.openCharModal()">캐릭터</button>
  <button class="nav-btn" onclick="location.reload()">갱신</button>
</div>

<script>
  const config = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", authDomain: "true-s.firebaseapp.com", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
  if (!firebase.apps.length) firebase.initializeApp(config);
  const db = firebase.database();

  let storyboard = [], eras = ["공통"], chars = [], charDetails = {}, currentProject = null, editingId = null;
  const pastelTabs = ["tab-blue", "tab-yellow", "tab-green", "tab-orange", "tab-pink"];
  let selectedChars = [], selectedFilter = null, tempCharImg = "", currentViewTab = 0;

  window.closeModal = (id) => document.getElementById(id).style.display = 'none';
  window.openModal = (id) => document.getElementById(id).style.display = 'flex';

  window.render = () => {
    const container = document.getElementById('timeline');
    if(!currentProject) return;
    container.innerHTML = '<div class="center-line"></div>';
    let filtered = selectedFilter ? storyboard.filter(s => (s.chars||[]).includes(selectedFilter)) : storyboard;
    
    eras.forEach(eName => {
        const eraData = filtered.filter(s => s.era === eName).sort((a,b) => (a.year - b.year) || (a.month - b.month));
        const groups = {};
        eraData.forEach(s => {
            const k = `${eName} ${s.year}년`;
            if(!groups[k]) groups[k] = {}; if(!groups[k][s.month]) groups[k][s.month] = {left:[], right:[]};
            groups[k][s.month][s.side||'left'].push(s);
        });

        Object.keys(groups).forEach(key => {
            container.innerHTML += `<div class="year-marker">${key}</div>`;
            Object.keys(groups[key]).sort((a,b)=>a-b).forEach(m => {
                const row = document.createElement('div'); row.className = 'row';
                row.innerHTML = `<div class="dropzone" data-gkey="${key}" data-month="${m}" data-side="left"></div><div class="node"></div><div class="dropzone" data-gkey="${key}" data-month="${m}" data-side="right"></div>`;
                container.appendChild(row);
                ['left','right'].forEach(side => {
                    const zone = row.querySelector(`.dropzone[data-side="${side}"]`);
                    groups[key][m][side].forEach(sc => {
                        const wrap = document.createElement('div'); wrap.className = 'card-wrapper';
                        wrap.dataset.id = sc.id;
                        let tabsHtml = `<div class="tab-idx tab-white"></div>`;
                        if(sc.branches) sc.branches.forEach((_,i) => tabsHtml += `<div class="tab-idx ${pastelTabs[i]}"></div>`);
                        wrap.innerHTML = `<div class="side-tabs">${tabsHtml}</div><div class="card"><div class="card-month">${m}월</div><div class="card-content">${sc.text}</div></div>`;
                        zone.appendChild(wrap);
                    });
                });
            });
        });
    });
    window.updateSearchBar();
  };

  window.openViewer = (id) => { editingId = id; const s = storyboard.find(x => x.id == id); if(!s) return; currentViewTab = 0; window.renderTabs(s); window.openModal('viewModal'); };
  window.renderTabs = (s) => {
    const menu = document.getElementById('viewTabMenu');
    let tabs = [`<div class="v-tab tab-white ${currentViewTab===0?'active':''}" onclick="window.switchTab(0)">사건</div>`];
    (s.branches || []).forEach((_, i) => tabs.push(`<div class="v-tab ${pastelTabs[i]} ${currentViewTab===(i+1)?'active':''}" onclick="window.switchTab(${i+1})">탭 ${i+1}</div>`));
    menu.innerHTML = tabs.join('');
    document.getElementById('viewMonth').innerText = `${s.era} ${s.year}년 ${s.month}월`;
    document.getElementById('viewText').innerText = currentViewTab === 0 ? s.text : s.branches[currentViewTab-1];
    document.getElementById('addBranchBtn').style.display = (s.branches||[]).length < 5 ? 'block' : 'none';
  };
  window.switchTab = (idx) => { currentViewTab = idx; window.renderTabs(storyboard.find(x => x.id == editingId)); };

  // 캐릭터 추가 기능 수정 (중요!)
  window.openCharAdd = () => { 
    tempCharImg = ""; 
    document.getElementById('charPrevImg').style.display = "none";
    document.getElementById('charEmptySym').style.display = "flex";
    document.getElementById('cName').value = ""; document.getElementById('cAge').value = ""; document.getElementById('cLook').value = ""; document.getElementById('cNote').value = ""; 
    window.openModal('charEditModal'); 
  };
  window.handleCharImg = (e) => { const file = e.target.files[0]; if(file) { const reader = new FileReader(); reader.onload = (re) => { tempCharImg = re.target.result; document.getElementById('charPrevImg').src = tempCharImg; document.getElementById('charPrevImg').style.display = "block"; document.getElementById('charEmptySym').style.display = "none"; }; reader.readAsDataURL(file); } };
  window.saveCharInfo = () => {
    const name = document.getElementById('cName').value.trim();
    if(!name) { alert("이름을 입력해주세요."); return; }
    if(!charDetails) charDetails = {};
    charDetails[name] = { img: tempCharImg, age: document.getElementById('cAge').value, look: document.getElementById('cLook').value, note: document.getElementById('cNote').value };
    if(!chars.includes(name)) chars.push(name);
    window.sync(); 
    window.closeModal('charEditModal'); 
    setTimeout(window.openCharModal, 150); 
  };
  window.openCharModal = () => {
    const grid = document.getElementById('charListGrid');
    grid.innerHTML = chars.map(c => {
      const d = charDetails[c] || {};
      const imgHtml = d.img ? `<img src="${d.img}" style="width:55px; height:55px; border-radius:15px; object-fit:cover;">` : `<div style="width:55px; height:55px; border-radius:15px; background:#e9ecef; display:flex; align-items:center; justify-content:center; font-size:20px;">👤</div>`;
      return `<div style="display:flex; align-items:center; gap:12px; background:#f8f9fa; padding:12px; border-radius:18px; margin-bottom:10px;">${imgHtml}<div style="flex:1;"><div style="font-weight:800; font-size:15px;">${c}</div><div style="font-size:12px; color:#868e96;">${d.age||''}</div></div><button class="btn-ghost" onclick="window.editCharExist('${c}')">편집</button></div>`;
    }).join('');
    window.openModal('charModal');
  };
  window.editCharExist = (name) => {
    const d = charDetails[name];
    document.getElementById('cName').value = name;
    document.getElementById('cAge').value = d.age || "";
    document.getElementById('cLook').value = d.look || "";
    document.getElementById('cNote').value = d.note || "";
    tempCharImg = d.img || "";
    if(tempCharImg) { document.getElementById('charPrevImg').src = tempCharImg; document.getElementById('charPrevImg').style.display = "block"; document.getElementById('charEmptySym').style.display = "none"; }
    else { document.getElementById('charPrevImg').style.display = "none"; document.getElementById('charEmptySym').style.display = "flex"; }
    window.closeModal('charModal');
    window.openModal('charEditModal');
  };

  // 드래그 앤 드롭 유지
  let dragItem = null, startX, startY, currentTarget = null, dragId = null, isMoving = false;
  document.addEventListener('touchstart', (e) => {
    const wrap = e.target.closest('.card-wrapper'); if(!wrap) return;
    const touch = e.touches[0]; startX = touch.clientX; startY = touch.clientY;
    dragId = wrap.dataset.id; isMoving = false;
    const move = (me) => {
      const mt = me.touches[0];
      if(!isMoving && (Math.abs(mt.clientX - startX) > 10 || Math.abs(mt.clientY - startY) > 10)) {
        isMoving = true; wrap.style.transform = 'scale(1.1)'; wrap.style.opacity = '0.5';
        dragItem = wrap.cloneNode(true); dragItem.style.position = 'fixed'; dragItem.style.zIndex = '5000'; dragItem.style.width = '110px'; dragItem.style.pointerEvents = 'none';
        dragItem.style.boxShadow = '0 20px 50px rgba(0,0,0,0.3)'; dragItem.style.transform = 'scale(1.1)'; document.body.appendChild(dragItem);
      }
      if(isMoving && dragItem) {
        dragItem.style.left = (mt.clientX - 55) + 'px'; dragItem.style.top = (mt.clientY - 45) + 'px';
        const zone = document.elementFromPoint(mt.clientX, mt.clientY)?.closest('.dropzone');
        if(currentTarget !== zone) { if(currentTarget) currentTarget.style.background = ''; currentTarget = zone; if(currentTarget) currentTarget.style.background = 'rgba(77,171,247,0.1)'; }
      }
    };
    const end = () => {
      if(!isMoving) window.openViewer(dragId);
      else if(currentTarget && dragId) {
        const idx = storyboard.findIndex(s => s.id == dragId);
        if(idx !== -1) {
          const p = currentTarget.dataset.gkey.split(' ');
          storyboard[idx].year = parseInt(p.pop()); storyboard[idx].era = p.join(' ');
          storyboard[idx].month = parseInt(currentTarget.dataset.month); storyboard[idx].side = currentTarget.dataset.side;
          window.sync();
        }
      }
      if(dragItem) dragItem.remove(); wrap.style.transform = ''; wrap.style.opacity = '1'; if(currentTarget) currentTarget.style.background = '';
      document.removeEventListener('touchmove', move); document.removeEventListener('touchend', end);
    };
    document.addEventListener('touchmove', move, { passive: false }); document.addEventListener('touchend', end);
  }, { passive: true });

  // 기본 공통 로직
  window.sync = () => { if(currentProject) db.ref('projects/'+currentProject).set({ data: storyboard, eras, chars, charDetails }).then(window.render); };
  window.saveToCloud = () => { if(currentProject) db.ref('projects/'+currentProject).set({ data: storyboard, eras, chars, charDetails }).then(() => { const t = document.getElementById('toast'); t.className = 'show'; setTimeout(() => t.className = '', 2000); }); };
  window.loadP = (k) => { currentProject = k; localStorage.setItem('lastProject', k); document.getElementById('projectTitle').innerText = k; db.ref('projects/'+k).on('value', s => { const d = s.val(); if(d){ storyboard=d.data||[]; eras=d.eras||["공통"]; chars=d.chars||[]; charDetails=d.charDetails||{}; window.render(); } }); window.closeModal('loadModal'); };
  window.openEdit = (id) => { editingId = id; const s = storyboard.find(x => x.id == id); document.getElementById('eContent').value = s ? s.text : ""; document.getElementById('eYear').value = s ? s.year : "1000"; document.getElementById('eMonth').value = s ? s.month : "1"; document.getElementById('eraType').innerHTML = eras.map(e => `<option value="${e}">${e}</option>`).join(''); if(s) { document.getElementById('eraType').value = s.era; selectedChars = s.chars || []; } else { selectedChars = []; } window.updateCharUI(); window.openModal('editModal'); };
  window.updateCharUI = () => { document.getElementById('charTagSelector').innerHTML = chars.map(c => `<div class="filter-tag ${selectedChars.includes(c)?'active':''}" onclick="window.toggleChar('${c}')">${c}</div>`).join(''); };
  window.toggleChar = (c) => { if(selectedChars.includes(c)) selectedChars = selectedChars.filter(x=>x!==c); else selectedChars.push(c); window.updateCharUI(); };
  window.saveScene = () => { const text = document.getElementById('eContent').value.trim(); if(!text) return; const year = parseInt(document.getElementById('eYear').value), month = parseInt(document.getElementById('eMonth').value), era = document.getElementById('eraType').value; if(editingId) storyboard = storyboard.map(s => s.id == editingId ? {...s, text, year, month, era, chars: selectedChars} : s); else storyboard.push({ id: Date.now().toString(), era, year, month, text, chars: selectedChars, side: 'left', branches: [] }); window.sync(); window.closeModal('editModal'); };
  window.confirmDeleteScene = () => { if(confirm('삭제할까요?')) { storyboard = storyboard.filter(s => s.id != editingId); window.sync(); window.closeModal('editModal'); } };
  window.updateSearchBar = () => { document.getElementById('searchBar').innerHTML = `<div class="filter-tag ${selectedFilter===null?'active':''}" onclick="window.filterByChar(null)">전체</div>` + chars.map(c => `<div class="filter-tag ${selectedFilter===c?'active':''}" onclick="window.filterByChar('${c}')">${c}</div>`).join(''); };
  window.filterByChar = (name) => { selectedFilter = name; window.render(); };
  window.addScene = () => { if(!currentProject) return; window.openEdit(null); };
  window.openEraModal = () => { const grid = document.getElementById('eraListGrid'); grid.innerHTML = eras.map((e, i) => `<div style="display:flex; justify-content:space-between; align-items:center; background:#f8f9fa; padding:15px; border-radius:18px; margin-bottom:10px;"><b>${e}</b><div style="display:flex; gap:5px;"><button class="btn-ghost" style="padding:5px 10px;" onclick="window.moveEra(${i}, -1)">▲</button><button class="btn-ghost" style="padding:5px 10px;" onclick="window.moveEra(${i}, 1)">▼</button><button class="btn-danger" style="padding:5px 10px;" onclick="window.confirmDelEra('${e}')">×</button></div></div>`).join(''); window.openModal('eraModal'); };
  window.moveEra = (idx, dir) => { const target = idx + dir; if(target < 0 || target >= eras.length) return; const temp = eras[idx]; eras[idx] = eras[target]; eras[target] = temp; window.sync(); window.openEraModal(); };
  window.promptNewEra = () => { const n = prompt("새 시대 이름"); if(n) { eras.push(n); window.sync(); window.openEraModal(); } };
  window.confirmDelEra = (e) => { if(confirm('시대를 삭제할까요?')) { eras = eras.filter(x => x!==e); window.sync(); window.openEraModal(); } };
  window.openLoadModal = () => { db.ref('projects').once('value').then(s => { const d = s.val(); document.getElementById('projectList').innerHTML = d ? Object.keys(d).map(k => `<div style="display:flex; justify-content:space-between; align-items:center; padding:15px; background:#f8f9fa; border-radius:18px; margin-bottom:10px;"><span style="font-weight:800;">${k}</span><div style="display:flex; gap:8px;"><button class="btn-pill" style="width:auto; padding:8px 15px; font-size:12px;" onclick="window.loadP('${k}')">열기</button></div></div>`).join('') : ''; window.openModal('loadModal'); }); };
  window.promptNewProject = () => { const n = prompt("새 연력표 이름"); if(n) window.loadP(n); };

  window.onload = () => { const last = localStorage.getItem('lastProject'); if(last) window.loadP(last); else window.openLoadModal(); };
</script>
</body>
</html>
