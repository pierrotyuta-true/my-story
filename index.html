<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>스토리마스터 Pro</title>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    :root { --primary: #4dabf7; --bg: #f8f9fa; --line: #dee2e6; }
    body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); touch-action: pan-y; -webkit-user-select: none; user-select: none; padding-bottom: 80px; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    /* 레이아웃 */
    .header { position: fixed; top: 0; width: 100%; background: #fff; z-index: 1000; padding: 0 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; height: 50px; align-items: center; }
    .timeline-container { position: relative; width: 100%; max-width: 800px; margin: 60px auto 0; padding: 0 10px; }
    .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--line); transform: translateX(-50%); z-index: 0; }
    
    /* 카드 및 타임라인 */
    .row { display: grid; grid-template-columns: 1fr 40px 1fr; align-items: center; margin-bottom: 15px; }
    .year-marker { width: fit-content; margin: 20px auto; padding: 5px 15px; background: #495057; color: white; border-radius: 15px; font-size: 11px; font-weight: bold; position: relative; z-index: 10; }
    .card { background: #fff; border-radius: 10px; padding: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 4px solid var(--primary); font-size: 12px; cursor: pointer; position: relative; z-index: 20; }
    .dropzone { min-height: 50px; display: flex; flex-direction: column; gap: 8px; }

    /* 하단 네비게이션 - 중요 */
    .nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #fff; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 5000; }
    .nav-btn { border: none; background: none; font-size: 10px; color: #888; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; height: 100%; justify-content: center; }
    .add-btn { font-size: 35px; color: var(--primary); font-weight: 300; }

    /* 모달 */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9000; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
    .modal-content { background: white; width: 90%; max-width: 320px; padding: 20px; border-radius: 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.2); }
    input, textarea, select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #eee; border-radius: 8px; font-size: 13px; }
    .btn-main { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; }
    
    #toast { visibility: hidden; background: #333; color: #fff; padding: 10px 20px; position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); border-radius: 20px; z-index: 9999; font-size: 12px; }
    #toast.show { visibility: visible; }
  </style>

  <script>
    // 1. Firebase 초기 설정 (최상단 배치)
    var config = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", authDomain: "true-s.firebaseapp.com", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
    if (!firebase.apps.length) { firebase.initializeApp(config); }
    var db = firebase.database();

    var storyboard = [], eras = ["공통"], chars = [], currentProject = null, editingId = null;
    var selectedColor = "#4dabf7", selectedChars = [];

    // 2. 핵심 함수들을 전역(window)에 즉시 할당
    window.openModal = function(id) { document.getElementById(id).style.display = 'flex'; };
    window.closeModal = function(id) { document.getElementById(id).style.display = 'none'; };

    window.openLoadModal = function() {
        db.ref('projects').once('value').then(function(s) {
            var d = s.val();
            var html = '';
            if(d) {
                Object.keys(d).forEach(function(k) {
                    html += '<div style="display:flex; gap:5px; margin-bottom:10px;">' +
                            '<button onclick="loadP(\''+k+'\')" style="flex:1; padding:12px; border:1px solid #eee; border-radius:10px; background:#fff; text-align:left; font-weight:bold;">📁 '+k+'</button>' +
                            '<button onclick="deleteProject(\''+k+'\')" style="padding:10px; color:red; border:none; background:#fff1f1; border-radius:10px;">X</button>' +
                            '</div>';
                });
            }
            document.getElementById('projectList').innerHTML = html || '<p style="text-align:center; color:#ccc;">연력이 없습니다.</p>';
            window.openModal('loadModal');
        });
    };

    window.loadP = function(k) {
        currentProject = k;
        localStorage.setItem('lastProject', k);
        document.getElementById('projectTitle').innerText = k;
        db.ref('projects/' + k).once('value').then(function(s) {
            var d = s.val();
            if(d) {
                storyboard = d.data || [];
                eras = d.eras || ["공통"];
                chars = d.chars || [];
                render();
            }
            window.closeModal('loadModal');
        });
    };

    window.addScene = function() {
        if(!currentProject) { window.openLoadModal(); return; }
        editingId = null;
        document.getElementById('editTitle').innerText = "새 기록";
        document.getElementById('eContent').value = "";
        document.getElementById('eraType').innerHTML = eras.map(e => `<option value="${e}">${e}</option>`).join('');
        window.openModal('editModal');
    };

    window.saveScene = function() {
        var text = document.getElementById('eContent').value.trim();
        if(!text) return;
        var data = {
            id: editingId || Date.now().toString(),
            era: document.getElementById('eraType').value,
            year: parseInt(document.getElementById('eYear').value) || 2024,
            month: parseInt(document.getElementById('eMonth').value) || 1,
            text: text,
            side: 'left'
        };
        if(editingId) {
            storyboard = storyboard.map(s => s.id == editingId ? data : s);
        } else {
            storyboard.push(data);
        }
        sync();
        window.closeModal('editModal');
    };

    window.sync = function() {
        if(currentProject) {
            db.ref('projects/' + currentProject).set({ data: storyboard, eras: eras, chars: chars }).then(render);
        }
    };

    window.render = function() {
        var container = document.getElementById('timeline');
        container.innerHTML = '<div class="center-line"></div>';
        var groups = {};
        storyboard.sort((a,b) => a.year - b.year).forEach(s => {
            var k = s.era + " " + s.year + "년";
            if(!groups[k]) groups[k] = {};
            if(!groups[k][s.month]) groups[k][s.month] = { left: [], right: [] };
            groups[k][s.month][s.side || 'left'].push(s);
        });

        Object.keys(groups).forEach(key => {
            container.innerHTML += `<div class="year-marker">${key}</div>`;
            Object.keys(groups[key]).sort((a,b)=>a-b).forEach(m => {
                var row = document.createElement('div'); row.className = 'row';
                row.innerHTML = `<div class="dropzone"></div><div style="text-align:center;font-size:10px;color:var(--primary);font-weight:bold;">${m}월</div><div class="dropzone"></div>`;
                var leftZone = row.children[0];
                var rightZone = row.children[2];
                groups[key][m].left.forEach(sc => {
                    var c = document.createElement('div'); c.className = 'card'; c.innerText = sc.text;
                    c.onclick = function() { editingId = sc.id; document.getElementById('eContent').value = sc.text; window.openModal('editModal'); };
                    leftZone.appendChild(c);
                });
                groups[key][m].right.forEach(sc => {
                    var c = document.createElement('div'); c.className = 'card'; c.innerText = sc.text;
                    c.onclick = function() { editingId = sc.id; document.getElementById('eContent').value = sc.text; window.openModal('editModal'); };
                    rightZone.appendChild(c);
                });
                container.appendChild(row);
            });
        });
    };

    window.saveToCloud = function() {
        if(!currentProject) return;
        db.ref('projects/' + currentProject).set({ data: storyboard, eras: eras, chars: chars }).then(function() {
            var t = document.getElementById('toast'); t.className = 'show';
            setTimeout(() => t.className = '', 2000);
        });
    };

    // 시대 관리용 함수
    window.openEraModal = function() {
        var html = eras.map(e => `<div style="display:flex; justify-content:space-between; padding:10px; background:#f8f9fa; margin-bottom:5px; border-radius:8px;">${e}</div>`).join('');
        document.getElementById('eraListGrid').innerHTML = html;
        window.openModal('eraModal');
    };

    window.onload = function() {
        var last = localStorage.getItem('lastProject');
        if(last) window.loadP(last); else window.openLoadModal();
    };
  </script>
</head>
<body>

<div id="toast">저장되었습니다</div>

<div class="header">
  <div id="projectTitle" style="font-weight:900; color:var(--primary);">STORY MASTER</div>
  <button onclick="saveToCloud()" style="background:var(--primary); color:white; border:none; padding:5px 15px; border-radius:8px; font-size:11px; font-weight:bold;">저장</button>
</div>

<div class="timeline-container" id="timeline"></div>

<div class="nav">
  <button class="nav-btn" onclick="openLoadModal()">📁<span>목록</span></button>
  <button class="nav-btn" onclick="openEraModal()">⏳<span>시대</span></button>
  <button class="nav-btn add-btn" onclick="addScene()">+</button>
  <button class="nav-btn" onclick="alert('준비 중입니다')">👤<span>캐릭터</span></button>
  <button class="nav-btn" onclick="location.reload()">🔄<span>갱신</span></button>
</div>

<div id="loadModal" class="modal">
  <div class="modal-content">
    <h3 style="margin-top:0;">내 연력표 목록</h3>
    <div id="projectList" style="max-height:300px; overflow-y:auto;"></div>
    <button class="btn-main" onclick="var n=prompt('이름 입력'); if(n) {currentProject=n; storyboard=[]; eras=['공통']; sync(); closeModal('loadModal');}">+ 새 연력표 만들기</button>
    <button onclick="closeModal('loadModal')" style="width:100%; background:none; border:none; color:#ccc; margin-top:10px;">닫기</button>
  </div>
</div>

<div id="editModal" class="modal">
  <div class="modal-content">
    <h3 id="editTitle" style="margin-top:0;">기록하기</h3>
    <label style="font-size:11px; color:#888;">시대 선택</label>
    <select id="eraType"></select>
    <div style="display:flex; gap:5px;">
        <input type="number" id="eYear" placeholder="연도" value="2024">
        <input type="number" id="eMonth" placeholder="월" value="1">
    </div>
    <textarea id="eContent" rows="5" placeholder="내용을 입력하세요"></textarea>
    <button class="btn-main" onclick="saveScene()">저장하기</button>
    <button onclick="closeModal('editModal')" style="width:100%; background:none; border:none; color:#ccc; margin-top:10px;">취소</button>
  </div>
</div>

<div id="eraModal" class="modal">
  <div class="modal-content">
    <h3>시대 관리</h3>
    <div id="eraListGrid"></div>
    <button class="btn-main" onclick="var n=prompt('시대 이름'); if(n) {eras.push(n); sync(); openEraModal();}">+ 시대 추가</button>
    <button onclick="closeModal('eraModal')" style="width:100%; background:none; border:none; color:#ccc; margin-top:10px;">닫기</button>
  </div>
</div>

</body>
</html>
