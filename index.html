<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Yuta's Engine</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    :root { --line: #dee2e6; --accent: #74c0fc; }
    body { font-family: 'Pretendard', sans-serif; margin: 0; background: #f8f9fa; color: #495057; overflow: hidden; }

    /* 헤더 & 네비 */
    .app-header { height: 50px; background: #343a40; color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: fixed; top: 0; width: 100%; z-index: 1100; box-sizing: border-box; }
    .header-right { display: flex; gap: 12px; align-items: center; }
    .top-nav { display: flex; justify-content: space-around; background: #fff; position: fixed; top: 50px; width: 100%; z-index: 1000; border-bottom: 1px solid #eee; height: 45px; align-items: center; }
    .nav-item { font-size: 13px; font-weight: 800; color: #adb5bd; cursor: pointer; }
    .nav-item.active { color: var(--accent); border-bottom: 3px solid var(--accent); }

    .view { display: none; margin-top: 95px; height: calc(100vh - 95px); overflow-y: auto; box-sizing: border-box; padding-bottom: 100px; }
    .view.active { display: block; }

    /* 타임라인 원본 디자인 복구 */
    .tl-container { position: relative; width: 100%; max-width: 600px; margin: 0 auto; padding-top: 30px; }
    .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--line); transform: translateX(-50%); }
    
    .row { display: grid; grid-template-columns: 1fr 1fr; position: relative; margin-bottom: 0px; align-items: center; min-height: 80px; }
    
    /* 중앙 노드 (연대/연도 분리 표시) */
    .node-center { position: absolute; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
    .node-dot { width: 10px; height: 10px; background: #fff; border: 2px solid var(--accent); border-radius: 50%; }
    .node-label { font-size: 9px; font-weight: 800; color: #adb5bd; background: #fff; padding: 1px 5px; border-radius: 4px; margin-top: 4px; white-space: nowrap; border: 1px solid #eee; }

    /* 쫀득한 가로선 */
    .connector { position: absolute; top: 50%; height: 2px; background: var(--line); z-index: 1; width: 20%; }
    .line-left { right: 50%; }
    .line-right { left: 50%; }

    /* 메모 박스 (직사각형 파스텔) */
    .dropzone { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80px; padding: 0 10px; }
    .card { background: #fff; padding: 10px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); width: 130px; min-height: 45px; position: relative; border-top: 4px solid var(--accent); cursor: pointer; }
    .card-meta { font-size: 8px; color: #adb5bd; font-weight: 800; margin-bottom: 3px; display: flex; justify-content: space-between; }
    .card-text { font-size: 11px; font-weight: 600; color: #495057; line-height: 1.4; word-break: break-all; }

    /* 스토리 & 캐릭터 공통 */
    .paper-area { background: #ced4da; padding: 20px; min-height: 100%; display: flex; justify-content: center; }
    .paper { width: 100%; max-width: 600px; background: white; padding: 40px; min-height: 80vh; outline: none; line-height: 1.8; font-size: 15px; }
    .char-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; }
    .char-card { background: white; padding: 15px 5px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

    /* 하단 바 */
    .bottom-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #fff; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; }
    .fab { width: 50px; height: 50px; background: var(--accent); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 30px; transform: translateY(-15px); border: 4px solid #f8f9fa; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .btn-sub { border: none; background: none; font-size: 11px; font-weight: 800; color: #adb5bd; }

    /* 모달 */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 3000; justify-content: center; align-items: center; padding: 20px; }
    .modal-content { background: white; width: 100%; max-width: 350px; padding: 25px; border-radius: 15px; }
    input, textarea, select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #eee; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
    .btn-main { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 800; }
  </style>
</head>
<body>

<header class="app-header">
  <div style="font-weight: 900; font-size: 20px; color: var(--accent);">Y</div>
  <div style="font-size: 14px; font-weight: 800; cursor: pointer;" onclick="openModal('projModal')">
    <span id="cur-proj-name">기본 프로젝트</span> ▾
  </div>
  <div class="header-right">
    <div onclick="location.reload()" style="font-size: 16px;">🔄</div>
    <div onclick="saveAll()" style="font-size: 11px; font-weight: 900; background: var(--accent); padding: 4px 8px; border-radius: 4px;">SAVE</div>
  </div>
</header>

<nav class="top-nav">
  <div class="nav-item active" onclick="tab('timeline', this)">타임라인</div>
  <div class="nav-item" onclick="tab('story', this)">스토리</div>
  <div class="nav-item" onclick="tab('char', this)">캐릭터도감</div>
</nav>

<div id="timeline-view" class="view active">
  <div class="tl-container">
    <div class="center-line"></div>
    <div id="tl-list"></div>
  </div>
  <div class="bottom-bar">
    <div style="flex:1"></div>
    <div class="fab" onclick="openEventModal()">+</div>
    <div style="flex:1"></div>
  </div>
</div>

<div id="story-view" class="view">
  <div class="paper-area"><div id="editor" class="paper" contenteditable="true"></div></div>
  <div class="bottom-bar">
    <button class="btn-sub" onclick="alert('문서 목록을 불러옵니다.')">문서목록</button>
    <button class="btn-sub" onclick="extractText()">문단추출</button>
  </div>
</div>

<div id="char-view" class="view">
  <div id="char-grid" class="char-grid"></div>
  <div class="bottom-bar">
    <button class="btn-main" style="width: 85%;" onclick="openModal('charModal')">+ 캐릭터 추가</button>
  </div>
</div>

<div id="eventModal" class="modal"><div class="modal-content">
  <h3 style="margin-top:0">사건 기록</h3>
  <select id="in-era"></select>
  <div style="display:flex; gap:5px;">
    <input type="number" id="in-year" placeholder="연도">
    <input type="number" id="in-month" placeholder="월">
  </div>
  <textarea id="in-text" rows="5" placeholder="내용을 입력하세요"></textarea>
  <button class="btn-main" onclick="saveEvent()">저장</button>
  <button class="btn-sub" style="width:100%; margin-top:10px;" onclick="closeModal('eventModal')">취소</button>
</div></div>

<div id="charModal" class="modal"><div class="modal-content">
  <h3>캐릭터 등록</h3>
  <input type="text" id="c-name" placeholder="이름">
  <input type="number" id="c-age" placeholder="나이">
  <textarea id="c-desc" rows="3" placeholder="상세 설정"></textarea>
  <button class="btn-main" onclick="saveChar()">등록</button>
  <button class="btn-sub" style="width:100%; margin-top:10px;" onclick="closeModal('charModal')">취소</button>
</div></div>

<div id="projModal" class="modal"><div class="modal-content">
  <h3>프로젝트 전환</h3>
  <div id="proj-items" style="max-height:150px; overflow-y:auto; margin-bottom:15px;"></div>
  <input type="text" id="new-p-name" placeholder="새 프로젝트 명">
  <button class="btn-main" onclick="addProj()">생성</button>
  <button class="btn-sub" style="width:100%; margin-top:10px;" onclick="closeModal('projModal')">닫기</button>
</div></div>

<script>
  const config = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
  firebase.initializeApp(config);
  const db = firebase.database();

  let state = {
    projects: ['기본 프로젝트'], curProject: '기본 프로젝트',
    data: { storyboard: [], eras: ['제국력'], characters: [], story: "" }
  };

  function tab(name, el) {
    document.querySelectorAll('.view, .nav-item').forEach(v => v.classList.remove('active'));
    document.getElementById(name + '-view').classList.add('active');
    el.classList.add('active');
    if(name === 'timeline') renderTimeline();
    if(name === 'char') renderChars();
  }

  function renderTimeline() {
    const list = document.getElementById('tl-list');
    list.innerHTML = "";
    const sorted = [...state.data.storyboard].sort((a,b) => a.year - b.year || a.month - b.month);
    
    sorted.forEach((s, i) => {
      const side = i % 2 === 0 ? 'left' : 'right';
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = `
        <div class="dropzone" data-side="left"></div>
        <div class="node-center">
          <div class="node-dot"></div>
          <div class="node-label">${s.era} ${s.year}년</div>
        </div>
        <div class="dropzone" data-side="right"></div>
        <div class="connector line-${side}"></div>
      `;
      const zone = row.querySelector(`.dropzone[data-side="${side}"]`);
      const card = document.createElement('div');
      card.className = 'card';
      card.style.borderTopColor = ['#d0ebff','#b2f2bb','#ffec99','#ffccf9'][i % 4];
      card.innerHTML = `<div class="card-meta"><span>${s.year}.${s.month}</span><span>No.${i+1}</span></div><div class="card-text">${s.text}</div>`;
      card.onclick = () => { editId = s.id; document.getElementById('in-text').value = s.text; openEventModal(); };
      zone.appendChild(card);
      list.appendChild(row);
    });

    document.querySelectorAll('.dropzone').forEach(z => {
      new Sortable(z, { group: 'timeline', animation: 150, onEnd: saveAll });
    });
  }

  function renderChars() {
    const grid = document.getElementById('char-grid');
    grid.innerHTML = (state.data.characters || []).map(c => `
      <div class="char-card">
        <div style="width:40px; height:40px; background:#eee; border-radius:50%; margin:0 auto 5px;"></div>
        <div style="font-size:12px; font-weight:800;">${c.name}</div>
      </div>`).join('');
  }

  let editId = null;
  function openEventModal() {
    document.getElementById('in-era').innerHTML = state.data.eras.map(e => `<option>${e}</option>`).join('');
    openModal('eventModal');
  }

  function saveEvent() {
    const text = document.getElementById('in-text').value;
    if(!text) return;
    const ev = { id: editId || Date.now(), era: document.getElementById('in-era').value, year: document.getElementById('in-year').value || 0, month: document.getElementById('in-month').value || 1, text: text };
    if(editId) state.data.storyboard = state.data.storyboard.map(s => s.id === editId ? ev : s);
    else state.data.storyboard.push(ev);
    editId = null; renderTimeline(); closeModal('eventModal');
  }

  function saveChar() {
    const name = document.getElementById('c-name').value;
    if(!name) return;
    if(!state.data.characters) state.data.characters = [];
    state.data.characters.push({ name, age: document.getElementById('c-age').value });
    renderChars(); closeModal('charModal');
  }

  function saveAll() {
    state.data.story = document.getElementById('editor').innerText;
    db.ref('users/Yuta/projects/' + state.curProject).set(state.data);
    db.ref('users/Yuta/meta').set({ projects: state.projects, curProject: state.curProject });
    alert("저장되었습니다.");
  }

  function switchProj(name) {
    state.curProject = name;
    document.getElementById('cur-proj-name').innerText = name;
    db.ref('users/Yuta/projects/' + name).once('value', s => {
      state.data = s.val() || { storyboard: [], eras: ['제국력'], characters: [], story: "" };
      renderTimeline();
      document.getElementById('editor').innerText = state.data.story || "";
      closeModal('projModal');
    });
  }

  function addProj() {
    const n = document.getElementById('new-p-name').value;
    if(n) { state.projects.push(n); switchProj(n); }
  }

  function openModal(id) { document.getElementById(id).style.display = 'flex'; }
  function closeModal(id) { document.getElementById(id).style.display = 'none'; }
  function extractText() { alert(document.getElementById('editor').innerText.split('\n').filter(l => l.trim()).length + "개 문단 추출"); }

  window.onload = () => {
    db.ref('users/Yuta/meta').once('value', s => {
      const m = s.val();
      if(m) { state.projects = m.projects; switchProj(m.curProject); }
      else switchProj('기본 프로젝트');
    });
  };
</script>
</body>
</html>
