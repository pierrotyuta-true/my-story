<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STORY MASTER Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header id="top-header">
            <div class="header-main">
                <button id="menu-toggle" onclick="toggleSidebar()">☰</button>
                <div class="logo">STORY MASTER</div>
                <button class="save-btn" onclick="saveToCloud()">구름저장</button>
            </div>
            <div id="timeline-bar" class="sub-bar">
                <div class="search-wrap" id="searchBar"></div>
                <button class="era-btn" onclick="openEraModal()">연대 편집</button>
            </div>
        </header>

        <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
        <aside id="sidebar">
            <nav class="side-nav">
                <div class="nav-item active" onclick="switchView('timeline')">사건 타임라인</div>
                <div class="nav-item" onclick="switchView('story')">줄거리 집필</div>
                <div class="nav-item" onclick="switchView('character')">캐릭터 도감</div>
            </nav>
            <div class="side-footer">
                <button onclick="openLoadModal()">프로젝트 목록</button>
            </div>
        </aside>

        <main id="main-content">
            <section id="view-timeline" class="content-view active">
                <div class="timeline-container dot-bg">
                    <div class="center-line"></div>
                    <div id="event-list"></div>
                </div>
            </section>

            <section id="view-story" class="content-view">
                <div class="story-editor">
                    <div class="editor-header">
                        <h3 id="current-story-title">메인 줄거리</h3>
                        <div class="editor-btns">
                            <button onclick="makeSub()">파트분리</button>
                            <button id="story-edit-btn" class="primary" onclick="toggleStoryEdit()">편집</button>
                        </div>
                    </div>
                    <div class="editor-body">
                        <div id="story-viewer" class="paper"></div>
                        <textarea id="story-input" class="paper" style="display:none;"></textarea>
                    </div>
                </div>
            </section>
        </main>

        <button class="fab" onclick="addNewEvent()">+</button>
    </div>

    <div id="detailModal" class="modal"><div class="modal-card">
        <div class="tab-header" id="modalTabMenu"></div>
        <div class="tab-content">
            <p id="modalDate" class="meta-info"></p>
            <div id="modalText" class="main-text"></div>
        </div>
        <div class="modal-footer">
            <button onclick="editCurrentTab()">수정</button>
            <button onclick="addBranch()">+ 가지</button>
            <button class="close" onclick="closeModal('detailModal')">닫기</button>
        </div>
    </div></div>

    <script src="script.js"></script>
</body>
</html>
