<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스토리마스터</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <nav id="top-nav">
            <button id="menu-toggle" onclick="toggleMainSidebar()">☰</button>
            <div class="nav-logo">STORY MASTER</div>
        </nav>

        <div id="sidebar-overlay" onclick="toggleMainSidebar()"></div>
        <aside id="main-sidebar">
            <div class="menu-section">
                <strong>메뉴</strong>
                <ul>
                    <li onclick="switchView('timeline')" class="active">사건 타임라인</li>
                    <li onclick="switchView('story')">줄거리 집필</li>
                    <li onclick="switchView('character')">인물 설정 (준비중)</li>
                </ul>
            </div>
            
            <div id="story-list-section" class="story-list-section" style="display:none;">
                <div class="sidebar-header">
                    <strong>Story List</strong>
                    <button class="add-icon" onclick="createNewStory()">+</button>
                </div>
                <ul id="story-list" class="scroll-area"></ul>
            </div>
        </aside>

        <div id="tab-container">
            <section id="view-timeline" class="tab-view active dot-bg">
                <div class="filter-bar">
                    <button class="filter-btn active">전체</button>
                    <button class="filter-btn">주요사건</button>
                    <button class="filter-btn">인물</button>
                </div>
                <div class="timeline-wrapper scroll-area">
                    <div class="timeline-line"></div>
                    <div id="event-list">
                        <div class="era-badge">제국력 589년</div>
                    </div>
                </div>
                <button class="floating-add-btn" onclick="addEvent()">+</button>
            </section>

            <section id="view-story" class="tab-view">
                <main class="main-editor">
                    <header class="paper-header">
                        <strong id="current-title">메인 줄거리</strong>
                        <div class="actions">
                            <button class="sub-btn" onclick="makeSubDocument()">파트분리</button>
                            <button id="edit-btn" class="primary-btn" onclick="handleEdit()">편집</button>
                        </div>
                    </header>
                    
                    <div class="editor-content-area scroll-area">
                        <div class="paper">
                            <div id="viewer"></div>
                            <textarea id="editor" spellcheck="false" placeholder="줄거리를 입력하세요..."></textarea>
                        </div>
                    </div>
                </main>
            </section>
            
            <section id="view-character" class="tab-view character-bg">
                <div class="character-container scroll-area">
                    <div class="character-card-grid">
                        <div style="text-align:center; padding:100px; color:#999; font-size:0.9rem;">
                            캐릭터 카드를 관리하는 공간입니다.<br>준비 중입니다.
                        </div>
                    </div>
                </div>
            </section>

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
