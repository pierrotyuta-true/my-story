<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STORY MASTER v6.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #4dabf7; --bg: #f8f9fa; --node: #74c0fc; --line: #dee2e6; --danger: #ff6b6b; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Pretendard', sans-serif; background: var(--bg); touch-action: none; }
        #app { display: flex; flex-direction: column; height: 100vh; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #fff; border-bottom: 1px solid #eee; z-index: 1000; }
        .nav-right { display: flex; gap: 15px; font-weight: bold; color: #adb5bd; }
        .nav-right .active { color: var(--primary); }

        .timeline-canvas { flex: 1; position: relative; overflow-y: auto; overflow-x: hidden; background-image: radial-gradient(#e9ecef 1.2px, transparent 1.2px); background-size: 25px 25px; }
        .center-line { position: absolute; left: 50%; top: 0; height: 20000px; width: 2px; background: var(--line); transform: translateX(-50%); z-index: 1; }
        #connection-svg { position: absolute; top: 0; left: 0; width: 100%; height: 20000px; pointer-events: none; z-index: 2; }

        /* 메모 박스 스타일 */
        .event-card { position: absolute; width: 160px; background: #fff; padding: 12px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); z-index: 10; cursor: grab; border: 1px solid #f1f3f5; box-sizing: border-box; touch-action: none; }
        .event-card.dragging { cursor: grabbing; box-shadow: 0 10px 30px rgba(0,0,0,0.12); z-index: 1000; opacity: 0.9; }
        
        .card-date { font-size: 11px; color: var(--primary); font-weight: 800; margin-bottom: 4px; }
        .card-content { font-size: 13px; color: #444; line-height: 1.4; word-break: break-all; }

        /* 인덱스 탭 스타일 */
        .branch-indices { position: absolute; top: 10px; display: flex; flex-direction: column; gap: 3px; }
        .left-side .branch-indices { right: -6px; }
        .right-side .branch-indices { left: -6px; }
        .idx-dot { width: 6px; height: 14px; border-radius: 3px; }
        .b-0 { background: #d0ebff; } .b-1 { background: #d3f9d8; } .b-2 { background: #ffdeeb; } .b-3 { background: #fff3bf; } .b-4 { background: #eebefa; }

        .year-label { position: absolute; left: 50%; transform: translate(-50%, -50%); background: #495057; color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 11px; z-index: 100; font-weight: bold; }

        /* 바텀 시트 & 탭 */
        #bottom-sheet-layer { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 2000; align-items: flex-end; }
        #bottom-sheet { background: #fff; width: 100%; border-radius: 25px 25px 0 0; padding: 25px; box-sizing: border-box; }
        
        .sheet-tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { padding: 8px 15px; border-radius: 10px; border: 1px solid #eee; background: #f8f9fa; font-size: 13px; white-space: nowrap; cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 11px; color: #999; margin-bottom: 4px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 15px; }
        
        .fab { position: fixed; bottom: 30px; right: 25px; width: 60px; height: 60px; border-radius: 50%; background: var(--primary); color: #fff; border: none; font-size: 24px; box-shadow: 0 5px 15px rgba(77,171,247,0.4); z-index: 1000; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <div style="font-weight:900; color:#4dabf7; font-size: 20px;">SM v6.0</div>
            <div class="nav-right"><span class="active">타임라인</span><span>설정</span></div>
        </header>

        <main class="timeline-canvas" id="canvas">
            <div class="center-line"></div>
            <svg id="connection-svg"></svg>
            <div id="event-container"></div>
        </main>

        <div id="bottom-sheet-layer" onclick="closeSheet()">
            <div id="bottom-sheet" onclick="event.stopPropagation()">
                <div class="sheet-tabs" id="memo-tabs"></div>

                <div id="view-mode">
                    <div id="view-full-date" style="color:var(--primary); font-weight:800; font-size:12px; margin-bottom:10px;"></div>
                    <div id="view-memo" style="background:#f8f9fa; padding:15px; border-radius:12px; min-height:100px; font-size:15px; color:#333; white-space: pre-wrap;"></div>
                    <div style="display:flex; gap:10px; margin-top:20px;">
                        <button onclick="toggleEditMode(true)" style="flex:1; padding:15px; border-radius:12px; border:none; background:#f1f3f5; font-weight:bold;">수정</button>
                        <button onclick="deleteEvent()" style="flex:0.5; padding:15px; border-radius:12px; border:none; background:#fff0f0; color:var(--danger); font-weight:bold;">삭제</button>
                        <button id="add-branch-btn" onclick="addBranch()" style="flex:1; padding:15px; border-radius:12px; border:none; background:var(--primary); color:#fff; font-weight:bold;">+ 메모 추가</button>
                    </div>
                </div>

                <div id="edit-mode" class="hidden">
                    <div class="input-group">
                        <label>연대 선택</label>
                        <select id="edit-era" onchange="checkNewEra(this)">
                            <option value="new">+ 연대 추가하기</option>
                        </select>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <div class="input-group" style="flex:1;"><label>연도</label><input type="number" id="edit-year"></div>
                        <div class="input-group" style="flex:1;"><label>월</label><input type="number" id="edit-month"></div>
                    </div>
                    <div class="input-group"><label>내용</label><textarea id="edit-memo-input" rows="4"></textarea></div>
                    <button onclick="updateEvent()" style="width:100%; padding:16px; border-radius:12px; border:none; background:var(--primary); color:#fff; font-weight:bold;">저장하기</button>
                </div>
            </div>
        </div>

        <button class="fab" onclick="createNewEvent()"><i class="fas fa-plus"></i></button>
    </div>

    <script>
        const config = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", authDomain: "true-s.firebaseapp.com", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
        firebase.initializeApp(config);
        const db = firebase.database();

        let storyboard = [], eras = [], currentProject = "이그리예가", currentId = null, activeTabIdx = 0;

        function init() {
            db.ref(`projects/${currentProject}/eras`).on('value', s => {
                eras = s.val() || ["제국력"];
                updateEraSelect();
            });
            db.ref(`projects/${currentProject}/data`).on('value', s => {
                const data = s.val();
                storyboard = data ? (Array.isArray(data) ? data : Object.values(data)) : [];
                render();
            });
        }

        function render() {
            const container = document.getElementById('event-container');
            const svg = document.getElementById('connection-svg');
            container.innerHTML = ''; svg.innerHTML = '';
            
            const centerX = window.innerWidth / 2;

            // 연대 및 시간순 정렬
            storyboard.sort((a, b) => {
                const eA = eras.indexOf(a.era), eB = eras.indexOf(b.era);
                if(eA !== eB) return eA - eB;
                return (b.year - a.year) || (b.month - a.month);
            });

            storyboard.forEach((ev, idx) => {
                const card = document.createElement('div');
                const isLeft = (ev.x || 0) + 80 < centerX;
                card.className = `event-card ${isLeft ? 'left-side' : 'right-side'}`;
                card.id = `ev-${ev.id}`;
                card.style.left = (ev.x || (centerX + 20)) + 'px'; 
                card.style.top = (ev.y || (idx * 140 + 80)) + 'px';
                
                // 15자 제한 표시 로직
                const displayMemo = (ev.memo || '내용 없음').length > 15 ? (ev.memo.substring(0, 15) + '...') : ev.memo;

                // 인덱스 도트 (사건 + 추가 메모들)
                let dots = `<div class="idx-dot b-0"></div>`;
                (ev.branches || []).forEach((_, i) => dots += `<div class="idx-dot b-${i+1}"></div>`);

                card.innerHTML = `
                    <div class="branch-indices">${dots}</div>
                    <div class="card-date">${ev.era} ${ev.year}년 ${ev.month}월</div>
                    <div class="card-content">${displayMemo}</div>
                `;
                
                card.onclick = (e) => { if(!card.classList.contains('dragging')) openSheet(ev.id); };
                container.appendChild(card);

                // 연도 라벨
                if (idx === 0 || storyboard[idx-1].year !== ev.year || storyboard[idx-1].era !== ev.era) {
                    const tag = document.createElement('div');
                    tag.className = 'year-label';
                    tag.style.top = (parseFloat(card.style.top) - 40) + 'px';
                    tag.innerText = `${ev.era} ${ev.year}년`;
                    container.appendChild(tag);
                }

                drawConnector(card, centerX, svg);
            });
            setupDrag();
        }

        function setupDrag() {
            interact('.event-card').draggable({
                hold: 300,
                onstart(event) { event.target.classList.add('dragging'); },
                onmove(event) {
                    const t = event.target;
                    const x = (parseFloat(t.style.left) || 0) + event.dx;
                    const y = (parseFloat(t.style.top) || 0) + event.dy;
                    t.style.left = x + 'px';
                    t.style.top = y + 'px';
                },
                onend(event) {
                    const t = event.target;
                    t.classList.remove('dragging');
                    const id = t.id.replace('ev-', '');
                    const ev = storyboard.find(i => i.id == id);
                    if(ev) {
                        ev.x = parseFloat(t.style.left);
                        ev.y = parseFloat(t.style.top);
                        save();
                    }
                }
            });
        }

        function drawConnector(card, centerX, svg) {
            const isLeft = parseFloat(card.style.left) + 80 < centerX;
            const startX = isLeft ? parseFloat(card.style.left) + 160 : parseFloat(card.style.left);
            const y = parseFloat(card.style.top) + 40;
            const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
            line.setAttribute("d", `M ${startX} ${y} L ${centerX} ${y}`);
            line.setAttribute("stroke", "#dee2e6"); line.setAttribute("stroke-dasharray", "3 3");
            svg.appendChild(line);
        }

        function openSheet(id) {
            currentId = id; activeTabIdx = 0;
            const ev = storyboard.find(i => i.id == id);
            renderTabs(ev);
            showTabData(ev);
            toggleEditMode(false);
            document.getElementById('bottom-sheet-layer').style.display = 'flex';
        }

        function renderTabs(ev) {
            const container = document.getElementById('memo-tabs');
            let html = `<div class="tab-btn ${activeTabIdx===0?'active':''}" onclick="switchTab(0)">사건</div>`;
            (ev.branches || []).forEach((_, i) => {
                html += `<div class="tab-btn ${activeTabIdx===i+1?'active':''}" onclick="switchTab(${i+1})">메모 ${i+1}</div>`;
            });
            container.innerHTML = html;
            document.getElementById('add-branch-btn').style.display = (ev.branches?.length >= 4) ? 'none' : 'block';
        }

        function switchTab(idx) {
            activeTabIdx = idx;
            const ev = storyboard.find(i => i.id == currentId);
            renderTabs(ev);
            showTabData(ev);
        }

        function showTabData(ev) {
            document.getElementById('view-full-date').innerText = `${ev.era} ${ev.year}년 ${ev.month}월`;
            document.getElementById('view-memo').innerText = (activeTabIdx === 0) ? ev.memo : ev.branches[activeTabIdx-1];
        }

        function toggleEditMode(isEdit) {
            document.getElementById('view-mode').classList.toggle('hidden', isEdit);
            document.getElementById('edit-mode').classList.toggle('hidden', !isEdit);
            if(isEdit) {
                const ev = storyboard.find(i => i.id == currentId);
                document.getElementById('edit-era').value = ev.era;
                document.getElementById('edit-year').value = ev.year;
                document.getElementById('edit-month').value = ev.month;
                document.getElementById('edit-memo-input').value = (activeTabIdx === 0) ? ev.memo : ev.branches[activeTabIdx-1];
            }
        }

        function checkNewEra(sel) {
            if(sel.value === 'new') {
                const name = prompt("새로운 연대 이름을 입력하세요:");
                if(name) {
                    eras.push(name);
                    db.ref(`projects/${currentProject}/eras`).set(eras);
                    updateEraSelect(name);
                } else { sel.selectedIndex = 1; }
            }
        }

        function updateEraSelect(selectedName) {
            const sel = document.getElementById('edit-era');
            let html = `<option value="new">+ 연대 추가하기</option>`;
            eras.forEach(e => html += `<option value="${e}">${e}</option>`);
            sel.innerHTML = html;
            sel.value = selectedName || eras[0];
        }

        function updateEvent() {
            const ev = storyboard.find(i => i.id == currentId);
            ev.era = document.getElementById('edit-era').value;
            ev.year = parseInt(document.getElementById('edit-year').value);
            ev.month = parseInt(document.getElementById('edit-month').value);
            const val = document.getElementById('edit-memo-input').value;
            
            if(activeTabIdx === 0) ev.memo = val;
            else ev.branches[activeTabIdx-1] = val;
            
            save(); closeSheet();
        }

        function addBranch() {
            const ev = storyboard.find(i => i.id == currentId);
            if(!ev.branches) ev.branches = [];
            ev.branches.push("새로운 메모 내용");
            activeTabIdx = ev.branches.length;
            save(); openSheet(currentId);
        }

        function deleteEvent() {
            if(confirm("이 기록을 삭제할까요?")) {
                storyboard = storyboard.filter(i => i.id != currentId);
                save(); closeSheet();
            }
        }

        function createNewEvent() {
            const id = Date.now();
            storyboard.push({ id, era: eras[0], year: 590, month: 1, memo: "새로운 사건", x: window.innerWidth/2 + 20, y: 100, branches: [] });
            save();
        }

        function save() { db.ref(`projects/${currentProject}/data`).set(storyboard); }
        function closeSheet() { document.getElementById('bottom-sheet-layer').style.display = 'none'; }
        window.onload = init;
    </script>
</body>
</html>
