<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>스토리마스터 Pro</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    :root { --primary: #4dabf7; --bg: #f8f9fa; --card-bg: #ffffff; --line: #dee2e6; --danger: #ff8787; --branch: #adb5bd; }
    body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); touch-action: pan-y; -webkit-user-select: none; user-select: none; padding-bottom: 80px; color: #333; overflow-x: hidden; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    /* 레이아웃 - 중앙선 초밀착 */
    .header { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); z-index: 1000; padding: 0 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; height: 50px; align-items: center; }
    .timeline-container { position: relative; width: 100%; max-width: 800px; margin: 65px auto 0; padding: 0 5px; min-height: 100vh; }
    .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--line); transform: translateX(-50%); z-index: 0; }
    
    /* 중앙 공간을 10px로 최소화 */
    .row { display: grid; grid-template-columns: 1fr 10px 1fr; align-items: start; position: relative; margin-bottom: 20px; }
    .node { width: 8px; height: 8px; background: white; border: 2px solid var(--primary); border-radius: 50%; margin: 25px auto 0; z-index: 5; position: relative; }
    .year-marker { position: relative; width: fit-content; margin: 40px auto 20px; padding: 4px 12px; background: #495057; color: white; border-radius: 12px; font-size: 10px; font-weight: 800; z-index: 10; }
    
    .dropzone { min-height: 60px; padding: 2px; display: flex; flex-direction: column; align-items: stretch; gap: 10px; }
    
    /* 카드 및 가지 위치 (바깥쪽으로 배치) */
    .card-wrapper { position: relative; display: flex; align-items: flex-start; gap: 4px; }
    /* 왼쪽 드롭존: [가지들] [카드] -> 카드가 오른쪽(중앙선쪽)으로 */
    .dropzone[data-side="left"] .card-wrapper { flex-direction: row; justify-content: flex-end; }
    /* 오른쪽 드롭존: [카드] [가지들] -> 카드가 왼쪽(중앙선쪽)으로 */
    .dropzone[data-side="right"] .card-wrapper { flex-direction: row; justify-content: flex-start; }

    .card { background: #fff; max-width: 140px; border-radius: 8px; padding: 10px 8px 10px 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); position: relative; z-index: 20; border: 1px solid rgba(0,0,0,0.05); cursor: pointer; flex-shrink: 0; }
    .card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background-color: var(--card-accent, #eee); border-radius: 8px 0 0 8px; }
    .card-month { font-size: 8px; font-weight: 900; color: #adb5bd; margin-bottom: 2px; }
    
    /* 15자 제한 및 말줄임 처리 복구 */
    .card-content { 
      font-size: 11px; line-height: 1.3; font-weight: 600; color: #444; 
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
      max-width: 100%; pointer-events: none;
    }
    
    /* 가지 아이콘 (화면 끝쪽 배열) */
    .branch-outer-container { display: flex; flex-wrap: wrap; gap: 2px; width: 32px; margin-top: 5px; flex-shrink: 0; }
    .branch-cube { width: 12px; height: 12px; background: var(--branch); border-radius: 2px; cursor: pointer; opacity: 0.6; }

    /* 모달 UI */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 4000; justify-content: center; align-items: center; backdrop-filter: blur(2px); }
    .modal-content { background: white; width: 88%; max-width: 300px; padding: 20px; border-radius: 18px; }
    .edit-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 10px; }
    input, textarea, select { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #eee; background: #f8f9fa; font-size: 12px; outline: none; }
    .btn-main { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: 800; font-size: 13px; cursor: pointer; background: var(--primary); color: white; margin-top: 5px; }
    .btn-sub { width: 100%; padding: 10px; border: none; border-radius: 10px; font-weight: 800; font-size: 11px; cursor: pointer; background: #f1f3f5; color: #888; margin-top: 5px; }
    .btn-row { display: flex; gap: 8px; margin-top: 10px; }
    .color-chip { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid white; box-shadow: 0 0 0 1px #eee; }
    .color-chip.selected { box-shadow: 0 0 0 2px var(--primary); }
    
    .nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #fff; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
    .nav-btn { border: none; background: none; font-size: 9px; font-weight: 800; color: #adb5bd; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
  </style>
</head>
<body>

<div id="toast">저장되었습니다</div>

<div id="customAlert" class="modal" style="z-index: 6000;">
    <div class="modal-content">
        <div id="alertTitle" style="font-size:14px; font-weight:900; margin-bottom:8px; text-align:center;">알림</div>
        <div id="alertMsg" style="font-size:12px; color:#666; text-align:center; margin-bottom:20px; line-height:1.5; white-space:pre-wrap;">내용</div>
        <div id="alertInputWrap" style="display:none;"><input type="text" id="alertInput" placeholder="입력하세요"></div>
        <div style="display:flex; gap:8px;">
            <button class="btn-sub" style="flex:1;" onclick="window.closeAlert(false)">취소</button>
            <button id="alertConfirm" class="btn-main" style="flex:1; margin-top:0;" onclick="window.closeAlert(true)">확인</button>
        </div>
    </div>
</div>

<div class="header">
  <div style="font-size:13px; font-weight:900; color:var(--primary);" id="projectTitle">STORY MASTER</div>
  <button onclick="window.saveToCloud()" style="background:var(--primary); color:white; border:none; padding:5px 12px; border-radius:7px; font-weight:800; font-size:10px;">저장</button>
</div>

<div class="timeline-container" id="timeline"></div>

<div class="nav">
  <button class="nav-btn" onclick="window.openLoadModal()"><svg style="width:18px;height:18px;stroke:#adb5bd;fill:none;stroke-width:2.5;" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><span>목록</span></button>
  <button class="nav-btn" onclick="window.openEraModal()"><svg style="width:18px;height:18px;stroke:#adb5bd;fill:none;stroke-width:2.5;" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span>시대</span></button>
  <button class="nav-btn" style="font-size:32px; color:var(--primary); font-weight:200;" onclick="window.addScene()">+</button>
  <button class="nav-btn" onclick="window.openCharModal()"><svg style="width:18px;height:18px;stroke:#adb5bd;fill:none;stroke-width:2.5;" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span>캐릭터</span></button>
  <button class="nav-btn" onclick="location.reload()"><svg style="width:18px;height:18px;stroke:#adb5bd;fill:none;stroke-width:2.5;" viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg><span>갱신</span></button>
</div>

<div id="viewModal" class="modal"><div class="modal-content">
    <div id="viewMonth" style="font-size:9px; font-weight:900; color:var(--primary); margin-bottom:5px;"></div>
    <div id="viewText" style="font-size:12px; line-height:1.6; color:#444; margin-bottom:12px; white-space:pre-wrap;"></div>
    <div id="viewTags" style="display:flex; flex-wrap:wrap; gap:4px; margin-bottom:15px;"></div>
    <div class="btn-row">
        <button class="btn-main" onclick="window.goToEdit()">수정하기</button>
        <button class="btn-main" style="background:#868e96;" onclick="window.addBranchFromView()">가지 추가</button>
    </div>
    <button class="btn-sub" onclick="window.closeModal('viewModal')">닫기</button>
</div></div>

<div id="editModal" class="modal"><div class="modal-content"><h3 id="editTitle" style="margin:0 0 15px 0; font-size:13px; text-align:center;">기록</h3>
    <div class="edit-grid">
        <select id="eraType"></select>
        <input type="number" id="eYear" placeholder="연도">
        <select id="eMonth"><script>for(let i=1;i<=12;i++)document.write(`<option value="${i}">${i}월</option>`)</script></select>
    </div>
    <div id="colorPicker" style="display:flex; gap:5px; margin-bottom:12px; justify-content:center; flex-wrap:wrap;"></div>
    <div id="charTagSelector" style="display:flex; flex-wrap:wrap; gap:4px; margin-bottom:12px;"></div>
    <textarea id="eContent" rows="4" placeholder="내용을 입력하세요"></textarea>
    <button class="btn-main" onclick="window.saveScene()">기록 완료</button>
    <button id="delBtn" style="color:#ff8787; background:none; border:none; width:100%; font-size:11px; margin-top:10px; cursor:pointer;" onclick="window.confirmDeleteScene()">이 사건 삭제</button>
    <button class="btn-sub" onclick="window.closeModal('editModal')">취소</button>
</div></div>

<div id="loadModal" class="modal"><div class="modal-content"><h3>작업 목록</h3><div id="projectList" style="max-height:200px; overflow-y:auto;"></div><button class="btn-main" onclick="window.promptNewProject()">+ 새 연력표</button><button class="btn-sub" onclick="window.closeModal('loadModal')">닫기</button></div></div>
<div id="eraModal" class="modal"><div class="modal-content"><h3>시대 관리</h3><div id="eraListGrid" style="max-height:200px; overflow-y:auto; margin-bottom:10px;"></div><button class="btn-main" onclick="window.promptNewEra()">+ 시대 추가</button><button class="btn-sub" onclick="window.closeModal('eraModal')">닫기</button></div></div>
<div id="charModal" class="modal"><div class="modal-content"><h3>캐릭터 관리</h3><div id="charListGrid" style="max-height:150px; overflow-y:auto; margin-bottom:10px;"></div><button class="btn-main" onclick="window.promptNewChar()">+ 캐릭터 추가</button><button class="btn-sub" onclick="window.closeModal('charModal')">닫기</button></div></div>

<script>
  const config = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", authDomain: "true-s.firebaseapp.com", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
  if (!firebase.apps.length) firebase.initializeApp(config);
  const db = firebase.database();

  let storyboard = [], eras = ["공통"], chars = [], currentProject = null, editingId = null;
  const userColors = ["#eee", "#d0ebff", "#fff9db", "#d3f9d8", "#ffdeeb", "#eebefa", "#dae1e7", "#495057", "#ffd43b"];
  let selectedColor = "#eee", selectedChars = [], alertCallback = null;

  window.customUI = (title, msg, type, callback) => {
    const modal = document.getElementById('customAlert');
    document.getElementById('alertTitle').innerText = title; document.getElementById('alertMsg').innerText = msg;
    document.getElementById('alertInputWrap').style.display = (type === 'prompt') ? 'block' : 'none';
    const confirmBtn = document.getElementById('alertConfirm');
    confirmBtn.innerText = (title.includes('삭제')) ? '삭제' : '확인';
    confirmBtn.style.background = (title.includes('삭제')) ? '#ff8787' : '#4dabf7';
    alertCallback = callback; modal.style.display = 'flex';
  };
  window.closeAlert = (res) => { document.getElementById('customAlert').style.display = 'none'; if(alertCallback) { const val = document.getElementById('alertInput').value; alertCallback(res ? (val || true) : false); } };
  window.closeModal = (id) => document.getElementById(id).style.display = 'none';
  window.openModal = (id) => document.getElementById(id).style.display = 'flex';

  window.render = () => {
    const container = document.getElementById('timeline');
    if(!currentProject) { container.innerHTML = '<div style="text-align:center; padding-top:150px; color:#ccc; font-size:12px;">연력표를 선택해주세요.</div>'; return; }
    container.innerHTML = '<div class="center-line"></div>';
    const sortedBoard = [...storyboard].sort((a, b) => {
        const eraIdxA = eras.indexOf(a.era); const eraIdxB = eras.indexOf(b.era);
        if(eraIdxA !== eraIdxB) return eraIdxA - eraIdxB;
        return a.year - b.year;
    });
    const groups = {};
    sortedBoard.forEach(s => {
      const k = `${s.era || "공통"} ${s.year}년`;
      if(!groups[k]) groups[k] = {};
      if(!groups[k][s.month]) groups[k][s.month] = { left: [], right: [] };
      groups[k][s.month][s.side || 'left'].push(s);
    });
    Object.keys(groups).forEach(key => {
      container.innerHTML += `<div class="year-marker">${key}</div>`;
      Object.keys(groups[key]).sort((a,b)=>a-b).forEach(m => {
        const row = document.createElement('div'); row.className = 'row';
        row.innerHTML = `<div class="dropzone" data-gkey="${key}" data-month="${m}" data-side="left"></div><div class="node"></div><div class="dropzone" data-gkey="${key}" data-month="${m}" data-side="right"></div>`;
        container.appendChild(row);
        ['left', 'right'].forEach(side => {
          const zone = row.querySelector(`.dropzone[data-side="${side}"]`);
          groups[key][m][side].forEach(sc => {
            const wrapper = document.createElement('div'); wrapper.className = 'card-wrapper';
            const card = document.createElement('div'); card.className = 'card'; card.dataset.id = sc.id;
            card.style.setProperty('--card-accent', sc.color || "#eee");
            card.innerHTML = `<div class="card-month">${m}월</div><div class="card-content">${sc.text}</div>`;
            const bContainer = document.createElement('div'); bContainer.className = 'branch-outer-container';
            if(sc.branches) { sc.branches.forEach((b, bIdx) => {
                const cube = document.createElement('div'); cube.className = 'branch-cube';
                cube.onclick = (e) => { e.stopPropagation(); window.viewBranch(sc.id, bIdx); };
                bContainer.appendChild(cube);
            }); }
            // 왼쪽 줄이면 [가지][카드], 오른쪽 줄이면 [카드][가지] 배치
            if(side === 'left') { wrapper.appendChild(bContainer); wrapper.appendChild(card); } 
            else { wrapper.appendChild(card); wrapper.appendChild(bContainer); }
            zone.appendChild(wrapper);
          });
        });
      });
    });
  };

  window.addBranchFromView = () => {
    const targetId = editingId; window.closeModal('viewModal');
    setTimeout(() => {
        window.customUI("생각의 가지 추가", "관련 아이디어 입력", "prompt", (val) => {
            if(val && typeof val === 'string') {
                const idx = storyboard.findIndex(s => s.id == targetId);
                if(!storyboard[idx].branches) storyboard[idx].branches = [];
                storyboard[idx].branches.push(val); window.sync();
            } else { window.openViewer(targetId); }
        });
    }, 200);
  };

  window.viewBranch = (id, bIdx) => {
    editingId = id; const s = storyboard.find(x => x.id == id);
    window.customUI("생각의 가지", s.branches[bIdx], "confirm", (res) => { if(res) { s.branches.splice(bIdx, 1); window.sync(); } });
    document.getElementById('alertConfirm').innerText = "가지 삭제";
  };

  window.loadP = (k) => { currentProject = k; localStorage.setItem('lastProject', k); document.getElementById('projectTitle').innerText = k; db.ref('projects/'+k).on('value', s => { const d = s.val(); if(d){ storyboard=d.data||[]; eras=d.eras||["공통"]; chars=d.chars||[]; window.render(); } }); window.closeModal('loadModal'); };
  window.openLoadModal = () => { db.ref('projects').once('value').then(s => { const d = s.val(); document.getElementById('projectList').innerHTML = d ? Object.keys(d).map(k => `<div style="display:flex; gap:5px; margin-bottom:8px; align-items:center;"><button onclick="window.loadP('${k}')" style="flex:1; padding:12px; border:1px solid #eee; border-radius:10px; background:#fff; text-align:left; font-weight:bold;">${k}</button><button onclick="window.confirmDeleteProject('${k}')" style="padding:12px; color:red; border:none; background:#fff1f1; border-radius:10px;">X</button></div>`).join('') : '<p style="text-align:center; font-size:12px; color:#ccc;">비어있음</p>'; window.openModal('loadModal'); }); };
  window.confirmDeleteProject = (k) => { window.customUI("연력 삭제", `${k} 삭제?`, "confirm", (r) => { if(r) db.ref('projects/'+k).remove().then(window.openLoadModal); }); };
  window.promptNewProject = () => { window.customUI("새 연력표", "이름 입력", "prompt", (n) => { if(n && typeof n === 'string') { currentProject = n; storyboard = []; eras = ["공통"]; chars = []; window.sync(); window.closeModal('loadModal'); } }); };
  window.addScene = () => { if(!currentProject) { window.openLoadModal(); return; } window.openEdit(null); };
  window.openEdit = (id) => {
    editingId = id; const s = storyboard.find(x => x.id == id);
    document.getElementById('eContent').value = s ? s.text : "";
    document.getElementById('eYear').value = s ? s.year : "2024";
    document.getElementById('eMonth').value = s ? s.month : "1";
    document.getElementById('eraType').innerHTML = eras.map(e => `<option value="${e}">${e}</option>`).join('');
    if(s) document.getElementById('eraType').value = s.era;
    selectedColor = s ? (s.color || "#eee") : "#eee"; selectedChars = s ? (s.chars || []) : [];
    window.updateColorUI(); window.updateCharUI(); window.openModal('editModal');
  };
  window.saveScene = () => {
    const text = document.getElementById('eContent').value.trim(); if(!text) return;
    const year = parseInt(document.getElementById('eYear').value), month = parseInt(document.getElementById('eMonth').value), era = document.getElementById('eraType').value;
    if(editingId) storyboard = storyboard.map(s => s.id == editingId ? {...s, text, year, month, era, color: selectedColor, chars: selectedChars} : s);
    else storyboard.push({ id: Date.now().toString(), era, year, month, text, color: selectedColor, chars: selectedChars, side: 'left', branches: [] });
    window.sync(); window.closeModal('editModal');
  };
  window.confirmDeleteScene = () => { window.customUI("사건 삭제", "삭제할까요?", "confirm", (r) => { if(r) { storyboard = storyboard.filter(s => s.id != editingId); window.sync(); window.closeModal('editModal'); } }); };
  window.openViewer = (id) => { editingId = id; const s = storyboard.find(x => x.id == id); if(!s) return; document.getElementById('viewMonth').innerText = `${s.era} ${s.year}년 ${s.month}월`; document.getElementById('viewText').innerText = s.text; document.getElementById('viewTags').innerHTML = (s.chars || []).map(c => `<span style="font-size:9px; background:#f1f3f5; padding:3px 7px; border-radius:6px; font-weight:700;">${c}</span>`).join(''); window.openModal('viewModal'); };
  window.goToEdit = () => { window.closeModal('viewModal'); window.openEdit(editingId); };
  window.updateColorUI = () => { document.getElementById('colorPicker').innerHTML = userColors.map(c => `<div class="color-chip ${selectedColor===c?'selected':''}" style="background:${c};" onclick="window.selectColor('${c}')"></div>`).join(''); };
  window.selectColor = (c) => { selectedColor = c; window.updateColorUI(); };
  window.updateCharUI = () => { document.getElementById('charTagSelector').innerHTML = chars.map(c => `<div style="padding:6px 10px; border-radius:8px; background:${selectedChars.includes(c)?'var(--primary)':'#f1f3f5'}; color:${selectedChars.includes(c)?'white':'#333'}; font-size:10px; font-weight:700;" onclick="window.toggleChar('${c}')">${c}</div>`).join('') || '<p style="font-size:10px; color:#ccc;">캐릭터 없음</p>'; };
  window.toggleChar = (c) => { if(selectedChars.includes(c)) selectedChars = selectedChars.filter(x => x !== c); else selectedChars.push(c); window.updateCharUI(); };
  window.openEraModal = () => { document.getElementById('eraListGrid').innerHTML = eras.map((e, i) => `<div style="display:flex; justify-content:space-between; padding:10px; background:#f8f9fa; border-radius:8px; margin-bottom:5px;"><span>${e}</span><button onclick="window.confirmDelEra('${e}')" style="color:red; border:none; background:none;">X</button></div>`).join(''); window.openModal('eraModal'); };
  window.promptNewEra = () => { window.closeModal('eraModal'); window.customUI("시대 추가", "이름 입력", "prompt", (n) => { if(n && typeof n === 'string' && !eras.includes(n)) { eras.push(n); window.sync(); } window.openEraModal(); }); };
  window.confirmDelEra = (e) => { window.closeModal('eraModal'); window.customUI("시대 삭제", `${e} 삭제?`, "confirm", (r) => { if(r) { storyboard = storyboard.map(s => s.era === e ? {...s, era: '공통'} : s); eras = eras.filter(x => x !== e); if(eras.length === 0) eras = ["공통"]; window.sync(); } window.openEraModal(); }); };
  window.openCharModal = () => { document.getElementById('charListGrid').innerHTML = chars.map(c => `<div style="display:flex; justify-content:space-between; padding:10px; background:#f8f9fa; border-radius:8px; margin-bottom:5px;"><span>${c}</span><button onclick="window.confirmDelChar('${c}')" style="color:red; border:none; background:none;">X</button></div>`).join(''); window.openModal('charModal'); };
  window.promptNewChar = () => { window.closeModal('charModal'); window.customUI("캐릭터 추가", "이름 입력", "prompt", (n) => { if(n && typeof n === 'string') { chars.push(n); window.sync(); } window.openCharModal(); }); };
  window.confirmDelChar = (c) => { window.closeModal('charModal'); window.customUI("캐릭터 삭제", `${c} 삭제?`, "confirm", (r) => { if(r) { chars = chars.filter(x => x !== c); window.sync(); } window.openCharModal(); }); };
  window.sync = () => { if(currentProject) db.ref('projects/'+currentProject).set({ data: storyboard, eras, chars }).then(window.render); };
  window.saveToCloud = () => { if(currentProject) db.ref('projects/'+currentProject).set({ data: storyboard, eras, chars }).then(() => { const t = document.getElementById('toast'); t.className = 'show'; setTimeout(() => t.className = '', 2000); }); };

  let dragItem = null, startX, startY, currentTarget = null, dragId = null, isMoving = false;
  document.addEventListener('touchstart', (e) => {
    if(e.target.closest('button') || e.target.closest('.branch-cube')) return;
    const card = e.target.closest('.card'); if(!card) return;
    const touch = e.touches[0]; startX = touch.clientX; startY = touch.clientY;
    dragId = card.dataset.id; isMoving = false;
    const move = (me) => {
      const mt = me.touches[0];
      if(!isMoving && (Math.abs(mt.clientX - startX) > 10 || Math.abs(mt.clientY - startY) > 10)) {
        isMoving = true; card.style.opacity = '0.5';
        dragItem = card.cloneNode(true); dragItem.style.position = 'fixed'; dragItem.style.zIndex = '5000'; dragItem.style.opacity = '0.8'; dragItem.style.pointerEvents = 'none';
        dragItem.style.width = card.offsetWidth + 'px'; document.body.appendChild(dragItem);
      }
      if(isMoving && dragItem) {
        dragItem.style.left = (mt.clientX - (card.offsetWidth/2)) + 'px'; dragItem.style.top = (mt.clientY - 20) + 'px';
        const below = document.elementFromPoint(mt.clientX, mt.clientY); const zone = below?.closest('.dropzone');
        if(currentTarget !== zone) { if(currentTarget) currentTarget.style.background = ''; currentTarget = zone; if(currentTarget) currentTarget.style.background = 'rgba(77,171,247,0.1)'; }
      }
    };
    const end = () => {
      if(!isMoving) { window.openViewer(dragId); }
      else if(currentTarget && dragItem) {
        const idx = storyboard.findIndex(s => s.id == dragId);
        if(idx !== -1) {
          const p = currentTarget.dataset.gkey.split(' ');
          storyboard[idx].year = parseInt(p.pop()); storyboard[idx].era = p.join(' ');
          storyboard[idx].month = parseInt(currentTarget.dataset.month); storyboard[idx].side = currentTarget.dataset.side;
          window.sync();
        }
      }
      if(dragItem) { dragItem.remove(); dragItem = null; }
      card.style.opacity = '1'; if(currentTarget) currentTarget.style.background = '';
      document.removeEventListener('touchmove', move); document.removeEventListener('touchend', end);
    };
    document.addEventListener('touchmove', move, { passive: false }); document.addEventListener('touchend', end);
  }, { passive: true });

  window.onload = () => { const last = localStorage.getItem('lastProject'); if(last) window.loadP(last); else window.openLoadModal(); };
</script>
</body>
</html>
