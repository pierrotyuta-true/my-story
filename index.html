<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ChronoDeck - 스토리 관리</title>
    <style>
        /* 1. 기존 앱 스타일 유지 (배경 및 레이아웃) */
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
        }

        /* 2. 커스텀 플로팅 모달 스타일 (추가된 부분) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); /* 배경 어둡게 */
            display: none; /* 기본은 숨김 */
            align-items: flex-end; /* 아래에서 올라오는 느낌 */
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 400px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            animation: slideUp 0.3s ease-out; /* 아래에서 쓱 올라오는 애니메이션 */
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            color: #333;
        }

        /* 버튼 스타일 */
        .menu-item {
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            border: none;
            border-radius: 12px;
            background: #f1f3f5;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-item:active { background: #e9ecef; }
        
        .menu-item.delete {
            color: #ff4d4d; /* 삭제는 빨간색으로 강조 */
            background: #fff5f5;
        }

        .cancel-btn {
            width: 100%;
            padding: 15px;
            margin-top: 5px;
            border: none;
            background: transparent;
            color: #888;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div style="padding: 20px;">
        <h3>내 글 목록</h3>
        <div style="display: flex; justify-content: space-between; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
            <span>📂 기본 문서</span>
            <button onclick="openMenu('기본 문서')" style="background:none; border:none; cursor:pointer; font-size: 18px;">≡</button>
        </div>
    </div>

    <div id="actionModal" class="modal-overlay" onclick="closeMenu()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modalTitle" class="modal-header">문서 관리</div>
            
            <button class="menu-item" onclick="renameDoc()">
                <span>✏️</span> 이름 변경
            </button>
            
            <button class="menu-item delete" onclick="deleteDoc()">
                <span>🗑️</span> 삭제하기
            </button>
            
            <button class="cancel-btn" onclick="closeMenu()">취소</button>
        </div>
    </div>

    <script>
        let currentDoc = "";

        // 메뉴 열기
        function openMenu(docName) {
            currentDoc = docName;
            document.getElementById('modalTitle').innerText = `'${docName}' 설정`;
            document.getElementById('actionModal').style.display = 'flex';
        }

        // 메뉴 닫기
        function closeMenu() {
            document.getElementById('actionModal').style.display = 'none';
        }

        // 이름 변경 기능
        function renameDoc() {
            closeMenu();
            // 이름 변경은 텍스트 입력이 필요하므로 prompt를 쓰거나, 별도의 입력 모달을 더 만들 수 있습니다.
            const newName = prompt(`'${currentDoc}'의 새 이름을 입력해주세요.`);
            if (newName) {
                alert(`이름이 '${newName}'으로 변경되었습니다.`);
                // 여기에 실제 DB 저장 로직을 넣으시면 됩니다.
            }
        }

        // 삭제 기능
        function deleteDoc() {
            closeMenu();
            if (confirm(`정말로 '${currentDoc}'을 삭제하시겠습니까?`)) {
                alert("삭제되었습니다.");
                // 여기에 실제 삭제 처리 로직을 넣으시면 됩니다.
            }
        }
    </script>
</body>
</html>
