<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>스토리마스터 Pro</title>
  <style>
    :root { --primary: #4dabf7; --bg: #f8f9fa; --card-bg: #ffffff; --line: #dee2e6; --danger: #ff8787; }
    body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); touch-action: pan-y; overflow-x: hidden; padding-bottom: 80px; color: #333; }
    body.dragging-active { touch-action: none; overflow: hidden; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    /* 레이아웃 */
    .header { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); z-index: 1000; padding: 0 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; height: 50px; align-items: center; }
    .timeline-container { position: relative; width: 100%; max-width: 800px; margin: 65px auto 0; padding: 0 10px; }
    .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--line); transform: translateX(-50%); z-index: 0; }
    
    .row { display: grid; grid-template-columns: 1fr 60px 1fr; align-items: center; position: relative; margin-bottom: 20px; }
    .node-container { display: flex; justify-content: center; align-items: center; z-index: 5; }
    .node { width: 10px; height: 10px; background: white; border: 2.5px solid var(--primary); border-radius: 50%; box-shadow: 0 0 0 3px var(--bg); }

    /* 곡선 연결선 (카드 박스에 밀착) */
    .curve-line { position: absolute; top: 50%; width: calc(50% - 10px); height: 35px; border: 1.5px solid var(--line); pointer-events: none; display: none; }
    .has-card .curve-line { display: block; }
    .left .curve-line { right: 0; border-left: 0; border-top: 0; border-radius: 0 0 15px 0; transform: translateY(-100%); }
    .right .curve-line { left: 0; border-right: 0; border-top: 0; border-radius: 0 0 0 15px; transform: translateY(-100%); }

    .year-marker { position: relative; width: fit-content; margin: 35px auto 20px; padding: 5px 15px; background: #495057; color: white; border-radius: 15px; font-size: 11px; font-weight: 800; z-index: 10; }
    .dropzone { min-height: 70px; padding: 5px; display: flex; flex-direction: column; justify-content: center; gap: 8px; }

    /* 카드 */
    .card { background: #fff; width: 100%; max-width: 230px; border-radius: 10px; padding: 12px 12px 12px 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; z-index: 20; border: 1px solid rgba(0,0,0,0.06); }
    .card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background-color: var(--card-accent, #eee); border-radius: 10px 0 0 10px; }
    .card-month { font-size: 9px; font-weight: 900; color: #adb5bd; margin-bottom: 3px; }
    .card-content { font-size: 11.5px; line-height: 1.4; font-weight: 600; color: #444; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }

    /* 네비게이션 */
    .nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #fff; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
    .nav-btn { border: none; background: none; font-size: 9px; font-weight: 800; color: #adb5bd; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
    .nav-btn svg { width: 20px; height: 20px; stroke: #adb5bd; stroke-width: 2.5; fill: none; }
    .add-btn { font-size: 30px; color: var(--primary); background: none; border: none; font-weight: 200; cursor: pointer; flex: 1; }

    /* 모달 */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 4000; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
    .modal-content { background: white; width: 85%; max-width: 300px; padding: 20px; border-radius: 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
    
    label { font-size: 9.5px; font-weight: 800; color: #adb5bd; margin-bottom: 4px; display: block; }
    input, textarea, select { width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #f1f1f1; background: #f8f9fa; font-size: 12px; outline: none; }

    .color-chip { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid white; box-shadow: 0 0 0 1px #eee; flex-shrink: 0; }
    .color-chip.selected { box-shadow: 0 0 0 2px var(--primary); }

    .btn-wrap { display: flex; gap: 8px; align-items: center; margin-top: 5px; }
    .btn-main { flex: 2; padding: 12px; border: none; border-radius: 10px; font-weight: 800; font-size: 13px; cursor: pointer; background: var(--primary); color: white; }
    .btn-del-small { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: 700; font-size: 11px; cursor: pointer; background: #fff1f1; color: var(--danger); }
    .btn-close { width: 100%; margin-top: 10px; background: none; border: none; color: #ccc; font-size: 11px; cursor: pointer; }

    /* 커스텀 토스트 알림 */
    #toast { visibility: hidden; min-width: 150px; background-color: #333; color: #fff; text-align: center; border-radius: 10px; padding: 10px; position: fixed; z-index: 5000; left: 50%; bottom: 100px; transform: translateX(-50%); font-size: 12px; font-weight: 700; }
    #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 1.5s; }
    @keyframes fadein { from {bottom: 80px; opacity: 0;} to {bottom: 100px; opacity: 1;} }
    @keyframes fadeout { from {bottom: 100px; opacity: 1;} to {bottom: 80px; opacity: 0;} }
  </style>
</head>
<body>

<div id="toast">저장되었습니다</div>

<div class="header">
  <div style="font-size:14px; font-weight:900; color:var(--primary);" id="projectTitle">STORY MASTER</div>
  <button onclick="saveToCloud()" style="background:var(--primary); color:white; border:none; padding:6px 14px; border-radius:8px; font-weight:800; font-size:11px;">저장</button>
</div>

<div class="timeline-container" id="timeline"></div>

<div class="nav">
  <button class="nav-btn" onclick="openLoadModal()"><svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><span>목록</span></button>
  <button class="nav-btn" onclick="openEraModal()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span>시대</span></button>
  <button class="add-btn" onclick="addScene()">+</button>
  <button class="nav-btn" onclick="openCharModal()"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span>캐릭터</span></button>
  <button class="nav-btn" onclick="location.reload()"><svg viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg><span>갱신</span></button>
</div>

<div id="viewModal" class="modal"><div class="modal-content">
  <div id="viewMonth" style="font-size:10px; font-weight:900; color:var(--primary); margin-bottom:8px;"></div>
  <div id="viewText" style="font-size:13px; line-height:1.6; color:#444; margin-bottom:15px; white-space:pre-wrap;"></div>
  <div id="viewTags" style="display:flex; flex-wrap:wrap; gap:4px; margin-bottom:15px;"></div>
  <div class="btn-wrap">
    <button class="btn-main" style="background:#f1f3f5; color:#adb5bd" onclick="closeModal('viewModal')">닫기</button>
    <button class="btn-main" onclick="goToEdit()">수정하기</button>
  </div>
</div></div>

<div id="editModal" class="modal"><div class="modal-content">
  <h3 id="editTitle" style="margin:0 0 15px 0; font-size:14px;">기록 수정</h3>
  <div style="display:flex; gap:8px;">
    <div style="flex:1.5"><label>시대</label><select id="eraType" style="padding:8px;"></select></div>
    <div style="flex:1"><label>연도</label><input type="number" id="eYear" style="padding:8px;"></div>
    <div style="flex:1"><label>월</label><select id="eMonth" style="padding:8px;"><script>for(let i=1;i<=12;i++)document.write(`<option value="${i}">${i}월</option>`)</script></select></div>
  </div>
  <label>포인트 컬러</label><div id="colorPicker" style="display:flex; gap:6px; margin-bottom:15px; flex-wrap:wrap;"></div>
  <label>캐릭터 태그</label><div id="charTagSelector" style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:15px;"></div>
  <textarea id="eContent" rows="4" style="font-size:12px;" placeholder="내용 입력..."></textarea>
  <div class="btn-wrap">
    <button id="delBtn" class="btn-del-small" onclick="handleDelete()">삭제</button>
    <button class="btn-main" onclick="saveScene()">기록 완료</button>
  </div>
  <button class="btn-close" onclick="closeModal('editModal')">취소</button>
</div></div>

<div id="loadModal" class="modal"><div class="modal-content">
  <h3 style="font-size:14px;">작업 목록</h3>
  <div id="projectList" style="max-height:250px; overflow-y:auto;"></div>
  <button class="btn-main" style="width:100%; margin-top:10px;" onclick="createNewProject()">+ 새 프로젝트</button>
  <button class="btn-close" onclick="closeModal('loadModal')">닫기</button>
</div></div>

<div id="eraModal" class="modal"><div class="modal-content"><h3>시대 관리</h3><div style="display:flex; gap:5px; margin-bottom:10px;"><input type="text" id="newEraName" style="margin:0"><button onclick="addEra()" style="background:var(--primary); color:white; border:none; padding:0 10px; border-radius:8px;">+</button></div><div id="eraListGrid"></div><button class="btn-close" onclick="closeModal('eraModal')">닫기</button></div></div>
<div id="charModal" class="modal"><div class="modal-content"><h3>캐릭터 관리</h3><div style="display:flex; gap:5px; margin-bottom:10px;"><input type="text" id="newCharName" style="margin:0"><button onclick="addChar()" style="background:var(--primary); color:white; border:none; padding:0 10px; border-radius:8px;">+</button></div><div id="charListGrid"></div><button class="btn-close" onclick="closeModal('charModal')">닫기</button></div></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, get, remove } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

  const firebaseConfig = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", authDomain: "true-s.firebaseapp.com", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let storyboard = [], eras = ["공통"], chars = [], currentProject = null, editingId = null;
  const userColors = ["#eee", "#d0ebff", "#fff9db", "#d3f9d8", "#ffdeeb", "#eebefa", "#dae1e7", "#495057", "#ffd43b"];
  let selectedColor = "#eee", selectedChars = [];

  // --- 커스텀 알림 ---
  window.showToast = (msg) => { const t = document.getElementById("toast"); t.innerText = msg; t.className = "show"; setTimeout(() => { t.className = t.className.replace("show", ""); }, 2000); };

  // --- 상호작용 (드래그 & 클릭) ---
  document.addEventListener('mousedown', e => handleInteraction(e));
  document.addEventListener('touchstart', e => handleInteraction(e), {passive: false});

  function handleInteraction(e) {
    const card = e.target.closest('.card');
    if(!card) return;
    const startTime = Date.now();
    const onEndInteraction = (endEvent) => {
      if(Date.now() - startTime < 200) openViewer(card.dataset.id);
      window.removeEventListener('mouseup', onEndInteraction);
      window.removeEventListener('touchend', onEndInteraction);
    };
    window.addEventListener('mouseup', onEndInteraction);
    window.addEventListener('touchend', onEndInteraction);
    initDrag(e, card.dataset.id);
  }

  let dragItem = null, startX, startY, currentTarget = null;
  function initDrag(e, id) {
    if(e.target.tagName === 'BUTTON') return;
    const card = document.querySelector(`.card[data-id="${id}"]`);
    const rect = card.getBoundingClientRect();
    const touch = e.type.includes('touch') ? e.touches[0] : e;
    startX = touch.clientX - rect.left; startY = touch.clientY - rect.top;

    const moveHandler = (me) => {
      if(!dragItem) { dragItem = card.cloneNode(true); dragItem.classList.add('dragging'); dragItem.style.position = 'fixed'; dragItem.style.width = rect.width + 'px'; dragItem.style.zIndex = '5000'; document.body.appendChild(dragItem); document.body.classList.add('dragging-active'); }
      me.preventDefault(); const mt = me.type.includes('touch') ? me.touches[0] : me;
      dragItem.style.left = (mt.clientX - startX) + 'px'; dragItem.style.top = (mt.clientY - startY) + 'px';
      dragItem.style.display = 'none'; const below = document.elementFromPoint(mt.clientX, mt.clientY); dragItem.style.display = 'block';
      const zone = below?.closest('.dropzone');
      if(currentTarget !== zone) { currentTarget?.classList.remove('over'); currentTarget = zone; currentTarget?.classList.add('over'); }
    };

    const endHandler = () => {
      if(currentTarget && dragItem) {
        const idx = storyboard.findIndex(s => s.id == id);
        const p = currentTarget.dataset.gkey.split(' ');
        storyboard[idx].year = parseInt(p.pop()); storyboard[idx].era = p.join(' ');
        storyboard[idx].month = parseInt(currentTarget.dataset.month); storyboard[idx].side = currentTarget.dataset.side;
        sync();
      } else if(dragItem) render();
      dragItem?.remove(); dragItem = null; currentTarget = null; document.body.classList.remove('dragging-active');
      window.removeEventListener('touchmove', moveHandler); window.removeEventListener('touchend', endHandler);
      window.removeEventListener('mousemove', moveHandler); window.removeEventListener('mouseup', endHandler);
    };
    window.addEventListener(e.type.includes('touch') ? 'touchmove' : 'mousemove', moveHandler, { passive: false });
    window.addEventListener(e.type.includes('touch') ? 'touchend' : 'mouseup', endHandler);
  }

  // --- 렌더링 (곡선 밀착 적용) ---
  window.render = () => {
    const container = document.getElementById('timeline');
    if(!currentProject) { container.innerHTML = '<div style="text-align:center; padding-top:150px; color:#ccc;">연력을 선택하세요.</div>'; return; }
    container.innerHTML = '<div class="center-line"></div>';
    const groups = {};
    storyboard.sort((a,b)=>a.year-b.year).forEach(s => {
      const k = `${s.era || eras[0]} ${s.year}년`;
      if(!groups[k]) groups[k] = {};
      if(!groups[k][s.month]) groups[k][s.month] = { left: [], right: [] };
      groups[k][s.month][s.side || 'left'].push(s);
    });
    Object.keys(groups).forEach(key => {
      container.innerHTML += `<div class="year-marker">${key}</div>`;
      Object.keys(groups[key]).sort((a,b)=>a-b).forEach(m => {
        const row = document.createElement('div'); row.className = 'row';
        row.innerHTML = `<div class="line-wrapper left ${groups[key][m].left.length > 0 ? 'has-card' : ''}"><div class="curve-line"></div><div class="dropzone" data-gkey="${key}" data-month="${m}" data-side="left"></div></div>
          <div class="node-container"><div class="node"></div></div>
          <div class="line-wrapper right ${groups[key][m].right.length > 0 ? 'has-card' : ''}"><div class="curve-line"></div><div class="dropzone" data-gkey="${key}" data-month="${m}" data-side="right"></div></div>`;
        container.appendChild(row);
        ['left', 'right'].forEach(side => {
          const zone = row.querySelector(`.${side} .dropzone`);
          groups[key][m][side].forEach(sc => {
            const card = document.createElement('div'); card.className = 'card'; card.dataset.id = sc.id;
            card.style.setProperty('--card-accent', sc.color || "#eee");
            card.innerHTML = `<div class="card-month">${m}월</div><div class="card-content">${sc.text}</div>`;
            zone.appendChild(card);
          });
        });
      });
    });
  };

  // --- 프로젝트 관리 (삭제 기능 추가) ---
  window.openLoadModal = () => {
    get(ref(db, 'projects')).then(s => {
      const d = s.val();
      document.getElementById('projectList').innerHTML = d ? Object.keys(d).map(k => `
        <div style="display:flex; gap:5px; margin-bottom:8px;">
          <button onclick="loadP('${k}')" style="flex:1; padding:10px; border:1px solid #eee; border-radius:10px; background:#fff; text-align:left; font-weight:700; font-size:12px;">📁 ${k}</button>
          <button onclick="deleteProject('${k}')" style="padding:10px; border:none; background:#fff1f1; color:red; border-radius:10px; font-weight:900;">X</button>
        </div>`).join('') : '';
      document.getElementById('loadModal').style.display = 'flex';
    });
  };
  window.deleteProject = (k) => { if(confirm(`'${k}' 연력을 완전히 삭제할까요?`)) { remove(ref(db, `projects/${k}`)).then(() => { if(currentProject === k) location.reload(); else openLoadModal(); }); } };

  // --- 기타 기능들 ---
  window.saveToCloud = () => { if(currentProject) set(ref(db, `projects/${currentProject}`), { data: storyboard, eras, chars }).then(() => showToast("저장되었습니다")); };
  window.sync = () => { if(currentProject) set(ref(db, `projects/${currentProject}`), { data: storyboard, eras, chars }).then(() => render()); };
  window.openViewer = (id) => { editingId = id; const s = storyboard.find(x => x.id == id); if(!s) return; document.getElementById('viewMonth').innerText = `${s.era} ${s.year}년 ${s.month}월`; document.getElementById('viewText').innerText = s.text; document.getElementById('viewTags').innerHTML = (s.chars || []).map(c => `<span style="font-size:9px; background:#f1f3f5; padding:3px 7px; border-radius:6px; font-weight:700;">${c}</span>`).join(''); document.getElementById('viewModal').style.display = 'flex'; };
  window.goToEdit = () => { closeModal('viewModal'); openEdit(editingId); };
  window.openEdit = (id) => { editingId = id; const s = storyboard.find(x => x.id == id); document.getElementById('eContent').value = s ? s.text : ""; document.getElementById('eYear').value = s ? s.year : "2024"; document.getElementById('eMonth').value = s ? s.month : "1"; document.getElementById('eraType').innerHTML = eras.map(e => `<option value="${e}">${e}</option>`).join(''); if(s) document.getElementById('eraType').value = s.era; document.getElementById('delBtn').style.visibility = id ? "visible" : "hidden"; selectedColor = s ? (s.color || "#eee") : "#eee"; selectedChars = s ? (s.chars || []) : []; updateColorUI(); updateCharUI_inEdit(); document.getElementById('editModal').style.display = 'flex'; };
  window.saveScene = () => { const text = document.getElementById('eContent').value.trim(); if(!text) return; const data = { id: editingId || Date.now().toString(), era: document.getElementById('eraType').value, year: parseInt(document.getElementById('eYear').value), month: parseInt(document.getElementById('eMonth').value), text, color: selectedColor, chars: selectedChars, side: editingId ? (storyboard.find(x=>x.id==editingId).side || 'left') : 'left' }; if(editingId) storyboard = storyboard.map(s => s.id == editingId ? data : s); else storyboard.push(data); closeModal('editModal'); sync(); };
  window.handleDelete = () => { if(confirm("삭제할까요?")) { storyboard = storyboard.filter(s => s.id != editingId); closeModal('editModal'); sync(); } };
  window.closeModal = (id) => document.getElementById(id).style.display = 'none';
  window.addScene = () => { if(currentProject) openEdit(null); };
  window.selectColor = (c) => { selectedColor = c; updateColorUI(); };
  window.updateColorUI = () => { document.getElementById('colorPicker').innerHTML = userColors.map(c => `<div class="color-chip ${selectedColor === c ? 'selected' : ''}" style="background:${c}" onclick="selectColor('${c}')"></div>`).join(''); };
  window.toggleChar = (c) => { if(selectedChars.includes(c)) selectedChars = selectedChars.filter(x => x !== c); else selectedChars.push(c); updateCharUI_inEdit(); };
  window.updateCharUI_inEdit = () => { document.getElementById('charTagSelector').innerHTML = chars.map(c => `<div style="padding:6px 10px; border-radius:8px; background:${selectedChars.includes(c)?'var(--primary)':'#f1f3f5'}; color:${selectedChars.includes(c)?'white':'#333'}; font-size:10px; font-weight:700; cursor:pointer;" onclick="toggleChar('${c}')">${c}</div>`).join('') || '<span style="color:#ccc; font-size:10px;">캐릭터 없음</span>'; };
  window.loadP = (k) => { currentProject = k; localStorage.setItem('lastProject', k); document.getElementById('projectTitle').innerText = k; onValue(ref(db, `projects/${k}`), s => { const d = s.val(); if(d){ storyboard=d.data||[]; eras=d.eras||["공통"]; chars=d.chars||[]; render(); } }, {onlyOnce:true}); closeModal('loadModal'); };
  window.createNewProject = () => { const n = prompt("새 연력 이름"); if(n) { currentProject = n; storyboard = []; eras = ["공통"]; chars = []; sync(); closeModal('loadModal'); } };
  window.addEra = () => { const n = document.getElementById('newEraName').value.trim(); if(n && !eras.includes(n)) { eras.push(n); sync(); openEraModal(); document.getElementById('newEraName').value=''; } };
  window.openEraModal = () => { document.getElementById('eraListGrid').innerHTML = eras.map(e => `<div style="display:flex; justify-content:space-between; padding:8px; background:#f8f9fa; border-radius:8px; margin-bottom:5px; font-size:11px;"><span>${e}</span><button onclick="delEra('${e}')" style="color:red; border:none; background:none;">X</button></div>`).join(''); document.getElementById('eraModal').style.display = 'flex'; };
  window.addChar = () => { const n = document.getElementById('newCharName').value.trim(); if(n && !chars.includes(n)) { chars.push(n); sync(); openCharModal(); document.getElementById('newCharName').value=''; } };
  window.openCharModal = () => { document.getElementById('charListGrid').innerHTML = chars.map(c => `<div style="display:flex; justify-content:space-between; padding:8px; background:#f8f9fa; border-radius:8px; margin-bottom:5px; font-size:11px;"><span>${c}</span><button onclick="delChar('${c}')" style="color:red; border:none; background:none;">X</button></div>`).join(''); document.getElementById('charModal').style.display = 'flex'; };

  const last = localStorage.getItem('lastProject'); if(last) loadP(last);
</script>
</body>
</html>
