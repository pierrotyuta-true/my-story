<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>STORY MASTER Pro v16</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    :root { --primary: #4dabf7; --bg: #f1f3f5; --card-bg: #ffffff; --line: #dee2e6; --text: #212529; --gray: #868e96; }
    body { font-family: 'Pretendard', sans-serif; margin: 0; background-color: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 70px; -webkit-user-select: none; user-select: none; touch-action: pan-y; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    /* 헤더 & 탭 */
    .header-container { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid #eee; }
    .header { height: 50px; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; }
    .top-nav { height: 45px; display: flex; justify-content: center; align-items: center; gap: 30px; border-top: 1px solid #f8f9fa; }
    .nav-item { font-size: 13px; font-weight: 800; color: #adb5bd; cursor: pointer; padding-bottom: 3px; border-bottom: 2px solid transparent; }
    .nav-item.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* 메인 뷰 컨테이너 */
    .content-view { display: none; margin-top: 105px; padding: 15px; min-height: calc(100vh - 175px); overflow-y: auto; }
    .content-view.active { display: block; }

    /* [타임라인 스타일] */
    .timeline-container { position: relative; width: 100%; max-width: 500px; margin: 0 auto; }
    .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--line); transform: translateX(-50%); }
    .year-marker { position: relative; width: fit-content; margin: 25px auto 15px; padding: 6px 14px; background: #343a40; color: white; border-radius: 20px; font-size: 10px; font-weight: 800; z-index: 10; }
    .row { display: grid; grid-template-columns: 1fr 1fr; position: relative; margin-bottom: 25px; min-height: 80px; }
    .node { width: 10px; height: 10px; background: white; border: 2px solid var(--primary); border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); top: 30px; z-index: 5; }
    .dropzone { display: flex; flex-direction: column; gap: 15px; padding: 0 5px; min-height: 80px; }
    .dropzone[data-side="left"] { align-items: flex-end; padding-right: 35px; }
    .dropzone[data-side="right"] { align-items: flex-start; padding-left: 35px; }

    /* 인덱스 탭 & 카드 */
    .card-wrapper { position: relative; width: 105px; z-index: 10; cursor: pointer; }
    .side-tabs { position: absolute; top: 8px; display: flex; flex-direction: column; gap: 2px; }
    .dropzone[data-side="left"] .side-tabs { right: 100%; align-items: flex-end; }
    .dropzone[data-side="right"] .side-tabs { left: 100%; align-items: flex-start; }
    .tab-idx { width: 12px; height: 18px; border: 1px solid rgba(0,0,0,0.03); }
    .tab-white { background: #fff; }
    .tab-blue { background: #d0ebff; } .tab-yellow { background: #fff9db; } .tab-green { background: #d3f9d8; } .tab-pink { background: #ffdeeb; }
    .card { background: #fff; width: 100%; min-height: 60px; border-radius: 10px; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
    .card-month { font-size: 8px; font-weight: 900; color: var(--primary); }
    .card-content { font-size: 10.5px; font-weight: 700; line-height: 1.4; color: #444; }

    /* [캐릭터 4열 스타일] */
    .char-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .char-item { text-align: center; }
    .char-circle { width: 65px; height: 65px; border-radius: 20px; background: #eee; margin: 0 auto 5px; overflow: hidden; border: 2px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; }
    .char-circle img { width: 100%; height: 100%; object-fit: cover; }
    .char-name { font-size: 11px; font-weight: 800; }

    /* 모달 공통 */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
    .modal-content { background: white; width: 85%; max-width: 400px; padding: 20px; border-radius: 20px; max-height: 85vh; overflow-y: auto; }
    .v-tab { padding: 6px 12px; border-radius: 8px 8px 0 0; font-size: 11px; font-weight: 800; border: 1px solid #eee; background: #f1f3f5; }
    .v-tab.active { background: white; border-bottom: none; color: var(--primary); }
    .btn-pill { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; margin-top: 10px; }
    .btn-ghost { background: #f1f3f5; border: none; padding: 10px; border-radius: 10px; font-weight: 700; width: 100%; margin-top: 5px; }

    /* 하단 내비 */
    .nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #fff; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; }
    .add-btn { width: 50px; height: 50px; background: var(--primary); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-top: -30px; border: 4px solid #fff; box-shadow: 0 4px 12px rgba(77,171,247,0.3); }
  </style>
</head>
<body>

<div class="header-container">
  <div class="header">
    <div style="font-weight:900; color:var(--primary);">STORY MASTER Pro</div>
    <div id="projectTitle" style="font-size:13px; font-weight:800;">이그리예가</div>
    <button onclick="window.saveToCloud()" style="border:none; background:none; font-size:20px;">☁️</button>
  </div>
  <div class="top-nav">
    <div id="t-timeline" class="nav-item active" onclick="switchView('timeline')">타임라인</div>
    <div id="t-story" class="nav-item" onclick="switchView('story')">스토리</div>
    <div id="t-char" class="nav-item" onclick="switchView('char')">캐릭터</div>
  </div>
</div>

<div id="view-timeline" class="content-view active">
  <div id="searchBar" style="display:flex; gap:6px; overflow-x:auto; margin-bottom:15px; scrollbar-width:none;"></div>
  <div class="timeline-container" id="timeline"></div>
</div>

<div id="view-story" class="content-view">
  <div id="story-render"></div>
  <textarea id="story-input" style="width:100%; padding:12px; border-radius:12px; border:1px solid #eee; height:120px;" placeholder="새로운 이야기..."></textarea>
</div>

<div id="view-char" class="content-view">
  <div class="char-grid" id="char-render"></div>
</div>

<div class="nav">
  <button onclick="window.openLoadModal()" style="border:none; background:none; font-size:11px; font-weight:800; color:#adb5bd;">목록</button>
  <button onclick="window.openEraModal()" style="border:none; background:none; font-size:11px; font-weight:800; color:#adb5bd;">시대</button>
  <div class="add-btn" id="mainAddBtn" onclick="window.addScene()">+</div>
  <button style="border:none; background:none; font-size:11px; font-weight:800; color:#adb5bd;">필터</button>
  <button onclick="location.reload()" style="border:none; background:none; font-size:11px; font-weight:800; color:#adb5bd;">갱신</button>
</div>

<div id="viewModal" class="modal"><div class="modal-content">
    <div style="display:flex; align-items:flex-end; gap:4px;" id="viewTabMenu"></div>
    <div style="border:1px solid #ddd; border-radius:0 12px 12px 12px; padding:15px; background:white; margin-bottom:15px;">
      <div id="viewMonth" style="font-size:11px; font-weight:900; color:var(--primary); margin-bottom:5px;"></div>
      <div id="viewText" style="font-size:14px; line-height:1.6; font-weight:700; min-height:80px; white-space:pre-wrap;"></div>
    </div>
    <div style="display:flex; gap:8px;"><button class="btn-pill" onclick="window.handleTabEdit()">편집</button><button class="btn-ghost" onclick="window.showBranchInput()">+ 가지</button></div>
    <button class="btn-ghost" onclick="window.closeModal('viewModal')">닫기</button>
</div></div>

<div id="editModal" class="modal"><div class="modal-content">
    <h4 style="text-align:center; margin:0 0 15px 0;">기록 편집</h4>
    <div style="display:flex; gap:6px;">
        <select id="eraType" style="flex:1.5; padding:8px;"></select>
        <input type="number" id="eYear" style="flex:1; padding:8px;" placeholder="년">
        <select id="eMonth" style="flex:1; padding:8px;"><script>for(let i=1;i<=12;i++)document.write(`<option value="${i}">${i}월</option>`)</script></select>
    </div>
    <div id="charTagSelector" style="display:flex; flex-wrap:wrap; gap:5px; margin:10px 0;"></div>
    <textarea id="eContent" style="width:100%; height:100px; padding:10px; margin-top:10px;" placeholder="내용을 입력하세요"></textarea>
    <button class="btn-pill" onclick="window.saveScene()">저장</button>
    <button class="btn-ghost" style="color:red;" id="delBtn">삭제</button>
    <button class="btn-ghost" onclick="window.closeModal('editModal')">취소</button>
</div></div>

<div id="charEditModal" class="modal"><div class="modal-content">
  <h4 style="text-align:center;">캐릭터 정보</h4>
  <div style="display:flex; justify-content:center; margin-bottom:15px;" onclick="document.getElementById('c-file').click()">
    <img id="c-preview" style="width:80px; height:80px; border-radius:20px; object-fit:cover; border:2px solid var(--primary); display:none;">
    <div id="c-empty" style="width:80px; height:80px; border-radius:20px; background:#f1f3f5; display:flex; align-items:center; justify-content:center; font-size:30px;">👤</div>
    <input type="file" id="c-file" hidden onchange="window.handleCharImg(event)">
  </div>
  <input type="text" id="cName" style="width:100%; margin-bottom:10px;" placeholder="이름">
  <textarea id="cNote" style="width:100%; height:80px;" placeholder="특징 및 메모"></textarea>
  <button class="btn-pill" onclick="window.saveCharInfo()">저장</button>
  <button class="btn-ghost" onclick="window.closeModal('charEditModal')">취소</button>
</div></div>

<script>
  // Firebase 초기화 (유타님의 기존 설정 그대로)
  const config = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", authDomain: "true-s.firebaseapp.com", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
  if (!firebase.apps.length) firebase.initializeApp(config);
  const db = firebase.database();

  let storyboard = [], eras = ["공통"], chars = [], charDetails = {}, currentProject = "이그리예가";
  let editingId = null, currentViewTab = 0, selectedFilter = null, selectedChars = [], tempImg = "";
  const pastelTabs = ["tab-blue", "tab-yellow", "tab-green", "tab-pink"];

  // 뷰 전환
  function switchView(view) {
    document.querySelectorAll('.content-view, .nav-item').forEach(e => e.classList.remove('active'));
    document.getElementById(`view-${view}`).classList.add('active');
    document.getElementById(`t-${view}`).classList.add('active');
    
    // 버튼 기능 변경
    const btn = document.getElementById('mainAddBtn');
    if(view === 'timeline') btn.onclick = window.addScene;
    else if(view === 'story') btn.onclick = window.addStory;
    else if(view === 'char') btn.onclick = window.openCharAdd;
  }

  // [유타님의 타임라인 렌더링 로직]
  window.renderTimeline = () => {
    const container = document.getElementById('timeline');
    container.innerHTML = '<div class="center-line"></div>';
    let filtered = selectedFilter ? storyboard.filter(s => (s.chars||[]).includes(selectedFilter)) : storyboard;
    
    eras.forEach(eName => {
        const eraData = filtered.filter(s => s.era === eName).sort((a,b) => (a.year - b.year) || (a.month - b.month));
        const groups = {};
        eraData.forEach(sc => {
            const k = `${eName} ${sc.year}년`;
            if(!groups[k]) groups[k] = {}; if(!groups[k][sc.month]) groups[k][sc.month] = {left:[], right:[]};
            groups[k][sc.month][sc.side||'left'].push(sc);
        });

        Object.keys(groups).forEach(key => {
            container.innerHTML += `<div class="year-marker">${key}</div>`;
            Object.keys(groups[key]).sort((a,b)=>a-b).forEach(m => {
                const row = document.createElement('div'); row.className = 'row';
                row.innerHTML = `<div class="dropzone" data-gkey="${key}" data-month="${m}" data-side="left"></div><div class="node"></div><div class="dropzone" data-gkey="${key}" data-month="${m}" data-side="right"></div>`;
                container.appendChild(row);
                ['left','right'].forEach(side => {
                    const zone = row.querySelector(`.dropzone[data-side="${side}"]`);
                    groups[key][m][side].forEach(sc => {
                        const wrap = document.createElement('div'); wrap.className = 'card-wrapper';
                        wrap.dataset.id = sc.id;
                        let tabsHtml = `<div class="tab-idx tab-white"></div>`;
                        if(sc.branches) sc.branches.forEach((_,i) => tabsHtml += `<div class="tab-idx ${pastelTabs[i]||'tab-blue'}"></div>`);
                        wrap.innerHTML = `<div class="side-tabs">${tabsHtml}</div><div class="card"><div class="card-month">${m}월</div><div class="card-content">${sc.text}</div></div>`;
                        zone.appendChild(wrap);
                    });
                });
            });
        });
    });
    window.updateSearchBar();
  };

  // [드래그 앤 드롭 및 꾹 누르기]
  let dragItem = null, dragId = null, isMoving = false, pressTimer;
  document.addEventListener('touchstart', (e) => {
    const wrap = e.target.closest('.card-wrapper');
    const char = e.target.closest('.char-item');
    
    if(wrap) {
        dragId = wrap.dataset.id;
        pressTimer = setTimeout(() => { isMoving = true; /* 드래그 시작 시각 효과 */ }, 200);
    }
    if(char) {
        const name = char.querySelector('.char-name').innerText;
        pressTimer = setTimeout(() => { window.editCharExist(name); }, 600);
    }
  });

  document.addEventListener('touchend', () => {
    clearTimeout(pressTimer);
    if(!isMoving && dragId) window.openViewer(dragId);
    isMoving = false; dragId = null;
  });

  // [캐릭터 렌더링 (4열)]
  window.renderChars = () => {
    const grid = document.getElementById('char-render');
    grid.innerHTML = chars.map(c => `
        <div class="char-item">
            <div class="char-circle">${charDetails[c]?.img ? `<img src="${charDetails[c].img}">` : '👤'}</div>
            <div class="char-name">${c}</div>
        </div>
    `).join('');
  };

  // [데이터 동기화]
  window.sync = () => {
    db.ref('projects/'+currentProject).set({ storyboard, eras, chars, charDetails }).then(() => {
        window.renderTimeline();
        window.renderChars();
    });
  };

  // [상세 보기 및 가지 제어]
  window.openViewer = (id) => {
    editingId = id; const s = storyboard.find(x => x.id == id);
    if(!s) return; currentViewTab = 0; window.renderTabs(s); window.openModal('viewModal');
  };
  window.renderTabs = (s) => {
    const menu = document.getElementById('viewTabMenu');
    let tabs = [`<div class="v-tab active" onclick="window.switchTab(0)">사건</div>`];
    (s.branches || []).forEach((_, i) => tabs.push(`<div class="v-tab ${pastelTabs[i]} ${currentViewTab===(i+1)?'active':''}" onclick="window.switchTab(${i+1})">탭 ${i+1}</div>`));
    menu.innerHTML = tabs.join('');
    document.getElementById('viewMonth').innerText = `${s.era} ${s.year}년 ${s.month}월`;
    document.getElementById('viewText').innerText = currentViewTab === 0 ? s.text : s.branches[currentViewTab-1];
  };

  // 초기 실행
  window.onload = () => {
    db.ref('projects/'+currentProject).on('value', s => {
        const d = s.val();
        if(d) {
            storyboard = d.storyboard || [];
            eras = d.eras || ["공통"];
            chars = d.chars || [];
            charDetails = d.charDetails || {};
            window.renderTimeline();
            window.renderChars();
        }
    });
  };

  // [필요한 함수들 정의]
  window.closeModal = (id) => document.getElementById(id).style.display = 'none';
  window.openModal = (id) => document.getElementById(id).style.display = 'flex';
  window.addScene = () => { editingId = null; window.openModal('editModal'); };
  window.saveToCloud = () => window.sync();
  window.updateSearchBar = () => {
    document.getElementById('searchBar').innerHTML = `<div onclick="window.filterByChar(null)" style="padding:4px 12px; border-radius:15px; background:${selectedFilter===null?var(--primary):'#fff'}; color:${selectedFilter===null?'#fff':'#868e96'}; font-size:11px; border:1px solid #eee;">전체</div>` + chars.map(c => `<div onclick="window.filterByChar('${c}')" style="padding:4px 12px; border-radius:15px; background:${selectedFilter===c?var(--primary):'#fff'}; color:${selectedFilter===c?'#fff':'#868e96'}; font-size:11px; border:1px solid #eee;">${c}</div>`).join('');
  };
</script>
</body>
</html>
