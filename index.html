<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Yuta's Engine Pro (Drag & Drop v16)</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    :root { --primary: #4dabf7; --bg: #f8f9fa; --node: #343a40; --line: #dee2e6; }
    body { font-family: 'Pretendard', sans-serif; margin: 0; background-color: var(--bg); color: #343a40; touch-action: none; overflow: hidden; }
    
    .app-header { height: 50px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: fixed; top: 0; width: 100%; z-index: 1100; border-bottom: 1px solid #eee; box-sizing: border-box; }
    .top-nav { display: flex; justify-content: space-around; background: #fff; position: fixed; top: 50px; width: 100%; z-index: 1000; border-bottom: 1px solid #eee; height: 45px; align-items: center; }
    .nav-item { font-size: 13px; font-weight: 800; color: #adb5bd; }
    .nav-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); padding-bottom: 5px; }

    /* 타임라인 캔버스 (드래그 앤 드롭 영역) */
    .view { display: none; height: 100vh; width: 100vw; position: relative; overflow: auto; padding-top: 100px; }
    .view.active { display: block; }
    .tl-container { position: relative; width: 2000px; height: 2000px; background-image: radial-gradient(#dee2e6 1.5px, transparent 1.5px); background-size: 30px 30px; }
    
    /* 다시 추가된 중앙 검정 박스 (연대 표시) */
    .center-line { position: absolute; left: 500px; top: 0; bottom: 0; width: 2px; background: var(--line); z-index: 1; }
    .era-marker { position: absolute; left: 501px; transform: translateX(-50%); background: #222; color: #fff; padding: 6px 15px; border-radius: 20px; font-size: 12px; font-weight: 800; z-index: 5; white-space: nowrap; }

    /* 메모 박스 (드래그 가능) */
    .card { position: absolute; width: 160px; min-height: 100px; background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 15px; box-sizing: border-box; z-index: 10; cursor: grab; border: 1px solid #eee; }
    .card:active { cursor: grabbing; box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
    .card .date-tag { font-size: 11px; color: var(--primary); font-weight: 800; margin-bottom: 6px; pointer-events: none; }
    .card .content { font-size: 13px; line-height: 1.5; pointer-events: none; }

    /* 모달 디자인 */
    .bottom-modal { position: fixed; bottom: -100%; left: 0; width: 100%; background: white; z-index: 2000; transition: bottom 0.3s ease; border-radius: 25px 25px 0 0; padding: 25px; box-sizing: border-box; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); max-height: 85vh; overflow-y: auto; }
    .bottom-modal.active { bottom: 0; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1900; }
    .overlay.active { display: block; }

    /* 가지(Branch) 파스텔 컬러 시스템 */
    .tab-item { padding: 8px 18px; border-radius: 10px; font-size: 12px; font-weight: 800; cursor: pointer; border: none; background: #f1f3f5; color: #adb5bd; transition: 0.2s; }
    .tab-item.active { color: #343a40; }
    .tab-item.main-tab { background: #fff; border: 1px solid #eee; color: #343a40; } /* 기본 기록: 흰 바탕 */
    .tab-item.main-tab.active { border-color: var(--primary); font-size: 14px; } /* 기본 기록 활성화 시 글씨 크게 */

    /* 파스텔 순서: 블루, 그린, 옐로, 레드, 퍼플 */
    .br-0.active { background: #d0ebff !important; }
    .br-1.active { background: #b2f2bb !important; }
    .br-2.active { background: #ffec99 !important; }
    .br-3.active { background: #ffc9c9 !important; }
    .br-4.active { background: #eebefa !important; }

    input, textarea { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; font-family: inherit; }
    .fab { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 60px; height: 60px; background: var(--primary); border-radius: 50%; color: white; border: none; font-size: 32px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1100; }
    .btn-main { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; }
    .btn-sub { background: #ffd43b; border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; }
  </style>
</head>
<body>

<header class="app-header">
  <div style="font-weight: 900; color: var(--primary); font-size: 24px;">Y</div>
  <button style="background: var(--primary); color: white; border: none; padding: 6px 18px; border-radius: 20px; font-weight: 800;" onclick="saveAll(true)">SAVE</button>
</header>

<nav class="top-nav">
  <div class="nav-item active">타임라인</div>
  <div class="nav-item">스토리</div>
  <div class="nav-item">캐릭터도감</div>
</nav>

<div id="timeline-view" class="view active">
  <div class="tl-container" id="tl-canvas">
    <div class="center-line"></div>
    </div>
</div>

<button class="fab" onclick="openEventModal()">+</button>
<div id="overlay" class="overlay" onclick="closeAll()"></div>

<div id="detailModal" class="bottom-modal">
  <div class="detail-tabs" id="detail-tabs-area" style="display:flex; gap:8px; margin-bottom:20px; overflow-x:auto;"></div>
  <div id="detail-header" style="font-size: 11px; color: var(--primary); font-weight: 800; margin-bottom: 10px;"></div>
  
  <div id="inline-branch-box" style="display:none; background:#f8f9fa; padding:15px; border-radius:12px; margin-bottom:15px;">
    <textarea id="new-branch-text" rows="3" placeholder="새 가지 내용 입력"></textarea>
    <button onclick="submitNewBranch()" class="btn-main" style="width:100%;">가지 저장</button>
  </div>

  <div id="detail-text-area" style="min-height:150px; line-height:1.6; font-size:15px; white-space:pre-wrap;"></div>
  
  <div style="display:flex; gap:10px; margin-top:20px;">
    <button onclick="toggleBranchInput(true)" class="btn-sub" style="flex:1;">가지 추가</button>
    <button onclick="switchToEdit()" style="flex:1; background:#f1f3f5; border:none; border-radius:12px; font-weight:800;">수정</button>
    <button onclick="closeAll()" style="flex:1; background:#f1f3f5; border:none; border-radius:12px; font-weight:800;">닫기</button>
  </div>
</div>

<script>
  const config = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
  firebase.initializeApp(config);
  const db = firebase.database();

  let state = { curProject: '기본', data: { storyboard: [], eras: ['제국력'] } };
  let currentId = null;
  let isDragging = false;
  let dragTarget = null;
  let offset = { x: 0, y: 0 };

  const pastelColors = ['br-0', 'br-1', 'br-2', 'br-3', 'br-4'];

  function renderTimeline() {
    const canvas = document.getElementById('tl-canvas');
    // 라인과 마커 제외하고 초기화
    canvas.querySelectorAll('.card, .era-marker').forEach(el => el.remove());

    const erasInUse = [...new Set(state.data.storyboard.map(i => i.era))];
    let currentY = 150;

    erasInUse.forEach(eraName => {
      // 연대 마커 (검정 박스) 다시 추가
      const eraEl = document.createElement('div');
      eraEl.className = 'era-marker';
      eraEl.innerText = eraName;
      eraEl.style.top = `${currentY}px`;
      canvas.appendChild(eraEl);

      const items = state.data.storyboard.filter(i => i.era === eraName)
                         .sort((a,b) => a.year - b.year || a.month - b.month);

      items.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `card-${item.id}`;
        
        // 위치 값이 있으면 적용, 없으면 기본 지그재그 배치
        if (item.posX) {
          card.style.left = `${item.posX}px`;
          card.style.top = `${item.posY}px`;
        } else {
          card.style.left = idx % 2 === 0 ? '280px' : '560px';
          card.style.top = `${currentY + 60 + (idx * 130)}px`;
        }

        card.innerHTML = `
          <div class="date-tag">${item.year}년 ${item.month}월</div>
          <div class="content">${item.text}</div>
        `;

        // 드래그 이벤트 연결 (마우스 & 터치)
        card.addEventListener('mousedown', startDrag);
        card.addEventListener('touchstart', startDrag, {passive: false});
        card.onclick = (e) => { if(!isDragging) openDetail(item.id); };

        canvas.appendChild(card);
      });
      currentY += (items.length * 140) + 100;
    });
  }

  // --- 드래그 앤 드롭 엔진 ---
  function startDrag(e) {
    if(e.type === 'touchstart') e.preventDefault();
    isDragging = false;
    dragTarget = e.currentTarget;
    const clientX = e.type === 'mousedown' ? e.clientX : e.touches[0].clientX;
    const clientY = e.type === 'mousedown' ? e.clientY : e.touches[0].clientY;
    
    const rect = dragTarget.getBoundingClientRect();
    offset.x = clientX - rect.left;
    offset.y = clientY - rect.top;

    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup', endDrag);
    document.addEventListener('touchmove', onDrag, {passive: false});
    document.addEventListener('touchend', endDrag);
  }

  function onDrag(e) {
    isDragging = true;
    e.preventDefault();
    const canvas = document.getElementById('tl-canvas');
    const canvasRect = canvas.getBoundingClientRect();
    const clientX = e.type === 'mousemove' ? e.clientX : e.touches[0].clientX;
    const clientY = e.type === 'mousemove' ? e.clientY : e.touches[0].clientY;

    let x = clientX - canvasRect.left - offset.x;
    let y = clientY - canvasRect.top - offset.y;

    dragTarget.style.left = `${x}px`;
    dragTarget.style.top = `${y}px`;
  }

  function endDrag() {
    if(isDragging && dragTarget) {
      const id = parseInt(dragTarget.id.replace('card-', ''));
      const item = state.data.storyboard.find(s => s.id === id);
      item.posX = parseInt(dragTarget.style.left);
      item.posY = parseInt(dragTarget.style.top);
      // 위치 이동 시 자동 저장 (선택 사항)
    }
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('mouseup', endDrag);
    document.removeEventListener('touchmove', onDrag);
    document.removeEventListener('touchend', endDrag);
    dragTarget = null;
    setTimeout(() => isDragging = false, 50);
  }

  // --- 상세보기 및 파스텔 탭 ---
  function openDetail(id) {
    currentId = id;
    const ev = state.data.storyboard.find(s => s.id === id);
    document.getElementById('detail-header').innerText = `${ev.era} ${ev.year}년 ${ev.month}월`;
    renderDetailTabs(ev);
    showTabContent('main');
    showModal('detailModal');
  }

  function renderDetailTabs(ev) {
    const area = document.getElementById('detail-tabs-area');
    area.innerHTML = `<button class="tab-item main-tab active" onclick="showTabContent('main')">기본 기록</button>`;
    ev.branches?.forEach((br, i) => {
      const colorClass = pastelColors[i % 5];
      area.innerHTML += `<button class="tab-item ${colorClass}" onclick="showTabContent(${i})">가지 ${i+1}</button>`;
    });
  }

  function showTabContent(type) {
    const ev = state.data.storyboard.find(s => s.id === currentId);
    const text = document.getElementById('detail-text-area');
    document.querySelectorAll('.tab-item').forEach((btn, i) => {
      btn.classList.remove('active');
      if(type === 'main' && i === 0) btn.classList.add('active');
      else if(i === type + 1) btn.classList.add('active');
    });
    
    if(type === 'main') {
      text.style.fontSize = "18px"; // 기본 기록은 글씨 크게
      text.innerText = ev.text;
    } else {
      text.style.fontSize = "15px";
      text.innerText = ev.branches[type].content;
    }
  }

  function toggleBranchInput(show) { document.getElementById('inline-branch-box').style.display = show ? 'block' : 'none'; }

  function submitNewBranch() {
    const content = document.getElementById('new-branch-text').value.trim();
    if(!content) return;
    const ev = state.data.storyboard.find(s => s.id === currentId);
    if(!ev.branches) ev.branches = [];
    ev.branches.push({ id: Date.now(), content });
    saveAll(false);
    toggleBranchInput(false);
    document.getElementById('new-branch-text').value = "";
    openDetail(currentId);
  }

  function openEventModal() {
    currentId = null;
    showModal('eventModal'); // (기존 모달 함수들 동일)
  }

  function showModal(id) { document.getElementById('overlay').classList.add('active'); document.getElementById(id).classList.add('active'); }
  function closeAll() { document.querySelectorAll('.bottom-modal').forEach(m => m.classList.remove('active')); document.getElementById('overlay').classList.remove('active'); }
  
  function saveAll(m) { 
    db.ref('users/Yuta/projects/' + state.curProject).set(state.data); 
    if(m) alert("위치와 내용이 모두 저장되었습니다!"); 
  }

  window.onload = () => { 
    db.ref('users/Yuta/projects/기본').on('value', s => { 
      if(s.val()) { state.data = s.val(); renderTimeline(); } 
    }); 
  };
</script>
</body>
</html>
