<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Yuta's Engine Pro</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    :root { 
      --primary: #4dabf7; --bg: #f8f9fa; --line: #dee2e6; --paper: #ffffff; 
      --node: #343a40; --accent: #74c0fc; --branch: #fab005;
    }
    body { 
      font-family: 'Pretendard', sans-serif; margin: 0; background-color: var(--bg); 
      color: #343a40; overflow: hidden; -webkit-user-select: none; user-select: none;
    }

    /* 상단 헤더 & 네비게이션 */
    .app-header { height: 50px; background: #343a40; color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: fixed; top: 0; width: 100%; z-index: 1100; box-sizing: border-box; }
    .proj-selector { display: flex; align-items: center; gap: 5px; cursor: pointer; font-weight: 800; font-size: 15px; }
    .top-nav { display: flex; justify-content: space-around; background: #fff; position: fixed; top: 50px; width: 100%; z-index: 1000; border-bottom: 1px solid #eee; height: 45px; align-items: center; }
    .nav-item { font-size: 13px; font-weight: 800; color: #adb5bd; cursor: pointer; padding: 10px; transition: 0.2s; }
    .nav-item.active { color: #4dabf7; border-bottom: 3px solid #4dabf7; }

    .view { display: none; margin-top: 95px; height: calc(100vh - 95px); overflow-y: auto; box-sizing: border-box; padding-bottom: 100px; }
    .view.active { display: block; }

    /* 타임라인 (원본 로직 복구 & 가지 추가) */
    .tl-container { position: relative; width: 100%; max-width: 600px; margin: 0 auto; padding-top: 50px; }
    .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--line); transform: translateX(-50%); z-index: 1; }
    .row { display: grid; grid-template-columns: 1fr 1fr; position: relative; margin-bottom: 30px; align-items: center; min-height: 80px; }
    
    /* 중앙 노드 (캡슐 분리) */
    .node-wrap { position: absolute; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
    .node-capsule { background: var(--node); color: #fff; font-size: 10px; font-weight: 900; padding: 3px 12px; border-radius: 12px; margin-bottom: 6px; white-space: nowrap; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
    .node-dot { width: 10px; height: 10px; background: #fff; border: 2px solid #4dabf7; border-radius: 50%; margin: 0 auto; box-shadow: 0 0 0 4px var(--bg); }

    /* 쫀득한 가로 연결선 */
    .connector-line { position: absolute; top: 15px; height: 2px; background: rgba(0,0,0,0.05); z-index: 1; transition: all 0.2s; }
    .line-left { right: 50%; width: 30px; }
    .line-right { left: 50%; width: 30px; }

    /* 메모 박스 (인덱스 디자인 복구 & 수정가능) */
    .dropzone { display: flex; flex-direction: column; align-items: center; gap: 15px; min-height: 80px; padding: 0 15px; z-index: 5; }
    .card { background: #fff; padding: 12px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); width: 130px; min-height: 60px; font-size: 12px; position: relative; border-top: 5px solid #a5d8ff; cursor: pointer; }
    .card-label { position: absolute; top: -10px; left: 10px; background: #a5d8ff; color: white; font-size: 8px; padding: 2px 6px; border-radius: 4px; display: none; }
    .card-meta { font-size: 9px; color: #adb5bd; font-weight: 800; margin-bottom: 4px; display: flex; justify-content: space-between; }
    .card-text { font-weight: 700; color: #495057; line-height: 1.4; word-break: break-all; outline: none; }
    
    /* 가지(Branch) 디자인 */
    .branch-card { border-top-color: var(--branch); width: 110px; margin-top: -10px; font-size: 11px; margin-left: 20px; }

    /* 스토리 종이 에디터 */
    .paper-area { background: #ced4da; padding: 30px 15px; min-height: 100%; display: flex; justify-content: center; }
    .paper { width: 100%; max-width: 650px; background: white; padding: 50px 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); min-height: 85vh; outline: none; line-height: 2; font-size: 16px; border-radius: 2px; }

    /* 캐릭터 */
    .char-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; }
    .char-item { text-align: center; background: white; padding: 15px 10px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.03); }
    .char-circle { width: 55px; height: 55px; border-radius: 50%; border: 3px solid #e9ecef; margin: 0 auto 8px; background: #f8f9fa; display: flex; align-items: center; justify-content: center; font-size: 20px; }

    /* 하단 메뉴 (탭별 독립) */
    .bottom-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: rgba(255,255,255,0.9); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; backdrop-filter: blur(5px); }
    .btn-sub { border: none; background: none; font-size: 11px; font-weight: 800; color: #adb5bd; cursor: pointer; }
    .fab { width: 55px; height: 55px; background: #4dabf7; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 35px; transform: translateY(-20px); border: 5px solid var(--bg); box-shadow: 0 6px 15px rgba(77,171,247,0.4); }

    /* 모달 (영문주소 없음) */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 3000; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(2px); }
    .modal-content { background: white; width: 100%; max-width: 400px; padding: 30px; border-radius: 25px; box-sizing: border-box; }
    input, textarea, select { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #f1f3f5; border-radius: 12px; box-sizing: border-box; font-size: 14px; outline: none; }
    .btn-action { width: 100%; padding: 16px; background: #4dabf7; color: white; border: none; border-radius: 12px; font-weight: 900; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>

<header class="app-header">
  <div style="font-weight: 900; font-size: 24px; color: #4dabf7;">Y</div>
  <div class="proj-selector" onclick="openProjectModal()">
    <span id="display-proj-name">프로젝트</span> <span style="font-size:10px;">▼</span>
  </div>
  <div class="save-btn" style="background:var(--accent); color:white; padding:5px 12px; border-radius:6px; font-size:12px; font-weight:900;" onclick="saveToCloud()">SAVE</div>
</header>

<nav class="top-nav">
  <div class="nav-item active" onclick="setTab('timeline', this)">타임라인</div>
  <div class="nav-item" onclick="setTab('story', this)">스토리</div>
  <div class="nav-item" onclick="setTab('char', this)">캐릭터도감</div>
</nav>

<div id="timeline-view" class="view active">
  <div class="tl-container">
    <div class="center-line"></div>
    <div id="tl-render-area"></div>
  </div>
  <div class="bottom-bar">
    <button class="btn-sub" onclick="openEraEditModal()">연대편집</button>
    <div class="fab" onclick="openEventModal()">+</div>
    <button class="btn-sub" onclick="location.reload()">새로고침</button>
  </div>
</div>

<div id="story-view" class="view">
  <div class="paper-area"><div id="story-editor" class="paper" contenteditable="true" spellcheck="false"></div></div>
  <div class="bottom-bar">
    <button class="btn-sub" onclick="openDocList()">문서목록</button>
    <button class="btn-sub" onclick="extractToSubDoc()">문단추출</button>
  </div>
</div>

<div id="char-view" class="view">
  <div class="char-grid" id="char-list-area"></div>
  <div class="bottom-bar">
    <button class="btn-action" style="width: 85%;" onclick="openCharModal()">+ 캐릭터 추가</button>
  </div>
</div>

<div id="eventModal" class="modal"><div class="modal-content">
  <div class="modal-h">사건 기록 및 수정</div>
  <select id="eEra"></select>
  <div style="display:flex; gap:8px;">
    <input type="number" id="eYear" placeholder="연도">
    <input type="number" id="eMonth" placeholder="월">
  </div>
  <textarea id="eText" rows="4" placeholder="내용 입력 (15자 초과시 자동 요약)"></textarea>
  <div style="display:flex; gap:10px;">
    <button class="btn-action" onclick="saveEventData()">저장</button>
    <button class="btn-action" style="background:var(--branch); display:none;" id="branch-add-btn" onclick="addBranch()">가지추가</button>
  </div>
  <button id="del-btn" onclick="deleteEvent()" style="width:100%; margin-top:10px; border:none; background:none; color:red; font-size:12px; display:none;">사건 삭제</button>
  <button class="btn-sub" style="width:100%; margin-top:10px;" onclick="closeModal('eventModal')">취소</button>
</div></div>

<div id="eraEditModal" class="modal"><div class="modal-content">
  <h3>연대 편집</h3>
  <div id="era-edit-list" style="max-height:150px; overflow-y:auto; margin-bottom:15px;"></div>
  <input type="text" id="newEraIn" placeholder="새 연대 이름 (예: 제국력)">
  <button class="btn-action" onclick="addNewEra()">연대 추가</button>
  <button class="btn-sub" style="width:100%; margin-top:10px;" onclick="closeModal('eraEditModal')">닫기</button>
</div></div>

<div id="projModal" class="modal"><div class="modal-content">
  <h3>프로젝트 전환</h3>
  <div id="proj-list-area"></div>
  <input type="text" id="new-p-name" placeholder="새 프로젝트">
  <button class="btn-action" onclick="addProj()">생성</button>
  <button class="btn-sub" style="width:100%; margin-top:10px;" onclick="closeModal('projModal')">닫기</button>
</div></div>

<div id="charModal" class="modal"><div class="modal-content">
  <h3>캐릭터 설정</h3>
  <input type="text" id="c-name" placeholder="이름">
  <input type="number" id="c-age" placeholder="나이">
  <textarea id="c-desc" rows="3" placeholder="기본 설정 내역"></textarea>
  <button class="btn-action" onclick="saveCharacter()">등록</button>
  <button class="btn-sub" style="width:100%; margin-top:10px;" onclick="closeModal('charModal')">취소</button>
</div></div>

<script>
  const config = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
  firebase.initializeApp(config);
  const db = firebase.database();

  let state = {
    projects: ['기본'], curProject: '기본',
    data: { storyboard: [], eras: ['제국력'], characters: [], story: "", docs: [] }
  };

  function setTab(name, el) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(name + '-view').classList.add('active');
    el.classList.add('active');
    if(name === 'timeline') renderTimeline();
    if(name === 'char') renderChars();
  }

  // 타임라인 렌더링 (쫀득한 연결선 & 가지 추가)
  function renderTimeline() {
    const area = document.getElementById('tl-render-area');
    area.innerHTML = "";
    
    // 연도순 정렬
    const sorted = [...(state.data.storyboard || [])].sort((a,b) => a.year - b.year || a.month - b.month);
    
    let lastYear = null;
    sorted.forEach((s, i) => {
      const side = i % 2 === 0 ? 'left' : 'right';
      const row = document.createElement('div');
      row.className = 'row';
      
      // 연도가 바뀔 때만 노드 표시
      let yearHtml = '';
      if(s.year !== lastYear) {
        yearHtml = `<div class="node-wrap">
          <div class="node-capsule">${s.era} ${s.year}년</div>
          <div class="node-dot"></div>
        </div>`;
        lastYear = s.year;
      } else {
        yearHtml = `<div class="node-wrap"><div class="node-dot" style="margin-top:0;"></div></div>`;
      }

      row.innerHTML = `
        <div class="dropzone" data-side="left"></div>
        ${yearHtml}
        <div class="dropzone" data-side="right"></div>
        <div class="connector-line line-${side}"></div>
      `;
      
      const zone = row.querySelector(`.dropzone[data-side="${side}"]`);
      
      // 메인 카드 생성
      const card = document.createElement('div');
      card.className = `card ${s.type === 'branch' ? 'branch-card' : ''}`;
      card.style.borderLeftColor = ['#d0ebff','#b2f2bb','#ffec99','#ffccf9'][i % 4];
      card.innerHTML = `
        <div class="card-label" style="display:${s.type==='branch'?'block':'none'}">가지</div>
        <div class="card-meta"><span>${s.year}.${s.month}</span><span>No.${i+1}</span></div>
        <div class="card-text">${s.text}</div>
      `;
      card.onclick = () => openEditEvent(s.id);
      zone.appendChild(card);
      area.appendChild(row);
    });

    // 드래그 앤 드롭 저장 연결
    document.querySelectorAll('.dropzone').forEach(z => {
      new Sortable(z, { group: 'timeline', animation: 150, onEnd: () => saveAll(false) });
    });
  }

  // 사건 저장/수정
  let editId = null;
  function openEventModal() {
    editId = null;
    document.getElementById('ev-text').value = "";
    document.getElementById('branch-add-btn').style.display = 'none';
    document.getElementById('del-btn').style.display = 'none';
    document.getElementById('in-era').innerHTML = (state.data.eras || ['제국력']).map(e => `<option>${e}</option>`).join('');
    openModal('eventModal');
  }

  function saveEvent() {
    let text = document.getElementById('ev-text').value; if(!text) return;
    const year = parseInt(document.getElementById('e-year').value) || 0;
    const month = parseInt(document.getElementById('e-month').value) || 1;
    const era = document.getElementById('e-era').value;

    if(editId) state.data.storyboard = state.data.storyboard.map(s => s.id === editId ? {...s, year, month, era, text} : s);
    else state.data.storyboard.push({ id: Date.now(), era, year, month, text, type: 'main' });
    
    renderTimeline(); closeModal('eventModal'); saveAll(false);
  }

  // 가지 추가 로직
  function addBranch() {
    if(!editId) return;
    const branchText = prompt("가지 메모 내용을 입력하세요");
    if(branchText) {
      const parent = state.data.storyboard.find(s => s.id === editId);
      state.data.storyboard.push({ id: Date.now(), era: parent.era, year: parent.year, month: parent.month, text: branchText, type: 'branch' });
      renderTimeline(); closeModal('eventModal'); saveAll(false);
    }
  }

  function openEditEvent(id) {
    const s = state.data.storyboard.find(x => x.id === id);
    if(!s) return;
    editId = id;
    document.getElementById('ev-text').value = s.text;
    document.getElementById('e-year').value = s.year;
    document.getElementById('e-month').value = s.month;
    document.getElementById('branch-add-btn').style.display = 'block';
    document.getElementById('del-btn').style.display = 'block';
    openModal('eventModal');
  }

  // 시대(Era) 관리 복구
  function openEraEditModal() {
    const box = document.getElementById('era-edit-list');
    box.innerHTML = (state.data.eras || []).map(e => `
      <div style="padding:8px; background:#f8f9fa; margin-bottom:5px; border-radius:8px; display:flex; justify-content:space-between;">
        <span>${e}</span>
        <span onclick="deleteEra('${e}')" style="color:red; font-size:11px; cursor:pointer;">삭제</span>
      </div>`).join('');
    openModal('eraEditModal');
  }

  // 공통 유틸
  function saveAll(isManual) {
    db.ref('users/Yuta/projects/' + state.curProject).set(state.data);
    db.ref('users/Yuta/meta').set({ projects: state.projects, curProject: state.curProject });
    if(isManual) alert("클라우드 저장 완료!");
  }
  function openModal(id) { document.getElementById(id).style.display = 'flex'; }
  function closeModal(id) { document.getElementById(id).style.display = 'none'; }
  
  // 초기화
  window.onload = () => {
    db.ref('users/Yuta/meta').once('value', s => {
      if(s.val()) { 
        state.projects = s.val().projects; 
        state.curProject = s.val().curProject;
        document.getElementById('cur-proj-display').innerText = state.curProject;
        db.ref('users/Yuta/projects/' + state.curProject).once('value', s2 => {
          state.data = s2.val() || { storyboard: [], eras: ['제국력'], characters: [], story: "", docs: [] };
          renderTimeline();
        });
      }
    });
  };
</script>
</body>
</html>
