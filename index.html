<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>스토리마스터 Pro</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    :root { --primary: #4dabf7; --bg: #f8f9fa; --card-bg: #ffffff; --line: #e9ecef; --danger: #ff8787; --branch: #adb5bd; }
    body { font-family: 'Pretendard', -apple-system, sans-serif; margin: 0; background: var(--bg); touch-action: pan-y; -webkit-user-select: none; user-select: none; padding-bottom: 80px; color: #333; overflow-x: hidden; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    /* 레이아웃 */
    .header-container { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.85); backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .header { height: 55px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
    
    /* 캐릭터 검색바 */
    .search-bar { display: flex; gap: 8px; overflow-x: auto; padding: 10px 20px; scrollbar-width: none; -ms-overflow-style: none; }
    .search-bar::-webkit-scrollbar { display: none; }
    .filter-tag { padding: 6px 14px; border-radius: 20px; background: #eee; font-size: 11px; font-weight: 800; white-space: nowrap; cursor: pointer; color: #666; }
    .filter-tag.active { background: var(--primary); color: white; }

    .timeline-container { position: relative; width: 100%; max-width: 500px; margin: 115px auto 0; padding: 0; min-height: 100vh; }
    .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--line); transform: translateX(-50%); z-index: 0; }
    
    .row { display: grid; grid-template-columns: 1fr 1fr; position: relative; margin-bottom: 20px; min-height: 90px; }
    .node { width: 12px; height: 12px; background: white; border: 2.5px solid var(--primary); border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); top: 38px; z-index: 5; box-shadow: 0 0 0 4px var(--bg); }
    .year-marker { position: relative; width: fit-content; margin: 50px auto 30px; padding: 6px 16px; background: #343a40; color: white; border-radius: 20px; font-size: 11px; font-weight: 800; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
    
    .dropzone { display: flex; flex-direction: column; gap: 15px; padding: 0 10px; }
    .dropzone[data-side="left"] { align-items: flex-end; padding-right: 20px; }
    .dropzone[data-side="right"] { align-items: flex-start; padding-left: 20px; }

    .card-wrapper { position: relative; width: fit-content; display: flex; align-items: flex-start; }
    .card { background: #fff; width: 120px; min-height: 70px; border-radius: 12px; padding: 15px 12px; box-shadow: 0 3px 12px rgba(0,0,0,0.04); position: relative; z-index: 10; border: 1px solid rgba(0,0,0,0.06); cursor: pointer; }
    .card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background-color: var(--card-accent, #eee); border-radius: 12px 0 0 12px; }
    .card-month { font-size: 9px; font-weight: 900; color: #adb5bd; margin-bottom: 6px; }
    .card-content { font-size: 11.5px; line-height: 1.5; font-weight: 600; color: #2d3436; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none; }
    
    .branch-outer-container { position: absolute; top: 8px; display: flex; flex-direction: column; gap: 4px; z-index: 20; }
    .dropzone[data-side="left"] .branch-outer-container { right: 100%; margin-right: 8px; align-items: flex-end; }
    .dropzone[data-side="right"] .branch-outer-container { left: 100%; margin-left: 8px; align-items: flex-start; }
    .branch-cube { width: 18px; height: 18px; background: var(--branch); border-radius: 4px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border: 2px solid white; }

    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 4000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
    .modal-content { background: white; width: 90%; max-width: 330px; padding: 25px 20px; border-radius: 24px; box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
    
    .edit-grid { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    select, input, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #f1f3f5; background: #f8f9fa; font-size: 14px; outline: none; }
    
    .edit-btn-group { display: flex; gap: 8px; margin-top: 15px; margin-bottom: 10px; }
    .btn-save { flex: 2.5; padding: 15px; border: none; border-radius: 12px; font-weight: 800; font-size: 15px; background: var(--primary); color: white; }
    .btn-del-scene { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: 800; font-size: 15px; background: #fff0f0; color: #ff8787; }
    .btn-close-text { width: 100%; background: none; border: none; color: #adb5bd; font-size: 13px; font-weight: 600; padding: 5px; cursor: pointer; }

    .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #f8f9fa; border-radius: 12px; margin-bottom: 8px; }
    .btn-item-del { background: #e9ecef; color: #495057; border: none; padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: 800; cursor: pointer; }

    .nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
    .nav-btn { border: none; background: none; font-size: 10px; font-weight: 800; color: #adb5bd; display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; }
    #toast { visibility: hidden; min-width: 150px; background-color: #333; color: #fff; text-align: center; border-radius: 10px; padding: 12px; position: fixed; z-index: 5000; left: 50%; bottom: 100px; transform: translateX(-50%); font-size: 13px; opacity: 0; transition: 0.3s; }
    #toast.show { visibility: visible; opacity: 1; }
  </style>
</head>
<body>

<div id="toast">변경사항 저장됨</div>

<div id="customAlert" class="modal" style="z-index: 6000;">
    <div class="modal-content">
        <div id="alertTitle" style="font-size:16px; font-weight:900; margin-bottom:12px; text-align:center;">알림</div>
        <div id="alertMsg" style="font-size:14px; color:#555; text-align:center; margin-bottom:20px;"></div>
        <div id="alertInputWrap" style="display:none;"><textarea id="alertInput" rows="4" placeholder="내용을 입력하세요"></textarea></div>
        <div style="display:flex; gap:10px;">
            <button class="btn-close-text" style="flex:1; color:#868e96; background:#f1f3f5; border-radius:10px; padding:12px;" onclick="window.closeAlert(false)">취소</button>
            <button id="alertConfirm" class="btn-save" style="flex:1; margin-top:0;" onclick="window.closeAlert(true)">확인</button>
        </div>
    </div>
</div>

<div class="header-container">
  <div class="header">
    <div style="font-size:16px; font-weight:900; color:var(--primary);" id="projectTitle">STORY MASTER</div>
    <button onclick="window.saveToCloud()" style="background:var(--primary); color:white; border:none; padding:8px 18px; border-radius:10px; font-weight:800; font-size:12px;">저장</button>
  </div>
  <div class="search-bar" id="searchBar"></div>
</div>

<div class="timeline-container" id="timeline"></div>

<div class="nav">
  <button class="nav-btn" onclick="window.openLoadModal()">목록</button>
  <button class="nav-btn" onclick="window.openEraModal()">시대</button>
  <button class="nav-btn" style="font-size:40px; color:var(--primary); font-weight:300;" onclick="window.addScene()">+</button>
  <button class="nav-btn" onclick="window.openCharModal()">캐릭터</button>
  <button class="nav-btn" onclick="location.reload()">갱신</button>
</div>

<div id="viewModal" class="modal"><div class="modal-content"><div id="viewMonth" style="font-size:11px; font-weight:900; color:var(--primary); margin-bottom:10px;"></div><div id="viewText" style="font-size:14px; line-height:1.7; color:#333; margin-bottom:20px; white-space:pre-wrap;"></div><div id="viewTags" style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:25px;"></div><div style="display:flex; flex-direction:column; gap:8px;"><div style="display:flex; gap:10px;"><button class="btn-save" onclick="window.goToEdit()">수정</button><button id="addBranchBtn" class="btn-save" style="background:#868e96;" onclick="window.addBranchFromView()">가지 추가</button></div><button class="btn-close-text" onclick="window.closeModal('viewModal')">닫기</button></div></div></div>
<div id="editModal" class="modal"><div class="modal-content"><h3 style="margin:0 0 20px 0; font-size:17px; text-align:center;">사건 기록</h3><div class="edit-grid"><select id="eraType"></select><input type="number" id="eYear" placeholder="연도"><select id="eMonth"><script>for(let i=1;i<=12;i++)document.write(`<option value="${i}">${i}월</option>`)</script></select></div><div id="colorPicker" style="display:flex; gap:8px; margin: 15px 0; justify-content:center; flex-wrap:wrap;"></div><div id="charTagSelector" style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:15px;"></div><textarea id="eContent" rows="5" placeholder="내용을 입력하세요"></textarea><div class="edit-btn-group"><button class="btn-save" onclick="window.saveScene()">기록 완료</button><button id="delBtn" class="btn-del-scene" onclick="window.confirmDeleteScene()">삭제</button></div><button class="btn-close-text" onclick="window.closeModal('editModal')">닫기</button></div></div>
<div id="loadModal" class="modal"><div class="modal-content"><h3>연력표 목록</h3><div id="projectList"></div><button class="btn-save" style="width:100%; margin-top:10px;" onclick="window.promptNewProject()">+ 새 연력표</button><button class="btn-close-text" style="margin-top:15px;" onclick="window.closeModal('loadModal')">닫기</button></div></div>
<div id="eraModal" class="modal"><div class="modal-content"><h3>시대 관리</h3><div id="eraListGrid"></div><button class="btn-save" style="width:100%; margin-top:10px;" onclick="window.promptNewEra()">+ 시대 추가</button><button class="btn-close-text" style="margin-top:15px;" onclick="window.closeModal('eraModal')">닫기</button></div></div>
<div id="charModal" class="modal"><div class="modal-content"><h3>캐릭터 관리</h3><div id="charListGrid"></div><button class="btn-save" style="width:100%; margin-top:10px;" onclick="window.promptNewChar()">+ 캐릭터 추가</button><button class="btn-close-text" style="margin-top:15px;" onclick="window.closeModal('charModal')">닫기</button></div></div>

<script>
  const config = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", authDomain: "true-s.firebaseapp.com", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
  if (!firebase.apps.length) firebase.initializeApp(config);
  const db = firebase.database();

  let storyboard = [], eras = ["공통"], chars = [], currentProject = null, editingId = null, selectedFilter = null;
  const userColors = ["#eee", "#d0ebff", "#fff9db", "#d3f9d8", "#ffdeeb", "#eebefa", "#dae1e7", "#495057", "#ffd43b"];
  let selectedColor = "#eee", selectedChars = [], alertCallback = null;

  window.customUI = (title, msg, type, callback, defaultVal = "") => {
    document.getElementById('alertTitle').innerText = title; document.getElementById('alertMsg').innerText = msg;
    const inputWrap = document.getElementById('alertInputWrap'); const input = document.getElementById('alertInput');
    if(type === 'prompt') { inputWrap.style.display = 'block'; input.value = defaultVal; } else { inputWrap.style.display = 'none'; }
    alertCallback = callback; window.openModal('customAlert');
  };
  window.closeAlert = (res) => { window.closeModal('customAlert'); if(alertCallback) { const val = document.getElementById('alertInput').value; alertCallback(res ? (val || true) : false); } };
  window.closeModal = (id) => document.getElementById(id).style.display = 'none';
  window.openModal = (id) => document.getElementById(id).style.display = 'flex';

  window.render = () => {
    const container = document.getElementById('timeline');
    if(!currentProject) return;
    container.innerHTML = '<div class="center-line"></div>';
    
    // [검색 필터 적용]
    let filtered = selectedFilter ? storyboard.filter(s => (s.chars||[]).includes(selectedFilter)) : storyboard;
    
    const sortedBoard = [...filtered].sort((a, b) => {
        const eraIdxA = eras.indexOf(a.era); const eraIdxB = eras.indexOf(b.era);
        if(eraIdxA !== eraIdxB) return eraIdxA - eraIdxB;
        if(a.year !== b.year) return a.year - b.year;
        return a.month - b.month;
    });

    const groups = {};
    sortedBoard.forEach(s => {
      const k = `${s.era || "공통"} ${s.year}년`;
      if(!groups[k]) groups[k] = {};
      if(!groups[k][s.month]) groups[k][s.month] = { left: [], right: [] };
      groups[k][s.month][s.side || 'left'].push(s);
    });

    Object.keys(groups).forEach(key => {
      container.innerHTML += `<div class="year-marker">${key}</div>`;
      Object.keys(groups[key]).sort((a,b)=>a-b).forEach(m => {
        const row = document.createElement('div'); row.className = 'row';
        row.innerHTML = `<div class="dropzone" data-gkey="${key}" data-month="${m}" data-side="left"></div><div class="node"></div><div class="dropzone" data-gkey="${key}" data-month="${m}" data-side="right"></div>`;
        container.appendChild(row);
        ['left', 'right'].forEach(side => {
          const zone = row.querySelector(`.dropzone[data-side="${side}"]`);
          groups[key][m][side].forEach(sc => {
            const wrapper = document.createElement('div'); wrapper.className = 'card-wrapper';
            const card = document.createElement('div'); card.className = 'card'; card.dataset.id = sc.id;
            card.style.setProperty('--card-accent', sc.color || "#eee");
            card.innerHTML = `<div class="card-month">${m}월</div><div class="card-content">${sc.text}</div>`;
            const bContainer = document.createElement('div'); bContainer.className = 'branch-outer-container';
            if(sc.branches) { sc.branches.forEach((b, bIdx) => {
                const cube = document.createElement('div'); cube.className = 'branch-cube';
                cube.setAttribute('onclick', `window.editBranch(event, '${sc.id}', ${bIdx})`);
                bContainer.appendChild(cube);
            }); }
            wrapper.appendChild(card); wrapper.appendChild(bContainer); zone.appendChild(wrapper);
          });
        });
      });
    });
    window.updateSearchBar();
  };

  // [검색바 UI 업데이트]
  window.updateSearchBar = () => {
    const bar = document.getElementById('searchBar');
    bar.innerHTML = `<div class="filter-tag ${selectedFilter===null?'active':''}" onclick="window.filterByChar(null)">전체</div>` + 
                    chars.map(c => `<div class="filter-tag ${selectedFilter===c?'active':''}" onclick="window.filterByChar('${c}')">${c}</div>`).join('');
  };
  window.filterByChar = (name) => { selectedFilter = name; window.render(); };

  // --- 이하 기존 코드 그대로 보존 ---
  window.editBranch = (e, id, bIdx) => { e.stopPropagation(); const s = storyboard.find(x => x.id == id); window.customUI("가지 수정", "수정/삭제", "prompt", (val) => { if(val === false) return; if(val === true || (typeof val === 'string' && val.trim() === '')) s.branches.splice(bIdx, 1); else s.branches[bIdx] = val; window.sync(); }, s.branches[bIdx]); };
  window.addBranchFromView = () => { const s = storyboard.find(x => x.id == editingId); if(s.branches && s.branches.length >= 2) { alert("최대 2개"); return; } window.closeModal('viewModal'); setTimeout(() => { window.customUI("가지 추가", "내용 입력", "prompt", (val) => { if(val && typeof val === 'string' && val.trim() !== '') { if(!s.branches) s.branches = []; s.branches.push(val); window.sync(); } else { window.openViewer(editingId); } }); }, 200); };
  window.loadP = (k) => { currentProject = k; localStorage.setItem('lastProject', k); document.getElementById('projectTitle').innerText = k; db.ref('projects/'+k).on('value', s => { const d = s.val(); if(d){ storyboard=d.data||[]; eras=d.eras||["공통"]; chars=d.chars||[]; window.render(); } }); window.closeModal('loadModal'); };
  window.openLoadModal = () => { db.ref('projects').once('value').then(s => { const d = s.val(); document.getElementById('projectList').innerHTML = d ? Object.keys(d).map(k => `<div class="item-row"><span>${k}</span><div style="display:flex;gap:5px;"><button class="btn-item-del" style="background:var(--primary);color:white;" onclick="window.loadP('${k}')">열기</button><button class="btn-item-del" onclick="window.confirmDeleteProject('${k}')">삭제</button></div></div>`).join('') : ''; window.openModal('loadModal'); }); };
  window.confirmDeleteProject = (k) => { window.customUI("삭제", "영구 삭제?", "confirm", (r) => { if(r) db.ref('projects/'+k).remove().then(window.openLoadModal); }); };
  window.promptNewProject = () => { window.customUI("새 연력표", "제목 입력", "prompt", (n) => { if(n && typeof n === 'string') { currentProject = n; storyboard = []; eras = ["공통"]; chars = []; window.sync(); window.closeModal('loadModal'); } }); };
  window.addScene = () => { if(!currentProject) return; window.openEdit(null); };
  window.openEdit = (id) => { editingId = id; const s = storyboard.find(x => x.id == id); document.getElementById('eContent').value = s ? s.text : ""; document.getElementById('eYear').value = s ? s.year : "1000"; document.getElementById('eMonth').value = s ? s.month : "1"; document.getElementById('eraType').innerHTML = eras.map(e => `<option value="${e}">${e}</option>`).join(''); if(s) document.getElementById('eraType').value = s.era; document.getElementById('delBtn').style.display = id ? "block" : "none"; selectedColor = s ? (s.color || "#eee") : "#eee"; selectedChars = s ? (s.chars || []) : []; window.updateColorUI(); window.updateCharUI(); window.openModal('editModal'); };
  window.saveScene = () => { const text = document.getElementById('eContent').value.trim(); if(!text) return; const year = parseInt(document.getElementById('eYear').value), month = parseInt(document.getElementById('eMonth').value), era = document.getElementById('eraType').value; if(editingId) storyboard = storyboard.map(s => s.id == editingId ? {...s, text, year, month, era, color: selectedColor, chars: selectedChars} : s); else storyboard.push({ id: Date.now().toString(), era, year, month, text, color: selectedColor, chars: selectedChars, side: 'left', branches: [] }); window.sync(); window.closeModal('editModal'); };
  window.confirmDeleteScene = () => { window.customUI("삭제", "삭제할까요?", "confirm", (r) => { if(r) { storyboard = storyboard.filter(s => s.id != editingId); window.sync(); window.closeModal('editModal'); } }); };
  window.openViewer = (id) => { editingId = id; const s = storyboard.find(x => x.id == id); if(!s) return; document.getElementById('viewMonth').innerText = `${s.era} ${s.year}년 ${s.month}월`; document.getElementById('viewText').innerText = s.text; document.getElementById('viewTags').innerHTML = (s.chars || []).map(c => `<span style="font-size:10px; background:#f1f3f5; padding:4px 10px; border-radius:8px; font-weight:700;">#${c}</span>`).join(''); const addBtn = document.getElementById('addBranchBtn'); if(s.branches && s.branches.length >= 2) { addBtn.style.opacity = '0.4'; addBtn.innerText = "가득참"; } else { addBtn.style.opacity = '1'; addBtn.innerText = "가지 추가"; } window.openModal('viewModal'); };
  window.goToEdit = () => { window.closeModal('viewModal'); window.openEdit(editingId); };
  window.updateColorUI = () => { document.getElementById('colorPicker').innerHTML = userColors.map(c => `<div style="background:${c}; width:24px; height:24px; border-radius:50%; border:2px solid ${selectedColor===c?'#4dabf7':'transparent'};" onclick="window.selectColor('${c}')"></div>`).join(''); };
  window.selectColor = (c) => { selectedColor = c; window.updateColorUI(); };
  window.updateCharUI = () => { document.getElementById('charTagSelector').innerHTML = chars.map(c => `<div style="padding:8px 12px; border-radius:10px; background:${selectedChars.includes(c)?'var(--primary)':'#f1f3f5'}; color:${selectedChars.includes(c)?'white':'#495057'}; font-size:11px; font-weight:700;" onclick="window.toggleChar('${c}')">${c}</div>`).join(''); };
  window.toggleChar = (c) => { if(selectedChars.includes(c)) selectedChars = selectedChars.filter(x => x !== c); else selectedChars.push(c); window.updateCharUI(); };
  window.openEraModal = () => { document.getElementById('eraListGrid').innerHTML = eras.map(e => `<div class="item-row"><span>${e}</span><button class="btn-item-del" onclick="window.confirmDelEra('${e}')">삭제</button></div>`).join(''); window.openModal('eraModal'); };
  window.promptNewEra = () => { window.closeModal('eraModal'); window.customUI("시대 추가", "이름 입력", "prompt", (n) => { if(n && typeof n === 'string' && !eras.includes(n)) { eras.push(n); window.sync(); } window.openEraModal(); }); };
  window.confirmDelEra = (e) => { window.closeModal('eraModal'); window.customUI("삭제", `${e} 삭제?`, "confirm", (r) => { if(r) { storyboard = storyboard.map(s => s.era === e ? {...s, era: '공통'} : s); eras = eras.filter(x => x !== e); window.sync(); } window.openEraModal(); }); };
  window.openCharModal = () => { document.getElementById('charListGrid').innerHTML = chars.map(c => `<div class="item-row"><span>${c}</span><button class="btn-item-del" onclick="window.confirmDelChar('${c}')">삭제</button></div>`).join(''); window.openModal('charModal'); };
  window.promptNewChar = () => { window.closeModal('charModal'); window.customUI("캐릭터 추가", "이름 입력", "prompt", (n) => { if(n && typeof n === 'string') { chars.push(n); window.sync(); } window.openCharModal(); }); };
  window.confirmDelChar = (c) => { window.closeModal('charModal'); window.customUI("삭제", `${c} 삭제?`, "confirm", (r) => { if(r) { chars = chars.filter(x => x !== c); window.sync(); } window.openCharModal(); }); };
  window.sync = () => { if(currentProject) db.ref('projects/'+currentProject).set({ data: storyboard, eras, chars }).then(window.render); };
  window.saveToCloud = () => { if(currentProject) db.ref('projects/'+currentProject).set({ data: storyboard, eras, chars }).then(() => { const t = document.getElementById('toast'); t.className = 'show'; setTimeout(() => t.className = '', 2000); }); };

  // 드래그 로직 (생략 없이 유지)
  let dragItem = null, startX, startY, currentTarget = null, dragId = null, isMoving = false;
  document.addEventListener('touchstart', (e) => {
    if(e.target.closest('button') || e.target.closest('.branch-cube')) return;
    const card = e.target.closest('.card'); if(!card) return;
    const touch = e.touches[0]; startX = touch.clientX; startY = touch.clientY;
    dragId = card.dataset.id; isMoving = false;
    const move = (me) => {
      const mt = me.touches[0];
      if(!isMoving && (Math.abs(mt.clientX - startX) > 10 || Math.abs(mt.clientY - startY) > 10)) {
        isMoving = true; card.style.opacity = '0.5';
        dragItem = card.cloneNode(true); dragItem.style.position = 'fixed'; dragItem.style.zIndex = '5000'; dragItem.style.opacity = '0.8'; dragItem.style.pointerEvents = 'none';
        dragItem.style.width = card.offsetWidth + 'px'; document.body.appendChild(dragItem);
      }
      if(isMoving && dragItem) {
        dragItem.style.left = (mt.clientX - (card.offsetWidth/2)) + 'px'; dragItem.style.top = (mt.clientY - 20) + 'px';
        const below = document.elementFromPoint(mt.clientX, mt.clientY); const zone = below?.closest('.dropzone');
        if(currentTarget !== zone) { if(currentTarget) currentTarget.style.background = ''; currentTarget = zone; if(currentTarget) currentTarget.style.background = 'rgba(77,171,247,0.08)'; }
      }
    };
    const end = () => {
      if(!isMoving) { window.openViewer(dragId); }
      else if(currentTarget && dragId) {
        const idx = storyboard.findIndex(s => s.id == dragId);
        if(idx !== -1) {
          const p = currentTarget.dataset.gkey.split(' ');
          storyboard[idx].year = parseInt(p.pop()); storyboard[idx].era = p.join(' ');
          storyboard[idx].month = parseInt(currentTarget.dataset.month); storyboard[idx].side = currentTarget.dataset.side;
          window.sync();
        }
      }
      if(dragItem) { dragItem.remove(); dragItem = null; }
      card.style.opacity = '1'; if(currentTarget) currentTarget.style.background = '';
      document.removeEventListener('touchmove', move); document.removeEventListener('touchend', end);
    };
    document.addEventListener('touchmove', move, { passive: false }); document.addEventListener('touchend', end);
  }, { passive: true });

  window.onload = () => { const last = localStorage.getItem('lastProject'); if(last) window.loadP(last); else window.openLoadModal(); };
</script>
</body>
