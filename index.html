<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>스토리마스터 Pro</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    :root { --primary: #4dabf7; --bg: #f8f9fa; --card-bg: #ffffff; --line: #dee2e6; --text: #212529; }
    body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 90px; -webkit-user-select: none; user-select: none; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    /* 헤더 */
    .header-container { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .header { height: 60px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
    .project-title { font-size: 18px; font-weight: 900; color: var(--primary); }
    .search-bar { display: flex; gap: 8px; overflow-x: auto; padding: 10px 20px; scrollbar-width: none; }

    /* 타임라인 */
    .timeline-container { position: relative; width: 100%; max-width: 500px; margin: 120px auto 0; min-height: 100vh; }
    .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--line); transform: translateX(-50%); }
    .year-marker { position: relative; width: fit-content; margin: 40px auto 25px; padding: 8px 18px; background: #343a40; color: white; border-radius: 25px; font-size: 11px; font-weight: 800; z-index: 10; }
    
    .row { display: grid; grid-template-columns: 1fr 1fr; position: relative; margin-bottom: 30px; min-height: 90px; }
    .node { width: 12px; height: 12px; background: white; border: 3px solid var(--primary); border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); top: 35px; z-index: 5; }
    
    .dropzone { display: flex; flex-direction: column; gap: 20px; padding: 0 5px; min-height: 90px; touch-action: none; }
    .dropzone[data-side="left"] { align-items: flex-end; padding-right: 30px; }
    .dropzone[data-side="right"] { align-items: flex-start; padding-left: 30px; }

    /* 측면 탭 디자인 */
    .card-wrapper { position: relative; width: 110px; z-index: 10; touch-action: none; }
    .side-tabs { position: absolute; top: 12px; display: flex; flex-direction: column; gap: 2px; }
    .dropzone[data-side="left"] .side-tabs { right: 100%; align-items: flex-end; }
    .dropzone[data-side="right"] .side-tabs { left: 100%; align-items: flex-start; }
    
    .tab-idx { width: 8px; height: 18px; border: 1px solid rgba(0,0,0,0.05); }
    /* 흰색 탭 일체화 처리 */
    .tab-white { background: #fff; border-right: none !important; width: 9px; position: relative; z-index: 11; }
    .dropzone[data-side="right"] .tab-white { border-left: none !important; border-right: 1px solid rgba(0,0,0,0.05) !important; }

    .dropzone[data-side="left"] .tab-idx { border-radius: 4px 0 0 4px; }
    .dropzone[data-side="right"] .tab-idx { border-radius: 0 4px 4px 0; }
    .tab-blue { background: #d0ebff; } .tab-yellow { background: #fff9db; } .tab-green { background: #d3f9d8; } .tab-pink { background: #ffdeeb; }

    .card { background: #fff; width: 100%; min-height: 70px; border-radius: 12px; padding: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.03); }
    .card-month { font-size: 9px; font-weight: 900; color: var(--primary); margin-bottom: 5px; }
    .card-content { font-size: 11px; line-height: 1.5; font-weight: 700; color: #333; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }

    /* 모달 디자인 */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: flex-end; backdrop-filter: blur(8px); }
    .modal-content { background: white; width: 100%; max-width: 500px; padding: 30px 25px; border-radius: 30px 30px 0 0; max-height: 90vh; overflow-y: auto; position: relative; }
    
    .view-tab-menu { display: flex; align-items: flex-end; gap: 5px; margin-bottom: -1px; }
    .v-tab { padding: 8px 14px; border-radius: 10px 10px 0 0; font-size: 12px; font-weight: 800; border: 1px solid #eee; border-bottom: none; height: 34px; display: flex; align-items: center; color: transparent; background: #f1f3f5; }
    .v-tab.active { height: 44px; background: white !important; color: #333 !important; border-color: #ddd; z-index: 2; }
    .v-tab:first-child { color: #868e96; }
    .view-body { border: 1px solid #ddd; border-radius: 0 15px 15px 15px; padding: 25px; background: white; margin-bottom: 20px; }

    .btn-pill { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 18px; font-weight: 800; width: 100%; }
    .btn-ghost { background: #f1f3f5; color: #495057; border: none; padding: 12px; border-radius: 15px; font-weight: 700; width: 100%; }
    
    input, select, textarea { width: 100%; padding: 14px; border-radius: 15px; border: 1px solid #eee; background: #f8f9fa; font-size: 15px; margin-bottom: 10px; outline: none; }

    /* 네비게이션 */
    .nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; }
    .add-btn-main { width: 55px; height: 55px; background: var(--primary); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 30px; border: 4px solid white; box-shadow: 0 8px 20px rgba(77,171,247,0.3); }
  </style>
</head>
<body>

<div id="viewModal" class="modal"><div class="modal-content">
    <div class="view-tab-menu" id="viewTabMenu"></div>
    <div class="view-body">
      <div id="viewMonth" style="font-size:12px; font-weight:900; color:var(--primary); margin-bottom:12px;"></div>
      <div id="viewText" style="font-size:15px; line-height:1.7; color:#333; white-space:pre-wrap; font-weight:700; min-height:120px;"></div>
    </div>
    <div style="display:flex; gap:10px; margin-bottom:10px;">
        <button class="btn-pill" style="flex:1.5;" onclick="window.handleTabEdit()">편집하기</button>
        <button id="addBranchBtn" class="btn-ghost" style="flex:1;" onclick="window.addBranchUI()">+ 가지 추가</button>
    </div>
    <button class="btn-ghost" onclick="window.closeModal('viewModal')">닫기</button>
</div></div>

<div id="editModal" class="modal"><div class="modal-content">
    <h3 style="text-align:center; margin-bottom:20px;">사건 기록 편집</h3>
    <div style="display:flex; gap:10px;">
        <select id="eraType"></select>
        <input type="number" id="eYear" placeholder="연도">
        <select id="eMonth"><script>for(let i=1;i<=12;i++)document.write(`<option value="${i}">${i}월</option>`)</script></select>
    </div>
    <div id="charTagSelector" style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:15px;"></div>
    <textarea id="eContent" rows="6" placeholder="내용을 입력하세요"></textarea>
    <button class="btn-pill" onclick="window.saveScene()">기록 저장</button>
    <button class="btn-ghost" style="margin-top:10px; color:#ff6b6b;" onclick="window.confirmDeleteScene()">삭제</button>
    <button class="btn-ghost" style="margin-top:10px;" onclick="window.closeModal('editModal')">취소</button>
</div></div>

<div id="charEditModal" class="modal"><div class="modal-content">
  <h3 style="text-align:center; margin-bottom:20px;">캐릭터 프로필</h3>
  <div style="display:flex; justify-content:center; margin-bottom:20px;" onclick="document.getElementById('charImgInput').click()">
    <img id="charPrevImg" style="width:100px; height:100px; border-radius:25px; object-fit:cover; border:4px solid var(--primary); display:none;">
    <div id="charEmptySym" style="width:100px; height:100px; border-radius:25px; border:4px solid var(--primary); background:#f1f3f5; display:flex; align-items:center; justify-content:center; font-size:35px;">👤</div>
    <input type="file" id="charImgInput" hidden accept="image/*" onchange="window.handleCharImg(event)">
  </div>
  <input type="text" id="cName" placeholder="이름">
  <input type="text" id="cAge" placeholder="나이/생일">
  <input type="text" id="cLook" placeholder="특징">
  <textarea id="cNote" rows="3" placeholder="메모"></textarea>
  <button class="btn-pill" onclick="window.saveCharInfo()">저장</button>
  <button class="btn-ghost" style="margin-top:10px;" onclick="window.closeModal('charEditModal')">취소</button>
</div></div>

<div id="charModal" class="modal"><div class="modal-content"><h3>캐릭터 도감</h3><div id="charListGrid"></div><button class="btn-pill" style="margin-top:15px;" onclick="window.openCharAdd()">+ 새 캐릭터 추가</button><button class="btn-ghost" style="margin-top:10px;" onclick="window.closeModal('charModal')">닫기</button></div></div>
<div id="eraModal" class="modal"><div class="modal-content"><h3>시대 관리</h3><div id="eraListGrid"></div><button class="btn-pill" style="margin-top:15px;" onclick="window.promptNewEra()">+ 시대 추가</button><button class="btn-ghost" style="margin-top:10px;" onclick="window.closeModal('eraModal')">닫기</button></div></div>
<div id="loadModal" class="modal"><div class="modal-content"><h3>연력표 목록</h3><div id="projectList"></div><button class="btn-pill" style="margin-top:15px;" onclick="window.promptNewProject()">+ 새 프로젝트</button><button class="btn-ghost" style="margin-top:10px;" onclick="window.closeModal('loadModal')">닫기</button></div></div>

<div class="header-container">
  <div class="header"><div class="project-title" id="projectTitle">STORY MASTER</div><button class="btn-pill" style="width:auto; padding:8px 15px; font-size:12px;" onclick="window.saveToCloud()">클라우드 저장</button></div>
  <div class="search-bar" id="searchBar"></div>
</div>
<div class="timeline-container" id="timeline"></div>
<div class="nav">
  <button onclick="window.openLoadModal()" style="border:none; background:none; font-weight:800; color:#adb5bd;">목록</button>
  <button onclick="window.openEraModal()" style="border:none; background:none; font-weight:800; color:#adb5bd;">시대</button>
  <div class="add-btn-main" onclick="window.addScene()">+</div>
  <button onclick="window.openCharModal()" style="border:none; background:none; font-weight:800; color:#adb5bd;">캐릭터</button>
  <button onclick="location.reload()" style="border:none; background:none; font-weight:800; color:#adb5bd;">갱신</button>
</div>

<script>
  const config = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", authDomain: "true-s.firebaseapp.com", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
  if (!firebase.apps.length) firebase.initializeApp(config);
  const db = firebase.database();

  let storyboard = [], eras = ["공통"], chars = [], charDetails = {}, currentProject = null, editingId = null;
  const pastelTabs = ["tab-blue", "tab-yellow", "tab-green", "tab-pink"];
  let selectedChars = [], selectedFilter = null, tempCharImg = "", currentViewTab = 0;

  window.closeModal = (id) => document.getElementById(id).style.display = 'none';
  window.openModal = (id) => document.getElementById(id).style.display = 'flex';

  window.render = () => {
    const container = document.getElementById('timeline');
    if(!currentProject) return;
    container.innerHTML = '<div class="center-line"></div>';
    let filtered = selectedFilter ? storyboard.filter(s => (s.chars||[]).includes(selectedFilter)) : storyboard;
    
    eras.forEach(eName => {
        const eraData = filtered.filter(s => s.era === eName).sort((a,b) => (a.year - b.year) || (a.month - b.month));
        const groups = {};
        eraData.forEach(s => {
            const k = `${eName} ${s.year}년`;
            if(!groups[k]) groups[k] = {}; if(!groups[k][s.month]) groups[k][s.month] = {left:[], right:[]};
            groups[k][s.month][s.side||'left'].push(s);
        });

        Object.keys(groups).forEach(key => {
            container.innerHTML += `<div class="year-marker">${key}</div>`;
            Object.keys(groups[key]).sort((a,b)=>a-b).forEach(m => {
                const row = document.createElement('div'); row.className = 'row';
                row.innerHTML = `<div class="dropzone" data-gkey="${key}" data-month="${m}" data-side="left"></div><div class="node"></div><div class="dropzone" data-gkey="${key}" data-month="${m}" data-side="right"></div>`;
                container.appendChild(row);
                ['left','right'].forEach(side => {
                    const zone = row.querySelector(`.dropzone[data-side="${side}"]`);
                    groups[key][m][side].forEach(sc => {
                        const wrap = document.createElement('div'); wrap.className = 'card-wrapper';
                        wrap.dataset.id = sc.id;
                        let tabsHtml = `<div class="tab-idx tab-white"></div>`;
                        if(sc.branches) sc.branches.forEach((_,i) => tabsHtml += `<div class="tab-idx ${pastelTabs[i]||'tab-blue'}"></div>`);
                        wrap.innerHTML = `<div class="side-tabs">${tabsHtml}</div><div class="card"><div class="card-month">${m}월</div><div class="card-content">${sc.text}</div></div>`;
                        zone.appendChild(wrap);
                    });
                });
            });
        });
    });
    window.updateSearchBar();
  };

  // 모달 제어 및 편집 기능 수정
  window.openViewer = (id) => { editingId = id; const s = storyboard.find(x => x.id == id); if(!s) return; currentViewTab = 0; window.renderTabs(s); window.openModal('viewModal'); };
  window.renderTabs = (s) => {
    const menu = document.getElementById('viewTabMenu');
    let tabs = [`<div class="v-tab active" onclick="window.switchTab(0)">사건</div>`];
    (s.branches || []).forEach((_, i) => tabs.push(`<div class="v-tab ${pastelTabs[i]||'tab-blue'} ${currentViewTab===(i+1)?'active':''}" onclick="window.switchTab(${i+1})">탭 ${i+1}</div>`));
    menu.innerHTML = tabs.join('');
    document.getElementById('viewMonth').innerText = `${s.era} ${s.year}년 ${s.month}월`;
    document.getElementById('viewText').innerText = currentViewTab === 0 ? s.text : s.branches[currentViewTab-1];
  };
  window.switchTab = (idx) => { currentViewTab = idx; window.renderTabs(storyboard.find(x => x.id == editingId)); };

  window.handleTabEdit = () => {
    const s = storyboard.find(x => x.id == editingId);
    if(currentViewTab === 0) { window.closeModal('viewModal'); window.openEdit(editingId); }
    else {
      const val = prompt("수정할 내용을 입력하세요.", s.branches[currentViewTab-1]);
      if(val === "") s.branches.splice(currentViewTab-1, 1); else if(val) s.branches[currentViewTab-1] = val;
      window.sync(); window.renderTabs(s);
    }
  };

  window.addBranchUI = () => {
    const s = storyboard.find(x => x.id == editingId);
    const val = prompt("새로운 가지 내용을 입력하세요.");
    if(val) { if(!s.branches) s.branches = []; s.branches.push(val); window.sync(); window.renderTabs(s); }
  };

  // 캐릭터 관련 버그 수정
  window.openCharAdd = () => { 
    window.closeModal('charModal');
    tempCharImg = ""; document.getElementById('charPrevImg').style.display = "none"; document.getElementById('charEmptySym').style.display = "flex";
    document.getElementById('cName').value = ""; document.getElementById('cAge').value = ""; document.getElementById('cLook').value = ""; document.getElementById('cNote').value = ""; 
    window.openModal('charEditModal'); 
  };
  window.editCharExist = (name) => {
    window.closeModal('charModal');
    const d = charDetails[name];
    document.getElementById('cName').value = name;
    document.getElementById('cAge').value = d.age || ""; document.getElementById('cLook').value = d.look || ""; document.getElementById('cNote').value = d.note || "";
    tempCharImg = d.img || "";
    if(tempCharImg) { document.getElementById('charPrevImg').src = tempCharImg; document.getElementById('charPrevImg').style.display = "block"; document.getElementById('charEmptySym').style.display = "none"; }
    window.openModal('charEditModal');
  };
  window.saveCharInfo = () => {
    const name = document.getElementById('cName').value.trim();
    if(!name) return;
    if(!charDetails) charDetails = {};
    charDetails[name] = { img: tempCharImg, age: document.getElementById('cAge').value, look: document.getElementById('cLook').value, note: document.getElementById('cNote').value };
    if(!chars.includes(name)) chars.push(name);
    window.sync(); window.closeModal('charEditModal'); setTimeout(window.openCharModal, 200);
  };
  window.openCharModal = () => {
    const grid = document.getElementById('charListGrid');
    grid.innerHTML = chars.map(c => `<div style="display:flex; align-items:center; gap:12px; background:#f8f9fa; padding:12px; border-radius:18px; margin-bottom:10px;"><div style="width:50px; height:50px; background:#eee; border-radius:12px; overflow:hidden;">${charDetails[c]?.img ? `<img src="${charDetails[c].img}" style="width:100%; height:100%; object-fit:cover;">` : ''}</div><div style="flex:1;"><b style="font-size:15px;">${c}</b></div><button class="btn-ghost" style="width:auto; padding:5px 10px;" onclick="window.editCharExist('${c}')">편집</button></div>`).join('');
    window.openModal('charModal');
  };

  // 드래그 앤 드롭 (화면 스크롤 방지 추가)
  let dragItem = null, startX, startY, currentTarget = null, dragId = null, isMoving = false;
  document.addEventListener('touchstart', (e) => {
    const wrap = e.target.closest('.card-wrapper'); if(!wrap) return;
    const touch = e.touches[0]; startX = touch.clientX; startY = touch.clientY; dragId = wrap.dataset.id; isMoving = false;
    const move = (me) => {
      const mt = me.touches[0];
      if(!isMoving && (Math.abs(mt.clientX - startX) > 10 || Math.abs(mt.clientY - startY) > 10)) {
        isMoving = true; document.body.style.overflow = 'hidden'; // 스크롤 잠금
        dragItem = wrap.cloneNode(true); dragItem.style.position = 'fixed'; dragItem.style.zIndex = '5000'; dragItem.style.width = '110px'; dragItem.style.pointerEvents = 'none';
        document.body.appendChild(dragItem);
      }
      if(isMoving && dragItem) {
        dragItem.style.left = (mt.clientX - 55) + 'px'; dragItem.style.top = (mt.clientY - 45) + 'px';
        const zone = document.elementFromPoint(mt.clientX, mt.clientY)?.closest('.dropzone');
        if(currentTarget !== zone) { if(currentTarget) currentTarget.style.background = ''; currentTarget = zone; if(currentTarget) currentTarget.style.background = 'rgba(77,171,247,0.1)'; }
      }
    };
    const end = () => {
      document.body.style.overflow = ''; // 스크롤 해제
      if(!isMoving) window.openViewer(dragId);
      else if(currentTarget && dragId) {
        const idx = storyboard.findIndex(s => s.id == dragId);
        const p = currentTarget.dataset.gkey.split(' ');
        storyboard[idx].year = parseInt(p.pop()); storyboard[idx].era = p.join(' ');
        storyboard[idx].month = parseInt(currentTarget.dataset.month); storyboard[idx].side = currentTarget.dataset.side;
        window.sync();
      }
      if(dragItem) dragItem.remove(); if(currentTarget) currentTarget.style.background = '';
      document.removeEventListener('touchmove', move); document.removeEventListener('touchend', end);
    };
    document.addEventListener('touchmove', move, { passive: false }); document.addEventListener('touchend', end);
  }, { passive: true });

  // 공통 로직
  window.sync = () => { if(currentProject) db.ref('projects/'+currentProject).set({ data: storyboard, eras, chars, charDetails }).then(window.render); };
  window.saveToCloud = () => { if(currentProject) db.ref('projects/'+currentProject).set({ data: storyboard, eras, chars, charDetails }).then(() => alert('저장되었습니다.')); };
  window.loadP = (k) => { currentProject = k; localStorage.setItem('lastProject', k); document.getElementById('projectTitle').innerText = k; db.ref('projects/'+k).on('value', s => { const d = s.val(); if(d){ storyboard=d.data||[]; eras=d.eras||["공통"]; chars=d.chars||[]; charDetails=d.charDetails||{}; window.render(); } }); window.closeModal('loadModal'); };
  window.openEdit = (id) => { editingId = id; const s = storyboard.find(x => x.id == id); document.getElementById('eContent').value = s ? s.text : ""; document.getElementById('eYear').value = s ? s.year : "1000"; document.getElementById('eraType').innerHTML = eras.map(e => `<option value="${e}">${e}</option>`).join(''); if(s) { document.getElementById('eraType').value = s.era; selectedChars = s.chars || []; } else { selectedChars = []; } window.updateCharUI(); window.openModal('editModal'); };
  window.updateCharUI = () => { document.getElementById('charTagSelector').innerHTML = chars.map(c => `<div style="padding:5px 10px; border-radius:15px; border:1px solid #eee; font-size:12px; background:${selectedChars.includes(c)?'#4dabf7':'#fff'}; color:${selectedChars.includes(c)?'#fff':'#868e96'}" onclick="window.toggleChar('${c}')">${c}</div>`).join(''); };
  window.toggleChar = (c) => { if(selectedChars.includes(c)) selectedChars = selectedChars.filter(x=>x!==c); else selectedChars.push(c); window.updateCharUI(); };
  window.saveScene = () => { const text = document.getElementById('eContent').value.trim(); if(!text) return; const year = parseInt(document.getElementById('eYear').value), era = document.getElementById('eraType').value, month = parseInt(document.getElementById('eMonth').value); if(editingId) storyboard = storyboard.map(s => s.id == editingId ? {...s, text, year, month, era, chars: selectedChars} : s); else storyboard.push({ id: Date.now().toString(), era, year, month, text, chars: selectedChars, side: 'left', branches: [] }); window.sync(); window.closeModal('editModal'); };
  window.handleCharImg = (e) => { const file = e.target.files[0]; if(file) { const reader = new FileReader(); reader.onload = (re) => { tempCharImg = re.target.result; document.getElementById('charPrevImg').src = tempCharImg; document.getElementById('charPrevImg').style.display = "block"; document.getElementById('charEmptySym').style.display = "none"; }; reader.readAsDataURL(file); } };
  window.updateSearchBar = () => { document.getElementById('searchBar').innerHTML = `<div onclick="window.filterByChar(null)" style="padding:7px 15px; border-radius:20px; background:${selectedFilter===null?'#4dabf7':'#fff'}; color:${selectedFilter===null?'#fff':'#868e96'}; border:1px solid #eee; font-size:12px; font-weight:700;">전체</div>` + chars.map(c => `<div onclick="window.filterByChar('${c}')" style="padding:7px 15px; border-radius:20px; background:${selectedFilter===c?'#4dabf7':'#fff'}; color:${selectedFilter===c?'#fff':'#868e96'}; border:1px solid #eee; font-size:12px; font-weight:700;">${c}</div>`).join(''); };
  window.filterByChar = (name) => { selectedFilter = name; window.render(); };
  window.addScene = () => { if(!currentProject) return; window.openEdit(null); };
  window.openLoadModal = () => { db.ref('projects').once('value').then(s => { const d = s.val(); document.getElementById('projectList').innerHTML = d ? Object.keys(d).map(k => `<div style="display:flex; justify-content:space-between; padding:15px; background:#f8f9fa; border-radius:18px; margin-bottom:10px;"><b>${k}</b><button class="btn-pill" style="width:auto; padding:5px 15px;" onclick="window.loadP('${k}')">열기</button></div>`).join('') : ''; window.openModal('loadModal'); }); };
  window.openEraModal = () => { const grid = document.getElementById('eraListGrid'); grid.innerHTML = eras.map((e, i) => `<div style="display:flex; justify-content:space-between; padding:12px; background:#f8f9fa; border-radius:15px; margin-bottom:10px;"><b>${e}</b><div style="display:flex; gap:5px;"><button class="btn-ghost" style="width:auto;" onclick="window.moveEra(${i}, -1)">▲</button><button class="btn-ghost" style="width:auto;" onclick="window.moveEra(${i}, 1)">▼</button></div></div>`).join(''); window.openModal('eraModal'); };
  window.moveEra = (idx, dir) => { const target = idx + dir; if(target < 0 || target >= eras.length) return; const temp = eras[idx]; eras[idx] = eras[target]; eras[target] = temp; window.sync(); window.openEraModal(); };
  window.promptNewEra = () => { const n = prompt("새 시대 이름"); if(n) { eras.push(n); window.sync(); window.openEraModal(); } };
  window.promptNewProject = () => { const n = prompt("새 프로젝트 이름"); if(n) window.loadP(n); };

  window.onload = () => { const last = localStorage.getItem('lastProject'); if(last) window.loadP(last); else window.openLoadModal(); };
</script>
</body>
</html>
