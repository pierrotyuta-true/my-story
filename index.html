<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STORY MASTER v16.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --primary: #4dabf7; --bg: #f8f9fa; --text: #212529; --card: #fff; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Pretendard', sans-serif; background: var(--bg); overflow: hidden; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* 헤더 & 네비게이션 */
        .header-wrap { position: fixed; top: 0; width: 100%; background: #fff; z-index: 1000; border-bottom: 1px solid #eee; }
        .top-info { height: 50px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
        .tabs { display: flex; justify-content: center; gap: 30px; height: 45px; align-items: center; }
        .tab-item { font-size: 14px; font-weight: 800; color: #adb5bd; cursor: pointer; padding-bottom: 4px; border-bottom: 2px solid transparent; }
        .tab-item.active { color: var(--primary); border-bottom-color: var(--primary); }

        /* 컨텐츠 뷰 */
        .main-view { margin-top: 100px; height: calc(100vh - 190px); overflow-y: auto; padding: 15px; }
        .view { display: none; }
        .view.active { display: block; }

        /* 타임라인 카드 스타일 */
        .tl-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; }
        .tl-date { color: var(--primary); font-size: 11px; font-weight: 800; margin-bottom: 5px; }
        .tl-title { font-weight: 700; font-size: 15px; }

        /* 캐릭터 아이콘 그리드 */
        .char-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .char-item { text-align: center; }
        .char-circle { width: 60px; height: 60px; border-radius: 20px; background: #eee; margin: 0 auto 5px; display: flex; align-items: center; justify-content: center; font-size: 20px; overflow: hidden; border: 2px solid #fff; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }

        /* 모달 시스템 (타임라인/캐릭터 공용) */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .modal-box { background: #fff; width: 88%; max-width: 320px; border-radius: 25px; padding: 20px; }
        .s-input { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 10px; border: 1px solid #eee; background: #fcfcfc; font-size: 13px; outline: none; }
        .btn-blue { width: 100%; padding: 12px; border-radius: 12px; background: var(--primary); color: #fff; border: none; font-weight: 800; cursor: pointer; margin-top: 10px; }

        /* 하단 메뉴 바 */
        .bottom-nav { position: fixed; bottom: 25px; left: 20px; right: 20px; height: 60px; background: #fff; border-radius: 30px; display: flex; justify-content: space-around; align-items: center; z-index: 5000; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .nav-side { background: none; border: none; font-size: 12px; font-weight: 800; color: #adb5bd; width: 80px; }
        .nav-main { width: 50px; height: 50px; background: var(--primary); border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-top: -35px; border: 4px solid #fff; box-shadow: 0 4px 10px rgba(77,171,247,0.3); }

        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 11px; z-index: 10001; opacity: 0; transition: 0.3s; pointer-events: none; }
    </style>
</head>
<body>

<div class="header-wrap">
    <div class="top-info">
        <div style="font-size:16px; font-weight:900; color:var(--primary);">STORY MASTER</div>
        <div style="font-weight:800;" onclick="openProj()">이그리예가 ▾</div>
        <button onclick="cloudSave()" style="border:none; background:none; color:var(--primary); font-weight:800; font-size:12px;">클라우드 저장</button>
    </div>
    <div class="tabs">
        <div id="t-timeline" class="tab-item active" onclick="goTab('timeline')">타임라인</div>
        <div id="t-story" class="tab-item" onclick="goTab('story')">스토리</div>
        <div id="t-char" class="tab-item" onclick="goTab('char')">캐릭터</div>
    </div>
</div>

<div class="main-view">
    <div id="v-timeline" class="view active"></div>
    <div id="v-story" class="view">
        <textarea id="story-db" class="s-input" style="height:350px; line-height:1.6;" placeholder="이그리예가의 이야기를 적어보세요..."></textarea>
    </div>
    <div id="v-char" class="view"><div class="char-grid" id="char-list"></div></div>
</div>

<footer class="bottom-nav">
    <button id="l-btn" class="nav-side" onclick="uiAct('left')">목록</button>
    <div class="nav-main" id="m-btn" onclick="uiAct('main')">+</div>
    <button id="r-btn" class="nav-side" onclick="uiAct('right')">시대</button>
</footer>

<div id="eventModal" class="modal-overlay"><div class="modal-box">
    <h3 id="modal-title">사건 등록</h3>
    <input type="text" id="e-date" class="s-input" placeholder="제국력 590년 1월">
    <input type="text" id="e-title" class="s-input" placeholder="사건 제목">
    <textarea id="e-desc" class="s-input" style="height:100px;" placeholder="상세 내용을 입력하세요"></textarea>
    <button class="btn-blue" onclick="saveEvent()">저장하기</button>
    <button class="btn-blue" style="background:#f1f3f5; color:#495057;" onclick="closeM('eventModal')">닫기</button>
</div></div>

<div id="charModal" class="modal-overlay"><div class="modal-box">
    <h3>캐릭터 등록</h3>
    <input type="text" id="c-name" class="s-input" placeholder="이름 (필수)">
    <div style="display:flex; gap:5px;"><input type="text" id="c-age" class="s-input" placeholder="나이"><input type="text" id="c-gen" class="s-input" placeholder="성별"></div>
    <input type="text" id="c-trait" class="s-input" placeholder="특징 (예: 차분함)">
    <button class="btn-blue" onclick="createChar()">생성하기</button>
    <button class="btn-blue" style="background:#f1f3f5; color:#495057;" onclick="closeM('charModal')">취소</button>
</div></div>

<div id="toast" class="toast"></div>

<script>
    let currentTab = 'timeline';
    const events = [];
    const characters = [];

    function goTab(t) {
        currentTab = t;
        document.querySelectorAll('.view, .tab-item').forEach(el => el.classList.remove('active'));
        document.getElementById('v-'+t).classList.add('active');
        document.getElementById('t-'+t).classList.add('active');
        
        const lb = document.getElementById('l-btn'), rb = document.getElementById('r-btn'), mb = document.getElementById('m-btn');
        if(t === 'timeline') { lb.innerText="목록"; rb.innerText="시대"; mb.innerText="+"; }
        else if(t === 'story') { lb.innerText="단락분리"; rb.innerText="목록보기"; mb.innerText="✓"; }
        else { lb.innerText="분류편집"; rb.innerText="순서변경"; mb.innerText="+"; }
    }

    function uiAct(type) {
        if(type === 'main') {
            if(currentTab === 'timeline') openM('eventModal');
            else if(currentTab === 'story') saveStory();
            else openM('charModal');
        } else { showToast(type + " 기능은 현재 개발 중입니다."); }
    }

    // 사건 저장 및 리스트 갱신
    function saveEvent() {
        const title = document.getElementById('e-title').value;
        const date = document.getElementById('e-date').value;
        if(!title) return showToast("제목을 입력해주세요.");
        
        events.push({title, date, desc: document.getElementById('e-desc').value});
        renderEvents();
        closeM('eventModal');
        showToast("사건이 타임라인에 추가되었습니다.");
    }

    function renderEvents() {
        const area = document.getElementById('v-timeline');
        area.innerHTML = events.map((ev, i) => `
            <div class="tl-card" onclick="viewDetail(${i})">
                <div class="tl-date">${ev.date}</div>
                <div class="tl-title">${ev.title}</div>
            </div>
        `).join('');
    }

    // 캐릭터 생성 및 즉시 반영
    function createChar() {
        const name = document.getElementById('c-name').value;
        if(!name) return showToast("이름을 입력해주세요.");
        
        characters.push({name});
        renderChars();
        closeM('charModal');
        showToast(name + " 캐릭터가 생성되었습니다.");
    }

    function renderChars() {
        const area = document.getElementById('char-list');
        area.innerHTML = characters.map(c => `
            <div class="char-item">
                <div class="char-circle">${c.name[0]}</div>
                <div style="font-size:11px; font-weight:700;">${c.name}</div>
            </div>
        `).join('');
    }

    function saveStory() { showToast("스토리 내용이 안전하게 저장되었습니다. ✓"); }
    function openM(id) { document.getElementById(id).style.display = 'flex'; }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }
    function showToast(m) { const t = document.getElementById('toast'); t.innerText=m; t.style.opacity=1; setTimeout(()=>t.style.opacity=0, 2000); }
</script>
</body>
</html>
