<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Yuta's Engine Pro (Auto-Push v20)</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    :root { --primary: #4dabf7; --bg: #f8f9fa; --line: #dee2e6; --index: #ffd43b; }
    body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); overflow: hidden; }
    
    .app-header { height: 50px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: fixed; top: 0; width: 100%; z-index: 1200; border-bottom: 1px solid #eee; box-sizing: border-box; }
    .top-nav { display: flex; justify-content: space-around; background: #fff; position: fixed; top: 50px; width: 100%; z-index: 1100; border-bottom: 1px solid #eee; height: 45px; align-items: center; }
    .nav-item { font-size: 13px; font-weight: 800; color: #adb5bd; }
    .nav-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); padding-bottom: 5px; }

    /* 타임라인 뷰 포트 보정 */
    .view { height: 100vh; width: 100vw; overflow-y: auto; overflow-x: hidden; padding-top: 110px; position: relative; box-sizing: border-box; }
    .tl-container { position: relative; width: 100%; min-height: 5000px; background-image: radial-gradient(#dee2e6 1.2px, transparent 1.2px); background-size: 30px 30px; }
    
    .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--line); transform: translateX(-50%); z-index: 1; }
    .era-marker { position: absolute; left: 50%; transform: translateX(-50%); background: #222; color: #fff; padding: 10px 25px; border-radius: 30px; font-size: 14px; font-weight: 800; z-index: 5; white-space: nowrap; box-shadow: 0 5px 15px rgba(0,0,0,0.3); margin-top: 20px; }

    .card-wrap { position: absolute; width: 180px; z-index: 10; cursor: pointer; transition: transform 0.1s; touch-action: none; }
    .card-wrap.dragging { z-index: 100; transform: scale(1.08); box-shadow: 0 15px 40px rgba(0,0,0,0.2); }
    .card { width: 100%; min-height: 100px; background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); padding: 15px; box-sizing: border-box; border: 1px solid #eee; position: relative; z-index: 3; }
    .index-tab { position: absolute; width: 35px; height: 18px; background: var(--index); z-index: 2; border-radius: 5px 5px 0 0; top: -10px; right: 12px; }
    .card .date-tag { font-size: 11px; color: var(--primary); font-weight: 800; margin-bottom: 6px; }

    .bottom-modal { position: fixed; bottom: -100%; left: 0; width: 100%; background: white; z-index: 2000; transition: bottom 0.3s ease; border-radius: 25px 25px 0 0; padding: 25px; box-sizing: border-box; box-shadow: 0 -5px 25px rgba(0,0,0,0.1); max-height: 85vh; overflow-y: auto; }
    .bottom-modal.active { bottom: 0; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1900; }
    .overlay.active { display: block; }

    .fab { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 60px; height: 60px; background: var(--primary); border-radius: 50%; color: white; border: none; font-size: 32px; box-shadow: 0 5px 20px rgba(77,171,247,0.4); z-index: 1150; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>

<header class="app-header">
  <div style="font-weight: 900; color: var(--primary); font-size: 24px;">Y</div>
  <button style="background: var(--primary); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 800;" onclick="saveAll(true)">SAVE</button>
</header>

<nav class="top-nav">
  <div class="nav-item active">타임라인</div>
  <div class="nav-item">스토리</div>
  <div class="nav-item">캐릭터도감</div>
</nav>

<div id="timeline-view" class="view">
  <div class="tl-container" id="tl-canvas">
    <div class="center-line"></div>
  </div>
</div>

<button class="fab" onclick="openEventModal()">+</button>
<div id="overlay" class="overlay" onclick="closeAll()"></div>

<div id="detailModal" class="bottom-modal">
  <div id="detail-header" style="font-size: 11px; color: var(--primary); font-weight: 800; margin-bottom: 10px;"></div>
  <div id="detail-text-area" style="min-height:120px; line-height:1.6; white-space:pre-wrap; font-size:18px; font-weight:700; color:#333;"></div>
  <div style="display:flex; gap:10px; margin-top:20px;">
    <button onclick="switchToEdit()" style="flex:1; background:#f1f3f5; border:none; border-radius:12px; font-weight:800; height:50px;">수정</button>
    <button onclick="closeAll()" style="flex:1; background:#4dabf7; color:white; border:none; border-radius:12px; font-weight:800; height:50px;">확인</button>
  </div>
</div>

<div id="eventModal" class="bottom-modal">
  <h3 id="modal-title" style="margin:0 0 20px 0;">사건 기록</h3>
  <label style="font-size:12px; color:#888;">연대 선택</label>
  <select id="e-era" style="width:100%; padding:12px; border:1px solid #eee; border-radius:10px; margin-bottom:12px;"></select>
  <div style="display:flex; gap:10px;">
    <input type="number" id="e-year" placeholder="연도" style="flex:1; padding:12px; border:1px solid #eee; border-radius:10px;">
    <input type="number" id="e-month" placeholder="월" style="flex:1; padding:12px; border:1px solid #eee; border-radius:10px;">
  </div>
  <textarea id="e-text" rows="5" placeholder="내용을 입력하세요" style="width:100%; margin-top:12px; padding:12px; border:1px solid #eee; border-radius:10px; box-sizing:border-box;"></textarea>
  <button onclick="saveEvent()" style="width:100%; background:var(--primary); color:white; border:none; padding:15px; border-radius:12px; font-weight:800; margin-top:15px;">저장</button>
  <button onclick="deleteEvent()" id="btn-del" style="width:100%; margin-top:15px; background:none; border:none; color:#ff6b6b; font-size:12px; font-weight:800; display:none;">사건 삭제</button>
</div>

<script>
  const config = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
  firebase.initializeApp(config);
  const db = firebase.database();

  let state = { data: { storyboard: [], eras: ['제국력'] } };
  let currentId = null, isDragging = false, dragTarget = null;
  let offset = { x: 0, y: 0 }, longPressTimer = null;

  function renderTimeline() {
    const canvas = document.getElementById('tl-canvas');
    canvas.querySelectorAll('.card-wrap, .era-marker').forEach(el => el.remove());

    const sortedItems = [...state.data.storyboard].sort((a,b) => a.year - b.year || a.month - b.month);
    let currentY = 150; // 시작 높이 상향 (상단 바 간섭 방지)
    const centerX = canvas.offsetWidth / 2;

    const eras = [...new Set(sortedItems.map(i => i.era))];
    if(eras.length === 0) eras.push(state.data.eras[0]);

    eras.forEach(eraName => {
      const eraItems = sortedItems.filter(i => i.era === eraName);
      
      // 연대 마커 (검은 박스)
      const eraEl = document.createElement('div');
      eraEl.className = 'era-marker';
      eraEl.innerText = eraItems.length > 0 ? `${eraName} ${eraItems[0].year}년 ~` : `${eraName} 연대`;
      eraEl.style.top = `${currentY}px`;
      canvas.appendChild(eraEl);

      currentY += 100;

      eraItems.forEach((item, idx) => {
        const wrap = document.createElement('div');
        wrap.className = 'card-wrap';
        wrap.id = `card-${item.id}`;
        
        // 겹침 방지 및 자동 배치 로직
        if (!item.posX || !item.posY) {
          item.posX = idx % 2 === 0 ? centerX - 220 : centerX + 40;
          item.posY = currentY + (idx * 150);
        }
        
        wrap.style.left = `${item.posX}px`;
        wrap.style.top = `${item.posY}px`;

        wrap.innerHTML = `
          ${item.branches?.length > 0 ? '<div class="index-tab"></div>' : ''}
          <div class="card">
            <div class="date-tag">${item.year}년 ${item.month}월</div>
            <div class="content">${item.text}</div>
          </div>`;

        wrap.addEventListener('touchstart', handleTouchStart, {passive: false});
        wrap.addEventListener('mousedown', handleTouchStart);
        canvas.appendChild(wrap);
      });
      currentY += (eraItems.length * 160) + 250;
    });
  }

  function handleTouchStart(e) {
    const target = e.currentTarget;
    const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
    const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;

    longPressTimer = setTimeout(() => {
      isDragging = true;
      dragTarget = target;
      dragTarget.classList.add('dragging');
      const rect = dragTarget.getBoundingClientRect();
      const canvasRect = document.getElementById('tl-canvas').getBoundingClientRect();
      offset.x = clientX - rect.left;
      offset.y = clientY - rect.top;
      
      document.addEventListener('touchmove', onDrag, {passive: false});
      document.addEventListener('mousemove', onDrag);
      document.addEventListener('touchend', endDrag);
      document.addEventListener('mouseup', endDrag);
    }, 400);

    target.ontouchend = target.onmouseup = () => {
      clearTimeout(longPressTimer);
      if (!isDragging) {
        const id = parseInt(target.id.replace('card-', ''));
        openDetail(id);
      }
    };
  }

  function onDrag(e) {
    if (!isDragging || !dragTarget) return;
    e.preventDefault(); // 스크롤 차단
    
    const canvas = document.getElementById('tl-canvas');
    const canvasRect = canvas.getBoundingClientRect();
    const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
    const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;

    let x = clientX - canvasRect.left - offset.x;
    let y = clientY - canvasRect.top - offset.y;

    // 중앙선 스냅
    const centerX = canvas.offsetWidth / 2;
    if (Math.abs(x + 180 - centerX) < 60) x = centerX - 220;
    else if (Math.abs(x - centerX) < 60) x = centerX + 40;

    dragTarget.style.left = `${x}px`;
    dragTarget.style.top = `${y}px`;

    // 실시간 겹침 감지 및 밀어내기
    checkCollisions(dragTarget);
  }

  function checkCollisions(activeEl) {
    const activeId = activeEl.id;
    const activeTop = parseInt(activeEl.style.top);
    const wraps = document.querySelectorAll('.card-wrap');
    
    wraps.forEach(target => {
      if (target.id === activeId) return;
      const targetTop = parseInt(target.style.top);
      // 겹치면 아래로 20px씩 밀어냄
      if (Math.abs(activeTop - targetTop) < 100 && activeEl.style.left === target.style.left) {
        target.style.top = `${targetTop + 20}px`;
      }
    });
  }

  function endDrag() {
    if (isDragging && dragTarget) {
      const id = parseInt(dragTarget.id.replace('card-', ''));
      const item = state.data.storyboard.find(s => s.id === id);
      
      item.posX = parseInt(dragTarget.style.left);
      item.posY = parseInt(dragTarget.style.top);

      dragTarget.classList.remove('dragging');
      saveAll(false);
      renderTimeline();
    }
    isDragging = false;
    dragTarget = null;
    document.removeEventListener('touchmove', onDrag);
    document.removeEventListener('mousemove', onDrag);
  }

  function openDetail(id) {
    currentId = id;
    const ev = state.data.storyboard.find(s => s.id === id);
    if (!ev) return;
    document.getElementById('detail-header').innerText = `${ev.era} ${ev.year}년 ${ev.month}월`;
    document.getElementById('detail-text-area').innerText = ev.text;
    showModal('detailModal');
  }

  function saveEvent() {
    const text = document.getElementById('e-text').value.trim();
    const year = parseInt(document.getElementById('e-year').value) || 0;
    const month = parseInt(document.getElementById('e-month').value) || 1;
    const era = document.getElementById('e-era').value;
    if(!text) return;

    if(currentId) {
      const idx = state.data.storyboard.findIndex(s => s.id === currentId);
      state.data.storyboard[idx] = { ...state.data.storyboard[idx], era, year, month, text };
    } else {
      state.data.storyboard.push({ id: Date.now(), era, year, month, text, branches: [], posX: null, posY: null });
    }
    closeAll(); renderTimeline(); saveAll(false);
  }

  function openEventModal() {
    currentId = null; document.getElementById('modal-title').innerText = "새 사건 기록";
    document.getElementById('e-text').value = ""; document.getElementById('btn-del').style.display = 'none';
    updateEraSelect(); showModal('eventModal');
  }

  function switchToEdit() {
    const ev = state.data.storyboard.find(s => s.id === currentId); closeAll();
    document.getElementById('modal-title').innerText = "기록 수정";
    document.getElementById('e-year').value = ev.year; document.getElementById('e-month').value = ev.month;
    document.getElementById('e-text').value = ev.text; document.getElementById('btn-del').style.display = 'block';
    updateEraSelect(ev.era); showModal('eventModal');
  }

  function deleteEvent() { if(confirm('삭제할까요?')) { state.data.storyboard = state.data.storyboard.filter(s => s.id !== currentId); renderTimeline(); closeAll(); saveAll(false); } }
  function updateEraSelect(sel) { document.getElementById('e-era').innerHTML = state.data.eras.map(e => `<option ${e===sel?'selected':''}>${e}</option>`).join(''); }
  function showModal(id) { document.getElementById('overlay').classList.add('active'); document.getElementById(id).classList.add('active'); }
  function closeAll() { document.querySelectorAll('.bottom-modal').forEach(m => m.classList.remove('active')); document.getElementById('overlay').classList.remove('active'); }
  function saveAll(m) { db.ref('users/Yuta/projects/기본').set(state.data); if(m) alert("저장되었습니다!"); }

  window.onload = () => { db.ref('users/Yuta/projects/기본').on('value', s => { if(s.val()) { state.data = s.val(); renderTimeline(); } }); };
</script>
</body>
</html>
