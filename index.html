<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>스토리마스터 Pro</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <style>
    :root { --primary: #4dabf7; --bg: #f8f9fa; --line: #e9ecef; --branch: #adb5bd; }
    body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); user-select: none; padding-bottom: 80px; color: #333; overflow-x: hidden; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    .header-container { position: fixed; top: 0; width: 100%; background: white; z-index: 1000; border-bottom: 1px solid #eee; }
    .header { height: 55px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
    .search-bar { display: flex; gap: 8px; overflow-x: auto; padding: 10px 20px; scrollbar-width: none; }
    .filter-tag { padding: 6px 14px; border-radius: 20px; background: #f1f3f5; font-size: 11px; font-weight: 800; white-space: nowrap; cursor: pointer; }
    .filter-tag.active { background: var(--primary); color: white; }

    .timeline-container { position: relative; width: 100%; max-width: 500px; margin: 115px auto 0; min-height: 100vh; padding-left: 20px; }
    /* 라인을 왼쪽으로 살짝 치우치게 하여 '나란히' 배치 공간 확보 */
    .center-line { position: absolute; left: 40px; top: 0; bottom: 0; width: 2px; background: var(--line); z-index: 1; }
    .year-marker { position: relative; width: fit-content; margin: 30px 0 20px 15px; padding: 6px 16px; background: #495057; color: white; border-radius: 20px; font-size: 11px; font-weight: 800; z-index: 10; }
    
    .row { position: relative; margin-bottom: 10px; padding-left: 50px; cursor: grab; z-index: 2; transition: transform 0.2s; }
    .node { width: 10px; height: 10px; background: white; border: 2.5px solid var(--primary); border-radius: 50%; position: absolute; left: 36px; top: 32px; z-index: 5; box-shadow: 0 0 0 4px var(--bg); }
    
    .card-wrapper { display: flex; align-items: flex-start; gap: 10px; }
    .card { background: #fff; width: 150px; min-height: 70px; border-radius: 12px; padding: 15px 12px; box-shadow: 0 3px 10px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.03); z-index: 10; position: relative; }
    .card-month { font-size: 9px; font-weight: 900; color: #adb5bd; margin-bottom: 5px; }
    .card-content { font-size: 11px; line-height: 1.4; font-weight: 600; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; pointer-events: none; }

    .branch-container { display: flex; flex-direction: column; gap: 4px; padding-top: 10px; }
    .branch-cube { width: 16px; height: 16px; background: var(--branch); border-radius: 4px; border: 2.5px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.15); }

    /* 모달 */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 4000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
    .modal-content { background: white; width: 88%; max-width: 330px; padding: 25px; border-radius: 25px; }
    .edit-grid { display: flex; gap: 8px; margin-bottom: 12px; }
    select, input, textarea { padding: 11px; border-radius: 10px; border: 1px solid #eee; font-size: 13px; background: #f9f9f9; width: 100%; outline: none; }
    .btn-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .btn-half { flex: 1; padding: 14px; border: none; border-radius: 14px; font-weight: 800; font-size: 14px; }
    .del-box-btn { background: #e9ecef; color: #868e96; border: none; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; }

    .nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; }
    .nav-btn { background: none; border: none; font-size: 10px; font-weight: 800; color: #adb5bd; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  </style>
</head>
<body>

<div class="header-container">
    <div class="header">
        <div style="font-size:16px; font-weight:900; color:var(--primary);" id="projectTitle">연력표 선택</div>
        <button onclick="window.saveToCloud()" style="background:var(--primary); color:white; border:none; padding:7px 16px; border-radius:10px; font-weight:800; font-size:12px;">저장</button>
    </div>
    <div class="search-bar" id="searchBar"></div>
</div>

<div class="timeline-container" id="timeline"></div>

<div id="viewModal" class="modal"><div class="modal-content"><div id="viewDate" style="font-size:11px; font-weight:900; color:var(--primary); margin-bottom:8px;"></div><div id="viewBody" style="font-size:14px; line-height:1.6; margin-bottom:15px; white-space:pre-wrap;"></div><div id="viewTags" style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:15px;"></div><div class="btn-row"><button class="btn-half" style="background:var(--primary); color:white;" onclick="window.goToEdit()">수정</button><button id="addBranchBtn" class="btn-half" style="background:#868e96; color:white;" onclick="window.addBranch()">가지 추가</button></div><button style="width:100%; padding:12px; border:none; border-radius:14px; background:#f1f3f5;" onclick="window.closeModal('viewModal')">닫기</button></div></div>
<div id="editModal" class="modal"><div class="modal-content"><div class="edit-grid"><div style="flex:1.2"><select id="eraType"></select></div><div style="flex:2"><input type="number" id="eYear"></div><div style="flex:1"><select id="eMonth"><script>for(let i=1;i<=12;i++)document.write(`<option value="${i}">${i}월</option>`)</script></select></div></div><div id="colorPicker" style="display:flex; justify-content:space-between; margin-bottom:15px;"></div><div id="charTagSelector" style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:15px;"></div><textarea id="eContent" rows="5"></textarea><div class="btn-row"><button class="btn-half" style="background:var(--primary); color:white;" onclick="window.saveScene()">완료</button><button id="delBtn" class="btn-half" style="background:#fff0f0; color:#ff8787;" onclick="window.deleteScene()">삭제</button></div><button style="width:100%; padding:12px; border:none; border-radius:14px; background:#f1f3f5;" onclick="window.closeModal('editModal')">취소</button></div></div>
<div id="branchInputModal" class="modal"><div class="modal-content"><h3 id="bTitle">가지 기록</h3><textarea id="bContent" rows="4"></textarea><div class="btn-row"><button class="btn-half" style="background:var(--primary); color:white;" onclick="window.confirmBranch()">저장</button><button class="btn-half" onclick="window.closeModal('branchInputModal')">취소</button></div></div></div>
<div id="eraModal" class="modal"><div class="modal-content"><h3>시대 관리</h3><div id="eraList"></div><button class="btn-half" onclick="window.closeModal('eraModal')">닫기</button></div></div>
<div id="charModal" class="modal"><div class="modal-content"><h3>캐릭터 관리</h3><div id="charList"></div><button class="btn-half" onclick="window.closeModal('charModal')">닫기</button></div></div>
<div id="loadModal" class="modal"><div class="modal-content"><h3>목록</h3><div id="projectList"></div><button class="btn-half" onclick="window.closeModal('loadModal')">닫기</button></div></div>

<div class="nav">
    <button class="nav-btn" onclick="window.openLoadModal()">목록</button>
    <button class="nav-btn" onclick="window.openEraModal()">시대</button>
    <button class="nav-btn" style="font-size:35px; color:var(--primary);" onclick="window.addScene()">+</button>
    <button class="nav-btn" onclick="window.openCharModal()">캐릭터</button>
    <button class="nav-btn" onclick="location.reload()">갱신</button>
</div>

<script>
    const config = { apiKey: "AIzaSyCK3At50Eo49KIydPU6ibqtzZt0itO9-Oc", authDomain: "true-s.firebaseapp.com", databaseURL: "https://true-s-default-rtdb.firebaseio.com", projectId: "true-s" };
    firebase.initializeApp(config); const db = firebase.database();

    let storyboard = [], eras = ["공통"], chars = [], currentProject = null, editingId = null, selectedFilter = null;
    let selectedColor = "#eee", selectedChars = [], branchEditingIdx = null;
    const userColors = ["#eee", "#d0ebff", "#fff9db", "#d3f9d8", "#ffdeeb", "#eebefa", "#dae1e7", "#495057", "#ffd43b"];

    window.render = () => {
        const container = document.getElementById('timeline');
        if(!currentProject) return;
        container.innerHTML = '<div class="center-line"></div>';
        
        let filtered = selectedFilter ? storyboard.filter(s => (s.chars||[]).includes(selectedFilter)) : storyboard;
        // 날짜순 정렬
        filtered.sort((a,b) => (eras.indexOf(a.era) - eras.indexOf(b.era)) || (a.year - b.year) || (a.month - b.month));

        let lastMarker = "", lastTimeKey = "";

        filtered.forEach((sc) => {
            const marker = `${sc.era} ${sc.year}년`;
            const timeKey = `${sc.era}-${sc.year}-${sc.month}`;

            if(lastMarker !== marker) {
                container.innerHTML += `<div class="year-marker">${marker}</div>`;
                lastMarker = marker;
            }

            const row = document.createElement('div');
            row.className = 'row';
            row.dataset.id = sc.id;
            row.dataset.era = sc.era;
            row.dataset.year = sc.year;
            row.dataset.month = sc.month;

            // [핵심] 같은 월 그룹의 첫 번째 사건에만 노드(점) 표시
            const showNode = timeKey !== lastTimeKey;
            lastTimeKey = timeKey;

            row.innerHTML = `
                ${showNode ? '<div class="node"></div>' : ''}
                <div class="card-wrapper">
                    <div class="card" onclick="window.openViewer('${sc.id}')" style="border-left:5px solid ${sc.color}">
                        <div class="card-month">${sc.month}월</div>
                        <div class="card-content">${sc.text}</div>
                    </div>
                    <div class="branch-container">
                        ${(sc.branches || []).map((b, i) => `<div class="branch-cube" onclick="event.stopPropagation(); window.editBranch('${sc.id}', ${i})"></div>`).join('')}
                    </div>
                </div>`;
            container.appendChild(row);
        });

        // 지능형 드래그 앤 드롭
        new Sortable(container, {
            animation: 150,
            draggable: ".row",
            onEnd: (evt) => {
                const itemEl = evt.item;
                const prevEl = itemEl.previousElementSibling;
                const nextEl = itemEl.nextElementSibling;
                
                // 드롭된 위치의 주변 요소로부터 날짜 정보 획득
                let targetEra, targetYear, targetMonth;
                const ref = (prevEl && prevEl.dataset.year) ? prevEl : (nextEl && nextEl.dataset.year ? nextEl : null);

                if (ref) {
                    targetEra = ref.dataset.era;
                    targetYear = ref.dataset.year;
                    targetMonth = ref.dataset.month;
                    
                    // 데이터 업데이트
                    const targetIdx = storyboard.findIndex(s => s.id == itemEl.dataset.id);
                    if (targetIdx > -1) {
                        storyboard[targetIdx].era = targetEra;
                        storyboard[targetIdx].year = targetYear;
                        storyboard[targetIdx].month = targetMonth;
                        window.sync(); // DB 저장 및 리렌더링
                    }
                }
            }
        });
        window.updateSearchBar();
    };

    // [이하 모든 로직 및 삭제 버튼 기능은 이전 코드의 완성본을 그대로 유지]
    window.openEraModal = () => { document.getElementById('eraList').innerHTML = eras.map(e => `<div class="list-item" style="padding:10px; display:flex; justify-content:space-between;"><span>${e}</span>${e!=='공통'?`<button class="del-box-btn" onclick="window.delItem('eras','${e}')">삭제</button>`:''}</div>`).join(''); window.openModal('eraModal'); };
    window.openCharModal = () => { document.getElementById('charList').innerHTML = chars.map(c => `<div class="list-item" style="padding:10px; display:flex; justify-content:space-between;"><span>${c}</span><button class="del-box-btn" onclick="window.delItem('chars','${c}')">삭제</button></div>`).join(''); window.openModal('charModal'); };
    window.openLoadModal = () => { db.ref('projects').once('value').then(s => { const d = s.val(); document.getElementById('projectList').innerHTML = d ? Object.keys(d).map(k => `<div class="list-item" style="padding:10px; display:flex; justify-content:space-between;"><span onclick="window.loadP('${k}')" style="flex:1;">${k}</span><button class="del-box-btn" onclick="window.delProj('${k}')">삭제</button></div>`).join('') : ''; window.openModal('loadModal'); }); };
    window.delItem = (type, val) => { if(confirm("삭제?")) { if(type==='eras') eras = eras.filter(x=>x!==val); else chars = chars.filter(x=>x!==val); window.sync(); type==='eras'?window.openEraModal():window.openCharModal(); }};
    window.delProj = (k) => { if(confirm(`${k} 삭제?`)) db.ref('projects/'+k).remove().then(window.openLoadModal); };
    window.openViewer = (id) => { editingId = id; const s = storyboard.find(x => x.id == id); document.getElementById('viewDate').innerText = `${sc.era} ${s.year}년 ${s.month}월`; document.getElementById('viewBody').innerText = s.text; document.getElementById('viewTags').innerHTML = (s.chars || []).map(c => `<span style="background:#e7f5ff; color:#4dabf7; padding:4px 8px; border-radius:6px; font-size:10px; font-weight:800; margin-right:4px;">#${c}</span>`).join(''); window.openModal('viewModal'); };
    window.goToEdit = () => { const s = storyboard.find(x => x.id == editingId); document.getElementById('eContent').value = s.text; document.getElementById('eYear').value = s.year; document.getElementById('eraType').innerHTML = eras.map(e => `<option value="${e}">${e}</option>`).join(''); document.getElementById('eraType').value = s.era; document.getElementById('eMonth').value = s.month; selectedColor = s.color; selectedChars = [...(s.chars || [])]; window.updateColorUI(); window.updateCharUI(); window.closeModal('viewModal'); window.openModal('editModal'); };
    window.saveScene = () => { const text = document.getElementById('eContent').value.trim(); if(!text) return; const year = document.getElementById('eYear').value, month = document.getElementById('eMonth').value, era = document.getElementById('eraType').value; if(editingId && storyboard.find(s=>s.id==editingId)) { const idx = storyboard.findIndex(s=>s.id==editingId); storyboard[idx] = {...storyboard[idx], text, year, month, era, color: selectedColor, chars: selectedChars}; } else { storyboard.push({id: Date.now().toString(), text, year, month, era, color: selectedColor, chars: selectedChars, branches: []}); } window.sync(); window.closeModal('editModal'); };
    window.deleteScene = () => { if(confirm("삭제?")) { storyboard = storyboard.filter(s => s.id != editingId); window.sync(); window.closeModal('editModal'); } };
    window.updateColorUI = () => { document.getElementById('colorPicker').innerHTML = userColors.map(c => `<div class="dot" style="background:${c}; width:22px; height:22px; border-radius:50%; border:2px solid ${selectedColor===c?'var(--primary)':'white'}; box-shadow:0 0 0 1px #eee;" onclick="window.selectColor('${c}')"></div>`).join(''); };
    window.selectColor = (c) => { selectedColor = c; window.updateColorUI(); };
    window.updateCharUI = () => { document.getElementById('charTagSelector').innerHTML = chars.map(c => `<div class="mini-tag" style="background:${selectedChars.includes(c)?'var(--primary)':'#f1f3f5'}; color:${selectedChars.includes(c)?'white':'#333'}; padding:5px 10px; border-radius:8px; font-size:10px; font-weight:800;" onclick="window.toggleChar('${c}')">${c}</div>`).join(''); };
    window.toggleChar = (c) => { if(selectedChars.includes(c)) selectedChars = selectedChars.filter(x => x!==c); else selectedChars.push(c); window.updateCharUI(); };
    window.updateSearchBar = () => { const bar = document.getElementById('searchBar'); bar.innerHTML = `<div class="filter-tag ${selectedFilter===null?'active':''}" onclick="window.filterByChar(null)">전체</div>` + chars.map(c => `<div class="filter-tag ${selectedFilter===c?'active':''}" onclick="window.filterByChar('${c}')">${c}</div>`).join(''); };
    window.filterByChar = (name) => { selectedFilter = name; window.render(); };
    window.sync = () => { if(currentProject) db.ref('projects/'+currentProject).set({data: storyboard, eras, chars}).then(window.render); };
    window.openModal = (id) => document.getElementById(id).style.display = 'flex';
    window.closeModal = (id) => document.getElementById(id).style.display = 'none';
    window.addScene = () => { editingId = null; window.openModal('editModal'); document.getElementById('eraType').innerHTML = eras.map(e => `<option value="${e}">${e}</option>`).join(''); document.getElementById('eContent').value=""; };
    window.loadP = (k) => { currentProject = k; localStorage.setItem('lastProject', k); document.getElementById('projectTitle').innerText = k; db.ref('projects/'+k).on('value', s => { if(s.val()){ storyboard=s.val().data||[]; eras=s.val().eras||["공통"]; chars=s.val().chars||[]; window.render(); }}); window.closeModal('loadModal'); };
    window.onload = () => { const last = localStorage.getItem('lastProject'); if(last) window.loadP(last); else window.openLoadModal(); };
    window.editBranch = (id, idx) => { editingId = id; branchEditingIdx = idx; const s = storyboard.find(x => x.id == id); document.getElementById('bContent').value = s.branches[idx]; window.openModal('branchInputModal'); };
    window.addBranch = () => { branchEditingIdx = null; document.getElementById('bContent').value = ""; window.closeModal('viewModal'); window.openModal('branchInputModal'); };
    window.confirmBranch = () => { const val = document.getElementById('bContent').value.trim(); const s = storyboard.find(x => x.id == editingId); if(!s.branches) s.branches = []; if(branchEditingIdx===null){if(val) s.branches.push(val);} else {if(!val) s.branches.splice(branchEditingIdx,1); else s.branches[branchEditingIdx]=val;} window.sync(); window.closeModal('branchInputModal'); };
</script>
</body>
</html>
