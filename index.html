<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스토리마스터</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <nav id="top-nav">
            <div class="nav-container">
                <div class="nav-logo">STORY MASTER</div>
                <div class="nav-tabs">
                    <button class="tab-btn active" onclick="switchTab('timeline')">Timeline</button>
                    <button class="tab-btn" onclick="switchTab('story')">Story</button>
                </div>
            </div>
        </nav>

        <div id="tab-container">
            <section id="view-timeline" class="tab-view active">
                <div class="filter-bar">
                    <button class="filter-btn active">전체</button>
                    <button class="filter-btn">주요사건</button>
                    <button class="filter-btn">인물</button>
                </div>
                <div id="timeline-scroll-area" class="scroll-area dot-bg">
                    <div class="timeline-line"></div>
                    <div id="event-list"></div>
                </div>
                <button class="floating-add-btn" onclick="addEvent()">+</button>
            </section>

            <section id="view-story" class="tab-view">
                <div class="story-layout">
                    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
                    <aside id="sidebar">
                        <div class="sidebar-header">
                            <strong>Story List</strong>
                            <button class="add-icon" onclick="createNewStory()">+</button>
                        </div>
                        <ul id="story-list" class="scroll-area"></ul>
                    </aside>
                    <main class="main-editor">
                        <header class="editor-header">
                            <button id="sidebar-toggle" onclick="toggleSidebar()">☰</button>
                            <strong id="current-title">줄거리</strong>
                            <div class="actions">
                                <button class="sub-btn" onclick="makeSubDocument()">파트분리</button>
                                <button id="edit-btn" class="primary-btn" onclick="handleEdit()">편집 시작</button>
                            </div>
                        </header>
                        <div class="editor-content scroll-area">
                            <div class="paper">
                                <div id="viewer"></div>
                                <textarea id="editor" spellcheck="false" placeholder="줄거리를 입력하세요..."></textarea>
                            </div>
                        </div>
                    </main>
                </div>
            </section>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
